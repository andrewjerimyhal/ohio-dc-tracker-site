projected to roughly quadruple, from about 500 MW to about 2,000 MW, by 2027. Because AEP expects it will take 7-10 years for permanent transmission infrastructure to catch up with demand, AEP Ohio separately proposed onsite fuel-cell power generation as an interim bridge for large customers, including a 15-year contract with Cologix (and a separate 6-year contract with Amazon Web Services) to help serve central Ohio data-center load while transmission upgrades are built out. Delaware County Commissioner Jeff Benton publicly cited electricity demand as one of the 'minuses' associated with data centers generally, alongside job creation and tax revenue as 'pluses.'\"}, \"taxImplications\": {\"summary\": \"COL5, bundled with Cologix's Licking County project, received a 50%, 10-year Ohio state sales-tax exemption valued at about $42.3 million plus a separate local 10-year, 50% Delaware County property tax abatement, arriving just before Governor DeWine's statewide pause on new data-center tax breaks.\", \"detail\": \"In roughly June 2026, the Ohio Tax Credit Authority approved a 50%, 10-year sales-tax exemption for Cologix Inc./Cologix US, Inc. covering both the Orange Township (Delaware County, i.e., COL5) and Johnstown (Licking County) projects jointly, valued at approximately $42.3 million; combined with a prior 2022 award, Cologix's cumulative Ohio state tax abatements were reported to exceed $50 million. In exchange, Cologix committed to $1.17 billion in combined capital investment, 90 FTE jobs, and $10 million in new annual payroll, and to operate the facilities for at least 13 years. Separately, Delaware Source reported the smaller (COL5) project also receiving a 10-year, 50% property tax abatement from Delaware County government plus an additional income tax break and another property-tax subsidy mechanism; specific school-district PILOT/hold-harmless payment terms for the Olentangy Local School District were not broken out in publicly available reporting reviewed. This was one of the last data-center incentives approved before Gov. Mike DeWine announced a statewide pause on new data-center sales-tax exemption requests (the Cologix deal was explicitly carved out/exempted from that pause as 'already in the works'), amid criticism from some state legislators, including Rep. Sean P. Brennan [D-Parma], that cumulative 2025-era data-center exemptions statewide were approaching $2.2 billion while school districts faced funding pressure.\"}, \"environmentalImpact\": {\"summary\": \"Cologix describes COL5 as using a closed-loop cooling system designed to minimize water withdrawal, sited within an existing Orange Township industrial park; specific Ohio EPA air-permit records for backup diesel generators were not located in public filings reviewed.\", \"detail\": \"Cologix's own materials, echoed in the Delaware County Regional Planning & Community Development newsletter, describe COL5 as utilizing 'a closed-loop mechanical system for minimal water usage.' Delaware County Commissioner Jeff Benton publicly flagged water usage (alongside electricity demand) as a community concern associated with data centers generally, while also stating the project was 'situating the facility appropriately in an industrial park that is designed for this kind of use,' implying the site was pre-zoned/planned for heavy commercial-industrial use, which should limit incremental land-disturbance concerns relative to greenfield development. Stormwater/erosion control on Delaware County projects of this type is typically administered through the County Engineer's Drainage, Erosion and Sediment Control (DESC) program, but no COL5-specific stormwater permit record was located. Data centers of this scale typically require backup diesel generators subject to Ohio EPA permit-by-rule (PBR) requirements for emergency generators; no COL5-specific Ohio EPA air-permit record was found in this research, so generator-specific air-permit details are Not publicly disclosed based on available search results.\"}, \"waterLoop\": {\"answer\": \"Yes\", \"detail\": \"COL5 is described by Cologix and by the Delaware County Regional Planning & Community Development office as using a 'closed-loop mechanical system for minimal water usage.' This is consistent with Cologix's broader corporate sustainability claims, which state the company achieved a fleet-wide average Water Usage Effectiveness (WUE) of 0.203 in 2024 (versus an industry average of about 1.8) and that its closed-loop, liquid-to-chip cooling designs 'eliminate the need for evaporative cooling towers and significantly reduce water usage' compared to legacy air-cooled/evaporative designs. No source reviewed described COL5 as using an open-loop or evaporative cooling-tower system.\"}, \"timeline\": \"2014: Cologix enters the Columbus, Ohio market (COL1-COL4 built out in subsequent years).\\nPre-2025: Cologix assembles a 28-acre site at the southeast corner of Green Meadows Drive and Home Road in Orange Township, Delaware County (an existing industrial park area near Lewis Center).\\nJune 18, 2025: Delaware County's regional planning office reports Cologix has 'started work' on the COL5 site — construction/site preparation groundbreaking.\\nThroughout 2025-2026: Construction of Phase 1 (135,000 sq ft building, ~60,000 sq ft raised floor, 25 MW) proceeds; Phase 1 building permit valuation reported at roughly $274 million.\\nNovember 2024 (context, separate project): Cologix separately announces an $7 billion, up to 800 MW, 2 million sq ft, 8-building 'Johnstown Campus' on 154 acres in Licking County — a much larger, distinct facility from COL5, but bundled with it for state-incentive purposes.\\n~Late May 2026: Gov. Mike DeWine announces a statewide pause on new data-center sales-tax exemption requests pending legislative review by a special Data Center Study Commission, but exempts the already-underway Cologix project from the pause.\\n~June 1-3, 2026: The Ohio Tax Credit Authority approves a combined 50%/10-year sales-tax exemption (~$42.3 million) for Cologix's Delaware County (COL5) and Licking County (Johnstown) projects — one of the last such approvals before the moratorium takes effect.\\nQ3 2026 / Fall 2026: COL5 Phase 1 targeted to be 'ready for service.'\\nBeyond 2026: Additional phases anticipated to bring the Orange Township campus to a total of roughly 120 MW of capacity.\", \"investors\": \"Sole named developer/operator is Cologix Inc. / Cologix US, Inc., a privately held, Denver, Colorado-headquartered data center and interconnection company (COL5 is its fifth Columbus-area facility, following COL1-COL4). No separate joint-venture partner, outside equity investor, or named private landowner/seller for the 28-acre Orange Township parcel was disclosed in public reporting reviewed. The project was supported through Ohio's economic-development apparatus — JobsOhio and the Ohio Tax Credit Authority reviewed and approved the state incentive package, and Delaware County's economic development office (rather than Orange Township trustees) is reported to have coordinated site selection/negotiation. Cologix is separately pursuing a much larger, financially distinct $7 billion / 800 MW 'Johnstown Campus' in neighboring Licking County, underscoring the company's broader central-Ohio expansion strategy (over $1.1 billion combined investment figure cited by Columbus Region economic-development press materials covers both the Orange Township and Johnstown projects together).\", \"politicalContext\": \"Delaware County Commissioner Jeff Benton [R] (Delaware County Republican Party Central Committee member) publicly weighed in on the project, stating 'There are pluses and minuses to a data center,' citing job creation and increased property tax revenue as benefits while flagging electricity demand and water usage as concerns; he also stated, 'This investment represents long-term value for our community and the people who live and work here, while situating the facility appropriately in an industrial park that is designed for this kind of use.' Delaware County Commissioner Gary Merrell [R] (elected 2012, multiple terms as Board President/Vice President) sits on the three-member commission that approved the local property-tax and income-tax incentives, though no direct on-record quote from him about this specific project was found. Orange Township Trustee Erica Fouss stated she remains 'data center neutral' pending further training from the Ohio Township Association, and said township trustees were not involved in selecting the COL5 site — that process was coordinated through Delaware County's economic development efforts — while acknowledging the project is good for economic development 'from a township perspective.' Her party affiliation could not be reliably confirmed from primary sources in this research (Ohio township trustee races are officially nonpartisan on the ballot), so it is not tagged. At the state level, Gov. Mike DeWine [R] announced a pause on new data-center sales-tax exemptions in late May 2026 while explicitly carving out the already-underway Cologix project so it could still receive final Ohio Tax Credit Authority approval. State Rep. Sean P. Brennan [D] (D-Parma) publicly criticized the resulting $42.3 million exemption, noting that data-center exemptions approved since 2025 were approaching $2.2 billion statewide 'while school districts are facing funding reductions, families are worried about rising utility, property tax, and rent costs,' and noted he was the sole Democrat to initially co-sponsor legislation creating a Data Center Study Commission, though he said he supported the pause on further exemptions.\", \"sources\": [\"https://regionalplanning.co.delaware.oh.us/wp-content/uploads/sites/17/2025/06/ORA-Cologix-starts-work-06.18.25.pdf\", \"https://www.delawaresource.com/2026/06/03/orange-township-data-center-among-last-projects-approved-before-ohio-tax-break-pause/\", \"https://bluewaterhealthyliving.com/news/national-news/ohio/data-center-operator-starts-work-on-1-billion-delaware-complex-part-of-larger-expansion/\", \"https://columbusregion.com/press-release/cologix-expands-in-central-ohio/\", \"https://cologix.com/data-centers/columbus/col5/\", \"https://cologix.com/resources/spec-sheets/col5-data-center-spec-sheet/\", \"https://www.datacenters.com/cologix-col5\", \"https://www.datacentermap.com/usa/ohio/columbus/cologix-col5/\", \"https://hs.getobedio.com/blog/worthington-council-reviews-274m-cologix-data-center-expansion\", \"https://www.aepohio.com/company/news/view?releaseID=9242\", \"https://dailyenergyinsider.com/news/42710-aep-ohio-identifies-routes-for-two-electric-transmission-lines-for-delaware-licking-counties/\", \"https://www.wvxu.org/2025-02-20/aep-ohio-proposes-onsite-fuel-cell-power-generation-for-aws-cologix-data-centers\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://signalohio.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://ohiohouse.gov/members/sean-p-brennan/news/rep-brennan-voices-disappointment-over-additional-423m-data-center-tax-break-while-schools-face-funding-challenges-145318\", \"https://www.edgeir.com/cologix-to-invest-7b-in-central-ohio-for-800mw-ai-ready-data-center-expansion-20241122\", \"https://www.datacenterdynamics.com/en/news/cologix-invests-7bn-in-licking-county-ohio-data-center-campus/\", \"https://cologix.com/resources/blogs/how-cologix-champions-sustainability/\", \"https://ballotpedia.org/Jeff_Benton_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"https://ballotpedia.org/Gary_Merrell_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"http://delawaregop.org/commissioner-jeff-benton-sworn-in/\"]}, \"ts\": 1784272480000}", "v67_dc_undisclosedcipher-mining-ulysses-site": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed as a groundbreaking date. Site acquisition was announced December 23, 2025 (GlobeNewswire/Cipher Mining press release); Cipher states the site is 'on track to energize in the fourth quarter of 2027.' Local Washington County reporting indicates the developer (HashWorks Powered Land Waterford LLC, tied to Sabre 56 and Cipher Digital) began quietly acquiring/optioning land in Waterford Township before the public announcement, with residents saying they first learned of the project 'at the start of' 2026 and county commissioners signing an NDA with developers in January 2026. No specific construction/groundbreaking date has been publicly reported as of this research.\", \"powerMW\": \"200 MW (195-acre site; secured capacity from AEP Ohio with interconnection approvals to participate in the PJM market). This site is part of Cipher's broader 3.4 GW, 8-site national development pipeline as of the December 2025 announcement.\", \"sizeSqFt\": \"Not publicly disclosed\", \"totalInvestment\": \"Not directly disclosed by Cipher for this specific site. Analysts/press have estimated $1.8-2.2 billion for the facility based on Cipher's industry-cited cost basis of $9-11 million per MW of critical computing load applied to 200 MW (see Yahoo Finance/Brave New Coin coverage of the Dec 23, 2025 announcement). Separately, local reporting confirms HashWorks Powered Land Waterford LLC paid $20 million for a ~275-acre parcel purchased from Waterford Township Trustee Doug McCutcheon alone, as part of assembling the 500+ acre site. Cipher's broader corporate financing for its data-center buildout pipeline (not site-specific) includes $1.1 billion in convertible notes issued previously and $333 million of additional senior secured notes priced November 20, 2025.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"The 200 MW Ulysses site has secured capacity and completed interconnection agreements with AEP Ohio, giving Cipher direct access to PJM, the largest wholesale electricity market in the US.\", \"detail\": \"Per Cipher's December 23, 2025 announcement, 'all utility agreements required to support the development of the site are in place' with AEP Ohio, and the site has secured interconnection approvals to participate in the PJM Interconnection market. The company cited the site's acreage, energization timeline (targeted Q4 2027), diverse fiber paths, and proximity to a major metropolitan area as reasons it is well-suited for HPC/AI hosting in addition to bitcoin mining. AEP Ohio's transmission planning documents in the vicinity reference the Sporn-Muskingum transmission corridor passing through Washington County, consistent with the site's location. No specific substation, transmission-line upgrade, or MW-load ratepayer-impact study specific to this project was found in public records located during this research.\"}, \"taxImplications\": {\"summary\": \"Washington County commissioners are negotiating a possible Community Reinvestment Area (CRA) property-tax abatement or Payment-in-Lieu-of-Taxes (PILOT) arrangement with the developer, but say no abatement has been approved as of spring 2026.\", \"detail\": \"Washington County signed a non-disclosure agreement with the data-center developers in January 2026 to facilitate negotiations. Commissioner Charlie L. Schilling (Vice President of the Board of County Commissioners) has publicly discussed both a Community Reinvestment Area agreement and a PILOT structure, under which the developer would make an annual lump-sum payment to the county in place of standard property taxes. In April 2026, commissioners publicly stated they had not approved any tax abatement for the project. Under Ohio law, any CRA, enterprise zone, or tax-increment-financing agreement requires formation of a tax incentive review council that must include affected township trustees, giving Waterford Township trustees a formal role in any eventual abatement terms. In June 2026, Schilling testified before an Ohio legislative body referred to in local press as the 'Ohio Joint Data Center Committee,' stating 'I support policies that keep Ohio competitive for these kinds of developments,' and noting that the developers could proceed with construction regardless of whether commissioners approve incentives, since the commissioners' role is limited to negotiating the best available terms, not blocking the project outright. No information was found confirming Ohio's specific sales/use-tax exemption treatment (or lack thereof) for crypto-mining equipment as applied to this project.\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental permit data (water withdrawal, air permit for backup generators) was found for the Waterford site; the project has drawn broad community concern over water use, diesel generator noise/emissions, and land-use disruption typical of large Ohio data-center proposals.\", \"detail\": \"Washington County residents have packed multiple commissioner meetings since February 2026 raising concerns about the Waterford project's proximity to farms and homes, its impact on land use, and fears about noise and water demand, mirroring statewide concerns documented by Sierra Club Ohio and other advocacy groups about data-center noise pollution (diesel backup generators can emit 200-600x the NOx of natural gas plants and produce ~90dB sound levels) and water consumption (large data centers can use up to 5 million gallons/day). No Ohio EPA water-withdrawal permit, air permit application, or land-disturbance permit specific to the Waterford/Ulysses site was located in public records during this research; these details were 'Not publicly disclosed' as of this research.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"Neither Cipher Mining's press release/investor materials nor local Washington County press coverage reviewed specify whether the Ulysses/Waterford facility will use closed-loop liquid cooling, air cooling, or immersion cooling. Cipher's other (Texas) sites reportedly use a mix of cooling approaches, but no site-specific technical disclosure for Ulysses was found.\"}, \"timeline\": \"December 23, 2025: Cipher Mining publicly announces acquisition of the 200 MW, 195-acre 'Ulysses' site in Ohio -- its first outside Texas -- with AEP Ohio capacity and PJM interconnection approvals already secured.\\nEarly 2026: Washington County residents in Waterford Township report first learning of the project; land assembly by HashWorks Powered Land Waterford LLC (500+ acres, including 275 acres bought from Township Trustee Doug McCutcheon for $20 million) becomes locally known.\\nJanuary 2026: Washington County Commissioners sign a non-disclosure agreement with developers to begin negotiations; commissioners publicly discuss the project at a January meeting marked by disputes over the NDA.\\nFebruary 2026: Residents pack commissioner meetings (reported by WTAP, Marietta Times, News and Sentinel) raising environmental and fiscal concerns.\\nMarch-May 2026: Commissioners repeatedly state they are pushing developers to hold a public meeting; residents petition Waterford Township trustees for a development moratorium, which trustees Randy Harper and Tim Rossiter decline to pass, citing legal advice.\\nMay 2026: A Waterford resident publicly calls for Trustee Doug McCutcheon to resign over his land sale to the developer.\\nApril 2026: Commissioners confirm no tax abatement has yet been approved.\\nMay 5, 2026: Cipher Mining formally rebrands to 'Cipher Digital Inc.' on its Q1 2026 earnings call, reflecting a strategic pivot toward hyperscale HPC/AI hosting.\\nJune 2026: Commissioner Charlie Schilling testifies before Ohio's legislative data-center committee about local tax and infrastructure implications.\\nJuly 2026 (present): Residents continue asking commissioners for help/answers; no public meeting with developers has yet been confirmed as held; site remains in pre-construction/negotiation phase.\\nQ4 2027: Target energization date per Cipher's original announcement.\", \"investors\": \"Cipher Mining Inc. (NASDAQ: CIFR), a publicly traded bitcoin-mining-turned-HPC/AI data center developer, is the site's ultimate corporate sponsor; the company rebranded to Cipher Digital Inc. in May 2026. Land for the site was assembled/leased through HashWorks Powered Land Waterford LLC, a real-estate holding entity based in Marietta, OH that describes itself as focused on 'the convergence of energy transition and the need for digital computing infrastructure' and which holds 500+ acres in Waterford Township. Local and trade press (Data Center Dynamics/Blockspace) report the project LLCs are tied to both Sabre 56 (a data-center development/engineering consulting firm) and Cipher Digital. Known landowner-sellers include Waterford Township Trustee Doug McCutcheon, who sold approximately 275 acres of his own land to the developer for $20 million -- a transaction that has become a local controversy given his elected position. Cipher's project-level financing draws on broader corporate capital raises, including $1.1 billion in convertible notes and $333 million in additional senior secured notes priced November 20, 2025, earmarked for data-center/HPC development across its pipeline.\", \"politicalContext\": \"Waterford Township Trustee Doug McCutcheon has faced public calls to resign (reported by WOUB, May 2026) after residents learned he sold ~275 acres of his own land to the project's developer for $20 million while serving as a township official with zoning/land-use authority over the same development -- a conflict-of-interest allegation; his party affiliation was not confirmed in records found (Ohio township trustee races are low-profile local contests and no partisan tag could be verified). Fellow Waterford Township Trustees Randy Harper and Tim Rossiter declined to enact a moratorium on data-center development despite resident requests, stating they were advised against it; their party affiliations were not confirmed. Washington County Board of Commissioners -- James W. Booth (President), Charlie L. Schilling (Vice President), and Kevin J. Ritter -- have taken the lead in negotiating with developers; Commissioner Schilling has been the most publicly vocal, stating 'I support policies that keep Ohio competitive for these kinds of developments' and testifying to an Ohio legislative 'Joint Data Center Committee' in June 2026 about PILOT/tax-relief structures; none of the three sitting commissioners' party affiliations could be confirmed via public records located in this research. Separately, Washington County's November 2026 election results (for terms beginning January 2027, and therefore not necessarily reflecting the board that handled this controversy) show commissioner seats won by Brian G. Whalin [D], Stephanie Lang [R], and Eddie Place [R] -- Place having previously been sworn in as a sitting Washington County Commissioner in January 2025, though it is unclear from available sources whether he was concurrently serving alongside Booth/Schilling/Ritter or in a staggered seat. No statements from Ohio Governor Mike DeWine [R], Ohio's Washington County state house/senate delegation, or federal officials specifically addressing the Ulysses/Waterford project were found in this research; if such statements exist they were not surfaced before the session's search budget was exhausted.\", \"sources\": [\"https://investors.ciphermining.com/news-releases/news-release-details/cipher-mining-announces-acquisition-200-mw-site-ohio\", \"https://www.globenewswire.com/news-release/2025/12/23/3209864/0/en/Cipher-Mining-Announces-Acquisition-of-200-MW-Site-in-Ohio.html\", \"https://www.theminermag.com/news/2025-12-23/cipher-ohio-hpc-pjm\", \"https://www.datacenterdynamics.com/en/news/cipher-mining-acquires-land-for-200mw-data-center-site-in-ohio/\", \"https://blockspace.media/insight/cipher-mining-acquires-200-mw-ohio-site-for-ai-workloads/\", \"https://x.com/CipherInc/status/2003458122107543670\", \"https://finance.yahoo.com/news/cipher-mining-acquires-200-mw-145138362.html\", \"https://bravenewcoin.com/insights/cipher-mining-enters-us-wholesale-power-market-with-ohio-data-center-acquisition\", \"https://woub.org/2026/05/22/waterford-resident-calls-trustee-step-down-data-center-development/\", \"https://www.mariettatimes.com/news/local-news/2026/03/washington-county-commissioners-in-contact-with-data-center-developers-about-public-meeting/\", \"https://www.mariettatimes.com/news/local-news/2026/01/disputes-over-data-centers-and-nda-during-washington-county-commission-meeting/\", \"https://www.mariettatimes.com/news/local-news/2026/04/washington-county-commissioners-say-they-dont-approve-data-center-tax-abatement/\", \"https://www.newsandsentinel.com/news/business/2026/06/washington-county-commissioner-charlie-schilling-testifies-to-ohio-joint-data-center-committee/\", \"https://www.newsandsentinel.com/news/business/2026/02/washington-county-residents-continue-to-raise-concerns-over-data-center-in-waterford/\", \"https://www.wtap.com/2026/02/13/washington-county-residents-pack-commissioners-meeting-over-proposed-data-center/\", \"https://www.mariettatimes.com/news/2026/07/waterford-resident-asks-washington-county-commissioners-for-help-regarding-data-center-project/\", \"https://medium.com/mashfocus/the-waterford-data-center-divide-data-center-cracks-a-small-township-heart-7c46d7b977c1\", \"https://www.hashworksindustries.com/powered-land\", \"https://sfranalytics.com/investors/oh/marietta-oh/hashworks-powered-land-waterford-llc-oh\", \"https://baxtel.com/data-center/cipher-digital-ulysses\", \"https://www.sierraclub.org/ohio/blog/2026/02/data-centers-noise-pollution-ohio-communities-are-organizing-accountability\", \"https://www.foodandwaterwatch.org/2026/06/08/data-center-tax-breaks-ohio/\", \"https://www.washingtongov.org/238/Board-of-County-Commissioners\", \"https://www.wtap.com/2025/01/21/eddie-place-sworn-washington-county-commissioner/\", \"https://www.yahoo.com/news/politics/articles/washington-county-commissioners-primary-election-090647826.html\"]}, \"ts\": 1784272480000}"};

<script>
(function(){
  const _SEED_DC={"v67_dc_delawareaws-sunbury-campus": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"No groundbreaking has occurred yet. Per Sunbury officials and trade press, construction of the first (450,000 sq ft) building was expected to begin January 2028, with completion/operational start by December 2034. As of mid-2026 the project is paused: Sunbury City Council passed a moratorium on data center development (effective until Jan. 31, 2027), so these dates may slip. Land was acquired Dec. 30, 2024.\", \"powerMW\": \"750 MW (per file). AEP Ohio has separately said regional load in the Delaware/Licking county area (of which this project is a major driver) is expected to roughly quadruple from ~500MW to ~2,000MW by 2027.\", \"sizeSqFt\": \"450,000 sq ft for the first building (Data Center Dynamics, 1808Delaware, Delaware Gazette). This is described as the first phase of a larger multi-building campus; a city financial analysis modeled a four-building campus. Total planned campus square footage across all phases is not publicly disclosed.\", \"totalInvestment\": \"$2 billion for the Sunbury campus specifically (announced Nov. 20, 2024), part of Amazon's broader $7.8 billion central Ohio investment announced in 2023, which itself is part of AWS's cumulative Ohio investment reported at over $10 billion (and elsewhere reported at $23 billion from 2015-2030 after a further $10B and $1B tranches were announced). Land purchase price for the Vans Valley Road/Galena parcel is reported inconsistently across sources as approximately $44 million (Data Center Dynamics headline) to $53.9 million (other secondary reporting) — exact final figure not authoritatively confirmed in public records reviewed.\", \"employment\": {\"construction\": \"Not publicly disclosed. No official construction-phase (temporary/peak) worker count has been released; the city's FAQ document directs local contractors to monitor AWS bid solicitations rather than citing a jobs figure.\", \"permanent\": \"50 full-time jobs\", \"totalPayroll\": \"$4.5 million annually (average salary approximately $90,000/year)\"}, \"gridImpact\": {\"summary\": \"AEP Ohio is building new 345kV transmission infrastructure in the Sunbury/New Albany corridor to serve growing regional load, including this data center, at a stated 750 MW project draw.\", \"detail\": \"AEP Ohio announced construction of two 13-mile 345-kilovolt transmission lines connecting its Vassell Substation off State Route 37 in Sunbury to two new substations off Green Chapel Road in New Albany, with construction planned from early 2026 to summer 2027. AEP has stated electricity demand in the Delaware/Licking county area is expected to roughly quadruple (from ~500MW to ~2,000MW) by 2027 due to industrial and data center growth, of which the AWS Sunbury campus (rated at 750MW) is a major single contributor. The known grid note on file — 'new AEP Ohio infrastructure required' — is corroborated by these transmission filings, though AEP's public materials describe the upgrades as serving regional growth broadly rather than being scoped exclusively to the AWS project.\"}, \"taxImplications\": {\"summary\": \"Sunbury approved a long-term Community Reinvestment Area (CRA) property tax abatement for the project, paired with a payment-in-lieu-of-taxes/compensation framework benefiting Big Walnut Local Schools and Delaware Area Career Center.\", \"detail\": \"Sunbury City Council rezoned roughly 1,200-1,300 newly annexed acres east of the city into a Limited Industrial (LI) district in November 2023 that explicitly lists 'data center' as a permitted use, and this project was the first economic-development incentive approved under that district. Reported abatement terms vary across public materials: one account describes a CRA exemption of 87.5% for 15 years followed by 75% for a further 15 years, while a city tax-and-benefit analysis document (referenced in search results but not independently verified) describes a 100% 15-year abatement paired with a 12.5% PILOT. The city has entered into compensation agreements with Big Walnut Local Schools and the Delaware Area Career Center to offset foregone property tax revenue. The project was reportedly among the last data center incentive deals approved before a broader pause in new Ohio data-center tax breaks in mid-2026. Ohio's state sales-tax exemption for qualifying data center equipment purchases (available under Ohio Rev. Code 122.175 for facilities meeting investment/job thresholds) would likely apply given the project's scale, though a specific Sunbury sales-tax exemption agreement was not separately confirmed in sources reviewed.\"}, \"environmentalImpact\": {\"summary\": \"The project involves clearing 330+ acres within a roughly 1,200-1,300 acre newly annexed business park, with the city citing a closed-loop, reclaimed-water cooling design and new wastewater treatment upgrades to address water-quality concerns.\", \"detail\": \"According to the City of Sunbury's official Data Center FAQ document, the AWS project would clear more than 330 acres within the Sunbury Business and Technology Park (a roughly 1,200-1,300 acre newly annexed and rezoned area between State Route 37 and Vans Valley Road). The LI zoning district caps maximum lot coverage at 75% to preserve room for landscaping, screening, and stormwater management, though a specific NPDES/stormwater land-disturbance permit for this site was not located in public records reviewed. Public meetings in 2026 (March and June) drew significant resident concern over water and environmental impacts; the city responded that it is adding advanced wastewater treatment technology to mitigate water-quality risk. No Ohio EPA air-permit filing (e.g., for backup diesel generators) specific to the Sunbury AWS campus was found in the sources reviewed — this differs from AWS's separate, unrelated Hilliard, Ohio data center project, which has a well-documented Title V air permit for 158 emergency diesel generators; that permit should not be conflated with the Sunbury site.\"}, \"waterLoop\": {\"answer\": \"Yes\", \"detail\": \"The City of Sunbury's official Data Center FAQ document states that AWS is planning a closed-loop cooling system using reclaimed (non-potable) water for the Sunbury facility, and that advanced wastewater treatment technology will be added to the Sunbury plant to mitigate water-quality risk. This is consistent with Amazon/AWS's broader stated sustainability approach of using reclaimed water rather than potable water at many of its data centers. Specific daily water-volume figures (gallons per day) for the Sunbury facility were not confirmed from Sunbury-specific sources during this research; some water-volume figures found in search results referenced a different Amazon data center project (Falls Township, Pennsylvania, near the Delaware River) and were excluded here to avoid misattribution.\"}, \"timeline\": \"November 2023: Sunbury City Council approves a Limited Industrial (LI) zoning update for ~1,200-1,300 newly annexed acres, explicitly permitting data centers.\\n2023: Amazon announces a $7.8 billion central Ohio investment plan (broader regional announcement, not Sunbury-specific).\\nNovember 20, 2024: AWS publicly announces a $2 billion data center campus for Sunbury, pushing its stated Ohio data center investment to roughly $10 billion.\\nDecember 30, 2024: Amazon/AWS entity acquires the project site at 11793 Vans Valley Road (Galena-area parcel), reported at roughly $44-54 million depending on source.\\nMarch 2025: AWS announces a further $1 billion Ohio AI data center investment tranche (statewide).\\n2025-2026: City negotiates CRA tax abatement and school-district compensation agreements (Big Walnut Local Schools, Delaware Area Career Center).\\nEarly 2026-Summer 2027: AEP Ohio constructs new 345kV transmission lines (Vassell Substation, Sunbury, to Green Chapel Road substations, New Albany) to serve regional growth including this project.\\nMarch 2026: Public meeting; residents voice data-center concerns (Delaware Gazette).\\nApril 2026: Sunbury City Council unanimously passes a moratorium pausing further action on data center projects, including this one, until January 31, 2027.\\nMay 2026: City releases public project records and holds an open house on the AWS proposal.\\nJune 2026: City council public forum specifically addresses water and power impacts.\\nJuly 2026: Resident coalition pushes a city charter amendment/ballot initiative for the November 2026 ballot to restrict or ban large data centers.\\nPlanned (pre-moratorium schedule): Construction of the first 450,000 sq ft building to begin January 2028; project completion/operations beginning December 2034.\", \"investors\": \"Sole developer/investor is Amazon Web Services, a subsidiary of Amazon.com, Inc. (NASDAQ: AMZN). Land was acquired directly by an Amazon-affiliated entity (reported locally as 'Amazon Data Services'); no third-party joint-venture partner has been publicly identified for this specific campus. The City of Sunbury acted as the public-sector partner, handling annexation, LI-district rezoning, and infrastructure commitments (new sanitary pump station, sewer/water line extensions, a new water tank, and at least one new roadway) to support the site. AEP Ohio is the utility partner building supporting transmission infrastructure. Big Walnut Local Schools and the Delaware Area Career Center are named parties to the associated tax-compensation agreements.\", \"politicalContext\": \"Sunbury Mayor Joe St. John [R] (running as the Republican nominee for Delaware County Commissioner in 2026) has taken a cautious public posture, saying the city wants time to study impacts and noting Amazon is 'very aware of the tenor nationally, and in particular, central Ohio' regarding data center pushback, and that Amazon wants to respond to questions thoughtfully. Sunbury City Council voted unanimously to pass a moratorium halting further movement on the AWS project until January 31, 2027, amid resident opposition. Delaware County Commissioner Jeff Benton [R] has spoken generally about Delaware County data centers (not confirmed as Sunbury-specific), saying 'there are pluses and minuses to a data center,' citing job creation and property tax revenue as benefits against electricity and water-use concerns. At the state level, State Rep. Adam Holmes [R-Nashport] and State Sen. Brian Chavez [R-Marietta] formed a joint Ohio House-Senate select committee in 2026 to study data centers statewide (general policy activity, not Sunbury-specific), with legislators publicly pressing tech-industry representatives over community opposition. A citizen coalition has organized a petition drive for a November 2026 Sunbury charter-amendment ballot measure to restrict data centers; resident Catherine Parker (not an elected official) is a vocal opponent quoted in local press. No Democratic or independent officials' statements specifically on this project were found in sources reviewed; where party affiliation could not be independently confirmed via an official bio, Ballotpedia, or Ohio Secretary of State record, no tag is applied.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/aws-plans-2bn-data-center-campus-in-sunbury-ohio/\", \"https://1808delaware.com/sunbury/everything-you-always-wanted-to-about-amazons-planned-sunbury-development/\", \"https://1808delaware.com/sunbury/sunbury-official-answers-faqs-about-aws-project/\", \"https://www.delgazette.com/2024/11/21/amazon-data-services-coming-to-sunbury/\", \"https://www.delgazette.com/2026/06/25/data-center-water-power-discussed-in-sunbury/\", \"https://www.delgazette.com/2026/03/23/public-voices-data-center-concerns/\", \"https://www.delgazette.com/2026/07/07/sunbury-voters-may-decide-on-data-centers/\", \"https://www.knoxpages.com/2026/06/26/sunbury-city-council-hears-how-data-centers-affect-water-and-power-in-first-public-forum/\", \"https://www.delawaresource.com/2026/05/07/sunbury-city-council-announces-data-center-open-house-unveils-more-project-files/\", \"https://www.delawaresource.com/2026/04/16/sunbury-city-council-passes-moratorium-on-data-centers-in-effect-till-2027/\", \"https://www.10tv.com/article/news/local/sunbury-city-council-passes-moratorium-data-centers/530-1802c6de-12e6-48c6-b390-1308fbcbc76c\", \"https://www.nbc4i.com/intel-in-ohio/amazon-web-services-to-invest-10-billion-more-into-ohio/\", \"https://www.costar.com/article/1381199103/amazon-web-services-boosts-data-center-investments-in-ohio-by-10-billion\", \"https://www.datacenterdynamics.com/en/news/aws-purchases-44m-galena-property-for-sunbury-campus-in-ohio/\", \"https://www.digitalcommerce360.com/2025/03/12/aws-to-invest-another-1-billion-in-ohio-ai-data-centers/\", \"https://sunburyohio.org/DocumentCenter/View/1692/Data-Center-FAQ?bidId=\", \"https://sunburyohio.org/DocumentCenter/View/1727/Data-Center-Tax-and-Benefit-Analysis?bidId=\", \"https://www.aepohio.com/company/news/view?releaseID=11922\", \"https://www.indianamichiganpower.com/company/news/view?releaseID=2503\", \"https://1808delaware.com/business/transmission-system-upgrades-focus-of-upcoming-public-meetings/\", \"https://baxtel.com/data-center/amazon-sunbury-ohio\", \"https://cleanview.co/data-centers/ohio/1681/aws-sunbury\", \"https://hoodline.com/2026/03/sunbury-neighbors-revolt-as-2-billion-amazon-data-hub-moves-in-next-door/\", \"https://www.yahoo.com/news/politics/articles/sunbury-residents-push-let-voters-195615647.html\", \"https://ballotpedia.org/Jeff_Benton_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"https://co.delaware.oh.us/commissioners/commissioner-1-bio/\", \"https://www.delgazette.com/2026/04/08/st-john-vaughan-vie-for-commissioner-seat/\", \"https://sunburyohio.org/170/Joe-St-John-Mayor\", \"https://ohiocapitaljournal.com/2026/06/08/big-tech-defends-data-centers-before-ohio-lawmakers/\", \"https://www.timesleaderonline.com/news/local-news/2026/05/lawmakers-form-group-to-study-data-centers-in-ohio/\", \"https://ohiosenate.gov/live/ohio-house-and-senate-select-committees-on-data-centers\"]}, \"ts\": 1784272480000}", "v67_dc_delawarecologix-col5": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Site work/construction start (\\\"groundbreaking\\\") occurred by June 18, 2025, per the Delaware County Regional Planning & Community Development newsletter announcing 'Denver company Cologix starts work on Lewis Center AI data center.' The facility (Phase 1: 135,000 sq ft building / 60,000 sq ft raised floor, 25 MW) is targeted to be 'ready for service' in Q3 2026, with Phase 1 completion also described as 'fall 2026' in local reporting. Land (28 acres at the SE corner of Green Meadows Drive and Home Road, Orange Township) was assembled prior to the June 2025 start. The associated Ohio Tax Credit Authority state sales-tax exemption was not formally approved until roughly a year later, around early June 2026, i.e., construction began before the state incentive was finalized.\", \"powerMW\": \"25 MW (Phase 1/COL5 as commissioned). Multiple trade sources describe an eventual full campus buildout at this Orange Township site reaching approximately 120 MW (Cologix's own spec materials describe COL5 commissioning at 25 MW 'with plans for an additional facility, which will add 95 MW in the future,' i.e., 25 MW now + 95 MW later = 120 MW total).\", \"sizeSqFt\": \"Phase 1 building: 135,000 sq ft (per Delaware County regional planning newsletter and local reporting), of which approximately 60,000 sq ft is described as raised-floor colocation ('white space') by datacenters.com/datacentermap listings. Full future campus square footage was not separately disclosed.\", \"totalInvestment\": \"Figures vary by scope/source and are not perfectly reconciled in public reporting: (1) ~$1 billion — the widely repeated figure for the COL5 Orange Township complex specifically, cited when Cologix 'started work' (June 2025); (2) $274 million — an Orange Township building-permit valuation for Phase 1 construction (per local council/permit reporting); (3) $1.17 billion — the combined capital commitment Cologix pledged across BOTH the Delaware County (COL5) and Licking County (Johnstown) projects as a condition of the June 2026 Ohio Tax Credit Authority 50%/10-year sales-tax exemption; (4) 'over $1.1 billion' — the figure used in Columbus Regional's press materials for Cologix's combined Orange Township + Johnstown investment. Note: Cologix's much larger, separate Licking County 'Johnstown Campus' (154 acres, up to 800 MW, ~$7 billion) is a distinct facility from COL5 and should not be conflated with it, though state incentive filings bundle the two projects together.\", \"employment\": {\"construction\": \"Not publicly disclosed as a fixed number. Company/press materials describe 'hundreds of additional construction jobs through a multi-year buildout' without a precise figure.\", \"permanent\": \"90 full-time-equivalent jobs, per the commitment Cologix made to the Ohio Tax Credit Authority in exchange for the state sales-tax exemption (covering the combined Delaware + Licking county projects), to be created by the end of 2028/2035 depending on source.\", \"totalPayroll\": \"$10 million in new annual payroll by the incentive deadline (~2028), averaging roughly $111,000 per job, per the Ohio Tax Credit Authority incentive filing.\"}, \"gridImpact\": {\"summary\": \"COL5 draws its 25 MW load from AEP Ohio amid a broader surge in Delaware/Licking County electricity demand that is prompting new AEP transmission lines and an interim onsite fuel-cell generation deal.\", \"detail\": \"AEP Ohio has announced plans for two new 345-kV transmission lines connecting the Vassell Substation (Sunbury, Delaware County) to new substations near Green Chapel Road in New Albany (Licking County) to serve growing data-center demand in the corridor; regional load is projected to roughly quadruple, from about 500 MW to about 2,000 MW, by 2027. Because AEP expects it will take 7-10 years for permanent transmission infrastructure to catch up with demand, AEP Ohio separately proposed onsite fuel-cell power generation as an interim bridge for large customers, including a 15-year contract with Cologix (and a separate 6-year contract with Amazon Web Services) to help serve central Ohio data-center load while transmission upgrades are built out. Delaware County Commissioner Jeff Benton publicly cited electricity demand as one of the 'minuses' associated with data centers generally, alongside job creation and tax revenue as 'pluses.'\"}, \"taxImplications\": {\"summary\": \"COL5, bundled with Cologix's Licking County project, received a 50%, 10-year Ohio state sales-tax exemption valued at about $42.3 million plus a separate local 10-year, 50% Delaware County property tax abatement, arriving just before Governor DeWine's statewide pause on new data-center tax breaks.\", \"detail\": \"In roughly June 2026, the Ohio Tax Credit Authority approved a 50%, 10-year sales-tax exemption for Cologix Inc./Cologix US, Inc. covering both the Orange Township (Delaware County, i.e., COL5) and Johnstown (Licking County) projects jointly, valued at approximately $42.3 million; combined with a prior 2022 award, Cologix's cumulative Ohio state tax abatements were reported to exceed $50 million. In exchange, Cologix committed to $1.17 billion in combined capital investment, 90 FTE jobs, and $10 million in new annual payroll, and to operate the facilities for at least 13 years. Separately, Delaware Source reported the smaller (COL5) project also receiving a 10-year, 50% property tax abatement from Delaware County government plus an additional income tax break and another property-tax subsidy mechanism; specific school-district PILOT/hold-harmless payment terms for the Olentangy Local School District were not broken out in publicly available reporting reviewed. This was one of the last data-center incentives approved before Gov. Mike DeWine announced a statewide pause on new data-center sales-tax exemption requests (the Cologix deal was explicitly carved out/exempted from that pause as 'already in the works'), amid criticism from some state legislators, including Rep. Sean P. Brennan [D-Parma], that cumulative 2025-era data-center exemptions statewide were approaching $2.2 billion while school districts faced funding pressure.\"}, \"environmentalImpact\": {\"summary\": \"Cologix describes COL5 as using a closed-loop cooling system designed to minimize water withdrawal, sited within an existing Orange Township industrial park; specific Ohio EPA air-permit records for backup diesel generators were not located in public filings reviewed.\", \"detail\": \"Cologix's own materials, echoed in the Delaware County Regional Planning & Community Development newsletter, describe COL5 as utilizing 'a closed-loop mechanical system for minimal water usage.' Delaware County Commissioner Jeff Benton publicly flagged water usage (alongside electricity demand) as a community concern associated with data centers generally, while also stating the project was 'situating the facility appropriately in an industrial park that is designed for this kind of use,' implying the site was pre-zoned/planned for heavy commercial-industrial use, which should limit incremental land-disturbance concerns relative to greenfield development. Stormwater/erosion control on Delaware County projects of this type is typically administered through the County Engineer's Drainage, Erosion and Sediment Control (DESC) program, but no COL5-specific stormwater permit record was located. Data centers of this scale typically require backup diesel generators subject to Ohio EPA permit-by-rule (PBR) requirements for emergency generators; no COL5-specific Ohio EPA air-permit record was found in this research, so generator-specific air-permit details are Not publicly disclosed based on available search results.\"}, \"waterLoop\": {\"answer\": \"Yes\", \"detail\": \"COL5 is described by Cologix and by the Delaware County Regional Planning & Community Development office as using a 'closed-loop mechanical system for minimal water usage.' This is consistent with Cologix's broader corporate sustainability claims, which state the company achieved a fleet-wide average Water Usage Effectiveness (WUE) of 0.203 in 2024 (versus an industry average of about 1.8) and that its closed-loop, liquid-to-chip cooling designs 'eliminate the need for evaporative cooling towers and significantly reduce water usage' compared to legacy air-cooled/evaporative designs. No source reviewed described COL5 as using an open-loop or evaporative cooling-tower system.\"}, \"timeline\": \"2014: Cologix enters the Columbus, Ohio market (COL1-COL4 built out in subsequent years).\\nPre-2025: Cologix assembles a 28-acre site at the southeast corner of Green Meadows Drive and Home Road in Orange Township, Delaware County (an existing industrial park area near Lewis Center).\\nJune 18, 2025: Delaware County's regional planning office reports Cologix has 'started work' on the COL5 site — construction/site preparation groundbreaking.\\nThroughout 2025-2026: Construction of Phase 1 (135,000 sq ft building, ~60,000 sq ft raised floor, 25 MW) proceeds; Phase 1 building permit valuation reported at roughly $274 million.\\nNovember 2024 (context, separate project): Cologix separately announces an $7 billion, up to 800 MW, 2 million sq ft, 8-building 'Johnstown Campus' on 154 acres in Licking County — a much larger, distinct facility from COL5, but bundled with it for state-incentive purposes.\\n~Late May 2026: Gov. Mike DeWine announces a statewide pause on new data-center sales-tax exemption requests pending legislative review by a special Data Center Study Commission, but exempts the already-underway Cologix project from the pause.\\n~June 1-3, 2026: The Ohio Tax Credit Authority approves a combined 50%/10-year sales-tax exemption (~$42.3 million) for Cologix's Delaware County (COL5) and Licking County (Johnstown) projects — one of the last such approvals before the moratorium takes effect.\\nQ3 2026 / Fall 2026: COL5 Phase 1 targeted to be 'ready for service.'\\nBeyond 2026: Additional phases anticipated to bring the Orange Township campus to a total of roughly 120 MW of capacity.\", \"investors\": \"Sole named developer/operator is Cologix Inc. / Cologix US, Inc., a privately held, Denver, Colorado-headquartered data center and interconnection company (COL5 is its fifth Columbus-area facility, following COL1-COL4). No separate joint-venture partner, outside equity investor, or named private landowner/seller for the 28-acre Orange Township parcel was disclosed in public reporting reviewed. The project was supported through Ohio's economic-development apparatus — JobsOhio and the Ohio Tax Credit Authority reviewed and approved the state incentive package, and Delaware County's economic development office (rather than Orange Township trustees) is reported to have coordinated site selection/negotiation. Cologix is separately pursuing a much larger, financially distinct $7 billion / 800 MW 'Johnstown Campus' in neighboring Licking County, underscoring the company's broader central-Ohio expansion strategy (over $1.1 billion combined investment figure cited by Columbus Region economic-development press materials covers both the Orange Township and Johnstown projects together).\", \"politicalContext\": \"Delaware County Commissioner Jeff Benton [R] (Delaware County Republican Party Central Committee member) publicly weighed in on the project, stating 'There are pluses and minuses to a data center,' citing job creation and increased property tax revenue as benefits while flagging electricity demand and water usage as concerns; he also stated, 'This investment represents long-term value for our community and the people who live and work here, while situating the facility appropriately in an industrial park that is designed for this kind of use.' Delaware County Commissioner Gary Merrell [R] (elected 2012, multiple terms as Board President/Vice President) sits on the three-member commission that approved the local property-tax and income-tax incentives, though no direct on-record quote from him about this specific project was found. Orange Township Trustee Erica Fouss stated she remains 'data center neutral' pending further training from the Ohio Township Association, and said township trustees were not involved in selecting the COL5 site — that process was coordinated through Delaware County's economic development efforts — while acknowledging the project is good for economic development 'from a township perspective.' Her party affiliation could not be reliably confirmed from primary sources in this research (Ohio township trustee races are officially nonpartisan on the ballot), so it is not tagged. At the state level, Gov. Mike DeWine [R] announced a pause on new data-center sales-tax exemptions in late May 2026 while explicitly carving out the already-underway Cologix project so it could still receive final Ohio Tax Credit Authority approval. State Rep. Sean P. Brennan [D] (D-Parma) publicly criticized the resulting $42.3 million exemption, noting that data-center exemptions approved since 2025 were approaching $2.2 billion statewide 'while school districts are facing funding reductions, families are worried about rising utility, property tax, and rent costs,' and noted he was the sole Democrat to initially co-sponsor legislation creating a Data Center Study Commission, though he said he supported the pause on further exemptions.\", \"sources\": [\"https://regionalplanning.co.delaware.oh.us/wp-content/uploads/sites/17/2025/06/ORA-Cologix-starts-work-06.18.25.pdf\", \"https://www.delawaresource.com/2026/06/03/orange-township-data-center-among-last-projects-approved-before-ohio-tax-break-pause/\", \"https://bluewaterhealthyliving.com/news/national-news/ohio/data-center-operator-starts-work-on-1-billion-delaware-complex-part-of-larger-expansion/\", \"https://columbusregion.com/press-release/cologix-expands-in-central-ohio/\", \"https://cologix.com/data-centers/columbus/col5/\", \"https://cologix.com/resources/spec-sheets/col5-data-center-spec-sheet/\", \"https://www.datacenters.com/cologix-col5\", \"https://www.datacentermap.com/usa/ohio/columbus/cologix-col5/\", \"https://hs.getobedio.com/blog/worthington-council-reviews-274m-cologix-data-center-expansion\", \"https://www.aepohio.com/company/news/view?releaseID=9242\", \"https://dailyenergyinsider.com/news/42710-aep-ohio-identifies-routes-for-two-electric-transmission-lines-for-delaware-licking-counties/\", \"https://www.wvxu.org/2025-02-20/aep-ohio-proposes-onsite-fuel-cell-power-generation-for-aws-cologix-data-centers\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://signalohio.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://ohiohouse.gov/members/sean-p-brennan/news/rep-brennan-voices-disappointment-over-additional-423m-data-center-tax-break-while-schools-face-funding-challenges-145318\", \"https://www.edgeir.com/cologix-to-invest-7b-in-central-ohio-for-800mw-ai-ready-data-center-expansion-20241122\", \"https://www.datacenterdynamics.com/en/news/cologix-invests-7bn-in-licking-county-ohio-data-center-campus/\", \"https://cologix.com/resources/blogs/how-cologix-champions-sustainability/\", \"https://ballotpedia.org/Jeff_Benton_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"https://ballotpedia.org/Gary_Merrell_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"http://delawaregop.org/commissioner-jeff-benton-sworn-in/\"]}, \"ts\": 1784272480000}", "v67_dc_undisclosedcipher-mining-ulysses-site": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed as a groundbreaking date. Site acquisition was announced December 23, 2025 (GlobeNewswire/Cipher Mining press release); Cipher states the site is 'on track to energize in the fourth quarter of 2027.' Local Washington County reporting indicates the developer (HashWorks Powered Land Waterford LLC, tied to Sabre 56 and Cipher Digital) began quietly acquiring/optioning land in Waterford Township before the public announcement, with residents saying they first learned of the project 'at the start of' 2026 and county commissioners signing an NDA with developers in January 2026. No specific construction/groundbreaking date has been publicly reported as of this research.\", \"powerMW\": \"200 MW (195-acre site; secured capacity from AEP Ohio with interconnection approvals to participate in the PJM market). This site is part of Cipher's broader 3.4 GW, 8-site national development pipeline as of the December 2025 announcement.\", \"sizeSqFt\": \"Not publicly disclosed\", \"totalInvestment\": \"Not directly disclosed by Cipher for this specific site. Analysts/press have estimated $1.8-2.2 billion for the facility based on Cipher's industry-cited cost basis of $9-11 million per MW of critical computing load applied to 200 MW (see Yahoo Finance/Brave New Coin coverage of the Dec 23, 2025 announcement). Separately, local reporting confirms HashWorks Powered Land Waterford LLC paid $20 million for a ~275-acre parcel purchased from Waterford Township Trustee Doug McCutcheon alone, as part of assembling the 500+ acre site. Cipher's broader corporate financing for its data-center buildout pipeline (not site-specific) includes $1.1 billion in convertible notes issued previously and $333 million of additional senior secured notes priced November 20, 2025.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"The 200 MW Ulysses site has secured capacity and completed interconnection agreements with AEP Ohio, giving Cipher direct access to PJM, the largest wholesale electricity market in the US.\", \"detail\": \"Per Cipher's December 23, 2025 announcement, 'all utility agreements required to support the development of the site are in place' with AEP Ohio, and the site has secured interconnection approvals to participate in the PJM Interconnection market. The company cited the site's acreage, energization timeline (targeted Q4 2027), diverse fiber paths, and proximity to a major metropolitan area as reasons it is well-suited for HPC/AI hosting in addition to bitcoin mining. AEP Ohio's transmission planning documents in the vicinity reference the Sporn-Muskingum transmission corridor passing through Washington County, consistent with the site's location. No specific substation, transmission-line upgrade, or MW-load ratepayer-impact study specific to this project was found in public records located during this research.\"}, \"taxImplications\": {\"summary\": \"Washington County commissioners are negotiating a possible Community Reinvestment Area (CRA) property-tax abatement or Payment-in-Lieu-of-Taxes (PILOT) arrangement with the developer, but say no abatement has been approved as of spring 2026.\", \"detail\": \"Washington County signed a non-disclosure agreement with the data-center developers in January 2026 to facilitate negotiations. Commissioner Charlie L. Schilling (Vice President of the Board of County Commissioners) has publicly discussed both a Community Reinvestment Area agreement and a PILOT structure, under which the developer would make an annual lump-sum payment to the county in place of standard property taxes. In April 2026, commissioners publicly stated they had not approved any tax abatement for the project. Under Ohio law, any CRA, enterprise zone, or tax-increment-financing agreement requires formation of a tax incentive review council that must include affected township trustees, giving Waterford Township trustees a formal role in any eventual abatement terms. In June 2026, Schilling testified before an Ohio legislative body referred to in local press as the 'Ohio Joint Data Center Committee,' stating 'I support policies that keep Ohio competitive for these kinds of developments,' and noting that the developers could proceed with construction regardless of whether commissioners approve incentives, since the commissioners' role is limited to negotiating the best available terms, not blocking the project outright. No information was found confirming Ohio's specific sales/use-tax exemption treatment (or lack thereof) for crypto-mining equipment as applied to this project.\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental permit data (water withdrawal, air permit for backup generators) was found for the Waterford site; the project has drawn broad community concern over water use, diesel generator noise/emissions, and land-use disruption typical of large Ohio data-center proposals.\", \"detail\": \"Washington County residents have packed multiple commissioner meetings since February 2026 raising concerns about the Waterford project's proximity to farms and homes, its impact on land use, and fears about noise and water demand, mirroring statewide concerns documented by Sierra Club Ohio and other advocacy groups about data-center noise pollution (diesel backup generators can emit 200-600x the NOx of natural gas plants and produce ~90dB sound levels) and water consumption (large data centers can use up to 5 million gallons/day). No Ohio EPA water-withdrawal permit, air permit application, or land-disturbance permit specific to the Waterford/Ulysses site was located in public records during this research; these details were 'Not publicly disclosed' as of this research.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"Neither Cipher Mining's press release/investor materials nor local Washington County press coverage reviewed specify whether the Ulysses/Waterford facility will use closed-loop liquid cooling, air cooling, or immersion cooling. Cipher's other (Texas) sites reportedly use a mix of cooling approaches, but no site-specific technical disclosure for Ulysses was found.\"}, \"timeline\": \"December 23, 2025: Cipher Mining publicly announces acquisition of the 200 MW, 195-acre 'Ulysses' site in Ohio -- its first outside Texas -- with AEP Ohio capacity and PJM interconnection approvals already secured.\\nEarly 2026: Washington County residents in Waterford Township report first learning of the project; land assembly by HashWorks Powered Land Waterford LLC (500+ acres, including 275 acres bought from Township Trustee Doug McCutcheon for $20 million) becomes locally known.\\nJanuary 2026: Washington County Commissioners sign a non-disclosure agreement with developers to begin negotiations; commissioners publicly discuss the project at a January meeting marked by disputes over the NDA.\\nFebruary 2026: Residents pack commissioner meetings (reported by WTAP, Marietta Times, News and Sentinel) raising environmental and fiscal concerns.\\nMarch-May 2026: Commissioners repeatedly state they are pushing developers to hold a public meeting; residents petition Waterford Township trustees for a development moratorium, which trustees Randy Harper and Tim Rossiter decline to pass, citing legal advice.\\nMay 2026: A Waterford resident publicly calls for Trustee Doug McCutcheon to resign over his land sale to the developer.\\nApril 2026: Commissioners confirm no tax abatement has yet been approved.\\nMay 5, 2026: Cipher Mining formally rebrands to 'Cipher Digital Inc.' on its Q1 2026 earnings call, reflecting a strategic pivot toward hyperscale HPC/AI hosting.\\nJune 2026: Commissioner Charlie Schilling testifies before Ohio's legislative data-center committee about local tax and infrastructure implications.\\nJuly 2026 (present): Residents continue asking commissioners for help/answers; no public meeting with developers has yet been confirmed as held; site remains in pre-construction/negotiation phase.\\nQ4 2027: Target energization date per Cipher's original announcement.\", \"investors\": \"Cipher Mining Inc. (NASDAQ: CIFR), a publicly traded bitcoin-mining-turned-HPC/AI data center developer, is the site's ultimate corporate sponsor; the company rebranded to Cipher Digital Inc. in May 2026. Land for the site was assembled/leased through HashWorks Powered Land Waterford LLC, a real-estate holding entity based in Marietta, OH that describes itself as focused on 'the convergence of energy transition and the need for digital computing infrastructure' and which holds 500+ acres in Waterford Township. Local and trade press (Data Center Dynamics/Blockspace) report the project LLCs are tied to both Sabre 56 (a data-center development/engineering consulting firm) and Cipher Digital. Known landowner-sellers include Waterford Township Trustee Doug McCutcheon, who sold approximately 275 acres of his own land to the developer for $20 million -- a transaction that has become a local controversy given his elected position. Cipher's project-level financing draws on broader corporate capital raises, including $1.1 billion in convertible notes and $333 million in additional senior secured notes priced November 20, 2025, earmarked for data-center/HPC development across its pipeline.\", \"politicalContext\": \"Waterford Township Trustee Doug McCutcheon has faced public calls to resign (reported by WOUB, May 2026) after residents learned he sold ~275 acres of his own land to the project's developer for $20 million while serving as a township official with zoning/land-use authority over the same development -- a conflict-of-interest allegation; his party affiliation was not confirmed in records found (Ohio township trustee races are low-profile local contests and no partisan tag could be verified). Fellow Waterford Township Trustees Randy Harper and Tim Rossiter declined to enact a moratorium on data-center development despite resident requests, stating they were advised against it; their party affiliations were not confirmed. Washington County Board of Commissioners -- James W. Booth (President), Charlie L. Schilling (Vice President), and Kevin J. Ritter -- have taken the lead in negotiating with developers; Commissioner Schilling has been the most publicly vocal, stating 'I support policies that keep Ohio competitive for these kinds of developments' and testifying to an Ohio legislative 'Joint Data Center Committee' in June 2026 about PILOT/tax-relief structures; none of the three sitting commissioners' party affiliations could be confirmed via public records located in this research. Separately, Washington County's November 2026 election results (for terms beginning January 2027, and therefore not necessarily reflecting the board that handled this controversy) show commissioner seats won by Brian G. Whalin [D], Stephanie Lang [R], and Eddie Place [R] -- Place having previously been sworn in as a sitting Washington County Commissioner in January 2025, though it is unclear from available sources whether he was concurrently serving alongside Booth/Schilling/Ritter or in a staggered seat. No statements from Ohio Governor Mike DeWine [R], Ohio's Washington County state house/senate delegation, or federal officials specifically addressing the Ulysses/Waterford project were found in this research; if such statements exist they were not surfaced before the session's search budget was exhausted.\", \"sources\": [\"https://investors.ciphermining.com/news-releases/news-release-details/cipher-mining-announces-acquisition-200-mw-site-ohio\", \"https://www.globenewswire.com/news-release/2025/12/23/3209864/0/en/Cipher-Mining-Announces-Acquisition-of-200-MW-Site-in-Ohio.html\", \"https://www.theminermag.com/news/2025-12-23/cipher-ohio-hpc-pjm\", \"https://www.datacenterdynamics.com/en/news/cipher-mining-acquires-land-for-200mw-data-center-site-in-ohio/\", \"https://blockspace.media/insight/cipher-mining-acquires-200-mw-ohio-site-for-ai-workloads/\", \"https://x.com/CipherInc/status/2003458122107543670\", \"https://finance.yahoo.com/news/cipher-mining-acquires-200-mw-145138362.html\", \"https://bravenewcoin.com/insights/cipher-mining-enters-us-wholesale-power-market-with-ohio-data-center-acquisition\", \"https://woub.org/2026/05/22/waterford-resident-calls-trustee-step-down-data-center-development/\", \"https://www.mariettatimes.com/news/local-news/2026/03/washington-county-commissioners-in-contact-with-data-center-developers-about-public-meeting/\", \"https://www.mariettatimes.com/news/local-news/2026/01/disputes-over-data-centers-and-nda-during-washington-county-commission-meeting/\", \"https://www.mariettatimes.com/news/local-news/2026/04/washington-county-commissioners-say-they-dont-approve-data-center-tax-abatement/\", \"https://www.newsandsentinel.com/news/business/2026/06/washington-county-commissioner-charlie-schilling-testifies-to-ohio-joint-data-center-committee/\", \"https://www.newsandsentinel.com/news/business/2026/02/washington-county-residents-continue-to-raise-concerns-over-data-center-in-waterford/\", \"https://www.wtap.com/2026/02/13/washington-county-residents-pack-commissioners-meeting-over-proposed-data-center/\", \"https://www.mariettatimes.com/news/2026/07/waterford-resident-asks-washington-county-commissioners-for-help-regarding-data-center-project/\", \"https://medium.com/mashfocus/the-waterford-data-center-divide-data-center-cracks-a-small-township-heart-7c46d7b977c1\", \"https://www.hashworksindustries.com/powered-land\", \"https://sfranalytics.com/investors/oh/marietta-oh/hashworks-powered-land-waterford-llc-oh\", \"https://baxtel.com/data-center/cipher-digital-ulysses\", \"https://www.sierraclub.org/ohio/blog/2026/02/data-centers-noise-pollution-ohio-communities-are-organizing-accountability\", \"https://www.foodandwaterwatch.org/2026/06/08/data-center-tax-breaks-ohio/\", \"https://www.washingtongov.org/238/Board-of-County-Commissioners\", \"https://www.wtap.com/2025/01/21/eddie-place-sworn-washington-county-commissioner/\", \"https://www.yahoo.com/news/politics/articles/washington-county-commissioners-primary-election-090647826.html\"]}, \"ts\": 1784272480000}", "v67_dc_adamsadams-co-dc-former-dp-l-landfill-": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Construction start date of February 1, 2026 was listed in a memo submitted to the Ohio EPA supporting the Buck Canyon Properties wetland-mitigation application. Operationally, AES Ohio's Feb. 3, 2026 interconnection filing shows the facility requesting an initial 100 MW load in 2028, ramping to 400 MW (2029), 700 MW (2030), 1.1 GW (2031), and 1.3 GW by March 2032 — meaning full build-out/energization is not expected until 2028-2032.\", \"powerMW\": \"100 MW initial (2028), ramping to 1,300 MW (1.3 GW) by 2032 per AES Ohio's PJM/Transmission Expansion Advisory Committee filing.\", \"sizeSqFt\": \"Not publicly disclosed. Ohio EPA wetland-mitigation records describe the planned development as twelve light-industrial buildings plus internal access drives, five stormwater basins, and utility infrastructure on a 1,016-acre parcel, but no specific building square footage has been released.\", \"totalInvestment\": \"Not publicly disclosed as a discrete, confirmed figure for this specific facility. Context: Buck Canyon Properties LLC paid $2.65 million for the 1,016-acre site in 2024; separately, Amazon (widely believed to be the end operator) has announced roughly $10 billion in new AWS Ohio-wide infrastructure investment (on top of a prior $7.8 billion commitment and $6+ billion invested through 2022, totaling over $23 billion statewide through 2030) — none of these public figures are broken out specifically for the Adams County/Buck Canyon site.\", \"employment\": {\"construction\": \"Described only as 'hundreds' of construction and supply-chain jobs (via Amazon's Adams County community-relations site); no precise construction headcount has been published.\", \"permanent\": \"At least 500 long-term positions claimed (data center engineers, network specialists, operations managers, security specialists), per amazon.adamscountyoh.gov.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"AES Ohio (formerly DP&L) filed with PJM Interconnection for a new customer load near its Stuart Substation in Adams County, ramping from 100 MW in 2028 to 1.3 GW by 2032 — which would make it one of Ohio's largest data center loads.\", \"detail\": \"The Feb. 3, 2026 AES Ohio filing to PJM's Transmission Expansion Advisory Committee describes a customer request for service in the vicinity of the Stuart Substation, escalating in stages to 1,300 MW by March 2032 — over 20-31 times Adams County's own current electricity consumption, per WCPO and Journal-News/Dayton Daily News reporting. Interconnection is complicated because power infrastructure from three separate utilities may be needed: the Stuart plant substation and adjacent switchyard are owned by AES Ohio, while the remainder of the former Stuart/Killen plant site sits in AEP Ohio's service territory, and Duke Energy lines may also be involved. The project is explicitly designed to reuse legacy DP&L/AES transmission and substation infrastructure from the retired Stuart and Killen coal plants rather than build an entirely new interconnection from scratch.\"}, \"taxImplications\": {\"summary\": \"Adams County is weighing a Community Reinvestment Area (CRA)/Tax Increment Financing (TIF) package for the project — including a proposed 30-year, 100% county property-tax abatement — while Ohio's statewide data-center sales-tax exemption program has been paused by Gov. DeWine pending legislative study.\", \"detail\": \"Public-records reporting (People's Defender, Food & Water Watch) describes at least two incentive options under discussion: a 30-year CRA in which the project (and other development in the zone) would pay zero property tax to the county, or a 15-year, 50% CRA combined with a TIF. Under the TIF structure, a '100% school compensation' clause is used to avoid the requirement for Manchester Local School District board approval (normally triggered when a TIF exceeds 75%/10 years) — but because the underlying CRA already halves the taxable value, critics (Food & Water Watch) say the 'full' school compensation is effectively only 50% of what schools, EMS, and other county services would otherwise receive. The land in question currently generates about $18,000/year in property tax; Amazon's community-relations materials claim the project will eventually generate 'tens of millions' in new public revenue. Separately, on the state level, Gov. Mike DeWine [R] announced in late May 2026 that he directed the Ohio Tax Credit Authority to pause new data-center sales-and-use-tax exemption approvals while the legislature's new Joint Committee on Data Centers studies the issue — a moratorium that affects the applicability of Ohio's data-center sales tax exemption to projects like this one going forward.\"}, \"environmentalImpact\": {\"summary\": \"The project would redevelop roughly 1,016 acres of former DP&L/AES Stuart and Killen coal-plant and landfill land, clearing about 320 acres of forest, disturbing 0.74 acres of wetlands (offset via mitigation credits), and operating under a federal permit with special protections for endangered species and nearby cemeteries.\", \"detail\": \"Buck Canyon Properties LLC's Ohio EPA wetland-mitigation filing states the development would cause 'unavoidable permanent impacts to approximately 0.74 acres of three low-quality isolated wetlands,' offset by 68 Yards LLC's purchase of mitigation credits from the Red Stone Farm Mitigation Bank in Pike County. The U.S. Army Corps of Engineers issued a Nationwide Permit No. 39 on Feb. 18, 2026, with 11 special conditions, including measures to protect endangered bats, mussels, and butterflies, a requirement to halt work if human remains or archaeological sites are discovered, and a 100-foot buffer with temporary construction fencing around the Boone and Davidson cemeteries and permanent fencing around the Rogers Parr cemetery. The 'Buck Canyon' project footprint is expected to clear approximately 320 acres of forested habitat. Local opposition groups and outlets (WCPO, Food & Water Watch, Hoodline) have raised broader concerns about noise, light pollution, heat, and strain on the rural ecosystem, in addition to the underlying brownfield/former-power-plant redevelopment angle the county has promoted as a selling point ('Adams County touts demolished power plants as the best place for data centers').\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No official filing or company statement explicitly confirms closed-loop versus open/evaporative cooling for this facility. Public estimates conflict: West Union Village Mayor Jason Buda told village council he had heard the facility could use 'one million gallons a day' — about four times the village's own usage — while Amazon's Adams County community-relations materials cite a much smaller figure of approximately 19.7 million gallons per year (roughly 54,000 gallons/day) drawn from the Ohio River, alongside a corporate pledge to be 'water positive' by 2030 and funding of an 11-acre wetland restoration with The Nature Conservancy. The order-of-magnitude discrepancy between these two figures, combined with the lack of a specific published cooling-system design or water-use permit for the site, means the closed-loop question cannot be confirmed either way from public sources.\"}, \"timeline\": \"2023-2024: Two affiliated companies (ultimately controlled by three owners, including Derek Harmon and Darren Royse) begin acquiring roughly 790 acres at the former Killen and Stuart power-plant sites; Buck Canyon Properties LLC pays $2.65 million for the adjoining 1,016-acre former DP&L landfill/Stuart Station parcel in 2024.\\nDecember 2025: Bu
