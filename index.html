(function(){
  const _SEED={"v67_bs_monroebitdeer-clarington": "{\"data\": {\"headline\": \"Bitdeer's 570 MW Clarington crypto/HPC campus represents one of Ohio's largest single-site data center developments, leveraging proximity to Ohio Valley transmission infrastructure.\", \"gridRisk\": \"High\", \"gridNote\": \"570 MW load in rural Monroe County places substantial stress on AEP Ohio's transmission network; major interconnection upgrades likely required.\", \"taxStatus\": \"Ohio data centers qualify for sales tax exemption on equipment; Monroe County may offer additional incentives given rural economic development priority.\", \"envFlag\": \"Moderate\", \"envNote\": \"Large thermal and noise footprint in rural Ohio Valley; potential concerns around stormwater, land disturbance, and proximity to Ohio River corridor.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Transmission capacity and interconnection timeline in a rural, low-load-density county could significantly delay or constrain full 570 MW buildout.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334789855}, \"ts\": 1782334789855}", "v67_bs_browndb-stu-mt-orab-mega-site": "{\"data\": {\"headline\": \"Unconfirmed Meta-linked 1500 MW hyperscale AI campus in rural Brown County represents one of Ohio's largest single-site data center investments and will stress AEP Ohio's transmission infrastructure significantly.\", \"gridRisk\": \"Very High\", \"gridNote\": \"1500 MW in Brown County will require major AEP Ohio transmission upgrades; rural grid lacks existing capacity for hyperscale AI load.\", \"taxStatus\": \"Ohio data center sales tax exemption likely applicable; Brown County may offer additional local abatements to attract investment.\", \"envFlag\": \"Significant\", \"envNote\": \"1500 MW load raises substantial water consumption, land use, and air quality concerns in a rural agricultural county with limited existing industrial infrastructure.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interco rect environmental violations at this facility.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Capacity unknown limits investment sizing; FirstEnergy grid reliability and potential rate increases pose operational cost risk for colocation margin stability.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334037925}, \"ts\": 1782334037925}", "v67_bs_montgomerylumen-dayton-3": "{\"data\": {\"headline\": \"Legacy Lumen telecom colocation node in Dayton serving as regional network interconnect point with limited disclosed capacity data.\", \"gridRisk\": \"Low\", \"gridNote\": \"Dayton Power and Light (AES Ohio) serves the area; telecom colo facilities typically draw modest and stable power loads compared to hyperscale data centers.\", \"taxStatus\": \"Ohio data center equipment may qualify for sales tax exemption if thresholds are met; Montgomery County offers standard enterprise zone incentives.\", \"envFlag\": \"None\", \"envNote\": \"No known environmental flags; legacy telecom facilities generally have low environmental footprint relative to large compute campuses.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Lumen Technologies ongoing financial distress and network asset divestitures create uncertainty about long-term operational continuity and facility investment commitment.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334843161}, \"ts\": 1782334843161}", "v67_bs_pikeports-technology-campus-softbank-sb-energy-": "{\"data\": {\"headline\": \"SoftBank's 10,000 MW AI campus at the former Portsmouth Gaseous Diffusion Plant represents the largest proposed data center investment in US history, combining massive on-site gas generation with a $4.2B transmission buildout on a legacy contaminated federal site.\", \"gridRisk\": \"High\", \"gridNote\": \"9.2 GW of on-site natural gas generation partially offloads grid demand but $4.2B AEP Ohio transmission upgrade signals significant regional grid stress; scale is unprecedented for a single campus.\", \"taxStatus\": \"Located on DOE Portsmouth site with complex federal land status; tax treatment likely involves Ohio Jobs Creation Tax Credit and potential federal energy zone benefits, but terms not publicly confirmed.\", \"envFlag\": \"Significant\", \"envNote\": \"Active radioactive and toxic remediation ongoing at former uranium enrichment site; Ohio EPA review in progress; on-site gas generation adds air quality concerns; cumulative environmental liability is substantial.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Radioactive and hazardous legacy contamination at the DOE Portsmouth site poses regulatory, liability, and timeline risk that could delay or derail construction regardless of capital committed.\", \"investmentEstimate\": \"$33B+\", \"priority\": \"Critical\", \"_ts\": 1782334858621}, \"ts\": 1782334858621}", "v67_bs_montgomerylumen-dayton-2": "{\"data\": {\"headline\": \"Legacy Lumen telecom facility in Dayton offering modest colocation capacity within a mid-sized Midwest market served by AES Ohio's constrained grid.\", \"gridRisk\": \"Medium\", \"gridNote\": \"AES Ohio faces ongoing transmission upgrade challenges and aging infrastructure in the Dayton region, though 2 MW demand is manageable at this scale.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemptions on equipment and electricity for qualifying facilities, though Lumen's colo model complicates direct applicability.\", \"envFlag\": \"Minor\", \"envNote\": \"Urban Dayton location with standard telecom operational footprint; no major environmental concerns flagged but brownfield site history in Montgomery County warrants due diligence.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Lumen Technologies' ongoing financial restructuring and debt load creates counterparty and operational continuity risk for colocation tenants.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334808775}, \"ts\": 1782334808775}", "v67_bs_montgomeryencore-technologies-msb1": "{\"data\": {\"headline\": \"Small 3 MW colocation facility in Dayton suburb served by Dayton Power and Light within a mature industrial corridor with limited expansion headroom.\", \"gridRisk\": \"Low\", \"gridNote\": \"DP&L service territory with stable suburban grid infrastructure; 3 MW load is modest and unlikely to strain local capacity.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment under certain thresholds; Montgomery County has no known special incentive districts for this site.\", \"envFlag\": \"None\", \"envNote\": \"No known environmental concerns associated with this suburban industrial location.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scale at 3 MW constrains enterprise colocation competitiveness against larger regional facilities in Columbus or Cincinnati.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334829003}, \"ts\": 1782334829003}", "v67_bs_franklindatacanopy-columbus": "{\"data\": {\"headline\": \"Small 1 MW colocation facility in Columbus serves as a regional connectivity node within Ohio's growing data center market anchored by the Columbus metro area.\", \"gridRisk\": \"Low\", \"gridNote\": \"Columbus is served by AEP Ohio with stable grid infrastructure and access to PJM Interconnection; 1 MW load is negligible for the regional grid.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment purchases; Franklin County may offer additional local incentives depending on investment thresholds.\", \"envFlag\": \"Minor\", \"envNote\": \"Small facility footprint limits environmental impact; standard UPS and diesel generator backup systems present minor emissions and fuel storage considerations.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 1 MW capacity constrains long-term revenue growth and competitive positioning against hyperscale campuses entering the Columbus market.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334344406}, \"ts\": 1782334344406}", "v67_bs_delawarecologix-col4": "{\"data\": {\"headline\": \"Cologix COL4 is a 27 MW active colocation facility in Delaware County, Ohio, positioned within the AEP Ohio service territory and benefiting from Ohio's data center tax exemption on equipment purchases.\", \"gridRisk\": \"Medium\", \"gridNote\": \"AEP Ohio serves the area with generally stable transmission infrastructure, but regional PJM interconnection queue congestion and load growth from Ohio's data center boom may pressure future capacity expansion timelines.\", \"taxStatus\": \"Ohio HB 218 (2022) provides a sales and use tax exemption for data center equipment and electricity for qualifying facilities; Delaware County may offer additional local incentives depending on job creation commitments.\", \"envFlag\": \"Minor\", \"envNote\": \"Ohio data centers face minimal direct environmental permitting hurdles, though increasing scrutiny on water consumption and carbon footprint from colocation customers may require enhanced ESG reporting.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Power capacity constraints driven by surging Ohio data center demand competing for PJM interconnection slots could limit future expansion beyond current 27 MW footprint.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Medium\", \"_ts\": 1782333837372}, \"ts\": 1782333837372}", "v67_bs_franklinkaris-critical-prairie-township": "{\"data\": {\"headline\": \"Karis Critical's 90 MW hyperscale campus in Prairie Township marks a significant addition to Franklin County's growing data center corridor, leveraging Columbus metro infrastructure and AEP Ohio grid access.\", \"gridRisk\": \"High\", \"gridNote\": \"90 MW hyperscale load in Franklin County adds substantial demand on AEP Ohio's already-stressed Columbus-area transmission system; large load interconnection queue timelines likely 3-5+ years.\", \"taxStatus\": \"Ohio data centers may qualify for state sales tax exemption on equipment; Franklin County Enterprise Zone or CRA abatements likely pursued but terms unconfirmed at site-selected stage.\", \"envFlag\": \"Moderate\", \"envNote\": \"Prairie Township in western Franklin County includes wetland and floodplain areas near Big Darby Creek watershed, a state-designated scenic river; site-specific environmental review required before construction.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interconnection timeline and capacity constraints on AEP Ohio transmission infrastructure pose the most significant development risk given the 90 MW hyperscale demand profile.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334188863}, \"ts\": 1782334188863}", "v67_bs_franklinexpedient-upper-arlington": "{\"data\": {\"headline\": \"Small urban colocation facility serving Columbus metro enterprises with modest 2MW footprint in established residential-commercial suburb.\", \"gridRisk\": \"Low\", \"gridNote\": \"Upper Arlington is served by AEP Ohio with stable suburban grid infrastructure and low congestion risk at 2MW scale.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment and electricity; Franklin County abatements possible via CRA or enterprise zone programs.\", \"envFlag\": \"Minor\", \"envNote\": \"2MW facility has limited environmental impact; standard cooling and backup diesel generator emissions typical for urban colo.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability beyond 2MW in dense suburban Upper Arlington location constrains long-term growth potential.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334329569}, \"ts\": 1782334329569}", "v67_bs_franklinark-data-centers-westerville": "{\"data\": {\"headline\": \"Small 1 MW colocation facility in Westerville serving regional SMB and enterprise clients within the Columbus metro area.\", \"gridRisk\": \"Low\", \"gridNote\": \"AEP Ohio serves Westerville with stable grid infrastructure and ample capacity for a 1 MW load in the Columbus suburban corridor.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment under certain thresholds; Franklin County incentives may apply but deal size limits leverage.\", \"envFlag\": \"None\", \"envNote\": \"1 MW facility poses minimal environmental footprint; no significant water, emissions, or land use concerns expected at this scale.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scale at 1 MW constrains revenue potential and competitive positioning against larger Columbus-area hyperscale and colo operators.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334422009}, \"ts\": 1782334422009}", "v67_bs_franklinenet-cmh-1": "{\"data\": {\"headline\": \"Small-scale Columbus colocation facility serving regional enterprise clients in Ohio's growing data center market.\", \"gridRisk\": \"Low\", \"gridNote\": \"AEP Ohio provides stable grid service to Franklin County with adequate capacity for 1 MW load.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment and electricity for qualifying facilities.\", \"envFlag\": \"None\", \"envNote\": \"1 MW facility presents minimal environmental footprint with no significant emissions or land use concerns.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scale reduces competitive positioning against hyperscale and larger colo operators entering the Columbus market.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334288174}, \"ts\": 1782334288174}", "v67_bs_lickingaligned-pataskala": "{\"data\": {\"headline\": \"Aligned Data Centers is developing a 150 MW AI/hyperscale campus in Pataskala, Licking County, positioning the facility within Ohio's rapidly expanding data center corridor east of Columbus.\", \"gridRisk\": \"High\", \"gridNote\": \"150 MW hyperscale load in Licking County falls under AEP Ohio territory, which is already managing significant new data center demand growth; large single-site interconnection queue position and transmission upgrade timelines pose material risk.\", \"taxStatus\": \"Ohio's Commercial Activity Tax applies, but Licking County and Pataskala may offer local tax increment financing or CRA property tax abatements consistent with incentives granted to nearby data center developments; formal agreements not yet confirmed at site-selected stage.\", \"envFlag\": \"Moderate\", \"envNote\": \"Pataskala area involves potential wetland and floodplain considerations near Licking County; 150 MW facility will require OEPA air permits for backup generation and stormwater NPDES permitting; no major Superfund concerns identified.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"AEP Ohio grid interconnection capacity and timeline uncertainty at 150 MW scale is the primary risk, compounded by competing large loads in the same transmission zone and potential multi-year delays for necessary substation and transmission upgrades.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334666252}, \"ts\": 1782334666252}", "v67_bs_undisclosedcipher-mining-ulysses-site": "{\"data\": {\"headline\": \"Cipher Mining's 200 MW Ulysses site expands Ohio's crypto/HPC footprint but county and grid interconnect details remain undisclosed, limiting near-term assessment.\", \"gridRisk\": \"High\", \"gridNote\": \"200 MW load in a rural Ohio location likely served by AEP Ohio or a rural co-op; large unannounced industrial loads strain local transmission without confirmed interconnect agreements.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemptions on equipment; county-level abatements unconfirmed given undisclosed county.\", \"envFlag\": \"Moderate\", \"envNote\": \"Crypto/HPC operations generate significant heat and noise; rural siting raises concerns about local air quality, noise ordinances, and community impact without disclosed environmental review.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Undisclosed county and lack of confirmed grid interconnect or utility agreement makes capacity delivery and timeline highly uncertain at this stage.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Medium\", \"_ts\": 1782333852794}, \"ts\": 1782333852794}", "v67_bs_franklinwow-business-columbus": "{\"data\": {\"headline\": \"WOW! Business operates a modest 3 MW telecom/colo facility in Columbus serving regional business connectivity needs with limited scalability.\", \"gridRisk\": \"Low\", \"gridNote\": \"AEP Ohio serves Columbus with stable grid infrastructure; 3 MW demand is easily accommodated.\", \"taxStatus\": \"Ohio data center tax exemption may apply to qualifying equipment; Franklin County incentives possible but likely modest at this scale.\", \"envFlag\": \"Minor\", \"envNote\": \"3 MW facility carries low environmental footprint; standard telecom cooling and diesel backup generator emissions typical.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited capacity ceiling and competitive pressure from larger Columbus colo providers constrains growth and tenant acquisition.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334252783}, \"ts\": 1782334252783}", "v67_bs_mahoningdrs-youngstown-south": "{\"data\": {\"headline\": \"Small 2 MW colocation facility in post-industrial Youngstown serving regional enterprises on aging FirstEnergy grid infrastructure.\", \"gridRisk\": \"Medium\", \"gridNote\": \"FirstEnergy Ohio service area faces aging transmission infrastructure and capacity constraints in the Mahoning Valley region; 2 MW load is manageable but grid reliability history warrants monitoring.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment purchases above qualifying thresholds; Mahoning County may offer additional incentives given Youngstown's economically distressed designation.\", \"envFlag\": \"Minor\", \"envNote\": \"Youngstown area carries legacy industrial contamination concerns in broader region, though colocation facility itself presents low direct environmental footprint at 2 MW scale.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Regional economic fragility and limited local enterprise demand in Youngstown metro may constrain colocation occupancy and revenue growth, compounded by aging regional grid reliability.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334751867}, \"ts\": 1782334751867}", "v67_bs_adamsadams-co-dc-former-dp-l-landfill-": "{\"data\": {\"headline\": \"Former DP&L landfill-to-data-center conversion represents a brownfield redevelopment opportunity with significant environmental legacy and rural grid constraints in Adams County.\", \"gridRisk\": \"High\", \"gridNote\": \"Adams County sits on the periphery of AEP Ohio territory with limited 100 MW transmission capacity; substantial substation upgrades likely required for industrial-scale AI load.\", \"taxStatus\": \"Ohio data center sales tax exemption likely applicable; rural enterprise zone abatements possible but Adams Co. has limited track record with large industrial incentive packages.\", \"envFlag\": \"Significant\", \"envNote\": \"Former DP&L landfill designation raises serious concerns about coal ash, leachate, soil contamination, and EPA closure compliance; Phase II ESA and potential Superfund adjacency review strongly advised.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Environmental remediation liability from landfill legacy contamination could substantially delay permitting, increase capital costs, or trigger regulatory action under RCRA or Ohio EPA closure rules.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782333860985}, \"ts\": 1782333860985}", "v67_bs_franklincrown-castle-columbus-oh1": "{\"data\": {\"headline\": \"Crown Castle's Columbus OH1 is a small-scale telecom colocation facility supporting regional fiber connectivity in central Ohio's growing data center market.\", \"gridRisk\": \"Low\", \"gridNote\": \"2 MW load is minimal for AEP Ohio service territory; no significant grid interconnection concerns expected at this capacity.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemption on equipment; Franklin County abatements possible via CRA or TIF programs.\", \"envFlag\": \"None\", \"envNote\": \"2 MW telecom colo presents negligible environmental footprint; standard cooling and backup generator emissions only.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 2 MW constrains future expansion; Crown Castle's core business is fiber/towers, not large-scale colo, reducing investment priority.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334246469}, \"ts\": 1782334246469}", "v67_bs_warrencbts-mason": "{\"data\": {\"headline\": \"CBTS Mason is a modest 1 MW colocation facility in suburban Warren County serving regional enterprise IT needs with limited grid and environmental exposure.\", \"gridRisk\": \"Low\", \"gridNote\": \"1 MW load is negligible for AEP Ohio's suburban Mason grid infrastructure with ample capacity in Warren County.\", \"taxStatus\": \"Ohio data center tax exemption may apply to qualifying colocation equipment; Warren County offers standard commercial property tax rates.\", \"envFlag\": \"None\", \"envNote\": \"1 MW facility presents minimal environmental footprint; no significant water, emissions, or land use concerns expected at this scale.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Small capacity limits revenue scale and competitive positioning against larger hyperscale and regional colo operators in the Columbus-Cincinnati corridor.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782335043943}, \"ts\": 1782335043943}", "v67_bs_lickingmeta-prometheus": "{\"data\": {\"headline\": \"Meta's 1GW+ Prometheus campus in New Albany is the world's first gigawatt-scale AI data center, representing a landmark $10B hyperscale investment requiring unprecedented AEP Ohio grid infrastructure upgrades.\", \"gridRisk\": \"Very High\", \"gridNote\": \"1GW+ load requires major AEP Ohio transmission upgrades; among the largest single-site grid demands in US history.\", \"taxStatus\": \"Sales tax exemptions on equipment and New Albany property tax abatement negotiated; partial incentive package.\", \"envFlag\": \"Significant\", \"envNote\": \"Gigawatt-scale power draw and water consumption carry significant environmental footprint; watershed restoration commitments noted but scale of impact is substantial.\", \"waterLoop\": \"Partial\", \"keyRisk\": \"AEP Ohio grid upgrade timeline and capacity delivery could delay or constrain full 1GW operational readiness.\", \"investmentEstimate\": \"~$10B\", \"priority\": \"Critical\", \"_ts\": 1782334612792}, \"ts\": 1782334612792}", "v67_bs_hamiltonencore-technologies-nor1": "{\"data\": {\"headline\": \"Small colocation facility in the Cincinnati suburb of Norwood serving regional enterprise clients with modest 3 MW capacity.\", \"gridRisk\": \"Low\", \"gridNote\": \"3 MW draw is well within AES Ohio/Duke Energy distribution capacity for the Norwood area; no significant grid stress expected.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemption on equipment and electricity if thresholds are met; Hamilton County offers limited additional incentives.\", \"envFlag\": \"Minor\", \"envNote\": \"3 MW facility has limited environmental footprint; standard cooling and modest water use typical for facilities this size in urban infill locations.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 3 MW capacity constrains long-term growth; Norwood is a landlocked inner-ring suburb with little room for campus expansion.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334512225}, \"ts\": 1782334512225}", "v67_bs_cuyahogalakeland-equity-e55th-denied-": "{\"data\": {\"headline\": \"A $1.6B hyperscale data center proposal was denied by Cleveland Mayor Justin Bibb in May 2026, blocking 150 MW of planned capacity in Cuyahoga County.\", \"gridRisk\": \"Low\", \"gridNote\": \"Permit denial eliminates any near-term grid impact; FirstEnergy transmission planning for this load is moot unless project is appealed or relocated.\", \"taxStatus\": \"No tax revenue realized; potential abatement negotiations and anticipated economic development benefits are voided by denial.\", \"envFlag\": \"None\", \"envNote\": \"Project denial means no environmental review obligations are active; site impacts are contingent on any future reapplication.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Regulatory and political opposition at the municipal level; Mayor Bibb's denial signals potential systemic resistance to large-scale data center development in Cleveland without community benefit or grid assurance frameworks.\", \"investmentEstimate\": \"$1.6B\", \"priority\": \"Low\", \"_ts\": 1782334116912}, \"ts\": 1782334116912}", "v67_bs_franklinamazon-scioto-darby-campus": "{\"data\": {\"headline\": \"Amazon's Scioto Darby Campus is a large-scale hyperscale AI/cloud facility in Hilliard representing one of AWS's most significant Ohio infrastructure investments at 395 MW of capacity.\", \"gridRisk\": \"High\", \"gridNote\": \"395 MW load places substantial demand on AEP Ohio transmission infrastructure in Franklin County; coordination with PJM required for grid interconnection at this scale.\", \"taxStatus\": \"Likely benefits from Ohio's Data Center Sales Tax Exemption for qualifying equipment; local CRA or TIF incentives probable given Hilliard/Franklin County development history.\", \"envFlag\": \"Moderate\", \"envNote\": \"High energy consumption raises carbon footprint concerns; cooling water withdrawal from Scioto-Darby watershed warrants OEPA scrutiny; noise and stormwater impacts from large campus footprint likely.\", \"waterLoop\": \"Partial\", \"keyRisk\": \"Grid capacity constraints and PJM interconnection queue delays could limit phased expansion; sustained community opposition to water and environmental impacts is a secondary risk.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Critical\", \"_ts\": 1782334177729}, \"ts\": 1782334177729}", "v67_bs_butlercbts-hamilton": "{\"data\": {\"headline\": \"CBTS Hamilton is a small 1 MW colocation facility in Butler County serving regional enterprise clients with limited scalability potential.\", \"gridRisk\": \"Low\", \"gridNote\": \"Butler County is served by Duke Energy Ohio with stable suburban grid infrastructure and no known capacity constraints at this scale.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on qualifying equipment; Butler County has no known special incentive districts but standard CRA abatements may apply.\", \"envFlag\": \"None\", \"envNote\": \"At 1 MW capacity, facility has minimal environmental footprint with no significant water, air, or land impact concerns expected.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited growth capacity at 1 MW makes facility vulnerable to client churn if expansion needs cannot be met on-site.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782333910892}, \"ts\": 1782333910892}", "v67_bs_warrencbts-lebanon": "{\"data\": {\"headline\": \"CBTS Lebanon is a modest 8 MW colocation facility in Warren County serving regional enterprise clients with established Ohio infrastructure presence.\", \"gridRisk\": \"Low\", \"gridNote\": \"Warren County is served by Duke Energy Ohio with stable suburban grid infrastructure and low congestion risk at 8 MW scale.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemption on equipment and electricity enterprise data center provisions if thresholds are met.\", \"envFlag\": \"Minor\", \"envNote\": \"8 MW facility carries standard cooling and energy consumption footprint; no significant environmental concerns expected at this scale in Warren County.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited public capacity and expansion data makes growth trajectory and competitive positioning against larger regional colo operators difficult to assess.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782335050618}, \"ts\": 1782335050618}", "v67_bs_hamiltoncbts-gold-coast": "{\"data\": {\"headline\": \"CBTS Gold Coast is a modest 2 MW colocation facility in Cincinnati serving regional enterprise clients with managed IT and network services.\", \"gridRisk\": \"Low\", \"gridNote\": \"Cincinnati is served by Duke Energy Ohio with stable urban grid infrastructure; 2 MW load poses minimal strain.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on qualifying equipment; Hamilton County has no additional special incentives noted.\", \"envFlag\": \"None\", \"envNote\": \"2 MW facility presents negligible environmental footprint; urban colocation with no significant cooling or emissions concerns flagged.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 2 MW capacity constrains growth potential and competitive positioning against larger regional colo providers.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334499450}, \"ts\": 1782334499450}", "v67_bs_franklinlumen-columbus-226-n-5th-": "{\"data\": {\"headline\": \"Legacy Lumen telecom colo in downtown Columbus serving as critical network hub for central Ohio connectivity infrastructure.\", \"gridRisk\": \"Low\", \"gridNote\": \"3 MW load is modest and well within AEP Ohio urban grid capacity; downtown Columbus has redundant utility feeds typical for telecom facilities.\", \"taxStatus\": \"Likely qualifies for existing telecom property tax treatment under Ohio law; data center-specific abatements may not apply given telecom classification.\", \"envFlag\": \"Minor\", \"envNote\": \"Downtown urban site with impervious surfaces and limited green space; standard telecom cooling emissions but small footprint limits broader environmental impact.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Lumen Technologies financial instability and ongoing asset divestitures rai <script type="text/babel">
const{useState,useMemo,useEffect,useRef,useCallback}=React;

// ── STORAGE SHIM ──────────────────────────────────────────────────────────────
// Storage layer: prefer localStorage (persistent across reloads) in deployed HTML.
// Fall back to window.storage only when localStorage is unavailable (e.g. private browsing with storage blocked).
// NOTE: window.storage exists in Claude artifact sandbox but is session-scoped — do NOT use it as primary.
const _useWinStorage = (()=>{
  try { localStorage.setItem('__test__','1'); localStorage.removeItem('__test__'); return false; }
  catch(e) { return typeof window.storage !== 'undefined'; }
})();
const storage={
  async set(k,v){
    try{
      if(_useWinStorage) return await window.storage.set(k,v);
      localStorage.setItem(k,v); return true;
    }catch(e){return false;}
  },
  async get(k){
    try{
      if(_useWinStorage) return await window.storage.get(k);
      const v=localStorage.getItem(k); return v?{value:v}:null;
    }catch(e){return null;}
  },
  async list(pfx){
    try{
      if(_useWinStorage) return await window.storage.list(pfx);
      const keys=Object.keys(localStorage).filter(k=>k.startsWith(pfx)); return{keys};
    }catch(e){return{keys:[]};}
  },
};

// ── CACHE ─────────────────────────────────────────────────────────────────────
const BS_PFX='v67_bs_',DC_PFX='v67_dc_';
async function cacheSet(pfx,id,data){try{await storage.set(pfx+id,JSON.stringify({data,ts:Date.now()}));return true;}catch(e){return false;}}
async function cacheGet(pfx,id){try{const r=await storage.get(pfx+id);return r?JSON.parse(r.value):null;}catch(e){return null;}}
async function cacheLoadAll(pfx){try{const keys=(await storage.list(pfx))?.keys||[];const out={};for(const k of keys){try{const r=await storage.get(k);if(r){const p=JSON.parse(r.value);out[k.replace(pfx,'')]={...p.data,_ts:p.ts};}}catch(e){}}return out;}catch(e){return{};}}
async function cacheIdSet(pfx){try{const keys=(await storage.list(pfx))?.keys||[];return new Set(keys.map(k=>k.replace(pfx,'')));}catch(e){return new Set();}}

// ── AUTH ──────────────────────────────────────────────────────────────────────
const ACCESS_CODE='freedom250';
const AUTH_KEY='ohdc_auth_v1';
function getAuth(){try{return localStorage.getItem(AUTH_KEY)==='1';}catch(e){return false;}}
function setAuth(){try{localStorage.setItem(AUTH_KEY,'1');}catch(e){}}

function LoginScreen({onAuth}){
  const[code,setCode]=useState('');
  const[err,setErr]=useState(false);
  const[shake,setShake]=useState(false);
  function attempt(){
    if(code.toLowerCase()===ACCESS_CODE.toLowerCase()){setAuth();onAuth();}
    else{setErr(true);setShake(true);setCode('');setTimeout(()=>setShake(false),600);}
  }
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#0f172a',padding:24}}>
      <div style={{animation:'fadeIn .4s ease',textAlign:'center',maxWidth:380,width:'100%'}}>
        <div style={{fontSize:13,letterSpacing:'.18em',color:'#475569',textTransform:'uppercase',marginBottom:6}}>Restricted Access</div>
        <div style={{fontSize:28,fontWeight:700,color:'white',marginBottom:4,letterSpacing:'-.5px'}}>Ohio Data Center Intelligence</div>
        <div style={{fontSize:13,color:'#475569',marginBottom:36}}>v.74-publish · Private Research Platform</div>
        <div style={{background:'#1e293b',borderRadius:12,padding:28,border:'0.5px solid #334155',animation:shake?'shake .5s ease':'none'}}>
          <div style={{fontSize:11,color:'#64748b',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10,textAlign:'left'}}>Access Code</div>
          <input autoFocus type="password" value={code} onChange={e=>{setCode(e.target.value);setErr(false);}} onKeyDown={e=>e.key==='Enter'&&attempt()} placeholder="Enter access code"
            style={{width:'100%',background:'#0f172a',border:`1px solid ${err?'#ef4444':'#334155'}`,borderRadius:8,padding:'10px 14px',color:'white',fontSize:14,outline:'none',marginBottom:12,letterSpacing:'.1em'}}/>
          {err&&<div style={{fontSize:11,color:'#ef4444',marginBottom:10,textAlign:'left'}}>Incorrect access code. Please try again.</div>}
          <button onClick={attempt} style={{width:'100%',background:'#3b82f6',color:'white',border:'none',borderRadius:8,padding:'10px 0',fontSize:13,fontWeight:600,cursor:'pointer',letterSpacing:'.03em'}}>Enter →</button>
        </div>

function cleanVal(v){if(v==null)return'TBD';let s=stripMD(String(v)).replace(/^[-:•*\s]+/,'').trim();const l=s.toLowerCase();if(!s||['tbd','n/a','na','unknown','—','-'].includes(l)||l.includes('not disclosed')||l.includes('research pending'))return'TBD';return s;}
function getSections(txt){const sec={};const parts=txt.split(/\n##\s+/);for(let i=1;i<parts.length;i++){const nl=parts[i].indexOf('\n');const h=(nl>-1?parts[i].slice(0,nl):parts[i]).trim().toLowerCase();const b=(nl>-1?parts[i].slice(nl+1):'').trim();if(h.includes('metric'))sec.metrics=b;else if(h.includes('grid')||h.includes('power'))sec.grid=b;else if(h.includes('tax'))sec.tax=b;else if(h.includes('environ'))sec.env=b;else if(h.includes('water'))sec.water=b;else if(h.includes('timeline'))sec.timeline=b;else if(h.includes('investor'))sec.investors=b;else if(h.includes('politic'))sec.political=b;else if(h.includes('source'))sec.sources=b;}return sec;}
function toResult(fac,txt){const s=getSections(txt);const fl=t=>t?t.split('\n')[0].replace(/^[-•*\d.]+\s*/,'').trim():'';const srcs=s.sources?s.sources.split('\n').map(x=>x.replace(/^[-•*\d.]+\s*/,'').trim()).filter(Boolean):[];
  // Alias-based extraction: tries each alias in order, returns first match found in the metrics block
  const gmA=aliases=>{
    if(!s.metrics)return'';
    for(const k of aliases){
      const m=s.metrics.match(new RegExp(k+'\\s*:\\s*([^\\n]+)','i'));
      if(m){const v=m[1].replace(/^-+\s*/,'').trim();if(v&&!/^\bTBD\b$/i.test(v))return v.replace(/\bTBD\b.*/i,'').trim();}
    }
    return'';
  };
  const gm=k=>gmA([k]);
  const startDate=gmA(['Operational Date','Operational','Online Date','Go-?Live Date','Expected Operational','In-?Service Date'])||gmA(['Construction Start','Construction Start Date','Groundbreaking','Groundbreaking Date'])||'';
  const sizeSqFt=gmA(['Square Feet','Square Footage','Facility Size','Total Square Feet','Building Size','Sq\\.?\\s*Ft\\.?'])||'';
  const totalInvestment=gmA(['Total Investment','Investment','Total Capital Investment','Project Cost','Capital Expenditure','Capex'])||fac.cost||'';
  return{status:fac.status,startDate,powerMW:fac.mw>0?fac.mw+' MW':'',sizeSqFt,totalInvestment,employment:{construction:gmA(['Construction Jobs','Construction Employment']),permanent:gmA(['Permanent Jobs','Permanent Employment','Full-?Time Jobs']),totalPayroll:gmA(['Annual Payroll','Payroll'])},gridImpact:{summary:fl(s.grid),detail:s.grid||''},taxImplications:{summary:fl(s.tax),detail:s.tax||''},environmentalImpact:{summary:fl(s.env),detail:s.env||''},waterLoop:{answer:fl(s.water)||'TBD',detail:s.water||''},timeline:s.timeline||'',investors:s.investors||'',politicalContext:s.political||'',sources:srcs,dataConfidence:srcs.length>2?'High':srcs.length>0?'Medium':'Low',_raw:Object.keys(s).length===0?txt:''};}

function parseCostM(cost){if(!cost)return null;const s=cost.replace(/[~<>+,\s]/g,'');const n=parseFloat(s);if(isNaN(n))return null;if(/b/i.test(s))return n*1000;if(/m/i.test(s))return n;return null;}

  {id:'cost_per_mw',label:'Cost per MW ($M/MW)',unit:'$M/MW',get:(f)=>{const m=f.mw>0?f.mw:null,c=parseCostM(f.cost);return(m&&c)?+(c/m).toFixed(2):null;}},
  {id:'mw_per_cost',label:'MW per $M invested',unit:'MW/$M',get:(f)=>{const m=f.mw>0?f.mw:null,c=parseCostM(f.cost);return(m&&c)?+(m/c).toFixed(3):null;}},

];

function calcStats(vals){if(!vals.length)return null;const s=[...vals].sort((a,b)=>a-b);const mean=vals.reduce((a,b)=>a+b,0)/vals.length;const mid=Math.floor(s.length/2);const median=s.length%2===0?(s[mid-1]+s[mid])/2:s[mid];const stddev=Math.sqrt(vals.reduce((a,b)=>a+Math.pow(b-mean,2),0)/vals.length);return{mean,median,stddev,min:s[0],max:s[s.length-1],n:vals.length};}
function fmtVal(v,fieldId){if(v===null||v===undefined)return'—';const scoreLabels={priority:{4:'Critical',3:'High',2:'Medium',1:'Low'},gridRisk:{4:'Very High',3:'High',2:'Medium',1:'Low'},envFlag:{4:'Significant',3:'Moderate',2:'Minor',1:'None'}};if(scoreLabels[fieldId]){const lbl=scoreLabels[fieldId][Math.round(v)];return lbl?`${lbl} (${v.toFixed(1)})`:v.toFixed(2);}if(v>=1000)return v.toLocaleString(undefined,{maximumFractionDigits:1});return v<1?v.toFixed(3):v.toFixed(2);}

// ── BASE SCAN VIEW ────────────────────────────────────────────────────────────
function BaseScanView({bsCache,setBsCache,resCache,onBack,onResearch}){
  const[scanning,setScanning]=useState(false);
  const[paused,setPaused]=useState(false);
  const[prog,setProg]=useState({done:0,total:0,current:'',log:[]});
  const[sortBy,setSortBy]=useState('priority');
  const pauseRef=useRef(false),stopRef=useRef(false);
  const PO={Critical:4,High:3,Medium:2,Low:1};
  const cached=Object.keys(bsCache);
  const pct=prog.total>0?Math.round((prog.done/prog.total)*100):0;
  const sorted=useMemo(()=>FACS.filter(f=>bsCache[f.id]).sort((a,b)=>{const sa=bsCache[a.id],sb=bsCache[b.id];if(sortBy==='priority')return(PO[sb.priority]||0)-(PO[sa.priority]||0);if(sortBy==='recent')return(sb._ts||0)-(sa._ts||0);return a.name.localeCompare(b.name);}),[bsCache,sortBy]);
  async function runScan(rescanAll){
    stopRef.current=false;pauseRef.current=false;setPaused(false);
    const queue=rescanAll?[...FACS]:FACS.filter(f=>!bsCache[f.id]);
    if(!queue.length)return;
    setScanning(true);setProg({done:0,total:queue.length,current:'Starting...',log:[]});
    let done=0;
    for(const fac of queue){
      if(stopRef.current)break;
      while(pauseRef.current)await new Promise(r=>setTimeout(r,200));
      setProg(p=>({...p,current:`Scanning ${fac.name}...`,done}));
      try{const result=await apiBaseScan(fac);const entry={...result,_ts:Date.now()};await cacheSet(BS_PFX,fac.id,result);setBsCache(prev=>({...prev,[fac.id]:entry}));setProg(p=>({...p,log:[{name:fac.name,ok:true,pri:result.priority},...p.log].slice(0,60)}));}
      catch(e){setProg(p=>({...p,log:[{name:fac.name,ok:false},...p.log].slice(0,60)}));}
      done++;await new Promise(r=>setTimeout(r,450));
    }
    setScanning(false);setProg(p=>({...p,done,current:`Done — ${done} processed`}));
  }
  async function rescanOne(fac){try{const result=await apiBaseScan(fac);const entry={...result,_ts:Date.now()};await cacheSet(BS_PFX,fac.id,result);setBsCache(prev=>({...prev,[fac.id]:entry}));}catch(e){console.error(e);}}
  const togglePause=()=>{pauseRef.current=!pauseRef.current;setPaused(p=>!p);};
  const stopScan=()=>{stopRef.current=true;setScanning(false);setPaused(false);};
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style={T.nav}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:12,padding:0}}>← Back</button>
        <span style={{fontSize:14,fontWeight:600,color:'white'}}>⚡ Base Scan</span>
        <span style={{fontSize:11,color:'#475569',background:'rgba(255,255,255,0.06)',padding:'2px 8px',borderRadius:99}}>{cached.length} / {FACS.length} cached</span>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <span style={{fontSize:10,color:'#475569'}}>Sort:</span>
          {['priority','recent','name'].map(s=><button key={s} onClick={()=>setSortBy(s)} style={{fontSize:10,padding:'2px 7px',borderRadius:99,border:'none',cursor:'pointer',background:sortBy===s?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.05)',color:sortBy===s?'white':'#64748b',textTransform:'capitalize'}}>{s}</button>)}
        </div>
      </div>
    </div>
    {(scanning||prog.done>0)&&<div style={{padding:'8px 20px',background:'white',borderBottom:'0.5px solid #e2e8f0',flexShrink:0}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
        <span style={{color:'#64748b',fontStyle:scanning&&!paused?'italic':'normal'}}>{prog.current}</span>
        <span style={{fontWeight:600,color:'#1e293b'}}>{pct}% ({prog.done}/{prog.total})</span>
      </div>
      <div style={{height:4,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#22c55e,#16a34a)',borderRadius:99,transition:'width .35s'}}/></div>
    </div>}
    {scanning&&prog.log.length>0&&<div style={{background:'#0f172a',padding:'5px 20px',flexShrink:0,maxHeight:64,overflowY:'auto'}}>
      {prog.log.slice(0,4).map((l,i)=><div key={i} style={{fontSize:10,fontFamily:'monospace',color:l.ok?'#4ade80':'#f87171',lineHeight:1.6}}>{l.ok?'✓':'✗'} {l.name}{l.ok&&l.pri?' · '+l.pri:''}</div>)}
    </div>}
    {cached.length===0&&!scanning
      ?<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',color:'#94a3b8'}}>
          <div style={{fontSize:32,marginBottom:10}}>⚡</div>
          <div style={{fontSize:14,fontWeight:500,color:'#475569',marginBottom:6}}>No base scans cached yet</div>
          <div style={{fontSize:12,lineHeight:1.7,maxWidth:360}}>Base scans populate via the scheduled research pipeline — none are cached for the current filter yet.</div>
        </div>
      :<div style={{flex:1,overflowY:'auto',padding:'12px 20px'}}>
          <div style={{fontSize:11,color:'#94a3b8',marginBottom:10}}>{sorted.length} cached · sorted by {sortBy}</div>
          {sorted.map(fac=>{
            const sc=bsCache[fac.id],ss=SS(fac.status),hasResearch=resCache.has(fac.id);
            return <div key={fac.id} style={{...T.card,borderLeft:`3px solid ${PRC[sc.priority]||'#94a3b8'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:3}}>{fac.name}</div>
                  <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:'#94a3b8'}}>{fac.company} · {fac.county} Co. · {fac.mw>0?fac.mw+' MW':'?'}</span>
                    <CacheTag type={hasResearch?'full':'base'} ts={sc._ts}/>
                  </div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <span style={T.pill(ss.bg,ss.cl)}>{fac.status}</span>
                  <span style={{...T.pill('#f8fafc',PRC[sc.priority]||'#94a3b8'),border:`0.5px solid ${PRC[sc.priority]||'#e2e8f0'}20`}}>{sc.priority}</span>
                </div>
              </div>
              <BaseScanCard sc={sc} compact={false}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                <span style={{fontSize:9,color:'#cbd5e1'}}>{sc._ts?new Date(sc._ts).toLocaleString():'—'}</span>
                <div style={{display:'flex',gap:5}}>
                  <button onClick={()=>onResearch(fac)} style={{...T.btn('#0f172a','white','none')}}>View Research →</button>
                </div>
              </div>
            </div>;
          })}
        </div>
    }
  </div>;
}

        <span style={{fontSize:11,fontWeight:500,padding:'3px 11px',borderRadius:6,background:'rgba(255,255,255,0.12)',color:'white',border:'0.5px solid rgba(255,255,255,0.1)'}}>🔍 Research</span>
        <button onClick={onMap} style={{fontSize:11,fontWeight:500,padding:'3px 11px',borderRadius:6,cursor:'pointer',border:'0.5px solid rgba(255,255,255,0.08)',background:'transparent',color:'#94a3b8'}}>🗺 Map</button>
        <button onClick={onBaseScan} style={{fontSize:11,fontWeight:500,padding:'3px 11px',borderRadius:6,cursor:'pointer',border:`0.5px solid ${bsCount>0?'rgba(34,197,94,0.3)':'rgba(255,255,255,0.08)'}`,background:bsCount>0?'rgba(34,197,94,0.12)':'transparent',color:bsCount>0?'#4ade80':'#94a3b8',display:'flex',alignItems:'center',gap:5}}>
          ⚡ Base Scan<span style={{fontSize:9,padding:'1px 5px',borderRadius:99,background:'rgba(255,255,255,0.07)'}}>{bsCount}/{FACS.length}</span>
        </button>
        <button onClick={onAnalytics} style={{fontSize:11,fontWeight:500,padding:'3px 11px',borderRadius:6,cursor:'pointer',border:'0.5px solid rgba(139,92,246,0.3)',background:'rgba(139,92,246,0.1)',color:'#a78bfa'}}>📊 Analytics</button>
      </div>
    </div>
    <div style={{padding:'10px 20px',background:'white',borderBottom:'0.5px solid #e2e8f0',flexShrink:0}}>
      <input type="text" placeholder="Search name, company, county, city..." value={query} onChange={e=>setQuery(e.target.value)} style={{border:'0.5px solid #e2e8f0',borderRadius:7,padding:'8px 12px',outline:'none',width:'100%',fontSize:13,marginBottom:8,boxSizing:'border-box',background:'#f8fafc'}} autoFocus/>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {regions.map(r=><button key={r} onClick={()=>setFilter(r)} style={{fontSize:10,fontWeight:500,padding:'3px 10px',borderRadius:99,border:'0.5px solid',cursor:'pointer',borderColor:filter===r?'transparent':'#e2e8f0',background:filter===r?'#0f172a':'white',color:filter===r?'white':'#64748b'}}>{r}</button>)}
      </div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:6,alignItems:'center'}}>
        <span style={{fontSize:9,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em',marginRight:2}}>Tier:</span>
        {tiers.map(t=>{
          const cnt=t==='All'?FACS.length:t==='Active'?activeCount:settledCount;
          const active=tierFilter===t;
          const tc=t!=='All'?TIER_COLORS[t]:null;
          return <button key={t} onClick={()=>setTierFilter(t)} style={{fontSize:10,fontWeight:500,padding:'3px 10px',borderRadius:99,border:'0.5px solid',cursor:'pointer',borderColor:active?'transparent':(tc?tc.cl+'40':'#e2e8f0'),background:active?(tc?tc.cl:'#0f172a'):(tc?tc.bg:'white'),color:active?'white':(tc?tc.cl:'#64748b')}}>{t} ({cnt})</button>;
        })}
      </div>
    </div>
    {error&&<div style={{padding:'6px 20px',background:'#fee2e2',color:'#991b1b',fontSize:11,flexShrink:0}}>⚠ {error}</div>}
    <div style={{flex:1,overflowY:'auto'}}>
      {filtered.length===0&&query.length>=2&&<div style={{padding:'24px',textAlign:'center'}}>
        <div style={{fontSize:12,color:'#64748b',marginBottom:10}}>No match for "{query}"</div>
        <button onClick={()=>onSelect({name:query,company:'(custom)',county:'Ohio',city:query,type:'Unknown',status:'Unknown',mw:0,cost:'',grid:'',tax:'',env:'',waterLoop:'',region:'Unknown',id:'custom-'+Date.now()})} style={{fontSize:12,padding:'7px 16px',borderRadius:6,cursor:'pointer',background:'#0f172a',color:'white',border:'none'}}>Research "{query}" from scratch →</button>
      </div>}
      {filtered.map((f,i)=>{
        const isResearched=resCache.has(f.id),sc=bsCache[f.id],ss=SS(f.status),rs=RS(f.region);
        const isExp=expanded[f.id];
        return <div key={i} style={{borderBottom:'0.5px solid #f0f4f8'}}>
          {/* Main row */}
          <div style={{padding:'9px 20px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,background:isExp?'#f8fafc':''}}
            onClick={()=>{if(sc){toggleExpand(f.id);}else{onSelect(f);}}}
            onMouseEnter={e=>{if(!isExp)e.currentTarget.style.background='#f8fafc';}}
            onMouseLeave={e=>{if(!isExp)e.currentTarget.style.background='';}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2,flexWrap:'wrap'}}>
                <span style={{fontWeight:600,fontSize:12,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.name}</span>
                {isResearched&&<CacheTag type="full" ts={0}/>}
                {!isResearched&&sc&&<CacheTag type="base" ts={sc._ts}/>}
              </div>
              <div style={{fontSize:10,color:'#94a3b8'}}>{f.company} · {f.county} Co. · {f.mw>0?f.mw+' MW':'?'}</div>
              {/* Headline always visible if scan exists */}
              {sc&&!isExp&&<div style={{fontSize:10,color:'#64748b',marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontStyle:'italic'}}>{sc.headline}</div>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:3,flexShrink:0,alignItems:'flex-end'}}>
              <span style={T.pill(ss.bg,ss.cl)}>{f.status}</span>
              <span style={T.pill(rs.bg,rs.cl)}>{f.region}</span>
              <span style={T.pill(TIER_COLORS[f.tier].bg,TIER_COLORS[f.tier].cl)}>{f.tier}</span>
              {/* Scan expand toggle */}
              {sc&&<button onClick={e=>{e.stopPropagation();toggleExpand(f.id);}} style={{fontSize:9,padding:'1px 6px',borderRadius:99,border:'0.5px solid #e2e8f0',background:isExp?'#1e293b':'white',color:isExp?'white':'#64748b',cursor:'pointer',marginTop:1}}>{isExp?'▲ scan':'▼ scan'}</button>}
            </div>
          </div>
          {/* Expanded scan panel */}
          {sc&&isExp&&<BaseScanCard sc={sc} compact={false}/>}
          {sc&&isExp&&<div style={{padding:'6px 20px 8px',background:'#f8fafc',display:'flex',justifyContent:'flex-end'}}>
            <button onClick={()=>onSelect(f)} style={{...T.btn('#0f172a','white','none'),fontSize:11}}>Full Research →</button>
          </div>}
        </div>;
      })}
    </div>
    <div style={{padding:'6px 20px',background:'#f8fafc',borderTop:'0.5px solid #e2e8f0',fontSize:10,color:'#94a3b8',flexShrink:0,display:'flex',justifyContent:'space-between'}}>
      <span>{query.length<2?`${filtered.length} major facilities — type to search all ${FACS.length}`:`${filtered.length} results`}</span>
      <span>{bsCount} base scanned · {resCache.size} fully researched{bsCount>0?' · click any scanned row to preview before researching':''}</span>
    </div>
  </div>;
}

// ── LOADING & RESULTS ─────────────────────────────────────────────────────────
const LOAD_MSGS=['Searching latest news and press releases...','Checking Ohio EPA and permit records...','Analyzing AEP Ohio grid filings...','Reviewing county tax abatement records...','Scanning political statements and voting records...','Verifying employment and investment figures...','Cross-referencing all sources...','Compiling research brief...'];
function LoadingView({fac,msg,prog}){
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',background:'#0f172a'}}>
    <div style={{fontSize:10,color:'#475569',marginBottom:6,textTransform:'uppercase',letterSpacing:'.1em'}}>Researching · {MODELS[fac._model||'sonnet'].label}</div>
    <div style={{fontSize:20,fontWeight:600,color:'white',marginBottom:4}}>{fac.name}</div>
    <div style={{fontSize:12,color:'#475569',marginBottom:28}}>{fac.company} · {fac.county} County</div>
    <div style={{width:220,height:3,background:'#1e293b',borderRadius:99,overflow:'hidden',marginBottom:18}}><div style={{height:'100%',background:'linear-gradient(90deg,#3b82f6,#7c3aed)',borderRadius:99,width:prog+'%',transition:'width 2s ease'}}/></div>
    <div style={{fontSize:12,color:'#475569',minHeight:20,fontStyle:'italic'}}>{msg}</div>
  </div>;
}
function ResultsView({fac,res,isCached,bsScan,onBack}){
  const[exp,setExp]=useState(null);
  const r=res,conf=r.dataConfidence||'Medium',cc={High:RT.emerald,Medium:RT.amber,Low:'#ef4444'}[conf];
  const pillars=[
    {k:'grid',icon:'⚡',title:'Power Grid Impact',color:RT.amber,sum:r.gridImpact?.summary,det:r.gridImpact?.detail},
    {k:'tax',icon:'▤',title:'Tax Implications',color:RT.teal,sum:r.taxImplications?.summary,det:r.taxImplications?.detail},
    {k:'env',icon:'◈',title:'Environmental Impact',color:RT.emerald,sum:r.environmentalImpact?.summary,det:r.environmentalImpact?.detail},
    {k:'water',icon:'≈',title:'Closed Water Loop',color:RT.sky,sum:r.waterLoop?.answer,det:r.waterLoop?.detail},
  ];
  return <div style={{minHeight:'100vh',background:RT.bg}}>
    <div style={{padding:'22px 20px 18px',borderBottom:`1px solid ${RT.borderStrong}`,background:RT.surfaceAlt}}>
      {isCached&&<div style={{fontSize:9,color:RT.textLow,marginBottom:10,fontFamily:RT.mono,textTransform:'uppercase',letterSpacing:'.08em'}}>Research recorded {r._cachedAt}</div>}
      <div style={{position:'relative',border:`1px solid ${RT.borderStrong}`,borderRadius:6,padding:'16px 20px',background:RT.surface,maxWidth:860,margin:'0 auto'}}>
        {[['-6px','-6px'],['-6px','auto'],['auto','-6px'],['auto','auto']].map(([t,l],i)=><div key={i} style={{position:'absolute',top:t,left:l,right:l==='auto'?'-6px':'auto',bottom:t==='auto'?'-6px':'auto',width:5,height:5,borderRadius:'50%',background:RT.borderStrong}}/>)}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontSize:9,color:RT.textLow,textTransform:'uppercase',letterSpacing:'.12em',marginBottom:5,fontFamily:RT.mono}}>Facility Record</div>
            <div style={{fontSize:19,fontWeight:700,color:RT.textHi,letterSpacing:'-.2px'}}>{fac.name}</div>
            <div style={{fontSize:11,color:RT.textMid,marginTop:4,fontFamily:RT.mono}}>{fac.company} · {fac.city}, {fac.county} CO · {fac.region}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end'}}>
            <span style={{fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:3,background:'rgba(242,165,65,0.12)',color:RT.amber,fontFamily:RT.mono,letterSpacing:'.04em'}}>{(r.status||fac.status).toUpperCase()}</span>
            <span style={{fontSize:9,color:RT.textLow,fontFamily:RT.mono}}>CONF: <strong style={{color:cc}}>{conf.toUpperCase()}</strong></span>
          </div>
        </div>
      </div>
    </div>
    {bsScan&&<div style={{maxWidth:860,margin:'0 auto'}}><BaseScanCard sc={bsScan} compact={false}/></div>}
    <div style={{background:RT.surfaceAlt,borderBottom:`1px solid ${RT.border}`,padding:'10px 20px',display:'flex',gap:6,justifyContent:'center'}}>
      <div style={{maxWidth:860,width:'100%',display:'flex',gap:6}}>
        <button onClick={onBack} style={{fontSize:11,padding:'5px 13px',borderRadius:4,border:`1px solid ${RT.border}`,background:'transparent',color:RT.textMid,cursor:'pointer',fontFamily:RT.mono}}>← BACK</button>
      </div>
    </div>
    <div style={{maxWidth:860,margin:'0 auto',padding:'16px 16px 40px'}}>
      <div style={{background:RT.surface,borderRadius:6,border:`1px solid ${RT.border}`,marginBottom:14,overflow:'hidden'}}>
        <div style={{padding:'9px 16px',fontSize:10,fontWeight:600,color:RT.teal,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,borderBottom:`1px solid ${RT.border}`}}>— Core Data</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)'}}>
          {[['Start Date',r.startDate],['Power',r.powerMW||(fac.mw>0?fac.mw+' MW':'')],['Size (sq ft)',r.sizeSqFt],['Investment',r.totalInvestment||fac.cost],['Constr. Jobs',r.employment?.construction],['Perm. Jobs',r.employment?.permanent],['Payroll',r.employment?.totalPayroll],['Type',fac.type],['Region',fac.region]].map(([l,v])=>{const cv=cleanVal(v),tbd=cv==='TBD';return <div key={l} style={{padding:'10px 14px',borderBottom:`1px solid ${RT.border}`,borderRight:`1px solid ${RT.border}`}}><div style={{fontSize:8,color:RT.textLow,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3,fontFamily:RT.mono}}>{l}</div><div style={{fontSize:13,fontWeight:tbd?400:700,color:tbd?RT.textLow:RT.textHi,fontFamily:RT.mono,fontStyle:tbd?'italic':'normal'}}>{tbd?'not disclosed':cv}</div></div>;})}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:600,color:RT.amber,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,marginBottom:8}}>— Four-Pillar Analysis <span style={{color:RT.textLow,fontWeight:400,letterSpacing:'normal',textTransform:'none'}}>· tap to expand</span></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {pillars.map(p=><div key={p.k} onClick={()=>setExp(exp===p.k?null:p.k)} style={{background:RT.surface,borderRadius:6,border:`1px solid ${RT.border}`,borderTop:`2px solid ${p.color}`,padding:13,cursor:'pointer'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:20,height:20,borderRadius:3,border:`1px solid ${p.color}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:p.color}}>{p.icon}</div>
                <span style={{fontSize:10,fontWeight:600,color:RT.textHi,fontFamily:RT.mono,textTransform:'uppercase',letterSpacing:'.05em'}}>{p.title}</span>
              </div>
              <span style={{fontSize:9,color:RT.textLow}}>{exp===p.k?'▲':'▼'}</span>
            </div>
            <div style={{fontSize:11.5,fontWeight:400,color:RT.textMid,lineHeight:1.5}}>{p.sum?stripMD(p.sum):'Tap to expand'}</div>
            {exp===p.k&&p.det&&<div style={{fontSize:11.5,color:RT.textMid,lineHeight:1.7,borderTop:`1px solid ${RT.border}`,paddingTop:9,marginTop:9,whiteSpace:'pre-wrap'}}>{stripMD(p.det)}</div>}
          </div>)}
        </div>
      </div>
      <Section title="Proposed Timeline" content={r.timeline}/>
      <Section title="Notable Investors & Organizers" content={r.investors}/>
      <Section title="Political Statements & Records" content={r.politicalContext} note="[R]=Republican  [D]=Democrat  [I]=Independent"/>
      {r._raw&&<Section title="Full Research Output" content={r._raw}/>}
      {r.sources?.length>0&&<div style={{background:RT.surface,borderRadius:6,border:`1px solid ${RT.border}`,padding:'12px 16px',marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:RT.textLow,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,marginBottom:8}}>— Sources ({r.sources.length})</div>
        {r.sources.map((s,i)=><div key={i} style={{fontSize:11,color:RT.textMid,marginBottom:4,paddingLeft:12,borderLeft:`2px solid ${RT.border}`}}>{s}</div>)}
      </div>}
    </div>
  </div>;
}

function PendingView({fac,onBack}){
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',background:'#f8fafc'}}>
    <div style={{fontSize:32,marginBottom:14}}>🕐</div>
    <div style={{fontSize:17,fontWeight:600,color:'#1e293b',marginBottom:4}}>{fac.name}</div>
    <div style={{fontSize:12,color:'#64748b',marginBottom:20}}>{fac.company} · {fac.county} County</div>
    <div style={{fontSize:13,color:'#475569',maxWidth:380,lineHeight:1.7,marginBottom:20}}>
      Full research for this facility hasn't been generated yet. This tracker updates on a scheduled cadence — <strong>Active-tier</strong> facilities (under construction, permitting, site selection) refresh weekly; <strong>Settled-tier</strong> facilities refresh periodically since their status changes rarely.
    </div>
    <button onClick={onBack} style={{...T.btn('#0f172a','white','none'),fontSize:12,padding:'7px 16px'}}>← Back to search</button>
  </div>;
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[authed,setAuthed]=useState(getAuth());
  const[view,setView]=useState('boot');
  const[query,setQuery]=useState('');
  const[filter,setFilter]=useState('All');
  const[tierFilter,setTierFilter]=useState('All');
  const[sel,setSel]=useState(null);
  const[res,setRes]=useState(null);
  const[err,setErr]=useState('');
  const[msg,setMsg]=useState('');
  const[prog,setProg]=useState(0);
  const[isCached,setIsCached]=useState(false);
  const[resCache,setResCache]=useState(new Set());
  const[bsCache,setBsCache]=useState({});
  const[model,setModel]=useState('sonnet');
  useEffect(()=>{if(!authed)return;(async()=>{const[bs,rc]=await Promise.all([cacheLoadAll(BS_PFX),cacheIdSet(DC_PFX)]);setBsCache(bs);setResCache(rc);setView('home');})();},[authed]);
  const filtered=useMemo(()=>{let list=FACS;if(filter!=='All')list=list.filter(f=>f.region===filter);if(tierFilter!=='All')list=list.filter(f=>f.tier===tierFilter);if(query.length>=2){const q=query.toLowerCase();list=list.filter(f=>f.name.toLowerCase().includes(q)||f.company.toLowerCase().includes(q)||f.county.toLowerCase().includes(q)||f.city.toLowerCase().includes(q));}else list=list.filter(f=>f.mw>=25||f.cost!=='');return list;},[query,filter,tierFilter]);
  const doResearch=useCallback(async(fac)=>{
    const fm={...fac,_model:model};
    const hit=await cacheGet(DC_PFX,fac.id);
    if(hit){setSel(fm);setRes({...hit.data,_cachedAt:new Date(hit.ts).toLocaleDateString()});setIsCached(true);setView('results');return;}
    // No cached deep research available in this static build — show pending state, no API call.
    setSel(fm);setRes(null);setView('pending');
  },[model]);
  function handleLogout(){try{localStorage.removeItem(AUTH_KEY);}catch(e){}setAuthed(false);setView('boot');}
  if(!authed)return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  if(view==='boot')return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',gap:12,color:'#94a3b8',fontSize:12,background:'#0f172a',flexDirection:'column'}}><div style={{width:22,height:22,border:'2px solid #1e293b',borderTopColor:'#3b82f6',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Loading...<style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>;
  if(view==='pending')return <PendingView fac={sel} onBack={()=>setView('home')}/>;
  if(view==='results')return <ResultsView fac={sel} res={res} isCached={isCached} bsScan={bsCache[sel?.id]} onBack={()=>setView('home')}/>;
  if(view==='map')return <MapView bsCache={bsCache} onResearch={f=>{setView('home');setTimeout(()=>doResearch(f),50);}} onBack={()=>setView('home')}/>;
  if(view==='basescan')return <BaseScanView bsCache={bsCache} setBsCache={setBsCache} resCache={resCache} onBack={()=>setView('home')} onResearch={f=>{setView('home');setTimeout(()=>doResearch(f),50);}}/>;
  if(view==='analytics')return <AnalyticsView bsCache={bsCache} onBack={()=>setView('home')}/>;
  return <HomeView query={query} setQuery={setQuery} filter={filter} setFilter={setFilter} tierFilter={tierFilter} setTierFilter={setTierFilter} model={model} setModel={setModel} filtered={filtered} onSelect={f=>doResearch(f)} resCache={resCache} bsCache={bsCache} error={err} onMap={()=>setView('map')} onBaseScan={()=>setView('basescan')} onAnalytics={()=>setView('analytics')} onLogout={handleLogout}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
