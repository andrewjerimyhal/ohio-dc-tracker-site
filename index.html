ms that recirculate water with 'very little' net consumption, and Google has positioned itself as the only major hyperscaler publishing site-specific water use figures and has lobbied for industry-wide water-use transparency standards amid public backlash. However, the site's own air/water permits reference 36 cooling towers (a technology usually associated with evaporative, not fully closed-loop, cooling) and a secured 5-million-gallon/day water ordinance, and local reporting (LimaOhio.com, July 14, 2026) indicates residents still lack clear, unredacted documentation of the facility's actual water withdrawal/cooling design — making the tracker's 'closed water loop' status unconfirmed for this specific site despite Google's general corporate claims.\"}, \"timeline\": \"Dec 2024: Project first surfaces publicly under the unnamed shell company Bistrozzi LLC, with no developer identified. May 2025: Allen County commissioners approve an NDA with Bistrozzi LLC; Elida Board of Education approves the PILOT agreement (~$250K/yr), both parties barred from naming the developer. Jul 10, 2025: Allen County commissioners approve incentive/CRA package for the American Township site. Jul 31, 2025: Commissioners approve a data-center roadway agreement. Aug 14, 2025: Bistrozzi LLC completes land purchases. Sep 2025: 5-million-gallon/day water ordinance secured. Dec 17, 2025: Ohio EPA holds public hearing on the draft air permit (115 generators, 36 cooling towers, 113 fuel tanks). Mar 7, 2026: Opponents organize formally to fight the air permit. Mar 16, 2026: Google is publicly confirmed as the company behind the $500M project (AEDG/LimaOhio/DCD/hometownstations coverage). Mar 18, 2026: Public comment period on the draft air permit closes. Apr 6, 2026: Google holds a formal community introduction ('Google introduces itself to Allen County'). Mid-2026: Ohio EPA permit process concludes/nears finalization; Board of Zoning Appeals reviews and denies a related request for temporary construction offices amid commissioner opposition. Jul 14, 2026: LimaOhio.com reports ongoing resident transparency complaints and records disputes. Construction (vertical) is expected to begin in 2026 following permit finalization, with completion/operational dates cited as anywhere from 2028 (partial/first-phase operation) to 2030 (full buildout) depending on the source.\", \"investors\": \"Sole developer/financier is Google (Alphabet Inc.), which self-funds the $500 million capital investment; Google used the Delaware-registered shell entity Bistrozzi LLC to acquire land and negotiate agreements before its identity was disclosed in March 2026. Local development support (not equity investment) came from the Allen Economic Development Group (AEDG), the Regional Growth Partnership (RGP), and JobsOhio, which administers Ohio's data-center sales-tax exemption program that the project is expected to use; Molly Kocour Boyle, Google's head of Midwest Data Center Public Affairs, has been the company's public-facing representative on the project, describing a partnership with 'the Allen County board of commissioners, City of Lima, local townships and local schools.' AEP Ohio is the electric utility partner responsible for grid interconnection.\", \"politicalContext\": \"Allen County Commissioner Ron Turpin [R] became the project's most vocal elected critic, telling a Board of Zoning Appeals hearing 'There's not a week that goes by that I do not get complaints about this applicant and the (data center) project' while urging denial of a related construction-office expansion as 'injurious to the public good' — explicitly noting he spoke for himself, not the full Board of Commissioners, which as a body approved the original CRA/incentive package and NDA with Bistrozzi LLC in 2025. Ohio House Speaker Matt Huffman [R], representing the Lima area, initially pushed to override Governor DeWine's veto of a legislative repeal of the state data-center sales-tax exemption (which Google's Lima project is positioned to benefit from), calling exemptions for 'multi-billion dollar corporations' a 'principle issue' for his caucus, but abandoned the override push by June 2026 citing insufficient support, partly from labor unions. At the state level, Rep. Christine Cockley [D] (Columbus-area, District 6) has been a prominent voice on data-center water-use transparency generally, saying 'I think my biggest concern is how much we don't know' and proposing an AI/data-center working group, though her comments were not Lima-specific. Locally, Elida Local Schools Superintendent Joel Mengerink [party unknown] publicly welcomed the PILOT payment as a benefit for students. Residents near the site have organized opposition specifically around the secrecy of the Bistrozzi LLC negotiation process, redacted EPA permit disclosures, and delayed public-records responses from Allen County, as detailed in LimaOhio.com's July 14, 2026 report on transparency concerns.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/google-confirmed-as-company-behind-500m-data-center-in-lima-ohio/\", \"https://www.limaohio.com/top-stories/2026/03/16/google-officially-behind-data-center-project/\", \"https://www.limaohio.com/top-stories/2026/04/06/google-introduces-itself-to-allen-county/\", \"https://www.limaohio.com/top-stories/2026/07/14/residents-question-transparency-with-allen-county-data-center/\", \"https://www.limaohio.com/top-stories/2026/03/07/opponents-organize-to-fight-data-centers-permit/\", \"https://www.limaohio.com/top-stories/2025/07/10/allen-commissioners-approve-incentives-for-proposed-american-township-data-center/\", \"https://www.limaohio.com/top-stories/2025/07/31/allen-commissioners-approve-data-center-roadway-agreement/\", \"https://www.limaohio.com/top-stories/2025/08/14/company-behind-data-center-completes-land-purchases/\", \"https://www.limaohio.com/top-stories/2025/05/27/talks-continue-for-proposed-american-township-data-center/\", \"https://www.limaohio.com/top-stories/2025/07/03/port-authority-takes-next-step-in-securing-data-center/\", \"https://www.hometownstations.com/news/allen_county/google-revealed-as-company-behind-500-million-data-center-project-in-lima-area/article_7fa7f0c1-88c1-4d79-86ca-630d942787e6.html\", \"https://www.hometownstations.com/news/allen_county/google-details-500m-lima-data-center-promises-jobs-and-community-investment/article_df9d22e7-5fad-489f-9353-030149054d90.html\", \"https://www.hometownstations.com/news/allen_county/community-can-access-google-data-center-details-through-aedg-site/article_e413355c-0518-4a57-9da0-70522b0e3e28.html\", \"https://www.aedg.org/blog/google-to-build-data-center-in-lima-ohio-with-500-million-capital-investment/\", \"https://rgp.org/google-to-build-500-million-data-center-in-allen-county/\", \"https://www.datacentermap.com/usa/ohio/lima-oh/google-project-bosc/\", \"https://coryparent.substack.com/p/decoding-project-bosc\", \"https://coryparent.substack.com/p/infrastructure-without-reciprocity\", \"https://www.aepohiowire.com/aep-to-power-googles-new-data-center/\", \"https://www.sahmcapital.com/news/content/aep-ohio-and-partners-plan-usd-42-billion-transmission-build-for-10-gigawatt-data-center-campus-2026-03-20\", \"https://www.axios.com/2026/06/03/google-pushes-water-standards-data-center-backlash\", \"https://www.latitudemedia.com/news/data-center-water-use-black-box-google-trying-to-change/\", \"https://9to5google.com/2026/06/03/google-says-it-will-replenish-more-water-than-it-uses-at-data-centers-amid-public-pushback/\", \"https://blog.google/company-news/outreach-and-initiatives/sustainability/new-water-stewardship-commitments/\", \"https://ohiohouse.gov/members/christine-cockley/in-the-news/more-than-electricity-data-centers-water-use-scrutinized-5784\", \"https://www.journal-news.com/local/1-6b-tax-break-dispute-stalls-ohio-data-center-regulations/article_4563cab4-3ac7-5a57-8638-70844242e978.html\", \"https://ohiocapitaljournal.com/2026/06/11/ohio-lawmakers-fail-to-reach-agreement-on-data-center-regulations/\", \"https://signalcleveland.org/ohio-republicans-back-off-effort-to-kill-a-beefy-tax-credit-for-data-centers/\", \"https://www.statenews.org/section/the-ohio-newsroom/2025-10-15/as-data-centers-boom-in-ohio-local-communities-are-watching-their-water\", \"https://www.wane.com/top-stories/zoning-board-denies-googles-construction-offices-in-allen-county/\", \"https://dam.assets.ohio.gov/image/upload/epa.ohio.gov/Portals/35/permits/Data_Centers/OHD_DataCenter_PP-FINAL-PresentationFull-Slides-Correct.pdf\", \"https://www.jobsohio.com/incentives-programs/data-center-tax-exemption\", \"https://www.aedg.org/incentives-grants/\"]}, \"ts\": 1784220513000}", "v67_dc_browndb-stu-mt-orab-mega-site": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed. Site was zoned/prepped starting Dec 2024 (emergency zoning code change) and land assembly closed 2024-2025; no confirmed vertical-construction start date has been announced, and the project has been under a village-imposed data-center permitting moratorium since late March 2026.\", \"powerMW\": \"Approximately 2,000 MW (2 GW) per Duke Energy's PJM interconnection filings, which is larger than the 1,500 MW figure previously associated with this project and would make it the single largest data-center load proposed in Ohio to date; exact contracted capacity not publicly confirmed by the developer.\", \"sizeSqFt\": \"Not publicly disclosed. The site itself is roughly 1,018-1,187 acres (including adjacent parcels DB Stu LLC also acquired); no building square footage has been released, consistent with NDAs signed by village officials.\", \"totalInvestment\": \"Not publicly disclosed as a total project figure. Brown County's port authority (Southwest Ohio Regional Development Authority, formerly Mt. Orab Port Authority) sold roughly 864-1,018 acres to DB Stu LLC for over $45 million per state auditor/county records (2024-2025). Trade press has floated a ~$1 billion figure in connection with Meta's related Ohio project reveal (Piqua/J5 LLC), but that figure applies to the separate Piqua site, not confirmed for Mt. Orab specifically.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"At a proposed ~2 GW load, Mt. Orab would be one of the largest single electricity consumers ever connected to Ohio's grid, requiring coordination across three utilities.\", \"detail\": \"Duke Energy Ohio first brought the Mt. Orab project into the PJM interconnection queue in June 2024, well before the public knew the site's use. Reporting indicates power lines from three separate utilities — AES Ohio, Duke Energy, and AEP Ohio — could be needed to serve the full build-out, reflecting the scale of transmission upgrades required. At 2 GW, it would rank above the ~1.5 GW Wilmington, Ohio project and the Adams County project as the largest data-center load reviewed by PJM in the state, raising regional concerns (echoed in Ohio Chamber and legislative hearings) about rate impacts on other ratepayers and the pace of new transmission/generation needed to serve it.\"}, \"taxImplications\": {\"summary\": \"Mt. Orab village council created a Community Reinvestment Area (CRA) and approved property tax abatements for the project via an emergency zoning/CRA resolution passed in December 2024, but exact abatement terms have not been made public.\", \"detail\": \"According to public-records requests cited by local press, Mt. Orab's council changed the zoning code during a December 2024 meeting by declaring an 'emergency' with no written justification, and in the same period passed a CRA resolution establishing tax abatements for the site — details of the abatement percentage, duration, and any PILOT (payment-in-lieu-of-taxes) arrangement with the local school district have not been disclosed publicly. The secrecy around these tax deals (compounded by NDAs signed by the mayor and all council members) became a statewide flashpoint, prompting Ohio HB 695 to restrict local officials' use of NDAs in economic-development negotiations, and fueling a citizen-led petition drive (ConserveOhio) for a state constitutional amendment to ban data centers over 25 MW.\"}, \"environmentalImpact\": {\"summary\": \"Residents have raised concerns about high water usage, land conversion of roughly 1,000+ acres of farmland, and potential aquifer/well impacts, though the developer has not publicly disclosed specific environmental data.\", \"detail\": \"The mega-site converts over 1,000 acres of farmland (bordered by Oakland Road, New Hope-White Oak Station Road and Tri-County Highway) to industrial/data-center use, and homes on the property have reportedly been demolished as part of site prep. Community members and the ConserveOhio petition campaign have cited concerns about groundwater withdrawal, aquifer strain, decreased property values, noise, and emissions from backup generation, similar to concerns raised statewide (e.g., an Ohio Chamber report finding adequate water supply exists but water quality/discharge remains an open issue). No site-specific water-use, wastewater, or emissions permit data for Mt. Orab has been published due to the confidentiality surrounding the project.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No cooling-system design details (closed-loop, air-cooled, or evaporative) have been released for the Mt. Orab facility specifically. If the project is confirmed to be a Meta facility, it would be notable that Meta (like Microsoft) has increasingly moved toward closed-loop, non-evaporative liquid cooling designs at newer campuses, but this has not been confirmed for this site.\"}, \"timeline\": \"2024 (year unclear, believed 2024-2025): Southwest Ohio Regional Development Authority (formerly Mt. Orab Port Authority) sells roughly 864-1,018+ acres of the 'mega-site' to DB Stu LLC, a Delaware LLC, for over $45 million; mayor and full village council sign NDAs with DB Stu LLC. December 2024: Mt. Orab council passes emergency zoning changes and a CRA tax-abatement resolution for the site. June 2024: Duke Energy files the project (~2 GW load) with PJM's interconnection queue. January 2026: Residents notice homes being demolished and land activity; a special council meeting draws hundreds demanding transparency; a nearly-900-signature petition circulates. February 2026: Public-records requests reveal a Purchase and Sale Agreement explicitly listing 'data center' as the intended use; Council member Eric Lang proposes a 180-day moratorium on data-center permits (first reading Feb. 3; second reading process continues Feb. 17); Ohio Reps. Adam Bird [R] and Brian Stewart [R] introduce HB 695 to restrict local-government NDAs, citing Mt. Orab directly. Late March 2026: Village council formally imposes the data-center permitting moratorium, pausing new permits for roughly six months. April 2026: Investigative outlet Hunterbrook publishes corporate-filing evidence linking DB Stu LLC's incorporator/registered-agent pattern to confirmed Meta shell entities (Balloonist LLC in Wisconsin, J5 LLC in Piqua, Ohio). Ongoing (through mid-2026): ConserveOhio petition drive collects signatures (over 105,000 of ~420,000+ needed as of July 8, 2026) for a 2027 statewide ballot measure to cap/ban large data centers; litigation involving village officials is pending, limiting further public comment.\", \"investors\": \"The disclosed buyer/developer of record is DB Stu LLC, a Delaware-registered limited liability company whose tax-mailing address is c/o Vorys, Sater, Seymour and Pease LLP (Columbus, OH, attn. Nicklaus J. Reis) — a law firm that provides data-center development services. Corporate-filings research (Hunterbrook) found DB Stu LLC was incorporated by Pamela Gregorski of Corporation Service Company (a Delaware registered-agent firm used repeatedly in Meta shell-company filings) on the same day as Balloonist LLC, a confirmed Meta subsidiary behind a Wisconsin data-center project, and that DB Stu LLC's NDA text is nearly identical to the NDA used by J5 LLC in Piqua, Ohio — which Hunterbrook separately confirmed via Nevada corporate filings (address inside Meta's Menlo Park HQ; manager David Kling, a former Meta VP/Deputy General Counsel) to be a Meta front entity. No party — DB Stu LLC, Meta, or Mt. Orab officials — has publicly confirmed Meta's involvement on the record; the identification rests on circumstantial but consistent corporate-filing patterns.\", \"politicalContext\": \"Ohio Rep. Adam Bird [R] (R-New Richmond, represents Brown County/Mt. Orab) publicly confirmed the mega-site's existence and the NDA controversy, stating 'there's a mega site that is located in the village of Mt. Orab in Brown County that I represent... many of the residents in that community were upset about a non-disclosure agreement that was signed by local government officials,' while noting 'Is it a data center? I don't know — they signed an NDA.' Bird co-sponsored HB 695 with Rep. Brian Stewart [R] (R-Ashville) to prohibit county, township, and village officials from signing economic-development NDAs, explicitly citing Mt. Orab as the impetus; Bird stressed the goal was transparency, not overriding local development authority. State Sen. Brian Chavez [R] (R-Marietta), co-chair of a legislative data-center committee, said he wants to question data-center representatives at a public hearing about whether NDAs are truly necessary. At the local level, Mt. Orab Mayor Joe Houser (also rendered 'Howser' in some reports) [party unknown, village office] signed an NDA with DB Stu LLC and, when asked for comment, said only that he could not discuss the matter due to pending litigation. Village council member Eric Lang [party unknown, village office] was the first and (as of reporting) only council member to publicly rescind his NDA and introduced the ordinances establishing the 180-day data-center permitting moratorium (ultimately imposed in late March 2026), as well as a separate 180-day moratorium on small modular reactors and a permanent ban on commercial nuclear facilities in the village. An attorney representing residents publicly criticized the NDAs as improper governance ('It's frankly disgusting. No government should be run that way'), though this individual is not an elected official. No statements from Brown County commissioners or JobsOhio specific to this project were found in public reporting, consistent with the project's unusually high level of confidentiality.\", \"sources\": [\"https://hntrbrk.com/meta-data-centers/\", \"https://stopohiodatacenters.org/\", \"https://local12.com/news/local/questions-remain-brown-county-officials-handling-proposed-mega-site-data-center-mount-orab-acres-mayor-village-council-attorney-law-legal-nda-nondisclosure-agreement-zone-zoning-code-tax-taxes-taxpayer-ordinances-emergency-cincinnati\", \"https://local12.com/news/local/brown-county-village-considers-6-month-pause-new-data-center-permits-mount-orab-datacenter-permit-non-disclosure-agreement-nda-potential-project-ordinance-mega-site-highway-nature-outdoors-pollution-cincinnati\", \"https://www.wcpo.com/news/local-news/brown-county/mt-orab-residents-pack-gymnasium-demanding-transparency-on-mysterious-mega-site-project\", \"https://browncountypress.com/news/19046/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction\", \"https://browncountypress.com/news/19073/breaking-news-purchase-and-sale-agreement-on-mt-orab-mega-site-lists-data-center-as-intended-use-for-property\", \"https://www.clermontsun.com/2026/02/04/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction\", \"https://www.clermontsun.com/2026/02/18/plans-for-data-center-cause-divide-in-mt-orab-community\", \"https://www.newsdemocrat.com/2026/02/01/mt-orab-residents-seek-answers-on-mega-site/\", \"https://www.newsdemocrat.com/2026/02/13/breaking-news-purchase-and-sale-agreement-on-mt-orab-mega-site-lists-data-center-as-intended-use-for-property/\", \"https://www.wcpo.com/news/local-news/mt-orab-council-introduces-data-center-moratorium-amid-community-opposition-to-mysterious-mega-site-project\", \"https://www.wcpo.com/news/local-news/brown-county/lack-of-transparency-hundreds-sign-petition-calling-to-pause-plans-for-mount-orab-mega-site\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-data-center-could-be-one-of-ohios-biggest-power-guzzlers\", \"https://www.daytondailynews.com/news/proposed-data-center-could-be-one-of-ohios-biggest-power-guzzlers/PIHRA4ZAGJC75OTEGK5EPR3VIY/\", \"https://ohiocapitaljournal.com/2026/03/12/ohioans-are-getting-fed-up-with-data-centers-state-lawmakers-are-starting-to-notice/\", \"https://www.clevescene.com/news/ohio-news/ohioans-are-getting-fed-up-with-data-centers-state-lawmakers-are-starting-to-notice/\", \"https://policymattersohio.org/news/2026/05/20/hb-695-should-limit-ndas-restore-access-to-records-of-data-center-and-other-development-deals/\", \"https://local12.com/news/local/brown-county-group-seeks-constitutional-ban-certain-data-centers-petition-petitions-amendment-amend-constitution-ohio-hamilton-county-cincinnati-construction-prohibit-banned-banning-signatrues-mount-orab-mega-site\", \"https://www.salon.com/2026/07/09/everyday-americans-are-fighting-to-take-down-data-centers/\", \"https://stopohiodatacenters.org/miami-county\", \"https://baxtel.com/data-center/j5-llc-piqua-ohio\", \"https://www.wosu.org/2026-06-18/ohio-chamber-report-says-theres-enough-water-for-data-centers-used-water-is-a-different-story\", \"https://mtoraboh.us/images/vom/Development/Mt.%20Orab%20Megasite%20Sales%20Sheet%20(1).pdf\", \"https://mtoraboh.us/index.php/component/content/category/economic-development?Itemid=101\"]}, \"ts\": 1784220513000}", "v67_dc_butlerlogistix-hamilton-dc": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Groundbreaking was expected around January 2026 with construction starting in spring 2026 and running 14-16 months (targeting mid-to-late 2027 completion), but as of a January 15, 2026 announcement the developer asked the City of Hamilton to pause feasibility studies, and the project remains in a holding pattern as of July 2026 pending a decision on next steps.\", \"powerMW\": \"Up to 240 MW requested by the developer (project was earlier described as ~100 MW, then 200+ MW, before settling at a 240 MW request); a city feasibility study found only 45 MW could be delivered, and that would take roughly 24-30 months.\", \"sizeSqFt\": \"310,640 sq ft (two-story data center building, sometimes rounded to 320,000 sq ft), including a 155,000 sq ft data center structure, a secured equipment yard, and a 95,000 sq ft customer substation, on a 15-acre site within a 29.2-acre city-owned parcel in the University Commerce Park.\", \"totalInvestment\": \"Reported at more than $1 billion in total investment (buildings, infrastructure, and IT equipment combined); earlier coverage (including initial city council discussion) cited a smaller ~$100 million figure and the city agreed to sell the land at $65,000/acre. No finalized capital-investment figure has been publicly confirmed given the project's current pause.\", \"employment\": {\"construction\": \"Not publicly disclosed (construction period estimated at 14-16 months once underway)\", \"permanent\": \"More than 100 permanent job opportunities cited by the developer and local press\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Hamilton operates its own municipal electric utility (not Duke Energy Ohio or AEP Ohio), and a feasibility study found it could deliver only 45 MW within 24-30 months versus the 240 MW the project needs, which is the central reason the project has stalled.\", \"detail\": \"Hamilton is one of the few Ohio cities with a city-owned electric utility, generating power via a natural gas plant and four hydroelectric generating stations rather than drawing from Duke Energy Ohio's regional grid. The site sits near an existing substation, but Logistix's plan includes building at least one new, larger (95,000 sq ft) customer substation. Hamilton's executive director of infrastructure, Edwin Porter, said a preliminary study concluded it would take about 30 months to deliver just 45 MW to the site — far short of the requested 240 MW — prompting Logistix to ask the city in January 2026 to pause further feasibility studies while it reconsiders the project's scale and next steps.\"}, \"taxImplications\": {\"summary\": \"No finalized, project-specific abatement or exemption has been publicly confirmed; the city sold/priced the land favorably, and the site sits within a Community Reinvestment Area, while the statewide Ohio data center sales-tax exemption (ORC 122.175) is a plausible but unconfirmed avenue given the project's scale.\", \"detail\": \"Local reporting noted the city agreeing to sell the 29.2-acre parcel to Logistix at roughly $65,000/acre, and described the project's tax treatment as similar to other Community Reinvestment Area (CRA) abatements the city has granted (e.g., Rossville Flats and Marcum Apartments), though no specific abatement percentage or term for this project has been published. Separately, Ohio's statewide data center sales/use tax exemption (Ohio Revised Code 122.175) requires at least $100 million in capital investment over three consecutive years and at least $1.5 million in annual payroll, for which a $1B, 240 MW project would likely qualify in scale — but no application or Ohio Tax Credit Authority approval specific to this project was found in public records. Ohio has granted roughly $2.5 billion in state/local data-center tax incentives from 2017-2024 statewide, including sales-tax exemptions and property tax abatements up to 75%, providing context but not confirmation for this specific project.\"}, \"environmentalImpact\": {\"summary\": \"Residents near the site (adjacent to Miami University's Hamilton campus and homes in the Riverside neighborhood) have raised concerns about noise, air/light pollution, water use and pressure, and traffic; no facility-specific water-consumption or emissions figures have been released.\", \"detail\": \"A resident-led Facebook group, the Coalition Against Data Centers in South Ohio, grew to 600+ members opposing the project, citing fears about water pollution and availability, noise, air and light pollution, health impacts, rising utility/tax bills, and increased road traffic; advocacy groups such as Cincinnati Socialists also publicly criticized the project. A June 2026 Ohio Chamber of Commerce Research Foundation study found the Cincinnati-Dayton corridor, which sits atop the Great Miami Buried Valley Aquifer (estimated 1.5 trillion gallons), is 'water-rich' in aggregate but constrained by power infrastructure, stormwater management, and permitting readiness rather than water supply. No specific water withdrawal, wastewater discharge, or emissions figures for the Logistix facility itself have been publicly disclosed.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No public statement from Logistix, the City of Hamilton, or trade press confirms whether the Hamilton facility will use a closed-loop (recirculating) cooling system versus evaporative cooling. Regional coverage of the broader southwest Ohio water-availability debate (including the June 2026 Ohio Chamber of Commerce Research Foundation study) discusses water-conserving cooling technology generally but does not cite Logistix-specific design commitments.\"}, \"timeline\": \"2025: Logistix Property Group proposes an initial ~100 MW, roughly $100 million data center ('Hamilton Innovation Center') on city-owned land at 1380 University Boulevard; October 2025: contentious Hamilton City Council meeting draws resident opposition (project then described as ~$100 million); Hamilton City Planning Commission recommends/approves the site plan; the project's scope grows to a 200+ MW, then up to 240 MW request, with total investment reported exceeding $1 billion; groundbreaking is targeted for around January 2026 with construction expected to run 14-16 months into mid-to-late 2027; January 15, 2026: Logistix asks the city to pause further feasibility studies after a study shows only 45 MW deliverable in 24-30 months; June 17, 2026: Butler County Commissioners approve a six-month, county-wide (unincorporated townships) moratorium on new data center development amid broader regional pushback; as of mid-July 2026, the Hamilton project remains paused, with Logistix stating no decision has been made on next steps.\", \"investors\": \"The project is being developed by Logistix Property Group, a Cincinnati-based land development firm led by founder and president Doug Swain, which specializes in site identification and land development for hyperscale, colocation, and enterprise data center clients rather than operating data centers itself. The identity of the ultimate hyperscaler/end-tenant that would occupy the Hamilton facility has not been publicly disclosed by Logistix, the City of Hamilton, or trade press. No outside financial investors, lenders, or equity partners have been named in public reporting.\", \"politicalContext\": \"Hamilton Mayor Pat Moeller [party unknown] pushed back at an October 2025 council meeting on what he called social-media misinformation that a vote on the project would occur that night, clarifying none was scheduled. Butler County Commission President T.C. Rogers [R] said developers 'weren't able to answer some of the questions which were pertinent' about the project's implications. Commissioner Don Dixon [R] said the county needed to understand 'what we're committing our residents to... as far as water and sewer availability, and who gets charged for the electric,' while stating he is not opposed to data centers generally; both commissioners joined a unanimous Butler County Commission vote on June 17, 2026 approving a six-month data center moratorium in unincorporated townships after six townships requested it (the moratorium does not directly govern the city-owned Hamilton parcel, which is under Hamilton's, not the county's, zoning authority, but reflects the regional political climate around the project). Hamilton's executive director of infrastructure, Edwin Porter, publicly presented the finding that only 45 MW could be delivered within roughly 30 months, underscoring the infrastructure gap driving the project's pause.\", \"sources\": [\"https://baxtel.com/data-center/logistix-hamilton-oh\", \"https://www.thebcfa.org/ignitebutler/featured-news-articles/p/item/64490/1b-hyperscale-data-center-could-break-ground-in-city-of-hamilton-in-2026\", \"https://www.datacenterdynamics.com/en/news/logistix-gets-planning-commission-approval-for-data-center-project-outside-cincinnati-ohio/\", \"https://local12.com/news/local/plans-1-billion-cincinnati-hamilton-ohio-data-center-advance-despite-environmental-energy-concerns-bills-usage-cost-customers-residents-logistix-property-group-consumption-natural-gas-hydroelectric-solar-wind-generators-technology-hub-tech-computers\", \"https://www.journal-news.com/news/hamilton-oks-plan-for-data-center-project-in-riverside-neighborhood/BFSJT4SRYFC5XGE7DKESMRI72U/\", \"https://www.wcpo.com/hamilton-ohio-data-center-city-council-meeting-october\", \"https://baxtel.com/data-centers/logistix-property-group\", \"https://www.journal-news.com/news/data-center-project-part-of-the-growth-happening-in-hamilton/YBCOX7A33BGJZHUMP6EXWB5NTM/\", \"https://www.journal-news.com/community/butler-county/construction-on-hamilton-data-center-could-get-started-next-year/4GTLOP3BG5CWVP3YE3LMZ62VLA/\", \"https://www.wvxu.org/environment/2025-12-03/developers-data-center-butler-county\", \"https://www.wcpo.com/news/local-news/butler-county/hamilton/hamilton-pauses-plausibility-studies-on-controversial-data-center-at-developers-request\", \"https://www.journal-news.com/news/data-center-developer-requests-hamilton-pause-plausibility-studies/QED7B6MJYBGMPAFRO7WHDBSBAA/\", \"https://www.wyso.org/2026-01-15/hamilton-data-center-paused-study\", \"https://www.journal-news.com/community/butler-county/what-is-a-data-center-hamilton-trenton-likely-to-get-large-facilities-for-vast-computing-networks/CRHD5DCKGNEAVGMA2TKUD7RE3Q/\", \"https://www.wvxu.org/environment/2026-06-17/butler-county-approves-data-center-moratorium\", \"https://www.journal-news.com/local/why-butler-county-leaders-cannot-block-data-centers/article_7dd81db4-fb8c-4e07-8cd5-e75c06caf7e4.html\", \"https://www.springfieldnewssun.com/news/this-area-is-water-rich-but-poor-in-power-a-study-highlights-southwest-ohio-data/article_6076fae7-a442-584c-b25a-fcd8f8f4edc2.html\", \"https://www.wvxu.org/local-news/2026-03-05/research-southwest-ohio-water-availability\", \"https://www.wyso.org/news/2026-06-18/ohio-chamber-report-says-theres-enough-water-for-data-centers-used-water-is-a-different-story\", \"https://www.journal-news.com/news/residents-say-no-on-1b-data-center-project-wants-hamilton-to-do-the-same/L3YUSLLR2VHMDFXVBXKPBTOHCA/\", \"https://logistixpg.com/logistix_projects/hamilton-innovation-center/\", \"https://codes.ohio.gov/ohio-revised-code/section-122.175\", \"https://www.journal-news.com/news/pat-moeller-re-elected-as-hamiltons-mayor-for-fourth-term/G6UQZ6F67JA45IUPWVORL73XSM/\", \"https://ballotpedia.org/T.C._Rogers_(Butler_County_Commission,_Ohio,_candidate_2024)\", \"https://ballotpedia.org/Donald_Dixon_(Butler_County_Commission,_Ohio,_candidate_2024)\", \"https://www.tcrogers.org/about\", \"https://www.dixonforbutler.com/about-don-dixon\", \"https://local12.com/news/local/one-billion-dollar-dollars-data-center-proposed-cincinnati-hamilton-2026-hyperscale-logistix-could-create-jobs-employment-hiring\", \"https://www.construction.com/projects/dr-202400261483-hamilton-innovation-center-logistix-data-center-substation\"]}, \"ts\": 1784220513000}", "v67_dc_butlerprologis-project-mila-campus": "{\"data\": {\"dataConfidence\": \"High\", \"startDate\": \"Prologis purchased the 141-acre site (near Kennel and Woodsdale roads) from the City of Trenton for $7.75 million in October 2025. The Trenton Planning Commission approved the site plan on March 30, 2026 (a 10-minute meeting with no public hearing, since the land was already zoned industrial). Site work/grading began around late March 2026. Vertical construction on the first of four buildings is set to begin fall 2026, with that first building targeted for a 2028 launch and full four-building buildout complete by 2029.\", \"powerMW\": \"250 MW\", \"sizeSqFt\": \"Approximately 899,065 sq ft total: four data center buildings of 220,353 sq ft each (~881,412 sq ft combined), plus a 16,150 sq ft utility building and a 1,503 sq ft security building, on 141 acres. Some earlier press cited slightly rounded figures (~880,000-893,034 sq ft).\", \"totalInvestment\": \"IBEW Local 648 has cited a total construction investment of approximately $1 billion. Separately, county tax records project a building value of roughly $233.2 million (at $265/sq ft across the four ~220,000 sq ft buildings), with one projection putting full taxable value around $238.5 million. Land acquisition cost was $7.75 million.\", \"employment\": {\"construction\": \"Estimates range from 800 to 1,200 construction jobs during buildout, including up to ~150 electrical trade jobs per building (per IBEW Local 648 and local reporting).\", \"permanent\": \"Prologis has publicly stated approximately 140 permanent jobs; project/tax filings separately reference 120 full-time jobs to be created by December 31, 2035.\", \"totalPayroll\": \"Approximately $5 million in annual payroll associated with the ~120-job full-time employment commitment cited in project filings.\"}, \"gridImpact\": {\"summary\": \"The project is served by AEP Ohio under its dedicated large-load data center tariff and includes a dedicated on-site substation built and paid for by Prologis.\", \"detail\": \"AEP Ohio's data center tariff (applicable to this project) requires customers above 25 MW to commit to paying for at least 85% of their subscribed monthly capacity for 12 years, with a 4-year ramp-up period and an exit fee equal to three years of minimum charges — a structure designed to protect other ratepayers from stranded transmission investment if the data center underdelivers on load. Prologis has stated it will pay 100% of power infrastructure upgrade costs associated with the project, and the campus plan includes its own on-site electrical substation and utility building.\"}, \"taxImplications\": {\"summary\": \"Trenton City Council approved a 15-year, 75% property tax abatement for Prologis on July 9, 2026 via a Community Reinvestment Area (CRA) agreement, paired with upfront compensation payments to local schools and utilities.\", \"detail\": \"Under the CRA-based Compensation Agreement, Prologis is paying $940,200 to Edgewood City Schools and $59,800 to Butler Tech to offset abated school tax revenue, and has already paid approximately $2.5 million to Trenton Water Works and $210,400 for sewer capacity. The city projects roughly $1.34 million in combined annual revenue for the city and local school districts once operational, plus about $120,000/year in municipal utility fee revenue cited by Prologis. The project may also separately qualify for Ohio's statewide data center sales-tax exemption (Ohio Revised Code 122.175, requiring $100M+ investment and $1.5M+ annual Ohio payroll), a program under active legislative scrutiny in 2026 (companion repeal bills HB 975 and SB 374) after the state disclosed the exemption cost $1.6 billion statewide in 2025 versus far lower original estimates.\"}, \"environmentalImpact\": {\"summary\": \"The facility is projected to use up to 15.8 million gallons of water annually via a direct evaporative free-air cooling system, and has drawn community opposition (group 'W.A.T.E.R.') over water use, noise, backup-generator emissions, and industrial land conversion near existing homes.\", \"detail\": \"Prologis states the cooling system needs water only about 3% of the year, uses no chemical additives, and is 25-35% more water-efficient at scale than conventional refrigerant-based or traditional closed-loop chilled-water systems; wastewater discharges to Butler County for treatment. The site sits less than half a mile from existing residences. Opposition group W.A.T.E.R. and other residents have raised concerns about noise (Prologis says levels will be comparable to a 'quiet urban' area at the property line), diesel backup-generator emissions during testing/outages (with cooling equipment, HVAC and substation transformers running continuously 24/7), and conversion of Trenton Industrial Park land. Residents have also circulated a petition (400+ signatures) and supported a proposed statewide constitutional amendment effort to ban data centers over 25 MW.\"}, \"waterLoop\": {\"answer\": \"No\", \"detail\": \"Prologis has described the cooling system as direct evaporative free-air cooling rather than a traditional closed water loop — the company markets it as 25-35% more water-efficient than conventional closed-loop chilled-water or refrigerant-based systems, drawing water only about 3% of the year with no chemical additives, and discharging wastewater to Butler County's treatment system. This is an open, intermittent-evaporative design rather than a fully closed recirculating loop, though its overall water footprint (up to 15.8 million gallons/year) is presented as lower than a comparable closed-loop hyperscale facility.\"}, \"timeline\": \"Note: public records (Trenton city agendas, Butler County/journal-news reporting, DCD) consistently place this Prologis 'Project Mila' campus in the City of Trenton, Butler County, Ohio — roughly 15-20 miles from West Chester Township — rather than West Chester itself; researchers should confirm the tracker's location tag. Key milestones: Oct. 2025 — Prologis buys 141 acres from City of Trenton for $7.75M. Mar. 25-30, 2026 — Trenton Planning Commission reviews and approves the site plan in a brief, non-public-hearing meeting, triggering resident pushback. Spring 2026 — site grading/earthwork begins; Butler County Commissioners approve a 6-month data center moratorium in six unincorporated townships (not applicable to Trenton). Jun-Jul 2026 — Ohio legislature debates HB 975/SB 374 to roll back the state data center sales-tax exemption. Jul. 9, 2026 — Trenton City Council approves the 15-year, 75% CRA property tax abatement and compensation agreement. Fall 2026 — vertical construction on Building 1 slated to begin. 2028 — first building targeted for launch/go-live. 2029 — full four-building, 250 MW campus targeted for completion.\", \"investors\": \"Prologis, Inc. (NYSE: PLD), the San Francisco-based industrial/logistics REIT, is the developer and owner financing the project as part of its expanding data center and 'build-to-suit' hyperscale platform. No specific hyperscale tenant/customer has been publicly disclosed for Project Mila; Prologis has described its data center strategy broadly as build-to-suit development for blue-chip hyperscale customers, but has not named an anchor tenant for this campus in public filings or press statements to date. IBEW Local 648 has been cited discussing the roughly $1 billion construction investment in connection with electrical trade job estimates.\", \"politicalContext\": \"Trenton Mayor Ryan Perry [party unknown] publicly defended the 15-year, 75% tax abatement approved by City Council on July 9, 2026, stating 'every business that we have in the city of Trenton has an abatement of some kind,' and framing the project as part of a strategy to grow Trenton 'into an economic powerhouse' and reduce reliance on residential property taxes. Butler County Commissioner Don Dixon [R] supported a six-month moratorium on new data center projects but only in the six unincorporated townships under county zoning authority (Hanover, Lemon, Madison, Milford, Oxford, Ross) — since Trenton is an incorporated city with its own zoning authority, the county commissioners have stated they have no legal authority to block or condition Project Mila itself. State Rep. Tom Young [R-Washington Twp.] supported House Bill 646, which passed the Ohio House unanimously to establish a statewide study commission on data centers, though no Mila-specific statement from him was found. At the state level, Rep. Rader [D] introduced a companion bill (alongside bipartisan Senate Bill 374) to repeal Ohio's data center sales-tax exemption effective 2026-2027, a program Project Mila may otherwise qualify for; Ohio Republican leadership has more recently backed off efforts to fully kill the credit. Local opposition group W.A.T.E.R. and residents have petitioned officials (400+ signatures) for stronger data center restrictions and supported a proposed statewide ballot initiative to constitutionally ban data centers over 25 MW.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/prologis-details-plans-for-data-center-campus-outside-cincinnati-ohio/\", \"https://stopohiodatacenters.org/butler-county\", \"https://www.wvxu.org/local-news/2026-03-30/trenton-planning-commission-approves-site-plan-data-center\", \"https://www.wvxu.org/local-news/2026-03-25/data-center-trenton-plans-pushback\", \"https://www.journal-news.com/local/what-to-know-about-trenton-s-proposed-data-center-tax-incentives/article_7b381512-adde-58f8-b35b-b43ca25051ef.html\", \"https://www.journal-news.com/local/why-butler-county-leaders-cannot-block-data-centers/article_7dd81db4-fb8c-4e07-8cd5-e75c06caf7e4.html\", \"https://www.thebcfa.org/ignitebutler/spotlight/news-archive/p/item/67936/developer-reveals-site-plan-begins-work-on-hyperscale-data-center-in-butler-county\", \"https://www.wvxu.org/environment/2026-07-09/trenton-approves-15-year-tax-abatement-for-data-center\", \"https://www.wosu.org/2026-07-09/trenton-approves-15-year-tax-abatement-for-data-center\", \"https://local12.com/news/local/data-center-zoning-approval-draws-backlash-in-butler-county-administrator-offers-answers-trenton-prologis-power-water-usage-artificial-intelligence-ai-cincinnati-local-12-wkrc\", \"https://local12.com/news/local/proposed-data-center-development-moves-closer-reality-butler-county-trenton-tax-taxes-taxpayers-abatement-prologis-tech-technology-community-reinvestment-area-cra-residents-construction-building-city-council-mayor-cincinnati\", \"https://www.costar.com/article/549289991/butler-county-industrial-park-site-sale-paves-way-for-data-center-construction-sets-valuation-benchmark\", \"https://constructionreviewonline.com/project-mila-data-center-in-ohio-inches-closer-to-construction-as-trenton-commission-approves-plans/\", \"https://hoodline.com/2026/03/trenton-neighbors-fume-as-mega-data-center-starts-digging/\", \"https://www.wcpo.com/news/local-news/butler-county/trenton/trenton-planning-commission-approves-data-center-site-plan-in-10-minute-meeting\", \"https://ballotpedia.org/Donald_Dixon_(Butler_County_Commission,_Ohio,_candidate_2024)\", \"https://signalohio.org/ohio-committed-at-least-2-3-billion-dollars-in-sales-tax-breaks-for-data-centers/\", \"https://ohiohouse.gov/news/democratic/rep-rader-introduces-companion-data-center-sales-tax-exemption-repeal-bill-144878\", \"https://www.govtech.com/artificial-intelligence/ohio-communities-grapple-with-data-center-approval-decisions\"]}, \"ts\": 1784220513000}", "v67_dc_delawareaws-sunbury-campus": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Land acquired Dec 30, 2024 (~$44-54M for the parcel at 11793 Vans Valley Road, Galena/Sunbury). Original plan called for construction of the first 450,000 sq ft building to begin January 2028, with completion/operations by December 2034. In April 2026, Sunbury City Council passed a moratorium on new data-center development (unanimous 6-0 vote) effective through January 31, 2027, putting the Amazon project 'on hold.' As of July 2026, groundbreaking has not occurred.\", \"powerMW\": \"750 MW planned capacity, per trade-press/tracker reporting (baxtel.com, cleanview.co); not found stated in a primary Amazon or city filing. Notably, a Sunbury resident ballot initiative (450+ signatures submitted July 6, 2026) seeks to cap any data center's peak load in the city at 25 MW, far below this figure.\", \"sizeSqFt\": \"450,000 sq ft (41,800 sq m) planned for the first building phase, sited within the larger 330+-acre Sunbury Business and Technology Park. Total planned build-out square footage for the full multi-building campus is not publicly disclosed.\", \"totalInvestment\": \"$2 billion for the Sunbury campus (Amazon/City of Sunbury announcement, Nov. 2024). This is part of AWS's broader $7.8 billion planned Ohio data-center expansion by 2029/2030 (announced by Gov. Mike DeWine and Lt. Gov. Jon Husted), within AWS's cumulative Ohio investment reported at over $10.3 billion to date and a total AWS Ohio investment plan exceeding $23 billion from 2015-2030.\", \"employment\": {\"construction\": \"Not publicly disclosed (no Sunbury-specific construction workforce figure found in city, county, or AWS filings; the broader $7.8B Ohio expansion is described only as supporting 'hundreds' of jobs regionally).\", \"permanent\": \"50 full-time direct jobs, at an average annual salary of approximately $90,000.\", \"totalPayroll\": \"$4.5 million annual payroll for the 50 direct employees, per the city's Community Reinvestment Area (CRA) agreement documents.\"}, \"gridImpact\": {\"summary\": \"AEP Ohio's Vassell Substation sits in Sunbury and anchors major new 345kV transmission construction driven by regional data-center load growth; electricity demand in the Delaware/Licking county area is projected to roughly quadruple by 2027.\", \"detail\": \"AEP Ohio is building two approximately 13-mile 345kV transmission lines connecting the existing Vassell Substation in Sunbury to two proposed substations in Johnstown, Licking County, with construction planned from early 2026 to summer 2027, potentially using AEP's 'BOLD' overhead line technology. AEP officials have said local demand (about 500 MW currently) could reach roughly 2,000 MW by 2027 due to data-center and industrial growth across the two-county area. At a June 25, 2026 Sunbury public forum, energy consultant John Seryak (Go Sustainable Energy) told council and residents that adding a Sunbury data center would affect transmission costs similarly to any other large load on AEP's system. No project-specific dollar figure tied solely to the Amazon campus was found, and the Vassell-area transmission work also serves broader central-Ohio data-center growth (e.g., New Albany-area campuses), not AWS Sunbury exclusively.\"}, \"taxImplications\": {\"summary\": \"The project was approved for a 30-year Community Reinvestment Area (CRA) property-tax exemption -- about 87.5% for years 1-15 and 75% for years 16-30 -- plus companion compensation agreements with Big Walnut Local Schools and the Delaware Area Career Center.\", \"detail\": \"Sunbury City Council approved an economic-development incentive structured as a 30-year CRA agreement exempting roughly 87.5% of new real-property taxes in years 1-15 and 75% in years 16-30. Because CRA abatements reduce school revenue, the city separately negotiated compensation/PILOT-style agreements with Big Walnut Local Schools and the Delaware Area Career Center, and the city has pitched the deal partly as funding support for the BST&G Fire District. In May 2026 the city released roughly 1,000 pages of public records (53 core documents), including non-disclosure agreements, water-infrastructure studies, and tax-incentive analyses underlying the deal. The project's status is also entangled with broader 2026 turbulence around Ohio's state-level data-center sales/use tax exemption program, though Sunbury's CRA is a separate, locally controlled incentive.\"}, \"environmentalImpact\": {\"summary\": \"Opposition has centered on water withdrawal, diesel-backup emissions/noise concerns, and clearing of the 330+-acre business park site near homes, schools, a pipeline, and a beekeeping operation.\", \"detail\": \"Public records include a hydrologic capacity analysis modeling a scenario of up to 2.5 million gallons per day of water withdrawal for the proposed facility; Del-Co Water Company COO Brian Coghlan told a June 2026 city forum that serving a data center would be a significant operational challenge, whether from potable supply or recycled wastewater. Residents at packed public meetings (including an April 2026 council session moved to Big Walnut High School's auditorium for hundreds of attendees) raised concerns about noise, proximity to homes, schools, and a pipeline, and threats to a local beekeeper's livelihood. Site-specific air-permit/backup-generator details (of the kind Ohio EPA processed for a 158-generator permit at Amazon's Hilliard, Ohio site) were not found in public records for Sunbury specifically.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No Amazon or city document found explicitly confirms a closed-loop cooling design for the Sunbury facility. City-commissioned hydrologic studies model a withdrawal scenario of up to 2.5 million gallons/day, and Del-Co Water's COO described serving the project as a supply challenge -- language suggesting meaningful water use rather than a zero-withdrawal closed loop. Amazon's general corporate sustainability messaging states that about 90% of its data centers use free air-cooling (no water) globally and that AWS deploys closed-loop liquid cooling for AI/high-density racks fleet-wide, but no Sunbury-specific technical statement confirming the cooling approach for this campus was located.\"}, \"timeline\": \"Nov 2024: Amazon/AWS and the City of Sunbury announce a planned $2B data-center campus in the new Sunbury Business and Technology Park, part of a Gov. DeWine/Lt. Gov. Husted-announced $7.8B AWS Ohio expansion; Sunbury City Council approves a CRA incentive agreement. Dec 30, 2024: AWS entities close on purchase of the Vans Valley Road/Galena parcel (11793 Vans Valley Road). 2025: Engineering, hydrologic, and tax-incentive studies conducted; construction of the first 450,000 sq ft building originally targeted to start January 2028, with completion/operations by December 2034. Late 2025-early 2026: Public opposition mounts at packed meetings. March 2026: Council weighs a moratorium after resident pushback. April 16, 2026: Council unanimously (6-0) passes an emergency moratorium on new data-center development through Jan. 31, 2027, pausing the Amazon project; Amazon says it is 'aware of the tenor' locally and nationally. May 5, 2026: Mayor Joe St. John loses the Republican primary for Delaware County Commissioner to Renee Vaughan. May 7, 2026: City releases roughly 1,000 pages of public project records. June 25, 2026: City holds its first public forum on data-center water and electricity impacts. July 6, 2026: Resident group submits 450+ signatures (more than double the ~172 required) for a proposed November 2026 charter-amendment ballot measure capping data-center peak load in Sunbury at 25 MW.\", \"investors\": \"The project is financed and built directly by Amazon/Amazon Data Services, Inc. (AWS); no third-party developer or colocation partner is identified in public records. State-level backing comes via Ohio's economic-development apparatus: Gov. Mike DeWine [R] and Lt. Gov. Jon Husted [R] publicly announced the associated $7.8B AWS Ohio expansion, though no JobsOhio cash grant specific to the Sunbury parcel was found in public records. Local incentives are municipal: the City of Sunbury negotiated the CRA tax abatement and companion agreements with Big Walnut Local Schools, the Delaware Area Career Center, and the BST&G Fire District. AEP Ohio (transmission utility) and Del-Co Water Company (regional water utility) are infrastructure providers assessing/building capacity to serve the site but are not project investors.\", \"politicalContext\": \"Gov. Mike DeWine [R] and Lt. Gov. Jon Husted [R] publicly touted the Sunbury project as part of a $7.8 billion AWS Ohio data-center expansion announcement. Locally, Sunbury Mayor Joe St. John [R] (mayor since 2021; SVP at Huntington National Bank) presided over the city's original November 2024 approval of the CRA incentive deal, but by early 2026 proposed and championed the moratorium City Council enacted 6-0 on April 16, 2026, saying he wanted 'the next eight months to learn more about how a data center could impact Sunbury.' St. John ran in the May 5, 2026 Republican primary for Delaware County Commissioner (succeeding outgoing Commissioner Barb Lewis) and lost to Genoa Township Trustee Renee Vaughan [R] (56.7% to 43.3%); Vaughan faces Democrat Ryan Grissinger [D] -- a Genoa Township resident and AI-consulting-firm founder campaigning on countywide growth planning and requiring 'growth to pay for itself,' who tracks Delaware County data-center projects including this one -- in the November 2026 general election, with data-center development a central campaign issue. Del-Co Water Company COO Brian Coghlan and energy consultant John Seryak briefed council and residents on water/electricity impacts at the June 25, 2026 public forum. A citizen petition campaign (450+ signatures submitted July 6, 2026) seeks a November 2026 ballot measure capping any Sunbury data center's peak electric load at 25 MW -- which, if passed, would conflict directly with the ~750 MW reportedly planned for the AWS campus; parallel signature campaigns are underway in neighboring Pataskala.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/aws-plans-2bn-data-center-campus-in-sunbury-ohio/\", \"https://www.10tv.com/article/news/local/boomtown-ohio/amazon-new-data-center-delaware-county-ohio/530-df6756a8-47e3-4e04-a78d-189d4d014168\", \"https://www.datacenterdynamics.com/en/news/aws-purchases-44m-galena-property-for-sunbury-campus-in-ohio/\", \"https://www.delgazette.com/2024/11/21/amazon-data-services-coming-to-sunbury/\", \"https://regionalplanning.co.delaware.oh.us/wp-content/uploads/sites/17/2024/11/SUN-Amazon-data-services-coming-to-Sunbury-11.21.24.pdf\", \"https://www.delawaresource.com/2026/05/07/sunbury-city-council-announces-data-center-open-house-unveils-more-project-files/\", \"https://www.delawaresource.com/2026/04/16/sunbury-city-council-passes-moratorium-on-data-centers-in-effect-till-2027/\", \"https://www.wosu.org/politics-government/2026-04-16/sunbury-city-council-passes-moratorium-on-data-centers\", \"https://www.10tv.com/article/news/local/sunbury-city-council-passes-moratorium-data-centers/530-1802c6de-12e6-48c6-b390-1308fbcbc76c\", \"https://www.yahoo.com/news/politics/articles/sunbury-residents-push-let-voters-195615647.html\", \"https://www.delgazette.com/2026/07/07/sunbury-voters-may-decide-on-data-centers/\", \"https://www.delgazette.com/2026/06/25/data-center-water-power-discussed-in-sunbury/\", \"https://www.knoxpages.com/2026/06/26/sunbury-city-council-hears-how-data-centers-affect-water-and-power-in-first-public-forum/\", \"https://abc6onyourside.com/news/local/sunbury-ohio-delaware-county-residents-voice-opposition-to-proposed-amazon-data-center\", \"https://hoodline.com/2026/03/sunbury-neighbors-revolt-as-2-billion-amazon-data-hub-moves-in-next-door/\", \"https://www.richlandsource.com/business/dewine-amazon-planning-7-8-billion-expansion-in-central-ohio/article_053e08ff-5d91-52e6-9ad8-c3fdbac64542.html\", \"https://dailyenergyinsider.com/news/42053-aep-ohio-to-build-two-electric-transmission-lines-to-address-customer-growth/\", \"https://www.wosu.org/2024-03-28/aep-ohio-gives-notice-for-new-high-voltage-transmission-lines-to-meet-growing-energy-demands\", \"https://www.delgazette.com/2026/01/07/sunbury-mayor-to-run-for-county-commissioner/\", \"https://www.delgazette.com/2026/04/08/st-john-vaughan-vie-for-commissioner-seat/\", \"https://www.aol.com/news/two-republicans-battle-delaware-county-220148239.html\", \"https://www.delawaresource.com/2026/04/29/meet-the-candidates-for-delaware-county-commissioner-ahead-of-may-5-primary/\", \"https://ryangrissinger.com/issues/data-centers\", \"https://ballotpedia.org/Ryan_Grissinger_(Delaware_County_Commission,_Ohio,_candidate_2026)\", \"https://www.tmia.com/sites/tmia.com/files/media/Amazon%20Testimony,%20(8_1_24)-2.pdf\", \"https://stopohiodatacenters.org/data-center-water-usage-ohio\", \"https://cleanview.co/data-centers/ohio/1681/aws-sunbury\", \"https://baxtel.com/data-center/amazon-sunbury-ohio\"]}, \"ts\": 1784220513000}", "v67_dc_delawarecologix-col5": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Site work/construction began around June 2025 (a Delaware County regional planning office document is dated 'Cologix starts work' 06/18/25; some coverage cites a ~July 1, 2025 groundbreaking). Phase 1 (135,000 sq ft, 25 MW) is expected to be ready for service in fall/Q3 2026. Public filings tied to the related state jobs incentive set a Dec. 31, 2028 deadline for the company's job/payroll commitments.\", \"powerMW\": \"25 MW initial (Phase 1), with plans to expand — sources vary on the ultimate figure, citing growth to as much as 75 MW or, per Cologix's own site plan, a Phase 2 addition of ~95 MW bringing the full COL5 campus to 120 MW.\", \"sizeSqFt\": \"135,000 sq ft (Phase 1 building). Some Worthington/Orange Township JEDD filings reference a related '6787 Green Meadows Drive' parcel/project (sometimes labeled COL6) on 25–28 acres; total build-out campus size beyond Phase 1 is not clearly disclosed.\", \"totalInvestment\": \"Approximately $1 billion for the Orange Township (COL5) complex per trade press headlines. A separate Ohio Tax Credit Authority filing covers this project jointly with Cologix's Johnstown (Licking County) site at a combined $1.17 billion capital commitment. A Worthington JEDD filing separately cites a ~$274 million project cost estimate for a related parcel addition, which appears to be a partial/phase figure rather than the full COL5 investment.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"90 full-time-equivalent jobs — disclosed by the Ohio Tax Credit Authority/Governor's office, but this figure is combined across Cologix's two-county project (Orange Township, Delaware County + Johnstown, Licking County), not COL5 alone.\", \"totalPayroll\": \"$10 million in new annual payroll by Dec. 31, 2028 — also a combined figure for the Delaware + Licking county projects per the state incentive filing (roughly $111,000/job average).\"}, \"gridImpact\": {\"summary\": \"COL5 draws power from AEP Ohio via a substation interconnection with a redundant power loop; because regional transmission buildout may take 7-10 years to catch up with data-center demand, AEP Ohio sought and won PUCO approval to install onsite fuel-cell generation at Cologix and AWS sites to allow near-term operation.\", \"detail\": \"AEP Ohio proposed (Feb. 2025) and the Public Utilities Commission of Ohio approved (May 2025) onsite fuel-cell power generation units at data centers operated by Amazon Web Services and Cologix, explicitly to bridge the gap while grid transmission infrastructure is expanded — AEP has said full grid capacity to serve this demand could take up to a decade. Cologix's Delaware County facility buys its power from AEP; the county's economic development office has also cited planned infrastructure work (e.g., a Home Road extension across U.S. 23 and the railroad) as tied to development in the area.\"}, \"taxImplications\": {\"summary\": \"The project received a 10-year, 50% Community Reinvestment Area property tax abatement from Delaware County, a 50%/10-year state sales-tax exemption on construction materials/equipment via the Ohio Tax Credit Authority, and is part of a Worthington–Orange Township Joint Economic Development District (JEDD) sharing 2.5% income-tax revenue.\", \"detail\": \"Delaware County granted a 10-year, 50% property tax abatement (Community Reinvestment Area) plus a sales-tax exemption on construction materials. Separately, the Ohio Tax Credit Authority approved a 50%, 10-year state sales tax exemption covering both the Orange Township (Delaware County) and Johnstown (Licking County) Cologix projects, valued at roughly $42.3 million combined — approved days before Gov. DeWine paused further such exemptions in June 2026, with Cologix's deal explicitly grandfathered in as 'already in the works.' The site also sits within a Worthington-Orange Township JEDD (established Nov. 2023) that levies a 2.5% tax on on-site wages and business net profits, with proceeds shared between the city and township.\"}, \"environmentalImpact\": {\"summary\": \"Cologix states COL5 uses a closed-loop mechanical cooling system to minimize water draw, and county officials note the site sits in an area already zoned industrial; critics at 2026 statehouse hearings raised broader concerns about data centers' water use, farmland loss, noise, and drinking-water risk.\", \"detail\": \"According to Cologix, COL5 utilizes a 'closed-loop mechanical system for minimal water usage.' Company-wide, Cologix reports an average water usage effectiveness (WUE) of 0.203 versus an industry average of ~1.8, attributing this to closed-loop/liquid cooling that avoids evaporative cooling towers. Delaware County's economic development director said the COL5 site is in an area already zoned for this type of industrial use, distinguishing it from more controversial hyperscale projects elsewhere in central Ohio. Specific figures for COL5's water draw, diesel backup generator counts/emissions, or land clearing were not publicly disclosed in available sources. At a June 2026 Ohio Statehouse hearing on data centers generally, over 60 residents testified citing concerns about farmland conversion, noise, property values, and potential drinking-water contamination from data center chemicals/operations statewide.\"}, \"waterLoop\": {\"answer\": \"Yes\", \"detail\": \"Cologix's own COL5 marketing/spec materials explicitly describe a 'closed-loop mechanical system for minimal water usage.' This aligns with Cologix's company-wide sustainability reporting, which credits closed-loop and liquid-to-chip cooling systems (used across its AI-ready facilities) for an average water usage effectiveness far below the industry average. Independent, facility-specific water-draw data (in gallons) was not found in public records reviewed.\"}, \"timeline\": \"2014: Cologix enters the Columbus market. Nov. 2023: Worthington–Orange Township JEDD established. 2024-2025: Cologix selects/secures the 6787 Green Meadows Drive site (Orange Township, Delaware County) for COL5. Feb. 2025: AEP Ohio proposes onsite fuel-cell generation for Cologix and AWS to address grid capacity gaps. May 2025: PUCO approves AEP's onsite generation plan. June 2025: Cologix begins site work/construction (Delaware County regional planning office documents this ~June 18, 2025; some press cite groundbreaking around July 1, 2025). Late 2025: Worthington City Council and Orange Township trustees vote to add the Cologix parcel to the JEDD. Early June 2026 (Monday before the pause): Ohio Tax Credit Authority approves the 50%/10-year sales tax exemption for the Delaware + Licking County projects (~$42.3M combined). June 2026: Gov. DeWine announces a pause on new data-center sales-tax exemptions, explicitly exempting the already-approved Cologix deal; Ohio's Joint/Select Committees on Data Centers hold public hearings the same week. Fall/Q3 2026: Phase 1 (135,000 sq ft, 25 MW) expected to be ready for service. Beyond 2026: A planned Phase 2 would add further capacity (cited variously as up to 75-95 MW more) toward a stated eventual ~120 MW for the campus.\", \"investors\": \"Cologix has been majority-owned by Stonepeak Infrastructure Partners since 2017 (initial ~$500M investment); Mubadala Investment Company joined as a co-investor in 2020. In 2022, Stonepeak completed a $3.0 billion equity recapitalization of Cologix (one of the largest continuation-vehicle deals in digital infrastructure) alongside a $1.65 billion asset-backed securitization to fund growth, including its central Ohio buildout. The COL5 project itself is funded through Cologix's corporate/Stonepeak-backed capital program (part of a stated $1B+ Columbus-area investment); public-sector 'investment' is limited to tax incentives (Delaware County CRA abatement, state sales-tax exemption via the Ohio Tax Credit Authority/JobsOhio-adjacent Development Services Agency process, and the Worthington-Orange Township JEDD revenue-sharing arrangement) rather than direct financing. Delaware County's economic development office (led by Dana McDaniel) served as the local coordinating/development partner.\", \"politicalContext\": \"Gov. Mike DeWine [R] presided over state approval of Cologix's sales-tax exemption just before announcing, in June 2026, a pause on new data-center tax breaks statewide — citing exemptions that had grown to roughly $1.6 billion in one year — while explicitly carving out the already-approved Cologix deal as 'already in the works.' House Speaker Matt Huffman [R, Lima] had pushed to whip votes to override an earlier DeWine veto of a bill ending the data-center sales-tax break, but later said an override was 'not practical' once the pause was announced. Ohio's data-center oversight bodies are chaired by Rep. Adam Holmes [R, Nashport] (House Select Committee on Data Centers) and Sen. Brian Chavez [R, Marietta] (Senate/Joint Select Committee on Data Centers); both committees held hearings in late May/early June 2026 where over 60 residents and advocacy groups testified against data-center expansion generally, citing water, farmland, noise and utility-cost concerns. Locally, Delaware County Commissioner Jeff Benton [R] publicly backed the project, saying it 'represents long-term value for our community' via jobs and tax revenue while acknowledging electricity-demand and water-use concerns. Orange Township Trustee Erica Fouss [R] described herself as 'data center neutral' pending further study, while noting the project is good for township economic development; trustees said they were not involved in site selection, which was coordinated through county economic development. Delaware County's economic development director Dana McDaniel [party unknown, non-elected staff] said the county 'certainly welcome[s] Cologix,' emphasizing the site's existing industrial zoning.\", \"sources\": [\"https://regionalplanning.co.delaware.oh.us/wp-content/uploads/sites/17/2025/06/ORA-Cologix-starts-work-06.18.25.pdf\", \"https://www.delawaresource.com/2026/06/03/orange-township-data-center-among-last-projects-approved-before-ohio-tax-break-pause/\", \"https://bluewaterhealthyliving.com/news/national-news/ohio/data-center-operator-starts-work-on-1-billion-delaware-complex-part-of-larger-expansion/\", \"https://cologix.com/data-centers/columbus/col5/\", \"https://columbusregion.com/press-release/cologix-expands-in-central-ohio/\", \"https://hs.getobedio.com/blog/worthington-council-reviews-274m-cologix-data-center-expansion\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://www.datacentermap.com/usa/ohio/columbus/cologix-col5/\", \"https://www.wosu.org/2025-05-28/state-utility-officials-approve-aep-ohios-building-onsite-energy-generators-at-two-data-centers\", \"https://www.wosu.org/politics-government/2025-02-20/aep-ohio-proposes-onsite-fuel-cell-power-generation-for-aws-cologix-data-centers\", \"https://www.datacenterdynamics.com/en/news/aep-ohio-wins-approval-for-on-site-power-units-at-aws-cologix-data-centers/\", \"https://cologix.com/news/stonepeak-successfully-completes-3-0-billion-equity-recapitalization-portfolio-company-cologix/\", \"https://stonepeak.com/portfolio-highlights/cologix\", \"https://governor.ohio.gov/media/news-and-media/governor-dewine-announces-eight-projects-set-to-create-1618-jobs-more-than-1-8-billion-in-investments\", \"https://www.nbc4i.com/news/politics/lawmakers-applaud-data-center-tax-break-pause/\", \"https://ohiocapitaljournal.com/2026/06/03/data-center-opponents-give-ohio-lawmakers-an-earful/\", \"https://www.statenews.org/government-politics/2026-03-05/ohio-gop-leaders-plan-override-of-dewines-veto-restoring-data-center-tax-break\", \"https://cologix.com/resources/blogs/how-cologix-tracks-our-esg-progress/\", \"https://www.orangetwp.org/staff/erica-fouss/\", \"https://electbenton.us/vision-leadership-accomplishments/\"]}, \"ts\": 1784220513000}", "v67_dc_undisclosedcipher-mining-ulysses-site": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Site acquisition announced December 23, 2025 (land purchase reported as closing/finalizing around January 2026). Cipher has not disclosed a construction/groundbreaking start date. Energization (go-live) is targeted for Q4 2027, per Cipher's Q4 2025 and Q1 2026 business updates.\", \"powerMW\": \"200 MW gross (195-acre site with secured capacity and interconnection approvals from AEP Ohio to participate in the PJM wholesale market)\", \"sizeSqFt\": \"Not publicly disclosed\", \"totalInvestment\": \"Not publicly disclosed. Cipher has not released a project-specific capex figure for Ulysses; the site was funded through Cipher's general corporate financing (including a $2B bond program tied to its Black Pearl, TX buildout and a $200M revolving credit facility led by Morgan Stanley closed in March 2026). Trade press has floated industry-average HPC build costs of roughly $9-11 million per critical-IT-load MW (which would put a 200MW campus in the $1.8-2.2B range), but this is a generic industry estimate, not a confirmed Cipher figure.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Cipher secured 200 MW of capacity and full interconnection approval from AEP Ohio, giving the Ulysses site direct access to PJM, the largest U.S. wholesale power market.\", \"detail\": \"Per Cipher's December 23, 2025 announcement and subsequent 8-K business updates (Q4 2025 and Q1 2026), all utility agreements required to develop Ulysses are already in place, including secured 200 MW gross interconnection capacity with AEP Ohio and PJM market access. This is Cipher's first site outside Texas and outside ERCOT, explicitly framed by the company as a strategic entry into the PJM wholesale power market. No specific substation name, transmission upgrade cost, or AEP Ohio capital investment figure tied to this interconnection has been publicly disclosed.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement or PILOT agreement for Ulysses has been publicly disclosed; the project sits within a broader, currently paused Ohio data-center sales-tax exemption program.\", \"detail\": \"Ohio's data center sales/use tax exemption program (Ohio Revised Code 122.175, created in 2013) waives state and local sales tax on data center equipment for projects investing at least $100M over three years with at least $1.5M in annual payroll. The program's cost ballooned to roughly $554.9M in 2024 and an estimated $1.568B in 2025 (versus ~$133M originally projected), prompting Governor Mike DeWine [R] to announce a pause on the Ohio Tax Credit Authority's approval of new data center exemptions while the state reviews the growth's fiscal impact. No public record confirms whether Cipher has applied for or received this exemption, a local property tax abatement, or a PILOT for Ulysses specifically.\"}, \"environmentalImpact\": {\"summary\": \"No Ulysses-specific environmental disclosures (water withdrawal permits, emissions filings, land-use/zoning records) have surfaced publicly; the project falls under an active statewide debate over data-center water and land impacts.\", \"detail\": \"Ohio lawmakers have held multiple 2026 hearings (Joint Select Committee on Data Centers) on data-center water use, with pending legislation from Sen. Brian Chavez [R-Marietta] that would require the Ohio EPA to run a water-quality testing/monitoring program and require data centers to track, report water usage, and adopt conservation best practices including closed-loop cooling. No site-specific water withdrawal, wastewater discharge, or air-permit filings for Ulysses were found in public records searched.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"Cipher has not stated whether Ulysses will use closed-loop liquid cooling, air/dry cooling, or another method. Statewide, pending Ohio legislation (from the Chavez/Holmes-led Joint Select Committee on Data Centers) would push data centers toward closed-loop cooling as a best practice and require water-use reporting, but this is a proposed state policy, not a confirmed design choice for this specific facility.\"}, \"timeline\": \"December 23, 2025: Cipher Mining (NASDAQ: CIFR) publicly announces acquisition of the 195-acre, 200 MW 'Ulysses' site in Ohio, its first outside Texas, with interconnection/utility agreements already secured with AEP Ohio for PJM market access. January 2026: land purchase reported as finalized, bringing Cipher's development pipeline to 3.4 GW across 8 sites. February 24, 2026 (Q4 2025 earnings call): CEO Tyler Page reports 'significant interest from multiple hyperscalers' and advanced discussions for an HPC hosting lease at Ulysses; company also closes a $2B bond program (with ~$233M reimbursement to Cipher) covering its Texas Black Pearl buildout. March 25, 2026: Cipher Digital (rebranded) signs its third data-center campus lease (15-year, investment-grade hyperscale tenant, site/tenant undisclosed) and closes a $200M revolving credit facility led by Morgan Stanley. May 5, 2026 (Q1 2026 earnings call): Cipher confirms Ulysses retains full PJM interconnection approval and is still in advanced tenant discussions, with Q4 2027 energization reaffirmed as the target date. As of mid-2026, no tenant, construction start date, or site county had been publicly named.\", \"investors\": \"Cipher Mining Inc. (rebranded Cipher Digital Inc.; NASDAQ: CIFR), a publicly traded former bitcoin miner pivoting to HPC/AI data-center hosting, is the sole disclosed developer/owner of Ulysses. The project is financed through Cipher's corporate balance sheet and debt facilities rather than a named site-specific investor: a $2 billion bond program (used primarily for its Black Pearl, Texas site, with ~$233M reimbursed to Cipher for prior equity contributions) and a $200 million revolving credit facility (with $50M accordion) closed March 2026, led by Morgan Stanley with Goldman Sachs, JPMorgan Chase, Wells Fargo, Banco Santander, and SMBC in the syndicate. No hyperscaler or HPC hosting tenant (e.g., Fluidstack, Google, AWS — all confirmed only at Cipher's Texas sites Barber Lake and Black Pearl) has been publicly named for Ulysses; Cipher states it is in 'active and advanced discussions with multiple potential tenants' for an HPC hosting lease there.\", \"politicalContext\": \"No elected official or public body has issued a statement specifically naming Cipher Mining or the Ulysses site in public records reviewed. However, the project falls squarely within active Ohio state-level data-center policy debates: Governor Mike DeWine [R] announced a pause on the Ohio Tax Credit Authority's approval of new data-center sales-tax exemptions after the program's cost surged to roughly $1.568 billion in 2025 (versus ~$133M projected). The Ohio legislature's bipartisan Joint Select Committee on Data Centers, co-chaired by Sen. Brian Chavez [R, Marietta] and Rep. Adam Holmes [R, Nashport], held hearings through mid-2026 where residents raised concerns about tax breaks, water use, and use of NDAs to shield project details from public scrutiny; Sen. Chavez introduced sweeping legislation (June 2026) covering water-use reporting/testing, closed-loop cooling requirements, utility billing, and clarifying that NDAs cannot supersede Ohio's public records law. Separately, a Senate GOP press release characterized opposition to data centers as 'a well-funded misinformation campaign from coastal special interests,' while grassroots organizers were separately circulating petition signatures for a constitutional amendment capping data centers over 25 MW.\", \"sources\": [\"https://www.globenewswire.com/news-release/2025/12/23/3209864/0/en/cipher-mining-announces-acquisition-of-200-mw-site-in-ohio.html\", \"https://investors.ciphermining.com/news-releases/news-release-details/cipher-mining-announces-acquisition-200-mw-site-ohio\", \"https://investors.cipherdigital.com/news-releases/news-release-details/cipher-mining-announces-acquisition-200-mw-site-ohio\", \"https://www.datacenterdynamics.com/en/news/cipher-mining-acquires-land-for-200mw-data-center-site-in-ohio/\", \"https://www.theminermag.com/news/2025-12-23/cipher-ohio-hpc-pjm\", \"https://baxtel.com/data-center/cipher-digital-ulysses\", \"https://x.com/CipherInc/status/2003458122107543670\", \"https://www.fool.com/earnings/call-transcripts/2026/02/24/cipher-mining-cifr-q4-2025-earnings-transcript/\", \"https://www.fool.com/earnings/call-transcripts/2026/05/05/cipher-mining-cifr-q1-2026-earnings-transcript/\", \"https://investors.cipherdigital.com/news-releases/news-release-details/cipher-digital-provides-first-quarter-2026-business-update\", \"https://www.datacenterdynamics.com/en/news/cipher-digital-secures-hyperscale-tenant-under-15-year-lease/\", \"https:
