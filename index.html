ck Canyon Properties requests Ohio EPA approval of a wetland mitigation plan for a 'light industrial use' consisting of twelve buildings, access drives, five stormwater basins, and utility infrastructure; the filing lists a construction start date of Feb. 1, 2026.\\nFebruary 3, 2026: AES Ohio (formerly DP&L) files with PJM's Transmission Expansion Advisory Committee confirming a new large customer load request near its Stuart Substation, ramping to 1.3 GW by 2032 — the filing that first publicly confirmed the project's scale, though AES declined to name the operator or confirm the exact site.\\nFebruary 12, 2026: Public debate over the project emerges in Adams County amid transparency concerns (People's Defender).\\nFebruary 18, 2026: U.S. Army Corps of Engineers issues Nationwide Permit No. 39 with special conditions for endangered species and cemetery protection.\\nFebruary-March 2026: Amazon Web Services holds a community open house in Manchester, Ohio about the 'potential data center'; county commissioners state no formal site plan, incentive request, or NDA has been received from any company.\\nMarch 2026: People's Defender reports 'growing developer interest' in Adams County ahead of public debate.\\nApril 2026: Local opposition intensifies; residents petition for a statewide constitutional amendment to ban large data centers and for local rural zoning restrictions.\\nMay-June 2026: Statewide ballot-amendment signature drive proceeds (413,487 signatures needed by July 1); Ohio legislature forms a bipartisan Joint Committee on Data Centers; Gov. DeWine pauses new state data-center sales-tax exemptions.\\n2028-2032: Phased power ramp-up (100 MW in 2028 to 1.3 GW by 2032) per the AES Ohio/PJM filing, implying phased construction/energization through the early 2030s.\", \"investors\": \"The land under the project is held by Buck Canyon Properties LLC (and affiliated entities, reportedly including 68 Yards LLC for wetland-credit purchases), which paid $2.65 million in 2024 for the 1,016-acre former DP&L Stuart Station/landfill parcel. Buck Canyon's owners are identified in reporting as Derek Harmon and Darren Royse (a third owner is referenced but not named in available sources); they have declined to comment publicly, citing a nondisclosure agreement. Two related companies controlled by the same ownership group have separately purchased about 790 acres at the former Killen and Stuart plant sites since 2023 and signed option agreements to sell roughly 97 combined acres to Hecate Energy, a Chicago-based developer of solar, battery storage, and gas-fired generation that supplies power infrastructure to data centers — suggesting Hecate could play a role in on-site or adjacent power generation. The strongest public evidence points to Amazon Web Services (Amazon Data Services) as the actual end-user/developer: Amazon operates a dedicated community-relations website (amazon.adamscountyoh.gov), held an open house in Manchester, Ohio branded as 'Amazon Web Services,' and has publicized job-training partnerships (with Columbus State Community College and Tolles Career and Technical Center) tied to the county. However, as of the most recent public statements, AES Ohio's regulatory filing declined to formally name the operator, and Adams County commissioners (Holt, Jones, Hayslip) say they have received nothing in writing and have signed no NDA — so while investigative and trade press treat Amazon as the de facto identified developer, it remains formally unconfirmed in official county/state records, consistent with the 'Undisclosed' listing.\", \"politicalContext\": \"Adams County Commissioner Barbara Moore Holt [R] said repeatedly that the county has received no formal plans: 'To this day, I have nothing in writing,' and 'I have signed no NDA'; she said the county is 'simply doing nothing but waiting.' Commissioner Jason Hayslip [R] said resident feedback has been mixed and that, to his knowledge, no formal incentive request has been made to the county; he also declined to sign any NDA. Board President Kelly Jones [R] likewise vowed not to sign an NDA regarding the project. All three commissioners have stated they do not support a countywide moratorium on data centers, citing limits on the board's authority and private property rights. At the state level, Sen. Brian Chavez [R, Marietta] and Rep. Adam Holmes [R, Nashport] co-chair the new Joint Committee on Data Centers; Chavez has been the most vocal defender of the industry among lawmakers, at one point asking data-center opponents 'Are you being paid for this in any way?' and characterizing some opposition as coming from 'coastal liberal organizations,' while Holmes acknowledged that testimony at the hearings was overwhelmingly critical of data centers. Gov. Mike DeWine [R] announced in May 2026 that he paused the state's data-center sales-tax exemption program pending the Joint Committee's study, while also telling communities that data centers are 'the future' but should 'pay their own way' so ordinary ratepayers aren't burdened. At the local level, West Union Village Mayor Jason Buda (nonpartisan village office; affiliation not established in available records) publicly raised concerns about the facility's water use ('about four times the amount we use ourself'). Adams County resident Nikki Gerber testified at the Statehouse against data centers generally, telling lawmakers 'You took an oath to protect this great state of Ohio, its natural resources and the people in it' — she is a private resident/advocate, not an elected official, so no party tag applies.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/new-data-center-construction-confirmed-in-adams-county-ohio/\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-data-center-could-be-one-of-ohios-biggest-power-guzzlers\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-touts-demolished-power-plants-as-the-best-place-for-data-centers\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-data-center-gets-federal-permit-as-voters-sign-petitions-to-block-it\", \"https://www.peoplesdefender.com/2026/02/12/data-center-debate-emerges-in-adams-county-amid-calls-for-transparency/\", \"https://www.peoplesdefender.com/2026/02/18/discussion-continues-residents-and-experts-add-new-perspectives-on-data-center-plans-in-adams-county/\", \"https://www.peoplesdefender.com/2026/03/27/records-show-growing-developer-interest-in-adams-county-ahead-of-public-debate/\", \"https://www.peoplesdefender.com/2026/04/16/commissioners-meet-data-center-discussion-continues/\", \"https://www.journal-news.com/news/proposed-data-center-could-be-one-of-ohios-biggest-power-guzzlers/PIHRA4ZAGJC75OTEGK5EPR3VIY/\", \"https://hoodline.com/2026/04/adams-county-locals-take-big-swing-at-monster-data-center-power-grab/\", \"https://www.foodandwaterwatch.org/2026/05/28/inside-the-fight-to-stop-a-data-center-in-ohio/\", \"https://www.foodandwaterwatch.org/2026/06/08/data-center-tax-breaks-ohio/\", \"https://www.foodandwaterwatch.org/wp-content/uploads/2026/05/2605_FSW_DataCenterTax_OH.pdf\", \"https://amazon.adamscountyoh.gov/\", \"https://baxtel.com/news/data-centers/dp-facilities-inc\", \"https://baxtel.com/data-center/amazon-project-galaxy\", \"https://stopohiodatacenters.org/\", \"https://ohiocapitaljournal.com/2026/06/03/data-center-opponents-give-ohio-lawmakers-an-earful/\", \"https://ohiocapitaljournal.com/2026/05/18/ohio-lawmakers-are-creating-bipartisan-data-center-committee-that-will-start-meeting-this-month/\", \"https://ohiocapitaljournal.com/2026/04/03/data-center-ban-on-the-ohio-ballot-petitioners-get-approval-to-start-gathering-signatures/\", \"https://ohiocapitaljournal.com/2026/04/30/ohio-data-center-ban-proposal-advocates-are-trying-to-get-413000-signatures-by-july-1/\", \"https://www.governing.com/infrastructure/ohio-throws-hundreds-of-millions-to-tech-giants-data-centers\", \"https://www.wosu.org/2026-06-11/gov-dewine-says-data-centers-are-the-future-but-they-should-pay-their-own-way\", \"https://www.wcpo.com/news/state/state-ohio/dewine-announces-pause-of-ohios-data-center-tax-exemption\", \"https://governor.ohio.gov/wps/portal/gov/governor/media/news-and-media/governor-dewine-announces-pause-of-data-center-tax-exemption\", \"https://www.wcpo.com/news/local-news/adams-county/ohio-voters-could-decide-on-a-proposed-ballot-measure-to-ban-large-scale-data-centers-across-the-state\", \"https://www.wcpo.com/news/local-news/adams-county/adams-county-residents-voice-skepticism-concerns-over-proposed-data-center-projects-at-community-meeting\", \"https://www.peoplesdefender.com/2026/05/13/jones-wins-republican-primary-for-adams-county-commissioner/\", \"https://www.peoplesdefender.com/2026/04/15/jones-cites-experience-fiscal-record-in-bid-for-second-term/\", \"https://www.thecentersquare.com/ohio/article_6b0142e7-f0c5-4ece-9dbd-17f4525bff0c.html\", \"https://www.aboutamazon.com/news/aws/aws-continues-to-invest-in-ohio\"]}, \"ts\": 1784272480000}", "v67_dc_allengoogle-lima-area-project-bosc-": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"No confirmed groundbreaking date has been publicly disclosed. Multiple outlets (LimaOhio.com, AEDG, DCD) consistently report construction is expected to begin in 2026, pending final Ohio EPA air-permit approval for the backup generators. Completion targets are inconsistent across sources: some report completion by 2030, while a hometownstations.com report cites facility completion 'targeted for 2028.' As of the July 14, 2026 LimaOhio.com report, construction had not yet broken ground and permits were still pending.\", \"powerMW\": \"316 MW (figure reflected in third-party data center tracking listings, e.g., datacentermap.com's 'Google Project BOSC' entry). Google and AEP Ohio have not officially published a facility-specific MW figure in press coverage reviewed; AEDG/Google materials describe the campus only as designed to be 'water-cooled' and coordinated with AEP Ohio 'to meet power demands.'\", \"sizeSqFt\": \"Not publicly disclosed. Multiple independent searches (local press, AEDG, trade press, Allen County Auditor materials) confirm building square footage has not been released. The site itself is variously reported as 200+ acres (initial AEDG figure) to 373 acres spanning American Township and neighboring Sugar Creek Township (per Signal Ohio and later reporting) of former farmland.\", \"totalInvestment\": \"$500 million capital investment, confirmed consistently across Data Center Dynamics, LimaOhio.com, AEDG, WTOL, hometownstations.com, and Signal Ohio -- described as the largest private-sector investment in Allen County history. Of that total, $50 million is earmarked for local infrastructure (per AEDG/DCD), including roundabouts at Bluelick Road/North Cole Street and SR-115/North Cole Street; a separately cited $13.6 million is allocated to local water infrastructure upgrades (unclear from reporting whether this is a subset of, or additional to, the $50M figure).\", \"employment\": {\"construction\": \"Reported at 'at least 1,000 construction jobs' (single secondary-source citation, irecruit.co summary of local coverage; not independently corroborated by a primary Google/AEDG release in the sources reviewed).\", \"permanent\": \"Approximately 50 full-time/permanent jobs, consistently cited across DCD, hometownstations.com, WTOL, LimaOhio.com and AEDG as 'high-paying' data center operations positions.\", \"totalPayroll\": \"Not publicly disclosed.\"}, \"gridImpact\": {\"summary\": \"Google is coordinating directly with AEP Ohio on power delivery, with $50 million of the project budget directed to local infrastructure while AEP's newly PUCO-approved large-load tariff structure requires big data-center customers to cover the cost of new transmission/distribution infrastructure needed to serve them.\", \"detail\": \"AEDG and DCD reporting state Google 'is working closely with AEP Ohio to meet power demands while ensuring infrastructure costs are managed responsibly,' and that the campus is designed to be water-cooled (cited as ~10% more energy-efficient than air-cooled designs, reducing grid strain). Separately, statewide context: AEP Ohio's PUCO-approved tariff (effective 2024-2025) requires data center loads above 25 MW to commit to paying for new transmission needed to serve them -- consistent with the case file's 'AEP full-cost coverage' note -- amid utility disclosures of up to 30 GW in cumulative new-load interconnection requests across Ohio. No Allen-County-specific AEP transmission/substation filing (e.g., a named 765kV line or new substation for this site) was found in the sources reviewed; the $50M local infrastructure figure in press coverage refers primarily to roads/roundabouts, not electrical transmission buildout.\"}, \"taxImplications\": {\"summary\": \"Google secured a 15-year local tax abatement, offset by a negotiated $250,000-per-year direct payment to Elida Local Schools, plus at least one other county-level tax incentive.\", \"detail\": \"Multiple sources (LimaOhio.com, hometownstations.com, AEDG, rgp.org) confirm Google agreed to a 15-year tax abatement in exchange for $250,000 in annual funding to Elida Local Schools; Elida Superintendent Joel Mengerink (an appointed administrator, not an elected school-board member) publicly welcomed the arrangement, saying the district is 'excited about the economic growth and opportunities the data center project will present for the district and our students and staff.' Signal Ohio's reporting references the deal as including 'two major tax breaks' without fully itemizing both (one appears to be the 15-year abatement referenced above; the second was not clearly specified in the sources reviewed). Negotiations were conducted under a non-disclosure agreement with Allen County commissioners while the project was known only as 'Project BOSC,' which has since become a point of public controversy (see politicalContext).\"}, \"environmentalImpact\": {\"summary\": \"Ohio EPA has drafted (but as of mid-July 2026 not finalized) an air permit for 115 diesel-fired backup generators plus 4 emergency fire-pump generators, 36 cooling towers, and 113 fuel storage tanks; a 5-million-gallon-per-day water ordinance was secured in September 2025.\", \"detail\": \"LimaOhio.com and Signal Ohio reporting describe the Ohio EPA's draft permit covering 115 diesel-fired emergency generators sited between North Cole Street and West Bluelick Road, alongside 4 additional emergency fire-pump generators, 36 cooling towers, and 113 fuel storage tanks. A Google spokesperson stated the generators would be used only 'in rare cases of an emergency or during periodic testing,' and Ohio EPA modeling reportedly shows facility emissions 'will not exceed any National Ambient Air Quality Standard.' Final permit issuance was still pending as of the most recent (July 14, 2026) coverage. Separately, a 5-million-gallons-per-day water-service ordinance for the site was secured from local water authorities in September 2025, and an engineering analysis reportedly used 'range estimates' to argue the facility could help address Ottawa River water-quality issues under extreme drought conditions. A resident (Charlene McCoy) has also raised complaints about fugitive dust from 'Envirolime' soil stabilizer used during early site work, alleging health effects and inadequate dust suppression. This project's water discharge would also fall under Ohio EPA's broader, separately controversial draft general NPDES permit for data centers (docket OHD000001), which environmental groups (including the Ohio Environmental Council) have criticized for allowing reduced site-specific review of industrial wastewater discharges to state waters.\"}, \"waterLoop\": {\"answer\": \"Partial\", \"detail\": \"Available evidence points to a hybrid/evaporative cooling design rather than a fully closed-loop, water-free system. AEDG/DCD materials describe the campus as 'water-cooled,' the Ohio EPA draft permit specifies 36 cooling towers (typically evaporative, consuming makeup water), the project secured a 5-million-gallon-per-day water ordinance, and the facility's wastewater would fall under Ohio's data-center NPDES discharge permit framework -- all of which indicate meaningful water withdrawal/discharge rather than a zero-water closed loop. This differs from Google's publicly announced water-free/closed-loop design for its Texas data center. Google's corporate-wide statements describe closed-loop systems as using 'very little water because it's continuously recirculated' and a company-wide 'water positive' goal (64% of freshwater consumption replenished in 2024), but no source reviewed explicitly confirms the Lima-area (Project BOSC) facility itself uses a fully closed-loop, non-discharging design. Given the cooling-tower and water-ordinance evidence, closed-loop status here is best characterized as unconfirmed/partial rather than a clear 'Yes.'\"}, \"timeline\": \"2022: Bistrozzi LLC, later revealed as a Google front entity, incorporated in Delaware.\\n2025 (through the year): Bistrozzi begins acquiring hundreds of acres of former farmland in American Township (later reported at up to 373 acres spanning American and Sugar Creek townships); Allen County commissioners negotiate tax abatements and sign a non-disclosure agreement while the project is known publicly only as 'Project BOSC.'\\nSeptember 2025: A 5-million-gallon-per-day water-service ordinance is secured for the site.\\nMarch 16, 2026: Google is publicly confirmed as the company behind Project BOSC (LimaOhio.com, DCD, hometownstations.com, WTOL all report the $500M investment).\\nApril 6, 2026: Google formally 'introduces itself' to the Allen County community (per LimaOhio.com).\\nMay 18 - June 10, 2026: Ohio legislature moves on statewide data-center oversight legislation (bipartisan study committee announced May 18; substitute HB 646 introduced/advanced in June) partly in response to controversies like this project.\\nJune 1, 2026: A resident (a cloud platform engineer) testifies before an Ohio legislative select committee about transparency concerns tied to the project's NDA-shielded negotiation.\\nJuly 14, 2026 (most recent coverage found): LimaOhio.com reports ongoing resident complaints, public-records access disputes, and unresolved Ohio EPA air-permit status.\\n2026-2030 (or 2028 per one source): Construction is expected to begin in 2026 following final permit approvals, with completion variously reported as 2028 or 2030 depending on the outlet -- this discrepancy is unresolved in current public reporting.\", \"investors\": \"Google (Alphabet Inc.) is the sole disclosed developer/investor, having used a shell entity, Bistrozzi LLC (incorporated in Delaware in 2022), to quietly assemble the ~200-373 acre former-farmland site in American Township before publicly confirming its identity in March 2026. The Allen Economic Development Group (AEDG), a local nonprofit economic-development organization led by President Cynthia Leis, brokered and publicly announced the deal ('We're officially welcoming a global tech leader into the heart of the Allen County community'). No joint-venture partner, co-investor, or third-party developer was identified in any source reviewed; individual prior landowners of the assembled farmland parcels were not named in press coverage.\", \"politicalContext\": \"Allen County Commissioners Cory Noonan, Beth Seibert, and Brian Winegardner (current 2026 board) approved the incentive package and NDA with Google/Bistrozzi; their individual party registrations were not confirmed via voter/election records in this research, though they have appeared at Allen County Republican Party events, consistent with the county's strongly Republican local political environment -- this should be treated as circumstantial, not confirmed, party affiliation. Elida Local Schools Superintendent Joel Mengerink (an appointed administrator, not an elected school-board member) publicly welcomed the $250,000/year partnership; no formal recorded school-board vote or individual board-member statements were found. Ohio House Speaker Matt Huffman [R] (longtime Lima-area legislator and former Lima city councilman) has taken a skeptical public stance on data-center deals statehouse-wide -- particularly criticizing multi-decade tax-abatement contracts -- but has reportedly avoided directly weighing in on the Allen County/Google project specifically. State Representatives Gary Click [R, Vickery] and Kellie Deeter [R, Norwalk] sponsored Ohio House Bill 646 (establishing a Data Center Study Commission and broader data-center regulatory provisions, including a proposed 50% cap on local property-tax abatements for data centers and a provision that NDAs cannot override public-records law); the bill passed the Ohio House unanimously and moved to the Senate. Local resident Charlene McCoy testified to a state legislative select committee on June 1, 2026, raising transparency concerns about the NDA-shielded negotiation process and a redacted Ohio EPA air permit. Note: search results also surfaced a similarly named controversy involving a 'Commissioner Ron Turpin' and a zoning board denying 'Google's construction offices,' but on verification this refers to Allen County, INDIANA (Fort Wayne) -- an unrelated jurisdiction -- and has been excluded from this report to avoid conflating the two same-named counties. Specific American Township Trustees' names and any individual statements/votes by them were not surfaced in available search results.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/google-confirmed-as-company-behind-500m-data-center-in-lima-ohio/\", \"https://www.limaohio.com/top-stories/2026/03/16/google-officially-behind-data-center-project/\", \"https://www.limaohio.com/top-stories/2026/04/06/google-introduces-itself-to-allen-county/\", \"https://www.limaohio.com/top-stories/2026/07/14/residents-question-transparency-with-allen-county-data-center/\", \"https://www.hometownstations.com/news/allen_county/google-revealed-as-company-behind-500-million-data-center-project-in-lima-area/article_7fa7f0c1-88c1-4d79-86ca-630d942787e6.html\", \"https://www.hometownstations.com/news/allen_county/google-details-500m-lima-data-center-promises-jobs-and-community-investment/article_df9d22e7-5fad-489f-9353-030149054d90.html\", \"https://www.aedg.org/blog/google-to-build-data-center-in-lima-ohio-with-500-million-capital-investment/\", \"https://www.aedg.org/data-center-updates/google-to-build-data-center-in-lima-ohio-with-500-million-capital-investment/\", \"https://www.aedg.org/data-center-updates/google-data-center-website-now-live-for-allen-county-community/\", \"https://signalohio.org/google-data-center-near-lima-ohio-neighbors-are-furious/\", \"https://www.wtol.com/article/news/local/google-to-build-500-million-data-center-in-lima/512-dfdd12b8-8dba-46c5-a3e2-e8568eb9006e\", \"https://www.allencountydatacenter.com/\", \"https://dam.assets.ohio.gov/image/upload/epa.ohio.gov/Portals/35/permits/Data_Centers/OHD000001_Draft.fs.pdf\", \"https://ohiocapitaljournal.com/2026/06/10/ohio-lawmakers-introduce-sweeping-new-data-center-legislation/\", \"https://ohiocapitaljournal.com/2026/06/08/big-tech-defends-data-centers-before-ohio-lawmakers/\", \"https://www.legislature.ohio.gov/legislation/136/hb646\", \"https://ohiohouse.gov/news/republican/ohio-house-passes-bill-establishing-the-ohio-data-center-study-commission-142643\", \"https://commissioners.allencountyohio.com/\", \"https://www.datacentermap.com/usa/ohio/lima-oh/google-project-bosc/\", \"https://www.irecruit.co/insights/google-500m-data-center-project-ohio\", \"https://rgp.org/google-to-build-500-million-data-center-in-allen-county/\", \"https://www.utilitydive.com/news/aep-ohio-data-center-crypto-rates-puc/716150/\"]}, \"ts\": 1784272480000}", "v67_dc_browndb-stu-mt-orab-mega-site": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed. No groundbreaking date or construction-start date has been announced. Duke Energy Ohio submitted the associated 2 GW load request to PJM's interconnection queue in June 2024; the Purchase and Sale Agreement (dated December 23, 2024) listing 'data center' as the intended use predates any construction announcement. As of mid-2026 the project remains in the pre-construction, permitting/regulatory-review phase (PUCO stated in February 2026 it was not yet conducting any review tied to a specific data center request for Mt. Orab), consistent with a 'Site Selected' status rather than an active-build status.\", \"powerMW\": \"Reported inconsistently across sources. The tracking database entry cites 1,500 MW. However, Duke Energy Ohio's own PJM interconnection filing (submitted June 2024) and multiple press accounts (WCPO I-Team, Dayton Daily News/Springfield News-Sun) describe the Mt. Orab project as a 2 GW (2,000 MW) load request — one of the largest data-center power requests filed in Ohio to date, larger than the Adams County project referenced alongside it.\", \"sizeSqFt\": \"Not publicly disclosed. Only the land parcel size has been confirmed publicly: a 1,018-acre 'mega site' (commonly rounded to '1,000+ acres' in coverage) bordered by Oakland Road, New Hope-White Oak Station Road, and Tri-County Highway in the Village of Mt. Orab. No building square footage has been released, likely because the developer's plans remain shielded by NDAs signed by village officials.\", \"totalInvestment\": \"Not officially confirmed. Investigative outlet Hunterbrook, in its report identifying Meta as the likely party behind DB Stu LLC, headlined the story 'BREAKING: Meta Secretly Behind $1B Ohio Data Center Facing Community Pushback,' implying a roughly $1 billion investment tied to this project, but no company, county, or state filing has published a confirmed capital-investment figure. Treat the $1B figure as investigative-journalism sourcing, not an official disclosure.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Duke Energy Ohio is the interconnecting utility and quietly filed a roughly 2 GW load request with PJM for the Mt. Orab site in June 2024, well before the project was publicly known.\", \"detail\": \"Mt. Orab sits in Duke Energy Ohio's service territory (not AEP Ohio). Duke Energy first brought the Mt. Orab project to PJM's generation/load interconnection queue in June 2024 — over a year before residents learned of it — with a reported ~2 GW capacity request, making it one of the largest single data-center power requests filed in Ohio and comparable in scale to the largest hyperscale queue entries statewide. As of February 2026, the Public Utilities Commission of Ohio (PUCO) said it was not aware of, and was not conducting, any formal review specific to powering a Mt. Orab data center, indicating the interconnection/tariff process was still in early stages. Local reporting (WCPO, Dayton Daily News) flagged the project as a potential ratepayer concern given Duke's contemporaneous requests for Ohio rate increases and broader statewide anxiety about data-center-driven electricity cost increases.\"}, \"taxImplications\": {\"summary\": \"Mt. Orab's village council passed a Community Reinvestment Area (CRA) tax-abatement resolution and an emergency rezoning in December 2024, both approved with no public hearing or written justification, later exposed via public-records requests.\", \"detail\": \"According to reporting based on public-records requests (since council members were bound by NDAs), a CRA resolution created tax abatements for the DB Stu LLC project, adopted at the same December 2024 council meeting where zoning code changes were pushed through via an 'emergency' measure with no written justification. The site was already zoned for heavy industry, so no public rezoning hearing was required for it to qualify as a data center site. Specific abatement percentages/duration, PILOT (payment-in-lieu-of-taxes) terms, and school-district compensation agreements have not been publicly released. Ohio's broader state-level sales-and-use tax exemption for qualifying data center equipment (under the state's data center tax exemption program, ORC 122.175/5709 series) would presumably apply to a project of this scale, but no state Development Services Agency agreement specific to this facility was found in public search results. The secrecy around these tax actions — revealed only through resident public-records requests — became a central grievance driving both HB 695 and the statewide ballot-amendment campaign.\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental permits (air, water withdrawal, or wastewater discharge) for the data center itself have surfaced publicly; Brown County is in EPA air-quality attainment, and the 1,018-acre site would convert land the village had held for industrial development.\", \"detail\": \"Brown County is classified as 'in attainment' for air quality by Ohio EPA, which local reporting notes as favorable for siting industrial/data-center development, but no facility-specific air permit (e.g., for backup diesel generators, which are typically required for hyperscale data centers of this size) has been identified in public Ohio EPA permit records under DB Stu LLC's name. Ohio EPA does maintain a general NPDES permit (OHD000001) addressing non-contact cooling water discharges from data centers statewide, but no site-specific water withdrawal or discharge permit tied to this project was located. The 1,018-acre mega site was assembled and marketed for years by the Mt. Orab Port Authority/Southwest Ohio Regional Development Authority (SORDA) for industrial use, so large-scale land disturbance and conversion of a formerly rural/agricultural-adjacent parcel is expected but not yet documented via construction or grading permits in public sources. Resident opposition (petitions with ~900 signatures, a 1,700+ member 'Mt. Orab Residents for Responsible Development' Facebook group, and a ~275-person turnout at a Mt. Orab Middle School gymnasium meeting) has centered on unknown water consumption, electricity rate impacts, noise, and general lack of environmental disclosure due to the NDAs.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No source identified in this research confirms whether the Mt. Orab facility would use closed-loop (recirculating) cooling versus open/evaporative cooling. Because DB Stu LLC's plans remain shielded by NDAs signed by the mayor and full village council, technical design details including cooling architecture and projected water withdrawal volumes have not been made public. Only a general, project-non-specific Ohio EPA NPDES general permit for data center non-contact cooling water discharge (OHD000001) was found, which does not itself specify the cooling method for this facility.\"}, \"timeline\": \"Multi-year land assembly: The Village of Mt. Orab (via its Port Authority, later reorganized as the Southwest Ohio Regional Development Authority/SORDA) spent years assembling and marketing the 1,018-acre 'mega site' for industrial development.\\nJune 2024: Duke Energy Ohio submitted a ~2 GW load interconnection request to PJM for the Mt. Orab site — over a year before the public knew a data center was planned.\\n~Mid-to-late 2024: SORDA sold the mega site to DB STU LLC (reported by residents as occurring 'more than a year' before February 2026 disclosures).\\nDecember 23, 2024: Purchase and Sale Agreement executed, explicitly stating the property meets the buyer's criteria for use 'as a data center and related improvements.'\\nDecember 2024: Mt. Orab Village Council passed emergency zoning code amendments and a CRA tax-abatement resolution in the same meeting, with no written public justification.\\nJanuary 6, 2026: At a village council meeting, officials confirmed for the first time that they had signed NDAs regarding the site.\\nJanuary 10, 2026: 'Mt. Orab Residents for Responsible Development' Facebook group formed; grew past 1,700 members.\\nJanuary 21, 2026: Local TV (Fox19) covers resident concerns over the still-unconfirmed project.\\nLate January 2026: ~275 residents pack a special village meeting at Mt. Orab Middle School demanding transparency; a petition opposing the project's pace and secrecy gathers nearly 900 signatures.\\nFebruary 3, 2026: Council member Eric Lang introduces ordinances proposing a 180-day (six-month) moratorium on new data-center permits and rescinds his own NDA — the only council member to do so.\\nFebruary 2026: Public-records requests confirm the CRA tax abatements and the data-center use via the Purchase and Sale Agreement, reported by Brown County Press/Clermont Sun/News Democrat.\\nMarch 12, 2026: Statewide press (Ohio Capital Journal) notes state lawmakers responding to mounting data-center backlash statewide, citing Mt. Orab as a flashpoint.\\nSpring 2026: Ohio House Bill 695 (Reps. Adam Bird [R] and Brian Stewart [R]), aimed at barring local officials from signing NDAs about development deals, advances — directly triggered by the Mt. Orab NDA scandal.\\nApril 2026: Ohio Ballot Board approves signature-gathering for a proposed constitutional amendment to ban data centers with peak load over 25 MW, an effort led in part by Brown County residents (including organizer Austin Baurichter) responding to the Mt. Orab project.\\nJune 19, 2026: Organizers announce they will not meet the July 1, 2026 signature deadline (413,000+ signatures needed) for this year's ballot, but say the campaign continues.\\nAs of July 2026 (present): No groundbreaking, building permits, or construction timeline have been publicly disclosed; the project remains at 'Site Selected'/pre-construction status amid active local and state political conflict.\", \"investors\": \"The listed applicant/landowner is DB STU LLC, a Delaware-registered limited liability company with a tax-mailing address c/o Vorys, Sater, Seymour and Pease LLP in Columbus, Ohio (attn: Nicklaus J. Reis) — a law firm commonly used for large corporate/real-estate transactions in Ohio. DB STU LLC purchased the 1,018-acre 'mega site' from the Southwest Ohio Regional Development Authority (SORDA, formerly the Mt. Orab Port Authority), the public economic-development entity that had assembled and marketed the land. Investigative outlet Hunterbrook Media reported strong circumstantial evidence tying DB Stu LLC to Meta Platforms: DB Stu LLC was incorporated by Pamela Gregorski, a senior manager at Corporation Service Company (a Delaware corporate-services firm), on the exact same day as Balloonist LLC, a confirmed Meta subsidiary behind a Wisconsin data center. DB Stu's Ohio filings also list Toreak Acquisition Corp., a Delaware entity that recurs as a corporate intermediary across other confirmed Meta shell companies (Pelican Leap LLC and Laidley LLC). Gregorski has been linked to at least four other confirmed Meta front LLCs (Orla LLC in Indiana; Laidley LLC and Pelican Leap LLC in Louisiana; Wurldwide LLC in Texas), and a similar pattern was separately identified by Hunterbrook for Meta's 'Project Klondike' in Piqua, Ohio (Miami County), which used a near-identical NDA to the one imposed on Mt. Orab officials. Meta has not issued a public statement officially confirming or denying involvement in the Mt. Orab project as of this research. No landowner names other than SORDA (as seller) and DB STU LLC (as buyer) were identified in available public reporting.\", \"politicalContext\": \"Rep. Adam Bird [R] (R-New Richmond, Ohio House District 63, representing western Brown County including Mt. Orab) co-sponsored House Bill 695 directly in response to this project, stating: 'There's a mega site that is located in the village of Mt. Orab in Brown County that I represent. And many of the residents in that community were upset about a non-disclosure agreement that was signed by local government officials... if it is a data center, then we should be open and honest with the public, and tell the public why this is a good idea for our community.' Rep. Brian Stewart [R] (R-Ashville) co-sponsored HB 695 alongside Bird; the bill would bar county commissioners, township trustees, and village mayors/council members from signing NDAs concerning matters related to their official duties. At the local level, Mt. Orab Mayor Joe Houser and the entire village council signed NDAs with DB Stu LLC before the data center use became public; party affiliations for Houser and other council members were not found in public sources (Ohio village mayoral and council races of this size are typically nonpartisan/non-declared). Council member Eric Lang was the only sitting council member to publicly rescind his NDA and, on February 3, 2026, introduced ordinances proposing a 180-day moratorium on new data-center permits in the village; no party affiliation for Lang was found in available sources. No on-the-record statements from Brown County commissioners specifically addressing this project were found in the sources reviewed (searches returned only a general county-commissioners listing page, not statements). Brown County resident Austin Baurichter (not an elected official, so no party tag applies) helped organize the statewide petition drive for a constitutional amendment to ban data centers over 25 MW peak load, a campaign explicitly motivated by the Mt. Orab secrecy episode; that signature drive missed the July 1, 2026 deadline for this year's ballot but organizers said the effort continues.\", \"sources\": [\"https://browncountypress.com/news/19046/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction\", \"https://browncountypress.com/news/19030/residents-request-transparency-voice-concerns-at-village-of-mt-orab-special-meeting-on-mega-site\", \"https://browncountypress.com/news/19025/mt-orab-residents-seek-answers-on-mega-site\", \"https://browncountypress.com/news/19073/breaking-news-purchase-and-sale-agreement-on-mt-orab-mega-site-lists-data-center-as-intended-use-for-property\", \"https://local12.com/news/local/questions-remain-brown-county-officials-handling-proposed-mega-site-data-center-mount-orab-acres-mayor-village-council-attorney-law-legal-nda-nondisclosure-agreement-zone-zoning-code-tax-taxes-taxpayer-ordinances-emergency-cincinnati\", \"https://local12.com/news/local/brown-county-village-considers-6-month-pause-new-data-center-permits-mount-orab-datacenter-permit-non-disclosure-agreement-nda-potential-project-ordinance-mega-site-highway-nature-outdoors-pollution-cincinnati\", \"https://local12.com/news/local/brown-county-residents-demand-answers-mysterious-industrial-project-mount-orab-village-council-mayor-nda-non-disclosure-agreement-industry-plot-land-sale-selling-developments-transparency-confidential-special-meeting-data-center-cincinnati\", \"https://local12.com/news/local/brown-county-group-seeks-constitutional-ban-certain-data-centers-petition-petitions-amendment-amend-constitution-ohio-hamilton-county-cincinnati-construction-prohibit-banned-banning-signatrues-mount-orab-mega-site\", \"https://local12.com/news/local/ohio-could-soon-see-local-lawmakers-banned-signing-ndas-nondisclosure-agreements-politicians-development-projects-data-centers-brown-county-mount-orab-cincinnati-ohio-residents-rumors-secretive-hidden-violations-fines-fees-voters\", \"https://www.wcpo.com/news/local-news/brown-county/mt-orab-residents-pack-gymnasium-demanding-transparency-on-mysterious-mega-site-project\", \"https://www.wcpo.com/news/local-news/brown-county/lack-of-transparency-hundreds-sign-petition-calling-to-pause-plans-for-mount-orab-mega-site\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-data-center-could-be-one-of-ohios-biggest-power-guzzlers\", \"https://www.daytondailynews.com/news/proposed-data-center-could-be-one-of-ohios-biggest-power-guzzlers/PIHRA4ZAGJC75OTEGK5EPR3VIY/\", \"https://www.clermontsun.com/2026/02/04/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction\", \"https://www.clermontsun.com/2026/02/05/residents-request-transparency-voice-concerns-at-village-of-mt-orab-special-meeting-on-mega-site\", \"https://www.newsdemocrat.com/2026/02/13/breaking-news-purchase-and-sale-agreement-on-mt-orab-mega-site-lists-data-center-as-intended-use-for-property/\", \"https://www.newsdemocrat.com/2026/02/04/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction/\", \"https://www.newsdemocrat.com/2026/02/01/mt-orab-residents-seek-answers-on-mega-site/\", \"https://www.ripleybee.com/2026/02/04/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction/\", \"https://www.fox19.com/2026/01/21/mt-orab-residents-voice-concerns-over-potential-data-center/\", \"https://hntrbrk.com/meta-data-centers/\", \"https://stopohiodatacenters.org/\", \"https://stopohiodatacenters.org/miami-county\", \"https://ohiocapitaljournal.com/2026/03/12/ohioans-are-getting-fed-up-with-data-centers-state-lawmakers-are-starting-to-notice/\", \"https://ohiocapitaljournal.com/2026/04/30/ohio-data-center-ban-proposal-advocates-are-trying-to-get-413000-signatures-by-july-1/\", \"https://ohiocapitaljournal.com/2026/04/03/data-center-ban-on-the-ohio-ballot-petitioners-get-approval-to-start-gathering-signatures/\", \"https://ohiocapitaljournal.com/2026/06/19/ohio-proposed-constitutional-amendment-to-ban-data-centers-will-not-be-on-this-years-ballot/\", \"https://policymattersohio.org/news/2026/05/20/hb-695-should-limit-ndas-restore-access-to-records-of-data-center-and-other-development-deals/\", \"https://legislature.ohio.gov/legislation/136/hb695\", \"https://ohiohouse.gov/members/adam-c-bird\", \"https://ballotpedia.org/Ohio_Prohibition_of_Data_Center_Construction_Amendment_(2026)\", \"https://dam.assets.ohio.gov/image/upload/epa.ohio.gov/Portals/35/permits/Data_Centers/OHD000001_Draft.pdf\", \"https://mtoraboh.us/index.php/contact/government-personnel/10-howser-joe-mayor\", \"https://ryangrissinger.com/issues/data-centers\", \"https://www.clevescene.com/news/ohio-news/ohioans-are-getting-fed-up-with-data-centers-state-lawmakers-are-starting-to-notice/\"]}, \"ts\": 1784272480000}", "v67_dc_butlerprologis-project-mila-campus": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Land acquired by Prologis from the City of Trenton in October 2025 ($7.7-7.75M). Site plan approved by Trenton Planning Commission March 30, 2026. Initial grading/groundwork for an on-site electric substation reportedly began before public hearings concluded. Construction on the first of four buildings is expected to begin fall 2026, with that building operational by 2028 and full four-building buildout complete by 2029. Note: publicly available records place this project in Trenton, Ohio (Butler County industrial park), not West Chester Township — see timeline/investors notes below.\", \"powerMW\": \"250 MW (confirmed across multiple sources as a 250-megawatt hyperscale campus)\", \"sizeSqFt\": \"899,065 sq ft total across the campus: four data center buildings at 220,353 sq ft each (881,412 sq ft), plus a 16,150 sq ft utility building and a 1,503 sq ft security building, on a 141-acre site. Some press accounts round this to ~880,000-893,034 sq ft.\", \"totalInvestment\": \"Not publicly disclosed as a single total capital-investment figure. Known reference points: Prologis paid $7.7-7.75 million for the 141-acre land parcel (Oct. 2025); pre-abatement taxable building value was pegged at approximately $233 million (reduced to ~$58M building / ~$68M total with land after the 75% abatement). To qualify for Ohio's state data-center sales-tax exemption, a project must invest at least $100 million over three years and maintain $1.5M+ annual Ohio payroll — Project Mila's scale strongly implies it clears this threshold, but no confirmed application or total capex figure was found in Prologis press releases, SEC filings, or local coverage.\", \"employment\": {\"construction\": \"Not publicly disclosed (no specific construction-phase job count found in city, county, or press records)\", \"permanent\": \"Prologis/City of Trenton compensation agreement cites 120 new full-time jobs by Dec. 31, 2035; some press summaries round this to ~140 jobs.\", \"totalPayroll\": \"Approximately $9 million annually (roughly $75,000 average per job), per the Prologis/Trenton compensation agreement\"}, \"gridImpact\": {\"summary\": \"The 250 MW campus will draw power via an on-site electrical substation, but no Duke Energy Ohio-specific interconnection filing for Project Mila was found in public records.\", \"detail\": \"Site plans include a dedicated on-site substation to serve the four-building, 250 MW load. Butler County Commissioner Don Dixon publicly raised concern about grid and infrastructure impact, stating the county needs to understand 'what we're committing our residents to, and the county's infrastructure, and the county's resources as far as water and sewer availability, and who gets charged for the electric.' No Duke Energy Ohio transmission-owner interconnection queue filing, PJM facility study, or PUCO case specifically naming 'Project Mila' or the Trenton/Prologis site was located; broader Duke Energy Ohio transmission upgrade projects (e.g., Camp Washington, West End substations) were found but could not be confirmed as tied to this specific facility.\"}, \"taxImplications\": {\"summary\": \"Trenton City Council approved a 15-year, 75% property tax abatement (Community Reinvestment Area agreement) for each Project Mila building, paired with PILOT payments to local schools.\", \"detail\": \"Under the CRA agreement (approved by Trenton City Council in July 2026), Prologis receives a 15-year, 75% property tax exemption on each new building. An associated TIF/compensation agreement directs payments-in-lieu-of-taxes (PILOTs) to Edgewood City Schools and Butler Tech proportional to what they'd otherwise receive; Prologis is paying $940,200 upfront to Edgewood City Schools and $59,800 upfront to Butler Tech. During the abatement period the project is projected to generate about $1.3 million annually split between the city ($513,000) and schools ($824,000), rising to roughly $1.87 million (city) and $3 million (schools) annually once the abatement expires. Mayor Ryan Perry defended the deal, saying 'every business that we have in the city of Trenton has an abatement of some kind' and that without one 'the business won't come.' Separately, Ohio's statewide data-center sales-tax exemption (requiring $100M+ investment and $1.5M+ Ohio payroll) is available to qualifying projects like this one, though no confirmed state exemption application specific to Project Mila was found; the statewide exemption program cost Ohio about $1.6 billion in foregone revenue in 2025.\"}, \"environmentalImpact\": {\"summary\": \"The project uses a direct evaporative-free air-cooling system projected to consume about 15.8 million gallons of water annually, plus backup diesel generators and 141 acres of land disturbance under Ohio EPA stormwater permitting.\", \"detail\": \"Prologis states the campus will use direct evaporative-free air cooling, which the company describes as 25-35% more efficient than traditional closed-loop/refrigerant systems and roughly 12 times more efficient than traditional cooling towers; the system uses water only about 3% of the year and requires no chemical additives, with total projected water use up to 15.8 million gallons annually. Trenton's water department confirmed system capacity for the project and said Prologis will pay to use it; wastewater discharges to Butler County for processing, and no private wells are reported affected. Backup diesel generators are described by Prologis as running only during testing or emergencies, while cooling systems, HVAC stacks, and substation transformers operate continuously. No project-specific Ohio EPA air-permit filing for the diesel generators was located in public records (a separate, unrelated Lima, Ohio data center's generator air permit was found in search results but does not apply to this project). The 141-acre site triggers Ohio EPA's general NPDES construction stormwater permit (OHC000006 series) given the land disturbance, though a project-specific permit record could not be independently retrieved.\"}, \"waterLoop\": {\"answer\": \"Partial\", \"detail\": \"Project Mila does not use a traditional recirculating closed-loop chilled-water or cooling-tower system. Prologis describes it as 'direct evaporative-free air cooling' — effectively dry/air-based cooling for roughly 97% of the year, switching to evaporative (water-using) cooling only during the hottest ~3% of the year, with no chemical additives required. This is a lower-water-use design than conventional open-loop evaporative cooling towers, but it is not a fully sealed closed-loop system either, since it does periodically consume make-up water (up to ~15.8 million gallons/year). Source: Data Center Dynamics coverage of Prologis's stated cooling design; corroborated by Butler County/Trenton project summaries.\"}, \"timeline\": \"IMPORTANT NOTE: The facility described (Prologis 'Project Mila,' 250 MW hyperscale campus, Butler County, Ohio) is consistently documented in public records (Trenton city government, Butler County press, Data Center Dynamics, WVXU/NPR, Cincinnati-market outlets) as located in the City of Trenton's industrial park, Butler County, OH — NOT in West Chester Township. In fact, one source (thebcfa.org regional coverage) notes West Chester Township currently prohibits data centers outright, while Trenton (an incorporated city, not a township) approved this project. This report treats 'Project Mila' as the same 250 MW/141-acre facility referenced in the research brief, located in Trenton, Butler County.\\n\\nKey milestones found:\\n- Oct. 2025: Prologis purchases 141 acres near Kennel/Woodsdale roads in Trenton's industrial park from the City of Trenton for ~$7.7-7.75 million.\\n- Early 2026: Site grading/groundwork for an electric substation reportedly begins ahead of formal public hearings, drawing resident criticism.\\n- March 25, 2026: WVXU/NPR-affiliate coverage previews Trenton Planning Commission vote amid resident pushback.\\n- March 30, 2026: Trenton Planning Commission approves the site plan in a roughly 10-minute meeting; no public hearing was legally required because the land was already zoned industrial.\\n- May 2026: A Saint Clair Township trustee reports surprise at Trenton's proposed ~600-acre annexation in Saint Clair/Madison townships, tied to broader data-center growth concerns.\\n- June 17, 2026: Butler County Commissioners unanimously approve a six-month county-wide data center moratorium (covering townships under county zoning; does not retroactively affect the already-approved Trenton/Mila project, which sits in city, not township, jurisdiction).\\n- July 9, 2026: Trenton City Council approves a 15-year, 75% property tax abatement (CRA agreement) and related PILOT/compensation agreement with Prologis.\\n- Fall 2026 (planned): Construction begins on the first of four buildings.\\n- 2028 (planned): First building operational/launch.\\n- 2029 (planned): Full four-building, 899,065 sq ft campus buildout complete.\", \"investors\": \"Prologis, Inc. (NYSE: PLD), the San Francisco-based industrial/logistics REIT, is the sole disclosed developer and owner of Project Mila. The land seller was the City of Trenton, Ohio (municipal industrial park parcel). No joint-venture partner, co-investor, or end-use tenant/hyperscaler customer has been publicly named in city records, county filings, or trade press as of the available reporting — Prologis is developing this as a speculative/build-to-suit hyperscale campus without a disclosed anchor tenant.\", \"politicalContext\": \"Mayor Ryan Perry [R] (City of Trenton) publicly defended the tax abatement deal, stating 'every business that we have in the city of Trenton has an abatement of some kind' and that without an abatement 'the business won't come.' (Perry has also run as a Republican candidate for Ohio House District 40.)\\n\\nButler County Commission President T.C. Rogers [R] expressed skepticism about the developer's transparency, saying: 'What I found is in these discussions with the developers, the developers didn't or weren't able to answer some of the questions which were pertinent. It's almost like, \\\"Sign here and we'll work it out.\\\"'\\n\\nButler County Commissioner Don Dixon [R] raised infrastructure and cost-allocation concerns: 'We have to understand what we're committing our residents to, and the county's infrastructure, and the county's resources as far as water and sewer availability, and who gets charged for the electric, etc., etc., etc.' Dixon and Rogers, both Republicans, voted with the full Butler County Commission to approve a six-month county-wide data center moratorium on June 17, 2026 (this moratorium applies to townships under county zoning authority, not the already-approved Trenton/Mila site).\\n\\nResident Barry Blankenship (not a public official) criticized the process, saying city leaders 'are not listening to residents' and that 'the way they're doing it makes it feel like they're trying to shove it down our throat.'\\n\\nAt the state level (general Ohio data-center policy context, not statements specific to Project Mila): Rep. Tom Young [R] (Washington Twp.) voiced support for HB 646, a bill creating a bipartisan legislative study commission on data centers ('This is about getting in front of this issue'). Rep. Adam Holmes [R] (Nashport) and Sen. Brian Chavez [R] (Marietta) were named co-chairs of that study committee, with Holmes stating its mission is to ensure 'Ohio citizens have accurate, relevant and usable information concerning the economic, environmental, and security impacts of Ohio data center development.' No Ohio state legislator was found making a statement specifically naming Project Mila or the Trenton site.\\n\\nNo Democratic or independent officials were found making public statements specifically about this project in the available search results — Butler County's elected commission and Trenton's mayor are Republican, consistent with Butler County's overall partisan lean.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/prologis-details-plans-for-data-center-campus-outside-cincinnati-ohio/\", \"https://stopohiodatacenters.org/butler-county\", \"https://www.thebcfa.org/ignitebutler/spotlight/news-archive/p/item/67936/developer-reveals-site-plan-begins-work-on-hyperscale-data-center-in-butler-county\", \"https://www.thebcfa.org/ignitebutler/featured-news-articles/p/item/65187/prologis-buys-141-acres-for-greater-cincinnati-data-center\", \"https://www.wvxu.org/local-news/2026-03-30/trenton-planning-commission-approves-site-plan-data-center\", \"https://www.wvxu.org/local-news/2026-03-25/data-center-trenton-plans-pushback\", \"https://www.wvxu.org/environment/2026-07-09/trenton-approves-15-year-tax-abatement-for-data-center\", \"https://www.wvxu.org/environment/2026-06-17/butler-county-approves-data-center-moratorium\", \"https://www.journal-news.com/local/what-to-know-about-trenton-s-proposed-data-center-tax-incentives/article_7b381512-adde-58f8-b35b-b43ca25051ef.html\", \"https://www.journal-news.com/local/why-butler-county-leaders-cannot-block-data-centers/article_7dd81db4-fb8c-4e07-8cd5-e75c06caf7e4.html\", \"https://hoodline.com/2026/03/trenton-neighbors-fume-as-mega-data-center-starts-digging/\", \"https://constructionreviewonline.com/project-mila-data-center-in-ohio-inches-closer-to-construction-as-trenton-commission-approves-plans/\", \"https://local12.com/news/local/proposed-data-center-development-moves-closer-reality-butler-county-trenton-tax-taxes-taxpayers-abatement-prologis-tech-technology-community-reinvestment-area-cra-residents-construction-building-city-council-mayor-cincinnati\", \"https://local12.com/news/local/data-center-zoning-approval-draws-backlash-in-butler-county-administrator-offers-answers-trenton-prologis-power-water-usage-artificial-intelligence-ai-cincinnati-local-12-wkrc\", \"https://www.wcpo.com/news/local-news/butler-county/trenton/trenton-planning-commission-approves-data-center-site-plan-in-10-minute-meeting\", \"https://www.wcpo.com/news/local-news/butler-county/trenton/prologis-reveals-tentative-plans-for-major-trenton-data-center-project\", \"https://www.daytondailynews.com/local/data-center-site-plan-approved-at-trenton-planning-commission/article_6151307e-3718-51fa-addb-c77a23e23087.html\", \"https://www.govtech.com/artificial-intelligence/ohio-communities-grapple-with-data-center-approval-decisions\", \"https://trentonoh.gov/DocumentCenter/View/2403/Prologis-and-Staff-Public-Forum-Agenda-?bidId=\", \"https://ballotpedia.org/Donald_Dixon_(Butler_County_Commission,_Ohio,_candidate_2024)\", \"https://www.trentonoh.gov/251/Ryan-Perry\", \"https://ohiocapitaljournal.com/2026/05/18/ohio-lawmakers-are-creating-bipartisan-data-center-committee-that-will-start-meeting-this-month/\"]}, \"ts\": 1784272480000}", "v67_dc_butlerlogistix-hamilton-dc": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"No confirmed groundbreaking has occurred as of this research (mid-2026). Groundbreaking was originally targeted for January 2026 with construction beginning in late spring 2026 (14-16 month build, targeting a 2027 operational date), but in January 2026 the developer asked the City of Hamilton to pause the second of two power-feasibility studies while it 'considers next steps.' As of the most recent reporting found, the project timeline is on hold and no new start date has been publicly announced.\", \"powerMW\": \"240 MW requested by the developer for the full hyperscale build-out (per city officials). Note: the project's scope escalated over time from an initial ~15 MW / 100,000s-sq-ft phase (2024) to a 100 MW / $100M phase, to the current 200+ MW / up to 240 MW / $1B+ hyperscale ambition. A city-commissioned feasibility study (reported January 2026) concluded it would take ~30 months to deliver only 45 MW to the site — far short of the 240 MW requested.\", \"sizeSqFt\": \"310,640 sq ft (two-story building; some sources round to ~320,000 sq ft), plus a 95,000 sq ft customer substation, on a ~15-acre portion of a 29.2-acre city-owned site at 1380 University Boulevard, University Commerce Park, Hamilton, Fairfield Township, Butler County, OH. (Earlier 2024 filings described the first approved phase as 155,000 sq ft per floor.)\", \"totalInvestment\": \"$1 billion+ (current stated ambition, per Logistix officials/city officials, e.g. Data Center Dynamics and Journal-News reporting). The figure escalated over the project's life: initially estimated at $15 million (2024 planning approval), revised to ~$75 million, then to $100 million (for the 100MW phase per Logistix's own website), and finally to 'potential $1 billion-plus' as the power request grew toward 240 MW.\", \"employment\": {\"construction\": \"Not publicly disclosed as a specific headcount. Construction duration is cited at 14-16 months; no public figure for peak/total construction workforce was found.\", \"permanent\": \"Approximately 50 to 100 permanent jobs (city manager Craig Bucheit cited 'up to 100 new full-time jobs'; other reporting says 50-100), with a projected salary range of $75,000-$90,000.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"The project would draw on Hamilton's municipally owned electric utility system, but a city-commissioned study found the grid could deliver only about 45 MW within 30 months versus the up to 240 MW Logistix has requested.\", \"detail\": \"Hamilton, unusually for Ohio, owns and operates its own municipal electric utility, which city officials noted has spare capacity/incentive to sell power dating back to the loss of load from area paper-mill closures. The site sits close to an existing substation, but Logistix's plans include developing at least one additional substation (a 95,000 sq ft customer substation was part of the approved site plan). Edwin Porter, Hamilton's executive director of infrastructure, said a first feasibility study's preliminary conclusion was that it would take roughly 30 months to deliver 45 MW to the site — a fraction of the up to 240 MW being requested, which would be roughly equivalent to the electricity use of about 24,000 households (one estimate) or, per a community advocacy estimate for the full hyperscale buildout, comparable to 350,000-400,000 electric vehicles or 12,600+ Ohio homes. Because of this gap, the developer asked the city to pause a second, more detailed power-delivery study in January 2026. No specific Duke Energy Ohio or AES Ohio interconnection/PJM filings tied directly to this project were found in public search results; the load would run through Hamilton's own municipal system rather than directly through Duke or AES Ohio distribution territory.\"}, \"taxImplications\": {\"summary\": \"The project would qualify for Ohio's statewide data center sales-tax exemption on equipment and construction materials, and the city sold Logistix its ~15-acre site for a nominal $65,000 as a development incentive, but no specific local PILOT, CRA abatement percentage, or school-district payment agreement has been publicly disclosed.\", \"detail\": \"Ohio Revised Code 122.175 provides a sales-and-use tax exemption for qualifying data center equipment purchases and construction materials; this exemption is under statewide political scrutiny (state officials say Ohio forgoes roughly $1.5-1.6 billion/year in sales tax revenue from data centers statewide), but no project-specific tax credit or exemption certificate for the Hamilton facility was found in public records searched. Locally, the City of Hamilton — which owned the land — sold approximately 15 acres to Logistix for $65,000, well below typical market value, functioning as a de facto development incentive; the city has said the project itself would be 'fully funded by the developer, and not by Hamilton residents.' No specific Community Reinvestment Area (CRA) abatement agreement, PILOT (payment in lieu of taxes) arrangement, or Hamilton City Schools payment agreement dollar figures were found publicly disclosed for this project as of this research.\"}, \"environmentalImpact\": {\"summary\": \"The site is partly wooded and located in a floodplain, raising stormwater and habitat concerns, while community groups have separately raised concerns about water consumption, noise, and light pollution from the facility.\", \"detail\": \"City engineering officials have said the project's stormwater management plan is believed sufficient to address floodplain issues on the site, which the city noted retains 'a fair amount of trees and other vegetation.' A community group calling itself the Coalition Against Data Centers in South Ohio (reported at 600+ members) and a separate statement from Cincinnati Socialists ('Profit over People and Planet') have raised concerns about water use (citing precedent from a Georgia data center that reportedly reduced residential water pressure), noise, light pollution, and rising regional electricity costs tied to data center buildout. No project-specific Ohio EPA air permit (e.g., for backup diesel generators) or NPDES wastewater/stormwater permit filing for this facility was found in public search results; Ohio EPA has separately been developing a draft statewide general NPDES permit framework for data center wastewater/stormwater discharges (public comment period late 2025/2026), which would apply broadly rather than being specific to this project.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No official confirmation of closed-loop versus open/evaporative cooling design was found for this specific facility. Community opposition (Coalition Against Data Centers in South Ohio, Cincinnati Socialists) has specifically cited water-use and water-pressure concerns — drawing a comparison to a Georgia data center that reportedly affected residential water pressure — suggesting residents are concerned the facility may use water-intensive evaporative cooling, but Logistix has not published technical cooling specifications, and no source confirmed a closed-loop system commitment.\"}, \"timeline\": \"2024: Hamilton City Planning Commission recommends approval of an initial Logistix project (then ~$15M, later revised to ~$75M); city agrees to sell ~15 acres of a 29.2-acre city-owned parcel at 1380 University Boulevard (University Commerce Park) to Logistix for $65,000; two-story, 155,000-sq-ft-per-floor (310,640 sq ft total) data center design approved with a 95,000 sq ft customer substation.\\n2024-2025: Development agreement executed between City of Hamilton and Logistix Property Group; project ambition grows substantially — company website cites a $100 million/100 MW 'Hamilton Innovation Center,' while founder Doug Swain begins publicly targeting a 200+ MW, ultimately up to 240 MW, hyperscale build described as a 'potential $1 billion-plus' project.\\nOctober 2025: Standing-room-only Hamilton City Council meeting; 40-50+ residents voice concerns over noise, light pollution, water use, and lack of transparency; Mayor Pat Moeller confirms no vote was scheduled that night.\\nDecember 2025: WVXU and other outlets report organized community opposition (Coalition Against Data Centers in South Ohio, 600+ members); city has two feasibility/power studies underway.\\nJanuary 2026: First feasibility study concludes it would take ~30 months to deliver only 45 MW to the site (versus the up to 240 MW requested); Logistix asks the city to pause the second study while it evaluates next steps; the previously anticipated January 2026 groundbreaking does not occur.\\nJune 17, 2026: Butler County Commissioners unanimously approve a six-month (some reports say up to one-year) moratorium on new data center development in the county-zoned townships (Hanover, Lemon, Madison, Milford, Oxford, Ross) — this does not directly govern the City of Hamilton, which controls its own zoning, but signals the regional political climate.\\nAs of mid-2026 (most recent reporting found): Project remains on hold pending resolution of power-delivery questions; Logistix has not publicly withdrawn but has not announced a revised construction timeline.\", \"investors\": \"The developer behind the 'Logistix' name is Logistix Property Group, a Cincinnati-based land development company founded and led by Douglas ('Doug') Swain, who serves as founder and President. Swain's LinkedIn/NAIOP bio describes over 30 years of experience including senior leadership roles at an institutional investment company, a publicly traded REIT, privately owned real estate firms, and one of the world's largest logistics companies, before founding Logistix, which specializes in identifying and developing sites (primarily for data centers) leveraging his development experience and industry relationships. The landowner and selling party is the City of Hamilton itself, a municipal government, which sold roughly 15 acres of a 29.2-acre city-owned parcel to Logistix for $65,000. No hyperscale end-user/tenant (e.g., a specific cloud or AI company) has been publicly named for the facility — consistent with the 'Undisclosed' company listing for the operating entity — and no additional equity investors, lenders, or financial backers behind Logistix's Hamilton project were identified in public reporting reviewed.\", \"politicalContext\": \"Hamilton Mayor Pat Moeller — the mayoralty is a nonpartisan municipal office, and this research could not conclusively confirm a current party affiliation via search before the session's search budget was exhausted; Moeller stated at the October 2025 council meeting that no vote on the project was scheduled that night, pushing back on what one council member called social-media misinformation. City Manager Craig Bucheit (an appointed, non-elected official) expressed interest in the project's economic potential, citing up to 100 new full-time jobs. Edwin Porter, Hamilton's executive director of infrastructure (appointed staff), authored/delivered the finding that only 45 MW could be delivered within 30 months. Butler County Commission President T.C. Rogers [R] publicly criticized data center developers' inability to answer key project questions ('It's almost like, Sign here and we'll work it out') and voted with fellow commissioners (unanimous vote) to approve a six-month countywide data-center development moratorium in June 2026 covering county-zoned townships — a vote reflecting the broader regional political backlash to projects like Logistix's, though it does not directly bind the City of Hamilton's own zoning authority. At the state level, statewide (not Hamilton-specific) legislative pushback on Ohio's data-center sales-tax exemption has come from Sen. Kent Smith [D, Euclid], who called the exemption 'the worst tax break in Ohio history,' Sen. Louis 'Bill' Blessing III [R, representing the Hamilton County/Cincinnati-area 8th Senate District], who has co-sponsored efforts to scrap the exemption for new projects, and Rep. David Thomas [R, Ashtabula County], who called for fully removing the exemption from Ohio law. These state-level statements concern Ohio's data center tax policy broadly and were not found to reference the Hamilton/Logistix project by name specifically. No on-record statements from individual Hamilton City Council members (by name) or from the other two Butler County commissioners regarding this specific project were located before the search budget was reached.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/logistix-gets-planning-commission-approval-for-data-center-project-outside-cincinnati-ohio/\", \"https://www.thebcfa.org/ignitebutler/featured-news-articles/p/item/64490/1b-hyperscale-data-center-could-break-ground-in-city-of-hamilton-in-2026\", \"https://www.wvxu.org/environment/2025-12-03/developers-data-center-butler-county\", \"https://baxtel.com/data-center/logistix-hamilton-oh\", \"https://www.journal-news.com/community/butler-county/what-is-a-data-center-hamilton-trenton-likely-to-get-large-facilities-for-vast-computing-networks/CRHD5DCKGNEAVGMA2TKUD7RE3Q/\", \"https://www.journal-news.com/news/data-center-project-part-of-the-growth-happening-in-hamilton/YBCOX7A33BGJZHUMP6EXWB5NTM/\", \"https://www.wvxu.org/environment/2026-01-15/hamilton-data-center-paused-study\", \"https://www.wyso.org/2026-01-15/hamilton-data-center-paused-study\", \"https://www.journal-news.com/news/data-center-developer-requests-hamilton-pause-plausibility-studies/QED7B6MJYBGMPAFRO7WHDBSBAA/\", \"https://www.journal-news.com/news/proposed-data-center-could-be-one-of-ohios-biggest-power-guzzlers/PIHRA4ZAGJC75OTEGK5EPR3VIY/\", \"https://www.govtech.com/artificial-intelligence/ohio-communities-grapple-with-data-center-approval-decisions\", \"https://local12.com/news/local/plans-1-billion-cincinnati-hamilton-ohio-data-center-advance-despite-environmental-energy-concerns-bills-usage-cost-customers-residents-logistix-property-group-consumption-natural-gas-hydroelectric-solar-wind-generators-technology-hub-tech-computers\", \"https://local12.com/news/local/one-billion-dollar-dollars-data-center-proposed-cincinnati-hamilton-2026-hyperscale-logistix-could-create-jobs-employment-hiring\", \"https://www.journal-news.com/news/residents-say-no-on-1b-data-center-project-wants-hamilton-to-do-the-same/L3YUSLLR2VHMDFXVBXKPBTOHCA/\", \"https://www.wcpo.com/hamilton-ohio-data-center-city-council-meeting-october\", \"https://www.journal-news.com/news/hamilton-oks-plan-for-data-center-project-in-riverside-neighborhood/BFSJT4SRYFC5XGE7DKESMRI72U/\", \"https://finance.yahoo.com/news/hamilton-oks-plan-data-center-150100825.html\", \"https://www.construction.com/projects/dr-202400261483-hamilton-innovation-center-logistix-data-center-substation\", \"https://logistixpg.com/logistix_projects/hamilton-innovation-center/\", \"https://www.linkedin.com/in/douglasjswain/\", \"https://www.naiop.org/about-us/bio-detail-page/?bio=86df5730-ea95-4ccc-a945-b18bc37ad910\", \"https://www.journal-news.com/local/why-butler-county-leaders-cannot-block-data-centers/article_7dd81db4-fb8c-4e07-8cd5-e75c06caf7e4.html\", \"https://www.wvxu.org/environment/2026-06-17/butler-county-approves-data-center-moratorium\", \"https://www.journal-news.com/news/this-area-is-water-rich-but-poor-in-power-a-study-highlights-southwest-ohio-data/article_dce72e79-9d73-5a8f-bbb0-f4a7bbb5b324.html\", \"https://www.cincysocialists.net/statements/profit-over-people-and-planet\", \"https://www.tcrogers.org/about\", \"https://ballotpedia.org/T.C._Rogers_(Butler_County_Commission,_Ohio,_candidate_2024)\", \"https://www.news5cleveland.com/news/local-news/oh-cuyahoga/calls-for-change-as-ohio-sales-tax-break-for-data-centers-approaches-1-6-billion-a-year\", \"https://codes.ohio.gov/ohio-revised-code/section-122.175\", \"https://ohiosenate.gov/members/louis-w-blessing-iii/news\"]}, \"ts\": 1784272480000}", "v67_dc_butlercbts-hamilton": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Not publicly disclosed\", \"powerMW\": \"1 MW (confirmed consistent with tracker figure; no additional capacity detail publicly disclosed)\", \"sizeSqFt\": \"Not publicly disclosed\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No facility-specific grid impact data disclosed\", \"detail\": \"No utility, load, or transmission information specific to the CBTS Hamilton colocation site was found. Regional context: Butler County and the broader Cincinnati-Dayton corridor have limited available grid capacity (roughly 65 MW available regionally, versus ~1.9 GW in the Columbus area), a constraint cited in coverage of a separate, much larger proposed Hamilton data center (Logistix Property Group, ~$1B, targeting up to 240 MW). That constraint discussion applies to the new proposal, not confirmed as applicable to the existing 1 MW CBTS facility.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No county auditor abatement/exemption record, Community Reinvestment Area (CRA) agreement, enterprise zone designation, or state sales-tax exemption filing specific to the CBTS Hamilton facility (123 Pine St) was found in available public records or news coverage. Ohio's data center sales-tax exemption program generally requires a minimum $100M investment and 40+ jobs, thresholds this 1 MW facility does not appear to meet, making a state-level abatement unlikely, though this could not be confirmed either way.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No environmental permit filings, land-use case documentation, or impact assessments specific to this facility were located.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No facility-specific cooling system information was found. A separate CBTS facility in Lebanon, Ohio (not this site) is documented as using a chilled-water system with air-cooled units, but this cannot be assumed to apply to the Hamilton location.\"}, \"timeline\": \"Limited public timeline exists for this specific facility. CBTS (originally Cincinnati Bell Technology Solutions) has operated a network of Midwest data centers for many years; the Hamilton facility is one of roughly ten-to-eleven CBTS sites and one of about six in the greater Cincinnati/Butler County area. Ownership changed hands corporately (not specific to this site): 2021 - Cincinnati Bell/altafiber taken private by Macquarie Asset Management; February 2024 - TowerBrook Capital Partners agreed to acquire CBTS (and OnX) from altafiber for $670 million, with the deal completing later in 2024. No opening, expansion, or closure date specific to the Hamilton facility itself was found.\", \"investors\": \"CBTS LLC is the operator. Corporate ownership: CBTS was a subsidiary of Cincinnati Bell/altafiber; altafiber was taken private in 2021 by funds managed by Macquarie Asset Management; in 2024 TowerBrook Capital Partners acquired CBTS (and sister company OnX) from altafiber for approximately $670 million. No project-specific investor or financing information for the Hamilton facility itself was found.\", \"politicalContext\": \"No facility-specific political statements or records from named officials about the CBTS Hamilton colocation facility (123 Pine St) were found. Note: Hamilton, Ohio officials and Butler County residents have been quoted extensively regarding a separate, much larger proposed data center in Hamilton (Logistix Property Group, ~$1B hyperscale project, targeting 2026-2027 construction), including public concerns about power availability and grid costs — but those statements concern that distinct proposed project, not the existing small CBTS colocation facility, and were excluded here to avoid misattribution.\", \"sources\": [\"https://www.datacenters.com/cbts-llc-hamilton\", \"https://www.datacentermap.com/usa/ohio/cincinnati/cbts-hamilton-data-center/\", \"https://www.datacentermap.com/usa/ohio/cincinnati/cbts-hamilton-data-center/ecosystem/\", \"https://www.topdatacenters.com/cbts-hamilton-data-center_3035/\", \"https://www.datacenters.com/providers/cbts-llc/data-center-locations\", \"https://www.datacenters.com/providers/cbts-llc\", \"https://www.cbts.com/locations\", \"https://www.datacenterdynamics.com/en/news/cbts-opens-sixth-data-center-in-cincinnati-area/\", \"https://cloudandcolocation.com/datacenters/cincinnati-bell-tech-solutions-cbts-lebanon-data-center/\", \"https://www.channele2e.com/news/towerbrook-capital-acquires-it-solutions-provider-cbts-from-altafiber\", \"https://www.cbts.com/news-article/cbts-announces-completion-of-acquisition-by-towerbrook-capital-partners-and-appointment-of-new-board-of-directors/\", \"https://www.businesswire.com/news/home/20240206363410/en/TowerBrook-Capital-Partners-to-acquire-IT-Services-Provider-CBTS-from-altafiber\", \"https://www.sec.gov/Archives/edgar/data/716133/000095017024035762/ck0000716133-20231231.htm\", \"https://www.thebcfa.org/ignitebutler/featured-news-articles/p/item/64490/1b-hyperscale-data-center-could-break-ground-in-city-of-hamilton-in-2026\", \"https://www.journal-news.com/community/butler-county/construction-on-hamilton-data-center-could-get-started-next-year/4GTLOP3BG5CWVP3YE3LMZ62VLA/\", \"https://www.wvxu.org/environment/2025-12-03/developers-data-center-butler-county\", \"https://auditor.bcohio.gov/real_estate/taxes/abatements___exemptions/index.php\", \"https://propertysearch.bcohio.gov/search/commonsearch.aspx?mode=address\"]}, \"ts\": 1784434061000}", "v67_dc_butlercyrusone-cin4": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Reported to have been operating from 103 Knightsbridge Drive, Hamilton, OH since approximately 2005, predating the CyrusOne brand (the site was part of the original Cyrus Networks/Cincinnati Bell data center portfolio; Cincinnati Bell acquired CyrusOne in June 2010 and spun it off via IPO on NASDAQ in January 2013). No single authoritative source gives an exact commissioning date for this specific building; the '2005' figure comes from a December 2025 WVXU (NPR Cincinnati) report on Butler County data centers.\", \"powerMW\": \"4.8 MW total available power reported by multiple colocation marketplaces (datacenters.com, datacentermap.com, Inflect, UPSTACK); tracker f
