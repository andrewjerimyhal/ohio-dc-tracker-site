om and AEDG as 'high-paying' data center operations positions.\", \"totalPayroll\": \"Not publicly disclosed.\"}, \"gridImpact\": {\"summary\": \"Google is coordinating directly with AEP Ohio on power delivery, with $50 million of the project budget directed to local infrastructure while AEP's newly PUCO-approved large-load tariff structure requires big data-center customers to cover the cost of new transmission/distribution infrastructure needed to serve them.\", \"detail\": \"AEDG and DCD reporting state Google 'is working closely with AEP Ohio to meet power demands while ensuring infrastructure costs are managed responsibly,' and that the campus is designed to be water-cooled (cited as ~10% more energy-efficient than air-cooled designs, reducing grid strain). Separately, statewide context: AEP Ohio's PUCO-approved tariff (effective 2024-2025) requires data center loads above 25 MW to commit to paying for new transmission needed to serve them -- consistent with the case file's 'AEP full-cost coverage' note -- amid utility disclosures of up to 30 GW in cumulative new-load interconnection requests across Ohio. No Allen-County-specific AEP transmission/substation filing (e.g., a named 765kV line or new substation for this site) was found in the sources reviewed; the $50M local infrastructure figure in press coverage refers primarily to roads/roundabouts, not electrical transmission buildout.\"}, \"taxImplications\": {\"summary\": \"Google secured a 15-year local tax abatement, offset by a negotiated $250,000-per-year direct payment to Elida Local Schools, plus at least one other county-level tax incentive.\", \"detail\": \"Multiple sources (LimaOhio.com, hometownstations.com, AEDG, rgp.org) confirm Google agreed to a 15-year tax abatement in exchange for $250,000 in annual funding to Elida Local Schools; Elida Superintendent Joel Mengerink (an appointed administrator, not an elected school-board member) publicly welcomed the arrangement, saying the district is 'excited about the economic growth and opportunities the data center project will present for the district and our students and staff.' Signal Ohio's reporting references the deal as including 'two major tax breaks' without fully itemizing both (one appears to be the 15-year abatement referenced above; the second was not clearly specified in the sources reviewed). Negotiations were conducted under a non-disclosure agreement with Allen County commissioners while the project was known only as 'Project BOSC,' which has since become a point of public controversy (see politicalContext).\"}, \"environmentalImpact\": {\"summary\": \"Ohio EPA has drafted (but as of mid-July 2026 not finalized) an air permit for 115 diesel-fired backup generators plus 4 emergency fire-pump generators, 36 cooling towers, and 113 fuel storage tanks; a 5-million-gallon-per-day water ordinance was secured in September 2025.\", \"detail\": \"LimaOhio.com and Signal Ohio reporting describe the Ohio EPA's draft permit covering 115 diesel-fired emergency generators sited between North Cole Street and West Bluelick Road, alongside 4 additional emergency fire-pump generators, 36 cooling towers, and 113 fuel storage tanks. A Google spokesperson stated the generators would be used only 'in rare cases of an emergency or during periodic testing,' and Ohio EPA modeling reportedly shows facility emissions 'will not exceed any National Ambient Air Quality Standard.' Final permit issuance was still pending as of the most recent (July 14, 2026) coverage. Separately, a 5-million-gallons-per-day water-service ordinance for the site was secured from local water authorities in September 2025, and an engineering analysis reportedly used 'range estimates' to argue the facility could help address Ottawa River water-quality issues under extreme drought conditions. A resident (Charlene McCoy) has also raised complaints about fugitive dust from 'Envirolime' soil stabilizer used during early site work, alleging health effects and inadequate dust suppression. This project's water discharge would also fall under Ohio EPA's broader, separately controversial draft general NPDES permit for data centers (docket OHD000001), which environmental groups (including the Ohio Environmental Council) have criticized for allowing reduced site-specific review of industrial wastewater discharges to state waters.\"}, \"waterLoop\": {\"answer\": \"Partial\", \"detail\": \"Available evidence points to a hybrid/evaporative cooling design rather than a fully closed-loop, water-free system. AEDG/DCD materials describe the campus as 'water-cooled,' the Ohio EPA draft permit specifies 36 cooling towers (typically evaporative, consuming makeup water), the project secured a 5-million-gallon-per-day water ordinance, and the facility's wastewater would fall under Ohio's data-center NPDES discharge permit framework -- all of which indicate meaningful water withdrawal/discharge rather than a zero-water closed loop. This differs from Google's publicly announced water-free/closed-loop design for its Texas data center. Google's corporate-wide statements describe closed-loop systems as using 'very little water because it's continuously recirculated' and a company-wide 'water positive' goal (64% of freshwater consumption replenished in 2024), but no source reviewed explicitly confirms the Lima-area (Project BOSC) facility itself uses a fully closed-loop, non-discharging design. Given the cooling-tower and water-ordinance evidence, closed-loop status here is best characterized as unconfirmed/partial rather than a clear 'Yes.'\"}, \"timeline\": \"2022: Bistrozzi LLC, later revealed as a Google front entity, incorporated in Delaware.\\n2025 (through the year): Bistrozzi begins acquiring hundreds of acres of former farmland in American Township (later reported at up to 373 acres spanning American and Sugar Creek townships); Allen County commissioners negotiate tax abatements and sign a non-disclosure agreement while the project is known publicly only as 'Project BOSC.'\\nSeptember 2025: A 5-million-gallon-per-day water-service ordinance is secured for the site.\\nMarch 16, 2026: Google is publicly confirmed as the company behind Project BOSC (LimaOhio.com, DCD, hometownstations.com, WTOL all report the $500M investment).\\nApril 6, 2026: Google formally 'introduces itself' to the Allen County community (per LimaOhio.com).\\nMay 18 - June 10, 2026: Ohio legislature moves on statewide data-center oversight legislation (bipartisan study committee announced May 18; substitute HB 646 introduced/advanced in June) partly in response to controversies like this project.\\nJune 1, 2026: A resident (a cloud platform engineer) testifies before an Ohio legislative select committee about transparency concerns tied to the project's NDA-shielded negotiation.\\nJuly 14, 2026 (most recent coverage found): LimaOhio.com reports ongoing resident complaints, public-records access disputes, and unresolved Ohio EPA air-permit status.\\n2026-2030 (or 2028 per one source): Construction is expected to begin in 2026 following final permit approvals, with completion variously reported as 2028 or 2030 depending on the outlet -- this discrepancy is unresolved in current public reporting.\", \"investors\": \"Google (Alphabet Inc.) is the sole disclosed developer/investor, having used a shell entity, Bistrozzi LLC (incorporated in Delaware in 2022), to quietly assemble the ~200-373 acre former-farmland site in American Township before publicly confirming its identity in March 2026. The Allen Economic Development Group (AEDG), a local nonprofit economic-development organization led by President Cynthia Leis, brokered and publicly announced the deal ('We're officially welcoming a global tech leader into the heart of the Allen County community'). No joint-venture partner, co-investor, or third-party developer was identified in any source reviewed; individual prior landowners of the assembled farmland parcels were not named in press coverage.\", \"politicalContext\": \"Allen County Commissioners Cory Noonan, Beth Seibert, and Brian Winegardner (current 2026 board) approved the incentive package and NDA with Google/Bistrozzi; their individual party registrations were not confirmed via voter/election records in this research, though they have appeared at Allen County Republican Party events, consistent with the county's strongly Republican local political environment -- this should be treated as circumstantial, not confirmed, party affiliation. Elida Local Schools Superintendent Joel Mengerink (an appointed administrator, not an elected school-board member) publicly welcomed the $250,000/year partnership; no formal recorded school-board vote or individual board-member statements were found. Ohio House Speaker Matt Huffman [R] (longtime Lima-area legislator and former Lima city councilman) has taken a skeptical public stance on data-center deals statehouse-wide -- particularly criticizing multi-decade tax-abatement contracts -- but has reportedly avoided directly weighing in on the Allen County/Google project specifically. State Representatives Gary Click [R, Vickery] and Kellie Deeter [R, Norwalk] sponsored Ohio House Bill 646 (establishing a Data Center Study Commission and broader data-center regulatory provisions, including a proposed 50% cap on local property-tax abatements for data centers and a provision that NDAs cannot override public-records law); the bill passed the Ohio House unanimously and moved to the Senate. Local resident Charlene McCoy testified to a state legislative select committee on June 1, 2026, raising transparency concerns about the NDA-shielded negotiation process and a redacted Ohio EPA air permit. Note: search results also surfaced a similarly named controversy involving a 'Commissioner Ron Turpin' and a zoning board denying 'Google's construction offices,' but on verification this refers to Allen County, INDIANA (Fort Wayne) -- an unrelated jurisdiction -- and has been excluded from this report to avoid conflating the two same-named counties. Specific American Township Trustees' names and any individual statements/votes by them were not surfaced in available search results.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/google-confirmed-as-company-behind-500m-data-center-in-lima-ohio/\", \"https://www.limaohio.com/top-stories/2026/03/16/google-officially-behind-data-center-project/\", \"https://www.limaohio.com/top-stories/2026/04/06/google-introduces-itself-to-allen-county/\", \"https://www.limaohio.com/top-stories/2026/07/14/residents-question-transparency-with-allen-county-data-center/\", \"https://www.hometownstations.com/news/allen_county/google-revealed-as-company-behind-500-million-data-center-project-in-lima-area/article_7fa7f0c1-88c1-4d79-86ca-630d942787e6.html\", \"https://www.hometownstations.com/news/allen_county/google-details-500m-lima-data-center-promises-jobs-and-community-investment/article_df9d22e7-5fad-489f-9353-030149054d90.html\", \"https://www.aedg.org/blog/google-to-build-data-center-in-lima-ohio-with-500-million-capital-investment/\", \"https://www.aedg.org/data-center-updates/google-to-build-data-center-in-lima-ohio-with-500-million-capital-investment/\", \"https://www.aedg.org/data-center-updates/google-data-center-website-now-live-for-allen-county-community/\", \"https://signalohio.org/google-data-center-near-lima-ohio-neighbors-are-furious/\", \"https://www.wtol.com/article/news/local/google-to-build-500-million-data-center-in-lima/512-dfdd12b8-8dba-46c5-a3e2-e8568eb9006e\", \"https://www.allencountydatacenter.com/\", \"https://dam.assets.ohio.gov/image/upload/epa.ohio.gov/Portals/35/permits/Data_Centers/OHD000001_Draft.fs.pdf\", \"https://ohiocapitaljournal.com/2026/06/10/ohio-lawmakers-introduce-sweeping-new-data-center-legislation/\", \"https://ohiocapitaljournal.com/2026/06/08/big-tech-defends-data-centers-before-ohio-lawmakers/\", \"https://www.legislature.ohio.gov/legislation/136/hb646\", \"https://ohiohouse.gov/news/republican/ohio-house-passes-bill-establishing-the-ohio-data-center-study-commission-142643\", \"https://commissioners.allencountyohio.com/\", \"https://www.datacentermap.com/usa/ohio/lima-oh/google-project-bosc/\", \"https://www.irecruit.co/insights/google-500m-data-center-project-ohio\", \"https://rgp.org/google-to-build-500-million-data-center-in-allen-county/\", \"https://www.utilitydive.com/news/aep-ohio-data-center-crypto-rates-puc/716150/\"]}, \"ts\": 1784272480000}", "v67_dc_browndb-stu-mt-orab-mega-site": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed. No groundbreaking date or construction-start date has been announced. Duke Energy Ohio submitted the associated 2 GW load request to PJM's interconnection queue in June 2024; the Purchase and Sale Agreement (dated December 23, 2024) listing 'data center' as the intended use predates any construction announcement. As of mid-2026 the project remains in the pre-construction, permitting/regulatory-review phase (PUCO stated in February 2026 it was not yet conducting any review tied to a specific data center request for Mt. Orab), consistent with a 'Site Selected' status rather than an active-build status.\", \"powerMW\": \"Reported inconsistently across sources. The tracking database entry cites 1,500 MW. However, Duke Energy Ohio's own PJM interconnection filing (submitted June 2024) and multiple press accounts (WCPO I-Team, Dayton Daily News/Springfield News-Sun) describe the Mt. Orab project as a 2 GW (2,000 MW) load request — one of the largest data-center power requests filed in Ohio to date, larger than the Adams County project referenced alongside it.\", \"sizeSqFt\": \"Not publicly disclosed. Only the land parcel size has been confirmed publicly: a 1,018-acre 'mega site' (commonly rounded to '1,000+ acres' in coverage) bordered by Oakland Road, New Hope-White Oak Station Road, and Tri-County Highway in the Village of Mt. Orab. No building square footage has been released, likely because the developer's plans remain shielded by NDAs signed by village officials.\", \"totalInvestment\": \"Not officially confirmed. Investigative outlet Hunterbrook, in its report identifying Meta as the likely party behind DB Stu LLC, headlined the story 'BREAKING: Meta Secretly Behind $1B Ohio Data Center Facing Community Pushback,' implying a roughly $1 billion investment tied to this project, but no company, county, or state filing has published a confirmed capital-investment figure. Treat the $1B figure as investigative-journalism sourcing, not an official disclosure.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Duke Energy Ohio is the interconnecting utility and quietly filed a roughly 2 GW load request with PJM for the Mt. Orab site in June 2024, well before the project was publicly known.\", \"detail\": \"Mt. Orab sits in Duke Energy Ohio's service territory (not AEP Ohio). Duke Energy first brought the Mt. Orab project to PJM's generation/load interconnection queue in June 2024 — over a year before residents learned of it — with a reported ~2 GW capacity request, making it one of the largest single data-center power requests filed in Ohio and comparable in scale to the largest hyperscale queue entries statewide. As of February 2026, the Public Utilities Commission of Ohio (PUCO) said it was not aware of, and was not conducting, any formal review specific to powering a Mt. Orab data center, indicating the interconnection/tariff process was still in early stages. Local reporting (WCPO, Dayton Daily News) flagged the project as a potential ratepayer concern given Duke's contemporaneous requests for Ohio rate increases and broader statewide anxiety about data-center-driven electricity cost increases.\"}, \"taxImplications\": {\"summary\": \"Mt. Orab's village council passed a Community Reinvestment Area (CRA) tax-abatement resolution and an emergency rezoning in December 2024, both approved with no public hearing or written justification, later exposed via public-records requests.\", \"detail\": \"According to reporting based on public-records requests (since council members were bound by NDAs), a CRA resolution created tax abatements for the DB Stu LLC project, adopted at the same December 2024 council meeting where zoning code changes were pushed through via an 'emergency' measure with no written justification. The site was already zoned for heavy industry, so no public rezoning hearing was required for it to qualify as a data center site. Specific abatement percentages/duration, PILOT (payment-in-lieu-of-taxes) terms, and school-district compensation agreements have not been publicly released. Ohio's broader state-level sales-and-use tax exemption for qualifying data center equipment (under the state's data center tax exemption program, ORC 122.175/5709 series) would presumably apply to a project of this scale, but no state Development Services Agency agreement specific to this facility was found in public search results. The secrecy around these tax actions — revealed only through resident public-records requests — became a central grievance driving both HB 695 and the statewide ballot-amendment campaign.\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental permits (air, water withdrawal, or wastewater discharge) for the data center itself have surfaced publicly; Brown County is in EPA air-quality attainment, and the 1,018-acre site would convert land the village had held for industrial development.\", \"detail\": \"Brown County is classified as 'in attainment' for air quality by Ohio EPA, which local reporting notes as favorable for siting industrial/data-center development, but no facility-specific air permit (e.g., for backup diesel generators, which are typically required for hyperscale data centers of this size) has been identified in public Ohio EPA permit records under DB Stu LLC's name. Ohio EPA does maintain a general NPDES permit (OHD000001) addressing non-contact cooling water discharges from data centers statewide, but no site-specific water withdrawal or discharge permit tied to this project was located. The 1,018-acre mega site was assembled and marketed for years by the Mt. Orab Port Authority/Southwest Ohio Regional Development Authority (SORDA) for industrial use, so large-scale land disturbance and conversion of a formerly rural/agricultural-adjacent parcel is expected but not yet documented via construction or grading permits in public sources. Resident opposition (petitions with ~900 signatures, a 1,700+ member 'Mt. Orab Residents for Responsible Development' Facebook group, and a ~275-person turnout at a Mt. Orab Middle School gymnasium meeting) has centered on unknown water consumption, electricity rate impacts, noise, and general lack of environmental disclosure due to the NDAs.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No source identified in this research confirms whether the Mt. Orab facility would use closed-loop (recirculating) cooling versus open/evaporative cooling. Because DB Stu LLC's plans remain shielded by NDAs signed by the mayor and full village council, technical design details including cooling architecture and projected water withdrawal volumes have not been made public. Only a general, project-non-specific Ohio EPA NPDES general permit for data center non-contact cooling water discharge (OHD000001) was found, which does not itself specify the cooling method for this facility.\"}, \"timeline\": \"Multi-year land assembly: The Village of Mt. Orab (via its Port Authority, later reorganized as the Southwest Ohio Regional Development Authority/SORDA) spent years assembling and marketing the 1,018-acre 'mega site' for industrial development.\\nJune 2024: Duke Energy Ohio submitted a ~2 GW load interconnection request to PJM for the Mt. Orab site — over a year before the public knew a data center was planned.\\n~Mid-to-late 2024: SORDA sold the mega site to DB STU LLC (reported by residents as occurring 'more than a year' before February 2026 disclosures).\\nDecember 23, 2024: Purchase and Sale Agreement executed, explicitly stating the property meets the buyer's criteria for use 'as a data center and related improvements.'\\nDecember 2024: Mt. Orab Village Council passed emergency zoning code amendments and a CRA tax-abatement resolution in the same meeting, with no written public justification.\\nJanuary 6, 2026: At a village council meeting, officials confirmed for the first time that they had signed NDAs regarding the site.\\nJanuary 10, 2026: 'Mt. Orab Residents for Responsible Development' Facebook group formed; grew past 1,700 members.\\nJanuary 21, 2026: Local TV (Fox19) covers resident concerns over the still-unconfirmed project.\\nLate January 2026: ~275 residents pack a special village meeting at Mt. Orab Middle School demanding transparency; a petition opposing the project's pace and secrecy gathers nearly 900 signatures.\\nFebruary 3, 2026: Council member Eric Lang introduces ordinances proposing a 180-day (six-month) moratorium on new data-center permits and rescinds his own NDA — the only council member to do so.\\nFebruary 2026: Public-records requests confirm the CRA tax abatements and the data-center use via the Purchase and Sale Agreement, reported by Brown County Press/Clermont Sun/News Democrat.\\nMarch 12, 2026: Statewide press (Ohio Capital Journal) notes state lawmakers responding to mounting data-center backlash statewide, citing Mt. Orab as a flashpoint.\\nSpring 2026: Ohio House Bill 695 (Reps. Adam Bird [R] and Brian Stewart [R]), aimed at barring local officials from signing NDAs about development deals, advances — directly triggered by the Mt. Orab NDA scandal.\\nApril 2026: Ohio Ballot Board approves signature-gathering for a proposed constitutional amendment to ban data centers with peak load over 25 MW, an effort led in part by Brown County residents (including organizer Austin Baurichter) responding to the Mt. Orab project.\\nJune 19, 2026: Organizers announce they will not meet the July 1, 2026 signature deadline (413,000+ signatures needed) for this year's ballot, but say the campaign continues.\\nAs of July 2026 (present): No groundbreaking, building permits, or construction timeline have been publicly disclosed; the project remains at 'Site Selected'/pre-construction status amid active local and state political conflict.\", \"investors\": \"The listed applicant/landowner is DB STU LLC, a Delaware-registered limited liability company with a tax-mailing address c/o Vorys, Sater, Seymour and Pease LLP in Columbus, Ohio (attn: Nicklaus J. Reis) — a law firm commonly used for large corporate/real-estate transactions in Ohio. DB STU LLC purchased the 1,018-acre 'mega site' from the Southwest Ohio Regional Development Authority (SORDA, formerly the Mt. Orab Port Authority), the public economic-development entity that had assembled and marketed the land. Investigative outlet Hunterbrook Media reported strong circumstantial evidence tying DB Stu LLC to Meta Platforms: DB Stu LLC was incorporated by Pamela Gregorski, a senior manager at Corporation Service Company (a Delaware corporate-services firm), on the exact same day as Balloonist LLC, a confirmed Meta subsidiary behind a Wisconsin data center. DB Stu's Ohio filings also list Toreak Acquisition Corp., a Delaware entity that recurs as a corporate intermediary across other confirmed Meta shell companies (Pelican Leap LLC and Laidley LLC). Gregorski has been linked to at least four other confirmed Meta front LLCs (Orla LLC in Indiana; Laidley LLC and Pelican Leap LLC in Louisiana; Wurldwide LLC in Texas), and a similar pattern was separately identified by Hunterbrook for Meta's 'Project Klondike' in Piqua, Ohio (Miami County), which used a near-identical NDA to the one imposed on Mt. Orab officials. Meta has not issued a public statement officially confirming or denying involvement in the Mt. Orab project as of this research. No landowner names other than SORDA (as seller) and DB STU LLC (as buyer) were identified in available public reporting.\", \"politicalContext\": \"Rep. Adam Bird [R] (R-New Richmond, Ohio House District 63, representing western Brown County including Mt. Orab) co-sponsored House Bill 695 directly in response to this project, stating: 'There's a mega site that is located in the village of Mt. Orab in Brown County that I represent. And many of the residents in that community were upset about a non-disclosure agreement that was signed by local government officials... if it is a data center, then we should be open and honest with the public, and tell the public why this is a good idea for our community.' Rep. Brian Stewart [R] (R-Ashville) co-sponsored HB 695 alongside Bird; the bill would bar county commissioners, township trustees, and village mayors/council members from signing NDAs concerning matters related to their official duties. At the local level, Mt. Orab Mayor Joe Houser and the entire village council signed NDAs with DB Stu LLC before the data center use became public; party affiliations for Houser and other council members were not found in public sources (Ohio village mayoral and council races of this size are typically nonpartisan/non-declared). Council member Eric Lang was the only sitting council member to publicly rescind his NDA and, on February 3, 2026, introduced ordinances proposing a 180-day moratorium on new data-center permits in the village; no party affiliation for Lang was found in available sources. No on-the-record statements from Brown County commissioners specifically addressing this project were found in the sources reviewed (searches returned only a general county-commissioners listing page, not statements). Brown County resident Austin Baurichter (not an elected official, so no party tag applies) helped organize the statewide petition drive for a constitutional amendment to ban data centers over 25 MW peak load, a campaign explicitly motivated by the Mt. Orab secrecy episode; that signature drive missed the July 1, 2026 deadline for this year's ballot but organizers said the effort continues.\", \"sources\": [\"https://browncountypress.com/news/19046/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction\", \"https://browncountypress.com/news/19030/residents-request-transparency-voice-concerns-at-village-of-mt-orab-special-meeting-on-mega-site\", \"https://browncountypress.com/news/19025/mt-orab-residents-seek-answers-on-mega-site\", \"https://browncountypress.com/news/19073/breaking-news-purchase-and-sale-agreement-on-mt-orab-mega-site-lists-data-center-as-intended-use-for-property\", \"https://local12.com/news/local/questions-remain-brown-county-officials-handling-proposed-mega-site-data-center-mount-orab-acres-mayor-village-council-attorney-law-legal-nda-nondisclosure-agreement-zone-zoning-code-tax-taxes-taxpayer-ordinances-emergency-cincinnati\", \"https://local12.com/news/local/brown-county-village-considers-6-month-pause-new-data-center-permits-mount-orab-datacenter-permit-non-disclosure-agreement-nda-potential-project-ordinance-mega-site-highway-nature-outdoors-pollution-cincinnati\", \"https://local12.com/news/local/brown-county-residents-demand-answers-mysterious-industrial-project-mount-orab-village-council-mayor-nda-non-disclosure-agreement-industry-plot-land-sale-selling-developments-transparency-confidential-special-meeting-data-center-cincinnati\", \"https://local12.com/news/local/brown-county-group-seeks-constitutional-ban-certain-data-centers-petition-petitions-amendment-amend-constitution-ohio-hamilton-county-cincinnati-construction-prohibit-banned-banning-signatrues-mount-orab-mega-site\", \"https://local12.com/news/local/ohio-could-soon-see-local-lawmakers-banned-signing-ndas-nondisclosure-agreements-politicians-development-projects-data-centers-brown-county-mount-orab-cincinnati-ohio-residents-rumors-secretive-hidden-violations-fines-fees-voters\", \"https://www.wcpo.com/news/local-news/brown-county/mt-orab-residents-pack-gymnasium-demanding-transparency-on-mysterious-mega-site-project\", \"https://www.wcpo.com/news/local-news/brown-county/lack-of-transparency-hundreds-sign-petition-calling-to-pause-plans-for-mount-orab-mega-site\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-data-center-could-be-one-of-ohios-biggest-power-guzzlers\", \"https://www.daytondailynews.com/news/proposed-data-center-could-be-one-of-ohios-biggest-power-guzzlers/PIHRA4ZAGJC75OTEGK5EPR3VIY/\", \"https://www.clermontsun.com/2026/02/04/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction\", \"https://www.clermontsun.com/2026/02/05/residents-request-transparency-voice-concerns-at-village-of-mt-orab-special-meeting-on-mega-site\", \"https://www.newsdemocrat.com/2026/02/13/breaking-news-purchase-and-sale-agreement-on-mt-orab-mega-site-lists-data-center-as-intended-use-for-property/\", \"https://www.newsdemocrat.com/2026/02/04/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction/\", \"https://www.newsdemocrat.com/2026/02/01/mt-orab-residents-seek-answers-on-mega-site/\", \"https://www.ripleybee.com/2026/02/04/mt-orab-council-member-takes-steps-to-stop-possible-data-center-construction/\", \"https://www.fox19.com/2026/01/21/mt-orab-residents-voice-concerns-over-potential-data-center/\", \"https://hntrbrk.com/meta-data-centers/\", \"https://stopohiodatacenters.org/\", \"https://stopohiodatacenters.org/miami-county\", \"https://ohiocapitaljournal.com/2026/03/12/ohioans-are-getting-fed-up-with-data-centers-state-lawmakers-are-starting-to-notice/\", \"https://ohiocapitaljournal.com/2026/04/30/ohio-data-center-ban-proposal-advocates-are-trying-to-get-413000-signatures-by-july-1/\", \"https://ohiocapitaljournal.com/2026/04/03/data-center-ban-on-the-ohio-ballot-petitioners-get-approval-to-start-gathering-signatures/\", \"https://ohiocapitaljournal.com/2026/06/19/ohio-proposed-constitutional-amendment-to-ban-data-centers-will-not-be-on-this-years-ballot/\", \"https://policymattersohio.org/news/2026/05/20/hb-695-should-limit-ndas-restore-access-to-records-of-data-center-and-other-development-deals/\", \"https://legislature.ohio.gov/legislation/136/hb695\", \"https://ohiohouse.gov/members/adam-c-bird\", \"https://ballotpedia.org/Ohio_Prohibition_of_Data_Center_Construction_Amendment_(2026)\", \"https://dam.assets.ohio.gov/image/upload/epa.ohio.gov/Portals/35/permits/Data_Centers/OHD000001_Draft.pdf\", \"https://mtoraboh.us/index.php/contact/government-personnel/10-howser-joe-mayor\", \"https://ryangrissinger.com/issues/data-centers\", \"https://www.clevescene.com/news/ohio-news/ohioans-are-getting-fed-up-with-data-centers-state-lawmakers-are-starting-to-notice/\"]}, \"ts\": 1784272480000}", "v67_dc_butlerlogistix-hamilton-dc": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"No confirmed groundbreaking has occurred as of this research (mid-2026). Groundbreaking was originally targeted for January 2026 with construction beginning in late spring 2026 (14-16 month build, targeting a 2027 operational date), but in January 2026 the developer asked the City of Hamilton to pause the second of two power-feasibility studies while it 'considers next steps.' As of the most recent reporting found, the project timeline is on hold and no new start date has been publicly announced.\", \"powerMW\": \"240 MW requested by the developer for the full hyperscale build-out (per city officials). Note: the project's scope escalated over time from an initial ~15 MW / 100,000s-sq-ft phase (2024) to a 100 MW / $100M phase, to the current 200+ MW / up to 240 MW / $1B+ hyperscale ambition. A city-commissioned feasibility study (reported January 2026) concluded it would take ~30 months to deliver only 45 MW to the site — far short of the 240 MW requested.\", \"sizeSqFt\": \"310,640 sq ft (two-story building; some sources round to ~320,000 sq ft), plus a 95,000 sq ft customer substation, on a ~15-acre portion of a 29.2-acre city-owned site at 1380 University Boulevard, University Commerce Park, Hamilton, Fairfield Township, Butler County, OH. (Earlier 2024 filings described the first approved phase as 155,000 sq ft per floor.)\", \"totalInvestment\": \"$1 billion+ (current stated ambition, per Logistix officials/city officials, e.g. Data Center Dynamics and Journal-News reporting). The figure escalated over the project's life: initially estimated at $15 million (2024 planning approval), revised to ~$75 million, then to $100 million (for the 100MW phase per Logistix's own website), and finally to 'potential $1 billion-plus' as the power request grew toward 240 MW.\", \"employment\": {\"construction\": \"Not publicly disclosed as a specific headcount. Construction duration is cited at 14-16 months; no public figure for peak/total construction workforce was found.\", \"permanent\": \"Approximately 50 to 100 permanent jobs (city manager Craig Bucheit cited 'up to 100 new full-time jobs'; other reporting says 50-100), with a projected salary range of $75,000-$90,000.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"The project would draw on Hamilton's municipally owned electric utility system, but a city-commissioned study found the grid could deliver only about 45 MW within 30 months versus the up to 240 MW Logistix has requested.\", \"detail\": \"Hamilton, unusually for Ohio, owns and operates its own municipal electric utility, which city officials noted has spare capacity/incentive to sell power dating back to the loss of load from area paper-mill closures. The site sits close to an existing substation, but Logistix's plans include developing at least one additional substation (a 95,000 sq ft customer substation was part of the approved site plan). Edwin Porter, Hamilton's executive director of infrastructure, said a first feasibility study's preliminary conclusion was that it would take roughly 30 months to deliver 45 MW to the site — a fraction of the up to 240 MW being requested, which would be roughly equivalent to the electricity use of about 24,000 households (one estimate) or, per a community advocacy estimate for the full hyperscale buildout, comparable to 350,000-400,000 electric vehicles or 12,600+ Ohio homes. Because of this gap, the developer asked the city to pause a second, more detailed power-delivery study in January 2026. No specific Duke Energy Ohio or AES Ohio interconnection/PJM filings tied directly to this project were found in public search results; the load would run through Hamilton's own municipal system rather than directly through Duke or AES Ohio distribution territory.\"}, \"taxImplications\": {\"summary\": \"The project would qualify for Ohio's statewide data center sales-tax exemption on equipment and construction materials, and the city sold Logistix its ~15-acre site for a nominal $65,000 as a development incentive, but no specific local PILOT, CRA abatement percentage, or school-district payment agreement has been publicly disclosed.\", \"detail\": \"Ohio Revised Code 122.175 provides a sales-and-use tax exemption for qualifying data center equipment purchases and construction materials; this exemption is under statewide political scrutiny (state officials say Ohio forgoes roughly $1.5-1.6 billion/year in sales tax revenue from data centers statewide), but no project-specific tax credit or exemption certificate for the Hamilton facility was found in public records searched. Locally, the City of Hamilton — which owned the land — sold approximately 15 acres to Logistix for $65,000, well below typical market value, functioning as a de facto development incentive; the city has said the project itself would be 'fully funded by the developer, and not by Hamilton residents.' No specific Community Reinvestment Area (CRA) abatement agreement, PILOT (payment in lieu of taxes) arrangement, or Hamilton City Schools payment agreement dollar figures were found publicly disclosed for this project as of this research.\"}, \"environmentalImpact\": {\"summary\": \"The site is partly wooded and located in a floodplain, raising stormwater and habitat concerns, while community groups have separately raised concerns about water consumption, noise, and light pollution from the facility.\", \"detail\": \"City engineering officials have said the project's stormwater management plan is believed sufficient to address floodplain issues on the site, which the city noted retains 'a fair amount of trees and other vegetation.' A community group calling itself the Coalition Against Data Centers in South Ohio (reported at 600+ members) and a separate statement from Cincinnati Socialists ('Profit over People and Planet') have raised concerns about water use (citing precedent from a Georgia data center that reportedly reduced residential water pressure), noise, light pollution, and rising regional electricity costs tied to data center buildout. No project-specific Ohio EPA air permit (e.g., for backup diesel generators) or NPDES wastewater/stormwater permit filing for this facility was found in public search results; Ohio EPA has separately been developing a draft statewide general NPDES permit framework for data center wastewater/stormwater discharges (public comment period late 2025/2026), which would apply broadly rather than being specific to this project.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No official confirmation of closed-loop versus open/evaporative cooling design was found for this specific facility. Community opposition (Coalition Against Data Centers in South Ohio, Cincinnati Socialists) has specifically cited water-use and water-pressure concerns — drawing a comparison to a Georgia data center that reportedly affected residential water pressure — suggesting residents are concerned the facility may use water-intensive evaporative cooling, but Logistix has not published technical cooling specifications, and no source confirmed a closed-loop system commitment.\"}, \"timeline\": \"2024: Hamilton City Planning Commission recommends approval of an initial Logistix project (then ~$15M, later revised to ~$75M); city agrees to sell ~15 acres of a 29.2-acre city-owned parcel at 1380 University Boulevard (University Commerce Park) to Logistix for $65,000; two-story, 155,000-sq-ft-per-floor (310,640 sq ft total) data center design approved with a 95,000 sq ft customer substation.\\n2024-2025: Development agreement executed between City of Hamilton and Logistix Property Group; project ambition grows substantially — company website cites a $100 million/100 MW 'Hamilton Innovation Center,' while founder Doug Swain begins publicly targeting a 200+ MW, ultimately up to 240 MW, hyperscale build described as a 'potential $1 billion-plus' project.\\nOctober 2025: Standing-room-only Hamilton City Council meeting; 40-50+ residents voice concerns over noise, light pollution, water use, and lack of transparency; Mayor Pat Moeller confirms no vote was scheduled that night.\\nDecember 2025: WVXU and other outlets report organized community opposition (Coalition Against Data Centers in South Ohio, 600+ members); city has two feasibility/power studies underway.\\nJanuary 2026: First feasibility study concludes it would take ~30 months to deliver only 45 MW to the site (versus the up to 240 MW requested); Logistix asks the city to pause the second study while it evaluates next steps; the previously anticipated January 2026 groundbreaking does not occur.\\nJune 17, 2026: Butler County Commissioners unanimously approve a six-month (some reports say up to one-year) moratorium on new data center development in the county-zoned townships (Hanover, Lemon, Madison, Milford, Oxford, Ross) — this does not directly govern the City of Hamilton, which controls its own zoning, but signals the regional political climate.\\nAs of mid-2026 (most recent reporting found): Project remains on hold pending resolution of power-delivery questions; Logistix has not publicly withdrawn but has not announced a revised construction timeline.\", \"investors\": \"The developer behind the 'Logistix' name is Logistix Property Group, a Cincinnati-based land development company founded and led by Douglas ('Doug') Swain, who serves as founder and President. Swain's LinkedIn/NAIOP bio describes over 30 years of experience including senior leadership roles at an institutional investment company, a publicly traded REIT, privately owned real estate firms, and one of the world's largest logistics companies, before founding Logistix, which specializes in identifying and developing sites (primarily for data centers) leveraging his development experience and industry relationships. The landowner and selling party is the City of Hamilton itself, a municipal government, which sold roughly 15 acres of a 29.2-acre city-owned parcel to Logistix for $65,000. No hyperscale end-user/tenant (e.g., a specific cloud or AI company) has been publicly named for the facility — consistent with the 'Undisclosed' company listing for the operating entity — and no additional equity investors, lenders, or financial backers behind Logistix's Hamilton project were identified in public reporting reviewed.\", \"politicalContext\": \"Hamilton Mayor Pat Moeller — the mayoralty is a nonpartisan municipal office, and this research could not conclusively confirm a current party affiliation via search before the session's search budget was exhausted; Moeller stated at the October 2025 council meeting that no vote on the project was scheduled that night, pushing back on what one council member called social-media misinformation. City Manager Craig Bucheit (an appointed, non-elected official) expressed interest in the project's economic potential, citing up to 100 new full-time jobs. Edwin Porter, Hamilton's executive director of infrastructure (appointed staff), authored/delivered the finding that only 45 MW could be delivered within 30 months. Butler County Commission President T.C. Rogers [R] publicly criticized data center developers' inability to answer key project questions ('It's almost like, Sign here and we'll work it out') and voted with fellow commissioners (unanimous vote) to approve a six-month countywide data-center development moratorium in June 2026 covering county-zoned townships — a vote reflecting the broader regional political backlash to projects like Logistix's, though it does not directly bind the City of Hamilton's own zoning authority. At the state level, statewide (not Hamilton-specific) legislative pushback on Ohio's data-center sales-tax exemption has come from Sen. Kent Smith [D, Euclid], who called the exemption 'the worst tax break in Ohio history,' Sen. Louis 'Bill' Blessing III [R, representing the Hamilton County/Cincinnati-area 8th Senate District], who has co-sponsored efforts to scrap the exemption for new projects, and Rep. David Thomas [R, Ashtabula County], who called for fully removing the exemption from Ohio law. These state-level statements concern Ohio's data center tax policy broadly and were not found to reference the Hamilton/Logistix project by name specifically. No on-record statements from individual Hamilton City Council members (by name) or from the other two Butler County commissioners regarding this specific project were located before the search budget was reached.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/logistix-gets-planning-commission-approval-for-data-center-project-outside-cincinnati-ohio/\", \"https://www.thebcfa.org/ignitebutler/featured-news-articles/p/item/64490/1b-hyperscale-data-center-could-break-ground-in-city-of-hamilton-in-2026\", \"https://www.wvxu.org/environment/2025-12-03/developers-data-center-butler-county\", \"https://baxtel.com/data-center/logistix-hamilton-oh\", \"https://www.journal-news.com/community/butler-county/what-is-a-data-center-hamilton-trenton-likely-to-get-large-facilities-for-vast-computing-networks/CRHD5DCKGNEAVGMA2TKUD7RE3Q/\", \"https://www.journal-news.com/news/data-center-project-part-of-the-growth-happening-in-hamilton/YBCOX7A33BGJZHUMP6EXWB5NTM/\", \"https://www.wvxu.org/environment/2026-01-15/hamilton-data-center-paused-study\", \"https://www.wyso.org/2026-01-15/hamilton-data-center-paused-study\", \"https://www.journal-news.com/news/data-center-developer-requests-hamilton-pause-plausibility-studies/QED7B6MJYBGMPAFRO7WHDBSBAA/\", \"https://www.journal-news.com/news/proposed-data-center-could-be-one-of-ohios-biggest-power-guzzlers/PIHRA4ZAGJC75OTEGK5EPR3VIY/\", \"https://www.govtech.com/artificial-intelligence/ohio-communities-grapple-with-data-center-approval-decisions\", \"https://local12.com/news/local/plans-1-billion-cincinnati-hamilton-ohio-data-center-advance-despite-environmental-energy-concerns-bills-usage-cost-customers-residents-logistix-property-group-consumption-natural-gas-hydroelectric-solar-wind-generators-technology-hub-tech-computers\", \"https://local12.com/news/local/one-billion-dollar-dollars-data-center-proposed-cincinnati-hamilton-2026-hyperscale-logistix-could-create-jobs-employment-hiring\", \"https://www.journal-news.com/news/residents-say-no-on-1b-data-center-project-wants-hamilton-to-do-the-same/L3YUSLLR2VHMDFXVBXKPBTOHCA/\", \"https://www.wcpo.com/hamilton-ohio-data-center-city-council-meeting-october\", \"https://www.journal-news.com/news/hamilton-oks-plan-for-data-center-project-in-riverside-neighborhood/BFSJT4SRYFC5XGE7DKESMRI72U/\", \"https://finance.yahoo.com/news/hamilton-oks-plan-data-center-150100825.html\", \"https://www.construction.com/projects/dr-202400261483-hamilton-innovation-center-logistix-data-center-substation\", \"https://logistixpg.com/logistix_projects/hamilton-innovation-center/\", \"https://www.linkedin.com/in/douglasjswain/\", \"https://www.naiop.org/about-us/bio-detail-page/?bio=86df5730-ea95-4ccc-a945-b18bc37ad910\", \"https://www.journal-news.com/local/why-butler-county-leaders-cannot-block-data-centers/article_7dd81db4-fb8c-4e07-8cd5-e75c06caf7e4.html\", \"https://www.wvxu.org/environment/2026-06-17/butler-county-approves-data-center-moratorium\", \"https://www.journal-news.com/news/this-area-is-water-rich-but-poor-in-power-a-study-highlights-southwest-ohio-data/article_dce72e79-9d73-5a8f-bbb0-f4a7bbb5b324.html\", \"https://www.cincysocialists.net/statements/profit-over-people-and-planet\", \"https://www.tcrogers.org/about\", \"https://ballotpedia.org/T.C._Rogers_(Butler_County_Commission,_Ohio,_candidate_2024)\", \"https://www.news5cleveland.com/news/local-news/oh-cuyahoga/calls-for-change-as-ohio-sales-tax-break-for-data-centers-approaches-1-6-billion-a-year\", \"https://codes.ohio.gov/ohio-revised-code/section-122.175\", \"https://ohiosenate.gov/members/louis-w-blessing-iii/news\"]}, \"ts\": 1784272480000}", "v67_dc_butlerprologis-project-mila-campus": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Land acquired by Prologis from the City of Trenton in October 2025 ($7.7-7.75M). Site plan approved by Trenton Planning Commission March 30, 2026. Initial grading/groundwork for an on-site electric substation reportedly began before public hearings concluded. Construction on the first of four buildings is expected to begin fall 2026, with that building operational by 2028 and full four-building buildout complete by 2029. Note: publicly available records place this project in Trenton, Ohio (Butler County industrial park), not West Chester Township — see timeline/investors notes below.\", \"powerMW\": \"250 MW (confirmed across multiple sources as a 250-megawatt hyperscale campus)\", \"sizeSqFt\": \"899,065 sq ft total across the campus: four data center buildings at 220,353 sq ft each (881,412 sq ft), plus a 16,150 sq ft utility building and a 1,503 sq ft security building, on a 141-acre site. Some press accounts round this to ~880,000-893,034 sq ft.\", \"totalInvestment\": \"Not publicly disclosed as a single total capital-investment figure. Known reference points: Prologis paid $7.7-7.75 million for the 141-acre land parcel (Oct. 2025); pre-abatement taxable building value was pegged at approximately $233 million (reduced to ~$58M building / ~$68M total with land after the 75% abatement). To qualify for Ohio's state data-center sales-tax exemption, a project must invest at least $100 million over three years and maintain $1.5M+ annual Ohio payroll — Project Mila's scale strongly implies it clears this threshold, but no confirmed application or total capex figure was found in Prologis press releases, SEC filings, or local coverage.\", \"employment\": {\"construction\": \"Not publicly disclosed (no specific construction-phase job count found in city, county, or press records)\", \"permanent\": \"Prologis/City of Trenton compensation agreement cites 120 new full-time jobs by Dec. 31, 2035; some press summaries round this to ~140 jobs.\", \"totalPayroll\": \"Approximately $9 million annually (roughly $75,000 average per job), per the Prologis/Trenton compensation agreement\"}, \"gridImpact\": {\"summary\": \"The 250 MW campus will draw power via an on-site electrical substation, but no Duke Energy Ohio-specific interconnection filing for Project Mila was found in public records.\", \"detail\": \"Site plans include a dedicated on-site substation to serve the four-building, 250 MW load. Butler County Commissioner Don Dixon publicly raised concern about grid and infrastructure impact, stating the county needs to understand 'what we're committing our residents to, and the county's infrastructure, and the county's resources as far as water and sewer availability, and who gets charged for the electric.' No Duke Energy Ohio transmission-owner interconnection queue filing, PJM facility study, or PUCO case specifically naming 'Project Mila' or the Trenton/Prologis site was located; broader Duke Energy Ohio transmission upgrade projects (e.g., Camp Washington, West End substations) were found but could not be confirmed as tied to this specific facility.\"}, \"taxImplications\": {\"summary\": \"Trenton City Council approved a 15-year, 75% property tax abatement (Community Reinvestment Area agreement) for each Project Mila building, paired with PILOT payments to local schools.\", \"detail\": \"Under the CRA agreement (approved by Trenton City Council in July 2026), Prologis receives a 15-year, 75% property tax exemption on each new building. An associated TIF/compensation agreement directs payments-in-lieu-of-taxes (PILOTs) to Edgewood City Schools and Butler Tech proportional to what they'd otherwise receive; Prologis is paying $940,200 upfront to Edgewood City Schools and $59,800 upfront to Butler Tech. During the abatement period the project is projected to generate about $1.3 million annually split between the city ($513,000) and schools ($824,000), rising to roughly $1.87 million (city) and $3 million (schools) annually once the abatement expires. Mayor Ryan Perry defended the deal, saying 'every business that we have in the city of Trenton has an abatement of some kind' and that without one 'the business won't come.' Separately, Ohio's statewide data-center sales-tax exemption (requiring $100M+ investment and $1.5M+ Ohio payroll) is available to qualifying projects like this one, though no confirmed state exemption application specific to Project Mila was found; the statewide exemption program cost Ohio about $1.6 billion in foregone revenue in 2025.\"}, \"environmentalImpact\": {\"summary\": \"The project uses a direct evaporative-free air-cooling system projected to consume about 15.8 million gallons of water annually, plus backup diesel generators and 141 acres of land disturbance under Ohio EPA stormwater permitting.\", \"detail\": \"Prologis states the campus will use direct evaporative-free air cooling, which the company describes as 25-35% more efficient than traditional closed-loop/refrigerant systems and roughly 12 times more efficient than traditional cooling towers; the system uses water only about 3% of the year and requires no chemical additives, with total projected water use up to 15.8 million gallons annually. Trenton's water department confirmed system capacity for the project and said Prologis will pay to use it; wastewater discharges to Butler County for processing, and no private wells are reported affected. Backup diesel generators are described by Prologis as running only during testing or emergencies, while cooling systems, HVAC stacks, and substation transformers operate continuously. No project-specific Ohio EPA air-permit filing for the diesel generators was located in public records (a separate, unrelated Lima, Ohio data center's generator air permit was found in search results but does not apply to this project). The 141-acre site triggers Ohio EPA's general NPDES construction stormwater permit (OHC000006 series) given the land disturbance, though a project-specific permit record could not be independently retrieved.\"}, \"waterLoop\": {\"answer\": \"Partial\", \"detail\": \"Project Mila does not use a traditional recirculating closed-loop chilled-water or cooling-tower system. Prologis describes it as 'direct evaporative-free air cooling' — effectively dry/air-based cooling for roughly 97% of the year, switching to evaporative (water-using) cooling only during the hottest ~3% of the year, with no chemical additives required. This is a lower-water-use design than conventional open-loop evaporative cooling towers, but it is not a fully sealed closed-loop system either, since it does periodically consume make-up water (up to ~15.8 million gallons/year). Source: Data Center Dynamics coverage of Prologis's stated cooling design; corroborated by Butler County/Trenton project summaries.\"}, \"timeline\": \"IMPORTANT NOTE: The facility described (Prologis 'Project Mila,' 250 MW hyperscale campus, Butler County, Ohio) is consistently documented in public records (Trenton city government, Butler County press, Data Center Dynamics, WVXU/NPR, Cincinnati-market outlets) as located in the City of Trenton's industrial park, Butler County, OH — NOT in West Chester Township. In fact, one source (thebcfa.org regional coverage) notes West Chester Township currently prohibits data centers outright, while Trenton (an incorporated city, not a township) approved this project. This report treats 'Project Mila' as the same 250 MW/141-acre facility referenced in the research brief, located in Trenton, Butler County.\\n\\nKey milestones found:\\n- Oct. 2025: Prologis purchases 141 acres near Kennel/Woodsdale roads in Trenton's industrial park from the City of Trenton for ~$7.7-7.75 million.\\n- Early 2026: Site grading/groundwork for an electric substation reportedly begins ahead of formal public hearings, drawing resident criticism.\\n- March 25, 2026: WVXU/NPR-affiliate coverage previews Trenton Planning Commission vote amid resident pushback.\\n- March 30, 2026: Trenton Planning Commission approves the site plan in a roughly 10-minute meeting; no public hearing was legally required because the land was already zoned industrial.\\n- May 2026: A Saint Clair Township trustee reports surprise at Trenton's proposed ~600-acre annexation in Saint Clair/Madison townships, tied to broader data-center growth concerns.\\n- June 17, 2026: Butler County Commissioners unanimously approve a six-month county-wide data center moratorium (covering townships under county zoning; does not retroactively affect the already-approved Trenton/Mila project, which sits in city, not township, jurisdiction).\\n- July 9, 2026: Trenton City Council approves a 15-year, 75% property tax abatement (CRA agreement) and related PILOT/compensation agreement with Prologis.\\n- Fall 2026 (planned): Construction begins on the first of four buildings.\\n- 2028 (planned): First building operational/launch.\\n- 2029 (planned): Full four-building, 899,065 sq ft campus buildout complete.\", \"investors\": \"Prologis, Inc. (NYSE: PLD), the San Francisco-based industrial/logistics REIT, is the sole disclosed developer and owner of Project Mila. The land seller was the City of Trenton, Ohio (municipal industrial park parcel). No joint-venture partner, co-investor, or end-use tenant/hyperscaler customer has been publicly named in city records, county filings, or trade press as of the available reporting — Prologis is developing this as a speculative/build-to-suit hyperscale campus without a disclosed anchor tenant.\", \"politicalContext\": \"Mayor Ryan Perry [R] (City of Trenton) publicly defended the tax abatement deal, stating 'every business that we have in the city of Trenton has an abatement of some kind' and that without an abatement 'the business won't come.' (Perry has also run as a Republican candidate for Ohio House District 40.)\\n\\nButler County Commission President T.C. Rogers [R] expressed skepticism about the developer's transparency, saying: 'What I found is in these discussions with the developers, the developers didn't or weren't able to answer some of the questions which were pertinent. It's almost like, \\\"Sign here and we'll work it out.\\\"'\\n\\nButler County Commissioner Don Dixon [R] raised infrastructure and cost-allocation concerns: 'We have to understand what we're committing our residents to, and the county's infrastructure, and the county's resources as far as water and sewer availability, and who gets charged for the electric, etc., etc., etc.' Dixon and Rogers, both Republicans, voted with the full Butler County Commission to approve a six-month county-wide data center moratorium on June 17, 2026 (this moratorium applies to townships under county zoning authority, not the already-approved Trenton/Mila site).\\n\\nResident Barry Blankenship (not a public official) criticized the process, saying city leaders 'are not listening to residents' and that 'the way they're doing it makes it feel like they're trying to shove it down our throat.'\\n\\nAt the state level (general Ohio data-center policy context, not statements specific to Project Mila): Rep. Tom Young [R] (Washington Twp.) voiced support for HB 646, a bill creating a bipartisan legislative study commission on data centers ('This is about getting in front of this issue'). Rep. Adam Holmes [R] (Nashport) and Sen. Brian Chavez [R] (Marietta) were named co-chairs of that study committee, with Holmes stating its mission is to ensure 'Ohio citizens have accurate, relevant and usable information concerning the economic, environmental, and security impacts of Ohio data center development.' No Ohio state legislator was found making a statement specifically naming Project Mila or the Trenton site.\\n\\nNo Democratic or independent officials were found making public statements specifically about this project in the available search results — Butler County's elected commission and Trenton's mayor are Republican, consistent with Butler County's overall partisan lean.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/prologis-details-plans-for-data-center-campus-outside-cincinnati-ohio/\", \"https://stopohiodatacenters.org/butler-county\", \"https://www.thebcfa.org/ignitebutler/spotlight/news-archive/p/item/67936/developer-reveals-site-plan-begins-work-on-hyperscale-data-center-in-butler-county\", \"https://www.thebcfa.org/ignitebutler/featured-news-articles/p/item/65187/prologis-buys-141-acres-for-greater-cincinnati-data-center\", \"https://www.wvxu.org/local-news/2026-03-30/trenton-planning-commission-approves-site-plan-data-center\", \"https://www.wvxu.org/local-news/2026-03-25/data-center-trenton-plans-pushback\", \"https://www.wvxu.org/environment/2026-07-09/trenton-approves-15-year-tax-abatement-for-data-center\", \"https://www.wvxu.org/environment/2026-06-17/butler-county-approves-data-center-moratorium\", \"https://www.journal-news.com/local/what-to-know-about-trenton-s-proposed-data-center-tax-incentives/article_7b381512-adde-58f8-b35b-b43ca25051ef.html\", \"https://www.journal-news.com/local/why-butler-county-leaders-cannot-block-data-centers/article_7dd81db4-fb8c-4e07-8cd5-e75c06caf7e4.html\", \"https://hoodline.com/2026/03/trenton-neighbors-fume-as-mega-data-center-starts-digging/\", \"https://constructionreviewonline.com/project-mila-data-center-in-ohio-inches-closer-to-construction-as-trenton-commission-approves-plans/\", \"https://local12.com/news/local/proposed-data-center-development-moves-closer-reality-butler-county-trenton-tax-taxes-taxpayers-abatement-prologis-tech-technology-community-reinvestment-area-cra-residents-construction-building-city-council-mayor-cincinnati\", \"https://local12.com/news/local/data-center-zoning-approval-draws-backlash-in-butler-county-administrator-offers-answers-trenton-prologis-power-water-usage-artificial-intelligence-ai-cincinnati-local-12-wkrc\", \"https://www.wcpo.com/news/local-news/butler-county/trenton/trenton-planning-commission-approves-data-center-site-plan-in-10-minute-meeting\", \"https://www.wcpo.com/news/local-news/butler-county/trenton/prologis-reveals-tentative-plans-for-major-trenton-data-center-project\", \"https://www.daytondailynews.com/local/data-center-site-plan-approved-at-trenton-planning-commission/article_6151307e-3718-51fa-addb-c77a23e23087.html\", \"https://www.govtech.com/artificial-intelligence/ohio-communities-grapple-with-data-center-approval-decisions\", \"https://trentonoh.gov/DocumentCenter/View/2403/Prologis-and-Staff-Public-Forum-Agenda-?bidId=\", \"https://ballotpedia.org/Donald_Dixon_(Butler_County_Commission,_Ohio,_candidate_2024)\", \"https://www.trentonoh.gov/251/Ryan-Perry\", \"https://ohiocapitaljournal.com/2026/05/18/ohio-lawmakers-are-creating-bipartisan-data-center-committee-that-will-start-meeting-this-month/\"]}, \"ts\": 1784272480000}", "v67_dc_delawareaws-sunbury-campus": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"No groundbreaking has occurred yet. Per Sunbury officials and trade press, construction of the first (450,000 sq ft) building was expected to begin January 2028, with completion/operational start by December 2034. As of mid-2026 the project is paused: Sunbury City Council passed a moratorium on data center development (effective until Jan. 31, 2027), so these dates may slip. Land was acquired Dec. 30, 2024.\", \"powerMW\": \"750 MW (per file). AEP Ohio has separately said regional load in the Delaware/Licking county area (of which this project is a major driver) is expected to roughly quadruple from ~500MW to ~2,000MW by 2027.\", \"sizeSqFt\": \"450,000 sq ft for the first building (Data Center Dynamics, 1808Delaware, Delaware Gazette). This is described as the first phase of a larger multi-building campus; a city financial analysis modeled a four-building campus. Total planned campus square footage across all phases is not publicly disclosed.\", \"totalInvestment\": \"$2 billion for the Sunbury campus specifically (announced Nov. 20, 2024), part of Amazon's broader $7.8 billion central Ohio investment announced in 2023, which itself is part of AWS's cumulative Ohio investment reported at over $10 billion (and elsewhere reported at $23 billion from 2015-2030 after a further $10B and $1B tranches were announced). Land purchase price for the Vans Valley Road/Galena parcel is reported inconsistently across sources as approximately $44 million (Data Center Dynamics headline) to $53.9 million (other secondary reporting) — exact final figure not authoritatively confirmed in public records reviewed.\", \"employment\": {\"construction\": \"Not publicly disclosed. No official construction-phase (temporary/peak) worker count has been released; the city's FAQ document directs local contractors to monitor AWS bid solicitations rather than citing a jobs figure.\", \"permanent\": \"50 full-time jobs\", \"totalPayroll\": \"$4.5 million annually (average salary approximately $90,000/year)\"}, \"gridImpact\": {\"summary\": \"AEP Ohio is building new 345kV transmission infrastructure in the Sunbury/New Albany corridor to serve growing regional load, including this data center, at a stated 750 MW project draw.\", \"detail\": \"AEP Ohio announced construction of two 13-mile 345-kilovolt transmission lines connecting its Vassell Substation off State Route 37 in Sunbury to two new substations off Green Chapel Road in New Albany, with construction planned from early 2026 to summer 2027. AEP has stated electricity demand in the Delaware/Licking county area is expected to roughly quadruple (from ~500MW to ~2,000MW) by 2027 due to industrial and data center growth, of which the AWS Sunbury campus (rated at 750MW) is a major single contributor. The known grid note on file — 'new AEP Ohio infrastructure required' — is corroborated by these transmission filings, though AEP's public materials describe the upgrades as serving regional growth broadly rather than being scoped exclusively to the AWS project.\"}, \"taxImplications\": {\"summary\": \"Sunbury approved a long-term Community Reinvestment Area (CRA) property tax abatement for the project, paired with a payment-in-lieu-of-taxes/compensation framework benefiting Big Walnut Local Schools and Delaware Area Career Center.\", \"detail\": \"Sunbury City Council rezoned roughly 1,200-1,300 newly annexed acres east of the city into a Limited Industrial (LI) district in November 2023 that explicitly lists 'data center' as a permitted use, and this project was the first economic-development incentive approved under that district. Reported abatement terms vary across public materials: one account describes a CRA exemption of 87.5% for 15 years followed by 75% for a further 15 years, while a city tax-and-benefit analysis document (referenced in search results but not independently verified) describes a 100% 15-year abatement paired with a 12.5% PILOT. The city has entered into compensation agreements with Big Walnut Local Schools and the Delaware Area Career Center to offset foregone property tax revenue. The project was reportedly among the last data center incentive deals approved before a broader pause in new Ohio data-center tax breaks in mid-2026. Ohio's state sales-tax exemption for qualifying data center equipment purchases (available under Ohio Rev. Code 122.175 for facilities meeting investment/job thresholds) would likely apply given the project's scale, though a specific Sunbury sales-tax exemption agreement was not separately confirmed in sources reviewed.\"}, \"environmentalImpact\": {\"summary\": \"The project involves clearing 330+ acres within a roughly 1,200-1,300 acre newly annexed business park, with the city citing a closed-loop, reclaimed-water cooling design and new wastewater treatment upgrades to address water-quality concerns.\", \"detail\": \"According to the City of Sunbury's official Data Center FAQ document, the AWS project would clear more than 330 acres within the Sunbury Business and Technology Park (a roughly 1,200-1,300 acre newly annexed and rezoned area between State Route 37 and Vans Valley Road). The LI zoning district caps maximum lot coverage at 75% to preserve room for landscaping, screening, and stormwater management, though a specific NPDES/stormwater land-disturbance permit for this site was not located in public records reviewed. Public meetings in 2026 (March and June) drew significant resident concern over water and environmental impacts; the city responded that it is adding advanced wastewater treatment technology to mitigate water-quality risk. No Ohio EPA air-permit filing (e.g., for backup diesel generators) specific to the Sunbury AWS campus was found in the sources reviewed — this differs from AWS's separate, unrelated Hilliard, Ohio data center project, which has a well-documented Title V air permit for 158 emergency diesel generators; that permit should not be conflated with the Sunbury site.\"}, \"waterLoop\": {\"answer\": \"Yes\", \"detail\": \"The City of Sunbury's official Data Center FAQ document states that AWS is planning a closed-loop cooling system using reclaimed (non-potable) water for the Sunbury facility, and that advanced wastewater treatment technology will be added to the Sunbury plant to mitigate water-quality risk. This is consistent with Amazon/AWS's broader stated sustainability approach of using reclaimed water rather than potable water at many of its data centers. Specific daily water-volume figures (gallons per day) for the Sunbury facility were not confirmed from Sunbury-specific sources during this research; some water-volume figures found in search results referenced a different Amazon data center project (Falls Township, Pennsylvania, near the Delaware River) and were excluded here to avoid misattribution.\"}, \"timeline\": \"November 2023: Sunbury City Council approves a Limited Industrial (LI) zoning update for ~1,200-1,300 newly annexed acres, explicitly permitting data centers.\\n2023: Amazon announces a $7.8 billion central Ohio investment plan (broader regional announcement, not Sunbury-specific).\\nNovember 20, 2024: AWS publicly announces a $2 billion data center campus for Sunbury, pushing its stated Ohio data center investment to roughly $10 billion.\\nDecember 30, 2024: Amazon/AWS entity acquires the project site at 11793 Vans Valley Road (Galena-area parcel), reported at roughly $44-54 million depending on source.\\nMarch 2025: AWS announces a further $1 billion Ohio AI data center investment tranche (statewide).\\n2025-2026: City negotiates CRA tax abatement and school-district compensation agreements (Big Walnut Local Schools, Delaware Area Career Center).\\nEarly 2026-Summer 2027: AEP Ohio constructs new 345kV transmission lines (Vassell Substation, Sunbury, to Green Chapel Road substations, New Albany) to serve regional growth including this project.\\nMarch 2026: Public meeting; residents voice data-center concerns (Delaware Gazette).\\nApril 2026: Sunbury City Council unanimously passes a moratorium pausing further action on data center projects, including this one, until January 31, 2027.\\nMay 2026: City releases public project records and holds an open house on the AWS proposal.\\nJune 2026: City council public forum specifically addresses water and power impacts.\\nJuly 2026: Resident coalition pushes a city charter amendment/ballot initiative for the November 2026 ballot to restrict or ban large data centers.\\nPlanned (pre-moratorium schedule): Construction of the first 450,000 sq ft building to begin January 2028; project completion/operations beginning December 2034.\", \"investors\": \"Sole developer/investor is Amazon Web Services, a subsidiary of Amazon.com, Inc. (NASDAQ: AMZN). Land was acquired directly by an Amazon-affiliated entity (reported locally as 'Amazon Data Services'); no third-party joint-venture partner has been publicly identified for this specific campus. The City of Sunbury acted as the public-sector partner, handling annexation, LI-district rezoning, and infrastructure commitments (new sanitary pump station, sewer/water line extensions, a new water tank, and at least one new roadway) to support the site. AEP Ohio is the utility partner building supporting transmission infrastructure. Big Walnut Local Schools and the Delaware Area Career Center are named parties to the associated tax-compensation agreements.\", \"politicalContext\": \"Sunbury Mayor Joe St. John [R] (running as the Republican nominee for Delaware County Commissioner in 2026) has taken a cautious public posture, saying the city wants time to study impacts and noting Amazon is 'very aware of the tenor nationally, and in particular, central Ohio' regarding data center pushback, and that Amazon wants to respond to questions thoughtfully. Sunbury City Council voted unanimously to pass a moratorium halting further movement on the AWS project until January 31, 2027, amid resident opposition. Delaware County Commissioner Jeff Benton [R] has spoken generally about Delaware County data centers (not confirmed as Sunbury-specific), saying 'there are pluses and minuses to a data center,' citing job creation and property tax revenue as benefits against electricity and water-use concerns. At the state level, State Rep. Adam Holmes [R-Nashport] and State Sen. Brian Chavez [R-Marietta] formed a joint Ohio House-Senate select committee in 2026 to study data centers statewide (general policy activity, not Sunbury-specific), with legislators publicly pressing tech-industry representatives over community opposition. A citizen coalition has organized a petition drive for a November 2026 Sunbury charter-amendment ballot measure to restrict data centers; resident Catherine Parker (not an elected official) is a vocal opponent quoted in local press. No Democratic or independent officials' statements specifically on this project were found in sources reviewed; where party affiliation could not be independently confirmed via an official bio, Ballotpedia, or Ohio Secretary of State record, no tag is applied.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/aws-plans-2bn-data-center-campus-in-sunbury-ohio/\", \"https://1808delaware.com/sunbury/everything-you-always-wanted-to-about-amazons-planned-sunbury-development/\", \"https://1808delaware.com/sunbury/sunbury-official-answers-faqs-about-aws-project/\", \"https://www.delgazette.com/2024/11/21/amazon-data-services-coming-to-sunbury/\", \"https://www.delgazette.com/2026/06/25/data-center-water-power-discussed-in-sunbury/\", \"https://www.delgazette.com/2026/03/23/public-voices-data-center-concerns/\", \"https://www.delgazette.com/2026/07/07/sunbury-voters-may-decide-on-data-centers/\", \"https://www.knoxpages.com/2026/06/26/sunbury-city-council-hears-how-data-centers-affect-water-and-power-in-first-public-forum/\", \"https://www.delawaresource.com/2026/05/07/sunbury-city-council-announces-data-center-open-house-unveils-more-project-files/\", \"https://www.delawaresource.com/2026/04/16/sunbury-city-council-passes-moratorium-on-data-centers-in-effect-till-2027/\", \"https://www.10tv.com/article/news/local/sunbury-city-council-passes-moratorium-data-centers/530-1802c6de-12e6-48c6-b390-1308fbcbc76c\", \"https://www.nbc4i.com/intel-in-ohio/amazon-web-services-to-invest-10-billion-more-into-ohio/\", \"https://www.costar.com/article/1381199103/amazon-web-services-boosts-data-center-investments-in-ohio-by-10-billion\", \"https://www.datacenterdynamics.com/en/news/aws-purchases-44m-galena-property-for-sunbury-campus-in-ohio/\", \"https://www.digitalcommerce360.com/2025/03/12/aws-to-invest-another-1-billion-in-ohio-ai-data-centers/\", \"https://sunburyohio.org/DocumentCenter/View/1692/Data-Center-FAQ?bidId=\", \"https://sunburyohio.org/DocumentCenter/View/1727/Data-Center-Tax-and-Benefit-Analysis?bidId=\", \"https://www.aepohio.com/company/news/view?releaseID=11922\", \"https://www.indianamichiganpower.com/company/news/view?releaseID=2503\", \"https://1808delaware.com/business/transmission-system-upgrades-focus-of-upcoming-public-meetings/\", \"https://baxtel.com/data-center/amazon-sunbury-ohio\", \"https://cleanview.co/data-centers/ohio/1681/aws-sunbury\", \"https://hoodline.com/2026/03/sunbury-neighbors-revolt-as-2-billion-amazon-data-hub-moves-in-next-door/\", \"https://www.yahoo.com/news/politics/articles/sunbury-residents-push-let-voters-195615647.html\", \"https://ballotpedia.org/Jeff_Benton_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"https://co.delaware.oh.us/commissioners/commissioner-1-bio/\", \"https://www.delgazette.com/2026/04/08/st-john-vaughan-vie-for-commissioner-seat/\", \"https://sunburyohio.org/170/Joe-St-John-Mayor\", \"https://ohiocapitaljournal.com/2026/06/08/big-tech-defends-data-centers-before-ohio-lawmakers/\", \"https://www.timesleaderonline.com/news/local-news/2026/05/lawmakers-form-group-to-study-data-centers-in-ohio/\", \"https://ohiosenate.gov/live/ohio-house-and-senate-select-committees-on-data-centers\"]}, \"ts\": 1784272480000}", "v67_dc_delawarecologix-col5": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Site work/construction start (\\\"groundbreaking\\\") occurred by June 18, 2025, per the Delaware County Regional Planning & Community Development newsletter announcing 'Denver company Cologix starts work on Lewis Center AI data center.' The facility (Phase 1: 135,000 sq ft building / 60,000 sq ft raised floor, 25 MW) is targeted to be 'ready for service' in Q3 2026, with Phase 1 completion also described as 'fall 2026' in local reporting. Land (28 acres at the SE corner of Green Meadows Drive and Home Road, Orange Township) was assembled prior to the June 2025 start. The associated Ohio Tax Credit Authority state sales-tax exemption was not formally approved until roughly a year later, around early June 2026, i.e., construction began before the state incentive was finalized.\", \"powerMW\": \"25 MW (Phase 1/COL5 as commissioned). Multiple trade sources describe an eventual full campus buildout at this Orange Township site reaching approximately 120 MW (Cologix's own spec materials describe COL5 commissioning at 25 MW 'with plans for an additional facility, which will add 95 MW in the future,' i.e., 25 MW now + 95 MW later = 120 MW total).\", \"sizeSqFt\": \"Phase 1 building: 135,000 sq ft (per Delaware County regional planning newsletter and local reporting), of which approximately 60,000 sq ft is described as raised-floor colocation ('white space') by datacenters.com/datacentermap listings. Full future campus square footage was not separately disclosed.\", \"totalInvestment\": \"Figures vary by scope/source and are not perfectly reconciled in public reporting: (1) ~$1 billion — the widely repeated figure for the COL5 Orange Township complex specifically, cited when Cologix 'started work' (June 2025); (2) $274 million — an Orange Township building-permit valuation for Phase 1 construction (per local council/permit reporting); (3) $1.17 billion — the combined capital commitment Cologix pledged across BOTH the Delaware County (COL5) and Licking County (Johnstown) projects as a condition of the June 2026 Ohio Tax Credit Authority 50%/10-year sales-tax exemption; (4) 'over $1.1 billion' — the figure used in Columbus Regional's press materials for Cologix's combined Orange Township + Johnstown investment. Note: Cologix's much larger, separate Licking County 'Johnstown Campus' (154 acres, up to 800 MW, ~$7 billion) is a distinct facility from COL5 and should not be conflated with it, though state incentive filings bundle the two projects together.\", \"employment\": {\"construction\": \"Not publicly disclosed as a fixed number. Company/press materials describe 'hundreds of additional construction jobs through a multi-year buildout' without a precise figure.\", \"permanent\": \"90 full-time-equivalent jobs, per the commitment Cologix made to the Ohio Tax Credit Authority in exchange for the state sales-tax exemption (covering the combined Delaware + Licking county projects), to be created by the end of 2028/2035 depending on source.\", \"totalPayroll\": \"$10 million in new annual payroll by the incentive deadline (~2028), averaging roughly $111,000 per job, per the Ohio Tax Credit Authority incentive filing.\"}, \"gridImpact\": {\"summary\": \"COL5 draws its 25 MW load from AEP Ohio amid a broader surge in Delaware/Licking County electricity demand that is prompting new AEP transmission lines and an interim onsite fuel-cell generation deal.\", \"detail\": \"AEP Ohio has announced plans for two new 345-kV transmission lines connecting the Vassell Substation (Sunbury, Delaware County) to new substations near Green Chapel Road in New Albany (Licking County) to serve growing data-center demand in the corridor; regional load is
