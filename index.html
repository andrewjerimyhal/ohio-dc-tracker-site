ile lists 5 MW nameplate capacity, consistent within rounding.\", \"sizeSqFt\": \"83,000 sq ft (consistently reported across datacenters.com, datacentermap.com, cloudandcolocation.com, and UPSTACK listings)\", \"totalInvestment\": \"Not publicly disclosed. No county auditor filing, press release, or news article was found quantifying original construction cost or capital investment for this specific CIN4 building.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed. Note: a JobsOhio/Ohio Development Services Agency tax-credit announcement (Dec. 2023) referencing a CyrusOne expansion creating 10 jobs and ~$1.5M in new payroll applies to CyrusOne's CIN5 facility in Lebanon, Warren County — a different building/county — and should not be attributed to CIN4 in Hamilton, Butler County.\"}, \"gridImpact\": {\"summary\": \"No documented grid-impact study, transmission upgrade, or utility filing specific to CIN4 was found.\", \"detail\": \"The Hamilton area is served by Duke Energy Ohio. CyrusOne marketing materials for CIN4 describe 'diverse power feed' with multiple on-site substations for redundancy and note the local grid mix is roughly 45% non-carbon. Recent (2025-2026) local reporting on data-center grid strain, PUCO rate cases, and Duke Energy rate-increase requests in Butler County concerns newly PROPOSED large facilities (a ~100+ MW project on 29 acres of city-owned land in Hamilton, and a ~1 million-sq-ft Prologis project in Trenton) — not the existing, much smaller CIN4 (4.8-5 MW) facility. These should not be conflated.\"}, \"taxImplications\": {\"summary\": \"No CIN4-specific abatement, CRA, PILOT, or sales-tax-exemption record was located.\", \"detail\": \"Butler County and its municipalities (including Hamilton) administer Community Reinvestment Area (CRA) programs typically lasting 10-15 years for qualifying commercial/industrial improvements, and Ohio offers a state data-center sales/use tax exemption program (administered via JobsOhio/Ohio Development Services Agency) for large qualifying data centers. No public record was found confirming CIN4 specifically received either. The Butler County Auditor's parcel/property database (propertysearch.bcohio.gov) could contain valuation and abatement-flag data for 103 Knightsbridge Drive but was not accessible via automated search in this research pass.\"}, \"environmentalImpact\": {\"summary\": \"No site-specific environmental permit, land-use controversy, or impact filing was found for CIN4 itself.\", \"detail\": \"CIN4 sits in an established light-industrial/commercial corridor (Knightsbridge Drive) rather than the greenfield/wooded sites now generating local opposition. Public environmental concern in Butler County in 2025-2026 (noise, light pollution, forest clearing, water/electricity strain, a 600+ member 'Coalition Against Data Centers in South Ohio' Facebook group, and a Cincinnati Socialists statement titled 'Profit over People and Planet') is directed at NEW proposed projects (the ~29-acre Hamilton site near Miami University's Hamilton campus and the Trenton/Prologis site), not at the existing CIN4 facility.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"CyrusOne as a company promotes closed-loop chiller cooling systems company-wide (stating ~83% of its new builds in 2023 used 'water-free' closed-loop designs, with only an initial ~8,000-gallon fill and ~1,200 gallons/day for restrooms/humidification), but no source specifically confirms the cooling architecture (closed-loop, evaporative, or air-cooled) used at the CIN4 building, which appears to be an older facility (circa 2005) that may predate CyrusOne's newer standardized closed-loop design. Status should be treated as unconfirmed for this specific building.\"}, \"timeline\": \"~2005: Facility at 103 Knightsbridge Drive, Hamilton, OH reportedly begins operating as a data center (per WVXU, Dec. 2025). June 2010: Cincinnati Bell acquires CyrusOne (~$525M), bringing the facility under the CyrusOne brand. January 2013: CyrusOne completes IPO on NASDAQ as a REIT, spun out of Cincinnati Bell. March 25, 2022: KKR and Global Infrastructure Partners complete ~$15 billion all-cash acquisition of CyrusOne; company taken private, delisted from NASDAQ. Present: CIN4 continues operating as an 83,000 sq ft, ~4.8-5 MW colocation facility marketed for production colocation, backup/DR, and business continuity. Separately, since late 2025, Hamilton and neighboring Trenton have been considering unrelated, much larger new data-center proposals that have drawn public and political attention — distinct from CIN4.\", \"investors\": \"CyrusOne Inc. was a publicly traded REIT (NASDAQ: CONE) from its January 2013 IPO until March 2022, when it was acquired for ~$15 billion (incl. debt assumption) by a consortium of investment funds managed by KKR and Global Infrastructure Partners (GIP), who now jointly own CyrusOne as a private company. No separate/local investor or joint-venture structure specific to the Hamilton CIN4 property was identified.\", \"politicalContext\": \"No political statements or records from named officials specifically about the CIN4 facility in Hamilton were found. All identified political and community activity regarding data centers in Hamilton/Butler County — including WCPO reporting on residents voicing concerns at a Hamilton City Council meeting, the Journal-News/Dayton Daily News 'Life-changing decision' and 'biggest power guzzlers' coverage, and the Cincinnati Socialists' 'Profit over People and Planet' statement — concerns NEW proposed data centers (a ~$100M, 100+ MW project on 29 acres of city-owned land near Miami University's Hamilton campus, and a separate Prologis-developed site in Trenton), not the existing, smaller CIN4 facility. No named official (mayor, council member, county commissioner, or state legislator) was found making a statement specifically about CIN4. Per instructions, this is stated explicitly rather than fabricating any CIN4-specific political commentary.\", \"sources\": [\"https://www.datacenters.com/cyrusone-cin4-cincinnati-hamilton\", \"https://www.datacentermap.com/usa/ohio/cincinnati/cyrusone-ohio-hamilton/\", \"https://inflect.com/building/103-knightsbridge-drive-hamilton/cyrusone/datacenter/cyrusone-cincinnati-hamilton\", \"https://www.colocapacity.com/facilities/1380/Cincinnati%20CIN4%20Data%20Center\", \"https://cloudandcolocation.com/datacenters/cyrusone-hamilton-data-center/\", \"https://marketplace.upstack.com/data-centers/cyrusone-data-center-cincinnati-hamilton\", \"https://www.datacenterhawk.com/marketplace/providers/cyrusone/103-knightsbridge-drive/cin4\", \"https://www.datacenterhawk.com/colo/cyrusone/103-knightsbridge-drive/hamilton\", \"https://www.wvxu.org/environment/2025-12-03/developers-data-center-butler-county\", \"https://www.wcpo.com/hamilton-ohio-data-center-city-council-meeting-october\", \"https://www.journal-news.com/news/what-is-a-data-center-hamilton-trenton-likely-to-get-large-facilities-for-vast-computing/article_fe556acc-2173-50e5-8473-4348a272644f.html\", \"https://www.journal-news.com/local/life-changing-decision-data-center-growth-fuels-fears-in-local-communities/FQ4JYJCGSVG7TBF7C7A2GR6SVA/\", \"https://www.journal-news.com/news/proposed-data-center-could-be-one-of-ohios-biggest-power-guzzlers/PIHRA4ZAGJC75OTEGK5EPR3VIY/\", \"https://www.journal-news.com/news/data-center-project-part-of-the-growth-happening-in-hamilton/YBCOX7A33BGJZHUMP6EXWB5NTM/\", \"https://www.cincysocialists.net/statements/profit-over-people-and-planet\", \"https://www.govtech.com/artificial-intelligence/ohio-communities-grapple-with-data-center-approval-decisions\", \"https://www.datacenterdynamics.com/en/news/logistix-gets-planning-commission-approval-for-data-center-project-outside-cincinnati-ohio/\", \"https://development.ohio.gov/home/news-and-events/all-news/2023-1211-new-projects-expected-to-create-1600-jobs-more-than-2-5-billion-in-investments\", \"https://www.paulweiss.com/insights/client-news/gip-and-kkr-complete-15-billion-acquisition-of-cyrusone\", \"https://www.datacenterfrontier.com/featured/article/11427810/kkr-gip-to-acquire-cyrusone-in-blockbuster-15-billion-deal\", \"https://www.datacenterdynamics.com/en/news/confirmed-kkr-gip-acquire-cyrusone-for-15bn-american-tower-acquires-coresite/\", \"https://www.sec.gov/Archives/edgar/data/1553023/000110465922010326/tm225019d1_ex99-1.htm\", \"https://baxtel.com/data-center/cyrusone-cincinnati-hamilton\", \"https://www.datacenterjournal.com/data-centers/ohio/cincinnati/cyrusone-hamilton/\", \"https://auditor.bcohio.gov/real_estate/taxes/abatements___exemptions/index.php\", \"https://propertysearch.bcohio.gov/\", \"https://www.cyrusone.com/resources/blogs/cooling-efficiencies-in-data-centers-one-size-doesnt-fit-all\"]}, \"ts\": 1784434061000}", "v67_dc_butlerflexential-cin01-02": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"October 2008 (original Peak 10 facility, later rebranded Flexential CIN01); second building CIN02 completed February 2017. A 2025 CMBS filing separately states Flexential occupancy at the 'Synergy Park' property since 2010, which may reflect a broader lease footprint than the data center alone.\", \"powerMW\": \"3 MW (tracker figure); vendor marketing materials list slightly different figures across sources: CIN01 1.1 MW + CIN02 1.8 MW (~2.9 MW combined) per one listing, and '3.8 MW critical power' per others. Backed by redundant 2.4 MW diesel generators.\", \"sizeSqFt\": \"43,551 sq ft total facility footprint, with roughly 16,000 sq ft of raised-floor colocation space (one source cites 12,000 sq ft of 24-inch raised floor); built in phases — 22,000 sq ft (2008) + 5,000 sq ft (2014) + ~20,000 sq ft/13,000 sq ft raised floor (2016-17).\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No facility-specific grid impact study, interconnection filing, or transmission-load disclosure was found. West Chester Township/Butler County is in Duke Energy Ohio's service territory, but no source specifically documents a substation study, load agreement, or grid-impact analysis tied to this facility. At 3 MW, this colocation facility is far below the scale (typically 50-300+ MW) that has prompted utility grid-impact studies for newer Ohio hyperscale projects (e.g., Prologis/Trenton, AEP Ohio cases).\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No Butler County Auditor record, Community Reinvestment Area (CRA) agreement, PILOT, or West Chester Township incentive agreement specific to this parcel/facility was found. Ohio's data center sales-tax exemption (ORC 122.175, administered by JobsOhio) requires a minimum $100 million capital investment and $1.5 million annual payroll to qualify — there is no evidence this smaller, incrementally-built colocation facility met that threshold or entered such an agreement, in contrast to larger recent Butler County projects like Trenton's Prologis 'Project Mila' data center, which did receive a 15-year, 75% CRA property tax abatement.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No specific environmental permit, EPA filing, or land-use/environmental review document was found for this facility. It occupies a commercial/business-park site (Synergy Park) and was built incrementally as office/data-center space rather than as a large greenfield campus, so it would likely have gone through routine local site-plan/zoning review rather than a major environmental impact process, but no such record was located.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"The facility uses a chilled-water cooling system with N+1 redundancy per vendor listings, but no source confirms whether this specific building's loop is closed-loop, open-loop, or evaporative. At the company level, Flexential states that roughly 84% of its total data center capacity portfolio-wide is now supported by closed-loop cooling systems designed to minimize water consumption, and newer 'Generation 5' facilities target zero water usage, but this is a portfolio-wide figure, not confirmation for the Cincinnati/West Chester site specifically, which predates Flexential's newest design generation.\"}, \"timeline\": \"Dec 2007: Peak 10 announces new Cincinnati-market data center in West Chester, OH. Oct 2008: 22,000 sq ft facility (CIN01) opens. Aug 2014: Peak 10 adds 5,000 sq ft, bringing total to ~27,000 sq ft. May 2016: Peak 10 announces a second, greenfield data center building (CIN02) at the same 5307 Muhlhauser Road site, ~20,000 sq ft with 13,000 sq ft raised floor. Feb 2017: Peak 10 announces completion of the 20,000 sq ft Cincinnati-area expansion. Aug 2017: Peak 10 acquires ViaWest for $1.67 billion. Jan 2018: Peak 10 + ViaWest rebrand as Flexential; facility becomes 'Flexential Cincinnati (CIN01/CIN02).' 2018: Flexential's lease at the broader Synergy Park property is extended, now running through Jan 2033 with two 5-year renewal options.\", \"investors\": \"Flexential was formed in 2017 when GI Partners merged its portfolio company Peak 10 with ViaWest (acquired for $1.67B), rebranding as Flexential in January 2018. GI Partners has remained a lead investor. Flexential has also received infrastructure investment from Morgan Stanley Infrastructure Partners. No investor or ownership disclosure is specific to the Cincinnati/West Chester facility itself — these are company-level, not asset-level, ownership facts.\", \"politicalContext\": \"No facility-specific political statements or records from named officials were found. Searches for West Chester Township trustees, Butler County commissioners, and general economic-development officials commenting specifically on the Flexential/Peak 10 Cincinnati facility did not return any results. This facility does not appear to have been a subject of public political debate, unlike larger recent Butler County data center proposals (e.g., Trenton's Prologis project), which have drawn public commentary. No party affiliations are cited because no facility-specific statements exist to attribute.\", \"sources\": [\"https://www.datacenterjournal.com/data-centers/ohio/cincinnati/flexential-cincinnati-cin01-02/\", \"https://inflect.com/building/5307-muhlhauser-road-west-chester-township/flexential/datacenter/cin02\", \"https://inflect.com/building/5307-muhlhauser-road-west-chester-township/flexential/datacenter/cin\", \"https://ryangrissinger.com/issues/data-centers/OH-DC-0061\", \"https://www.flexential.com/data-centers/oh/cincinnati/data-center\", \"https://baxtel.com/data-center/flexential-cincinnati-1-and-2\", \"https://www.datacenters.com/flexential-cincinnati\", \"https://datacenterhawk.com/marketplace/providers/flexential/5307-muhlhauser-road/cincinnati\", \"https://cloudandcolocation.com/datacenters/flexential-cincinnati-data-center/\", \"https://www.datacentermap.com/usa/ohio/cincinnati/peak-10-cincinnati.html\", \"https://www.datacenterdynamics.com/en/news/peak-10-viawest-becomes-flexential/\", \"https://www.sec.gov/Archives/edgar/data/1541480/000153949725000768/n4821-x13_424b2.htm\", \"https://www.sec.gov/Archives/edgar/data/1541480/000153949725000717/n4821_x6-424h.htm\", \"https://wraltechwire.com/2007/12/14/peak-10-expands-with-new-facility-in-cincinnati/\", \"https://www.datacenterknowledge.com/infrastructure/peak-10-expands-into-cincinnati\", \"https://www.prnewswire.com/news-releases/peak-10-expands-cincinnati-operations-by-5000-square-feet-272139301.html\", \"https://hostingjournalist.com/news/peak-10-adds-5000-square-feet-to-cincinnati-data-center\", \"https://www.datacenterdynamics.com/en/news/peak-10-is-building-second-data-center-in-cincinnati/\", \"https://www.flexential.com/newsroom/peak-10%E2%80%99s-new-data-center-facility-delivers-support-cincinnati-growth\", \"https://www.structureresearch.net/2016/05/12/peak-10-expanding-cincinnati-data-centre/\", \"https://www.businesswire.com/news/home/20170228005533/en/Peak-10-Completes-Data-Center-Expansions-Adds\", \"https://www.datacenterfrontier.com/hyperscale/article/55237220/us-data-center-investments-roll-on-equinix-adds-15b-jv-for-hyperscale-expansion-morgan-stanley-funds-flexential\", \"https://www.prnewswire.com/news-releases/flexentials-2025-esg-report-details-progress-on-sustainable-data-center-infrastructure-302820256.html\", \"https://codes.ohio.gov/ohio-revised-code/section-122.175\", \"https://www.jobsohio.com/incentives-programs/data-center-tax-exemption\", \"https://www.journal-news.com/local/what-to-know-about-trenton-s-proposed-data-center-tax-incentives/article_7b381512-adde-58f8-b35b-b43ca25051ef.html\"]}, \"ts\": 1784434061000}", "v67_dc_butlerlumen-cincinnati-2": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Building constructed c. 2001; site has operated as a telecom colocation facility since it was built and used by tw telecom under the 'TWTC Cincinnati' designation. No public record of a specific 'grand opening' date for the facility under the Lumen brand — Lumen inherited the site through corporate succession, not a new build.\", \"powerMW\": \"Not publicly disclosed (tracker lists 0 MW / negligible nameplate as a small telecom colo site; third-party aggregator listings reference the site inconsistently and none could be independently verified via direct fetch, so no reliable MW figure can be confirmed)\", \"sizeSqFt\": \"Not precisely confirmed for the data center suite itself. The building at 9490 Meridian Way sits within a small commercial/industrial complex at 9466-9490 Meridian Way (total complex ~59,400 sq ft, built 1998); the specific 9490 structure is described by one aggregator as a single-story cinder block building with concrete slab-on-grade construction, built circa 2001. No confirmed raised-floor or colocation square footage figure (contrast with Lumen's Cincinnati 1 at 7,059 sq ft raised floor and Cincinnati 3 at 50,000 sq ft total / 5,129 sq ft raised floor, which have published specs).\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No documented grid impact\", \"detail\": \"This is a small legacy telecom colocation node (originally built by tw telecom, later Level 3, then CenturyLink/Lumen), not a large-load hyperscale facility. No utility, transmission, or grid-capacity filings referencing this specific address were found. Duke Energy Ohio serves the West Chester area generally, but no site-specific interconnection or load studies are publicly documented for 9490 Meridian Way. This contrasts with the large new hyperscale data center proposals in Butler County (Hamilton, Trenton, Liberty Twp., etc.) that are generating public grid-impact scrutiny.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement, CRA, or PILOT agreement found\", \"detail\": \"No Community Reinvestment Area (CRA) abatement, PILOT, or Ohio data-center sales-tax exemption (which requires $100M+ investment and $1.5M+ annual payroll) was found tied to this address. West Chester Township now prohibits new data centers outright (a policy that postdates this legacy site), so the facility appears to predate and sit outside the current wave of data-center tax-incentive deals being negotiated elsewhere in Butler County (e.g., the county's other townships allowing data centers as conditional use). No Butler County Auditor abatement record for this parcel could be retrieved (auditor property-search site blocked direct automated access).\"}, \"environmentalImpact\": {\"summary\": \"Minimal documented environmental impact; small existing commercial building\", \"detail\": \"The site occupies an existing light-industrial/commercial building in the Union Centre business park area of West Chester Twp., built c. 1998-2001 — it was not developed via a greenfield/new-construction environmental review process typical of new hyperscale campuses. No wetlands, air-permit, or land-use controversy specific to this address was found in press or planning records.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No facility-specific cooling system disclosure was found. As a small legacy telecom colocation node (converted commercial building rather than a purpose-built hyperscale campus), it is unlikely to use large-scale evaporative or open-loop water cooling, but Lumen has not published cooling specifications for this address. (Note: Lumen's publicized closed-loop, water-free cooling initiative is tied to a separate Wyoming Hyperscale partnership project, not this Cincinnati site, and should not be conflated with it.)\"}, \"timeline\": \"1998: larger Meridian Way commercial complex constructed. c. 2001: 9490 Meridian Way building constructed / fitted out as a telecom data center by tw telecom (TWTC Cincinnati). 2014: tw telecom acquired by Level 3 Communications; facility rebranded Level 3 Cincinnati (West Chester). 2016-2017: Level 3 acquired by CenturyLink. 2020: CenturyLink rebrands corporately to Lumen Technologies; facility becomes 'Lumen Cincinnati 2.' No subsequent expansion, redevelopment, or closure announcements found as of 2026.\", \"investors\": \"Wholly owned and operated by Lumen Technologies, Inc. (NYSE: LUMN), a publicly traded company; no separate joint-venture partners, REIT co-owners, or outside investors identified for this specific facility. Prior owner-operators in the facility's history: tw telecom inc. (through 2014), Level 3 Communications, Inc. (2014-2017), CenturyLink, Inc. (2017-2020, renamed Lumen Technologies in 2020).\", \"politicalContext\": \"No political statements or records from named officials specifically about this Lumen Cincinnati 2 / 9490 Meridian Way facility were found. Local political attention in Butler County (including West Chester Township's decision to prohibit new data centers, and Journal-News/Dayton Daily News coverage of 'data center growth fears') is directed at newly proposed large hyperscale projects elsewhere in the county (Hamilton, Trenton, Liberty Twp., Fairfield Twp., and other Butler/Clark/Clinton County sites), not at this existing small legacy telecom colocation site, which predates that controversy and does not appear to have been a subject of any zoning, council, or trustee debate.\", \"sources\": [\"https://www.datacentermap.com/usa/ohio/cincinnati/twtc-cincinnati/\", \"https://www.datacentermap.com/usa/ohio/cincinnati/twtc-cincinnati/specs/\", \"https://www.datacenters.com/providers/lumen/locations/united-states/ohio/west-chester-township\", \"https://cloudandcolocation.com/datacenters/tw-telecom-cincinnati-data-center/\", \"https://cloudandcolocation.com/city/west-chester/\", \"https://platform.inflect.com/building/9490-meridian-way-west-chester-township\", \"https://platform.inflect.com/building/9490-meridian-way-west-chester-township/lumen/datacenter/level-3-west-chester\", \"https://baxtel.com/data-centers/lumen-technologies\", \"https://h5datacenters.com/cincinnati-II-data-center.html\", \"https://www.loopnet.com/Listing/9466-9490-Meridian-Way-West-Chester-OH/29112052/\", \"https://www.journal-news.com/local/life-changing-decision-data-center-growth-fuels-fears-in-local-communities/FQ4JYJCGSVG7TBF7C7A2GR6SVA/\", \"https://www.journal-news.com/local/can-butler-county-issue-a-county-wide-data-centers-moratorium/article_9ef5b504-1ef3-5747-b310-703ac81f488d.html\", \"https://www.govtech.com/artificial-intelligence/ohio-communities-grapple-with-data-center-approval-decisions\", \"https://www.datacenters.com/lumen-cincinnati-1\", \"https://www.datacenters.com/lumen-cincinnati-3\", \"https://www.lumen.com/en-us/services/colocation.html\", \"https://www.telecompetitor.com/lumen-technologies-working-on-eco-friendly-sustainable-data-centers/\", \"https://www.butlercountyauditor.org/\", \"https://propertysearch.butlercountyauditor.org/\"]}, \"ts\": 1784434061000}", "v67_dc_clermontdartpoints-eastgate-cincinnati": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Facility built/opened in 2008 (originally as an Immedion data center). DartPoints acquired the site as part of its acquisition of Immedion, announced March 16, 2021 and closed in Q2 2021.\", \"powerMW\": \"Not publicly disclosed. No power capacity (kW/MW) figure is published specifically for the Eastgate/Ivy Pointe site (distinct from DartPoints' separate downtown Cincinnati/CVG01 facility, which is listed elsewhere at 1.6 MW — that figure does not apply to Eastgate). Consistent with tracker's 0 MW / small edge colo classification.\", \"sizeSqFt\": \"2,887 sq ft of colocation space (per Baxtel, DataCenterMap, Ocolo, Inflect listings), located within a larger 101,338 sq ft multi-tenant building on a 7.01-acre lot at 4270 Ivy Pointe Blvd, Cincinnati, OH 45245 (Union Township, Clermont County).\", \"totalInvestment\": \"Not publicly disclosed for this specific data center. DartPoints' 2021 acquisition of Immedion (which included this site plus 7 other data centers in SC, NC, OH and IN) did not disclose deal terms. Separately, Clermont County's broader Ivy Pointe Business Park redevelopment (not specific to the data center) involved an $8.3 million county land purchase plus TIF-financed road/utility construction, but this figure covers the whole business park, not the data center parcel.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No facility-specific grid impact data disclosed\", \"detail\": \"No utility name, load figures, or transmission notes specific to this small edge colocation site were found in county, utility, or trade-press sources. Given its small footprint (2,887 sq ft) it is consistent with standard commercial/light-industrial electric service rather than a dedicated transmission interconnection.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement confirmed\", \"detail\": \"Union Township, Clermont County maintains a general Community Reinvestment Area (CRA) property-tax incentive program for commercial development, and the broader Ivy Pointe Business Park was developed using Tax Increment Financing (TIF) on county-purchased land. However, no source confirms this specific data center parcel/tenant received a CRA abatement, PILOT, or Ohio's data-center sales-tax exemption (which in any case requires $100M+ investment and $1.5M+ annual payroll thresholds this small facility would not meet).\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental review or permit found\", \"detail\": \"The site occupies existing commercial building space built in 2008 within the county-developed Ivy Pointe Business Park (originally 99 acres purchased by Clermont County in 2005 for park development). No dedicated environmental impact statement, air/water permit, or land-use filing specific to the data center tenancy was located.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Marketing material references only generic 'redundant HVAC systems and advanced cooling technologies' for this location; no source specifies closed-loop, open-loop, evaporative, or air-cooled/DX cooling design for the Eastgate facility specifically.\"}, \"timeline\": \"2005: Clermont County begins Ivy Pointe Business Park redevelopment, purchasing ~99 acres for $8.3M. 2008: Data center building at 4270 Ivy Pointe Blvd constructed/opened, operated by Immedion. March 16, 2021: DartPoints announces agreement to acquire Immedion (8 data centers across SC, NC, OH, IN). Q2 2021: Acquisition closes; site rebranded DartPoints Eastgate Cincinnati. Present: Listed as an active DartPoints colocation site (2,887 sq ft) in Union Township, Clermont County.\", \"investors\": \"Operator is DartPoints (Dallas, TX-headquartered regional colocation/edge provider), which is backed by private equity firm Astra Capital Management. DartPoints acquired the facility via its 2021 purchase of Immedion LLC (previously the site operator); deal terms were not disclosed. No public/SEC filings exist for DartPoints as it is privately held.\", \"politicalContext\": \"No facility-specific political statements, endorsements, or objections from named officials were found in county, township, or press coverage. Broader Clermont County/Union Township officials have publicly promoted the Ivy Pointe Business Park generally (e.g., in connection with tenants like TQL), but no statement specifically addresses the DartPoints/Immedion data center at this site, so none is reported here rather than fabricated.\", \"sources\": [\"https://baxtel.com/data-center/dartpoints-eastgate-cincinnati\", \"https://baxtel.com/data-center/immedion-eastgate-cincinnati\", \"https://www.datacentermap.com/usa/ohio/cincinnati/east-cincinnati-ivy-pointe/\", \"https://www.ocolo.io/colocation/dartpoints/cincinnati-eastgate/\", \"https://inflect.com/building/4270-ivy-pointe-boulevard-cincinnati/immedion-llc/datacenter/immedion-llc-eastgate-cincinnati-data-center\", \"https://platform.inflect.com/building/4270-ivy-pointe-boulevard-cincinnati\", \"https://www.datacenters.com/dartpoints-cincinnati\", \"https://dartpoints.com/locations/cvg01-cincinniati-oh/\", \"https://dartpoints.com/data-centers/ohio-data-center/\", \"https://totaltele.com/dartpoints-to-acquire-immedion/\", \"https://www.businesswire.com/news/home/20210316005637/en/DartPoints-to-Acquire-Immedion\", \"https://dartpoints.com/press/dartpoints-to-acquire-immedion/\", \"https://www.astracapitalmgmt.com/news/2021/3/16/dartpoints-to-acquire-immedion\", \"https://www.datacenterdynamics.com/en/news/dartpoints-acquires-immedion-triples-data-center-footprint/\", \"https://www.sheppardmullin.com/pressrelease-732\", \"https://clermontcountyohio.biz/wp-content/uploads/sites/3/ivy-pointe-story-2019-update.pdf\", \"https://www.clermontsun.com/2019/08/15/tql-story-illustrates-the-power-of-planned-economic-development\", \"https://www.utclermont.gov/290/Community-Reinvestment-Area-CRA\", \"https://www.redfin.com/OH/Cincinnati/4270-Ivy-Pointe-Blvd-45245/home/71328351\", \"https://www.clermontauditor.org/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogaark-data-centers-independence": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"2017 (facility introduced/opened in Independence, Ohio per baxtel.com and datacenterhawk.com listings). Exact commissioning/turn-up date not publicly disclosed.\", \"powerMW\": \"Tracker file lists 3 MW nameplate capacity. Independent trade-press listings (datacentermap.com, datacenterhawk.com) describe the facility at roughly 2.0-2.5 MW of available power as of their most recent updates, including a 1 MW power addition completed alongside a 2022 expansion. The discrepancy between the 3 MW tracker figure and the ~2-2.5 MW trade-press figures could not be resolved with available sources.\", \"sizeSqFt\": \"40,000 sq ft total facility footprint following a 2022 expansion that added 14,000 sq ft. Earlier/base listings describe roughly 17,000 sq ft of raised-floor colocation (white) space at the site, 7300 E Pleasant Valley Rd, Independence, OH 44131.\", \"totalInvestment\": \"ark data centers announced a combined investment of more than $136 million to expand data-processing capacity across its Akron and Independence, Ohio locations jointly (per Northeast Ohio regional economic development coverage). The Independence-specific share of that investment figure is not broken out in public sources. No county auditor or municipal capital-investment filing specific to this parcel was located.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"A Northeast Ohio regional economic-development announcement about ark data centers' combined Akron + Independence expansion cited 10 new jobs and 27 retained positions across the two-site project. An Independence-only breakdown of new/retained jobs is not publicly disclosed.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No source identifies the serving electric utility, substation, interconnection agreement, or committed load/transmission impact for this facility. Given its location and modest scale (2-3 MW class colocation site, not a hyperscale campus), it is unlikely to have triggered the kind of large-load transmission studies associated with gigawatt-scale proposals, but no utility filings or grid-impact documentation specific to this site were found.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No Community Reinvestment Area (CRA) agreement, PILOT, Cuyahoga County auditor abatement record, or Ohio state data-center sales-tax exemption (ORC 122.175) filing specific to this facility was located in available sources. Ohio's data center sales/use tax exemption program is available to qualifying operators generally, but no confirmation that ark data centers has applied for or received such an exemption for the Independence site was found.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No environmental permit filings, land-use/zoning case records, or environmental review documents specific to this facility were located. The facility appears to be a build-out/expansion of an existing colocation building rather than new greenfield construction, which would typically carry a smaller land-disturbance footprint than a new hyperscale campus, but no formal environmental documentation was found to confirm this.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No source specifies whether the facility's cooling system is closed-loop, open-loop, or evaporative, or discloses water-usage figures. Marketing materials describe 2N UPS and 2N generator redundancy and Uptime Institute Tier III (5th generation) design, consistent with typical CRAC/CRAH air-cooled colocation infrastructure at this scale, but explicit cooling-water disclosures were not found.\"}, \"timeline\": \"2017: ark data centers facility introduced/opened in Independence, Ohio (7300 E Pleasant Valley Rd), about 15 minutes from downtown Cleveland. Note: a datacentermap.com listing URL for this address uses the slug 'involta-independence,' suggesting possible prior association with the Involta brand at this site, though no acquisition/rebrand details could be confirmed. 2022: Facility expanded by 14,000 sq ft and 1 MW of power, bringing total space to roughly 40,000 sq ft; facility achieved Uptime Institute Tier III, 5th-generation certification. Undated (reported via Northeast Ohio regional economic-development news): ark data centers announced a combined $136+ million investment to expand data-processing capacity at both its Akron and Independence, Ohio locations, adding 10 new jobs and retaining 27 existing positions region-wide.\", \"investors\": \"Operator of record is ark data centers, LLC. No specific investor group, private-equity backer, or parent-company ownership structure for the Independence facility was disclosed in available sources. The site's listing history (URL slug referencing 'Involta') suggests a possible legacy connection to Involta branding, but no confirmed acquisition, merger, or ownership-transfer record was found.\", \"politicalContext\": \"No facility-specific political statements or records from named elected officials about the ark data centers Independence, Ohio facility were found. The only related public coverage located is a Northeast Ohio regional economic-development article discussing ark data centers' broader Akron/Independence investment plans; it did not contain direct, attributable quotes from named officials that could be tied specifically to the Independence facility. No political statements are reported here rather than fabricating any.\", \"sources\": [\"https://www.datacentermap.com/usa/ohio/cleveland/involta-independence/\", \"https://datacenterhawk.com/marketplace/providers/involta/7300-east-pleasant-valley-road/independence\", \"https://northeastohioregion.com/news/ark-data-centers-llc-eyes-growth-and-investment-in-neo/\", \"https://northeastohioregion.com/ark-data-centers-llc-eyes-growth-and-investment-in-northeast-ohio/\", \"https://www.arkdna.com/data-centers/ohio/\", \"https://www.datacenters.com/ark-cleveland\", \"https://www.ocolo.io/colocation/ark-data-centers/cleveland/\", \"https://baxtel.com/data-center/ark-independence\", \"https://www.arkdna.com/resources/blogs/cleveland-emerging-as-next-gen-tech-hub/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogabluebridge-mayfield-hts": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"The building at 5915 Landerbrook Drive, Mayfield Heights was originally a Nationwide Insurance data center; BlueBridge Networks acquired it and began operating it as a colocation/disaster-recovery facility in May 2010 (acquisition announced May 10, 2010). Exact original construction date of the building is not publicly disclosed.\", \"powerMW\": \"Not publicly disclosed. Tracker lists 0 MW (small colo site). Public specs mention only UPS-protected critical infrastructure and diesel generator backup with on-site fuel storage; no MW figure is published.\", \"sizeSqFt\": \"Data center space is reported as approximately 5,400 sq ft (per 2010 acquisition coverage) within a building with a total footprint of about 30,074 sq ft at 5915 Landerbrook Drive, Mayfield Heights, OH 44124.\", \"totalInvestment\": \"Acquisition price for the Mayfield Heights facility in 2010 was undisclosed. Separately, BlueBridge Networks announced a company-wide $6 million technology investment in June 2013 spanning all of its locations (Cleveland, Mayfield Heights, Columbus, and Grand Rapids, MI) — not a Mayfield-Heights-specific figure. No facility-specific investment total is publicly disclosed.\", \"employment\": {\"construction\": \"Not applicable / not publicly disclosed — the facility was an acquisition of an existing, already-built data center (former Nationwide Insurance site), not new construction.\", \"permanent\": \"Not publicly disclosed at the facility level. BlueBridge created about 50 disaster-recovery workstations at this site. Company-wide (all locations combined), BlueBridge reported roughly 14 employees plus 30 contractors in 2013, with plans to add about 15 more that year.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No known transmission-level or grid-capacity impact reported\", \"detail\": \"This is a small, legacy colocation/disaster-recovery site (repurposed former insurance-company data center), not a new large load. Public materials describe diversely distributed utility power, UPS protection, and diesel generator backup with on-site fuel storage, but no utility name, interconnection study, or transmission impact has been publicly reported.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement or incentive confirmed\", \"detail\": \"Mayfield Heights, OH maintains a general Community Reinvestment Area (CRA) program and other economic-development incentive programs available to commercial projects citywide, but no public record (news, city council minutes, or auditor filing) was found tying a specific CRA, PILOT, or sales-tax exemption agreement to this BlueBridge facility.\"}, \"environmentalImpact\": {\"summary\": \"Minimal — reuse of existing commercial building, no new land development found\", \"detail\": \"The facility occupies a pre-existing office/data-center building (formerly used by Nationwide Insurance) rather than new-build/greenfield construction, which typically limits new environmental permitting. No environmental impact filings, air/water permits, or land-use disputes specific to this facility were found in public records.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Public technical specs describe air-based cooling — approximately 300 tons of HVAC/CRAC-style cooling delivered via a pressurized downdraft (raised-floor) system with N+1 redundancy — but do not specify whether condenser/chiller cooling relies on a closed water loop, evaporative cooling, or DX (refrigerant-only) systems. No closed-loop water cooling claim has been publicly made for this site.\"}, \"timeline\": \"2004: BlueBridge Networks LLC founded in Cleveland, OH. Building at 5915 Landerbrook Drive, Mayfield Heights originally built/operated as a Nationwide Insurance data center (date not disclosed). May 10, 2010: BlueBridge Networks announces acquisition of the former Nationwide Insurance data center in Mayfield Heights, adding ~5,400 sq ft of DR/colo space with ~50 workgroup-recovery stations, serving as a backup site to BlueBridge's downtown Cleveland facility and its Columbus site. June 2013: BlueBridge announces a company-wide $6 million technology investment across all locations (Cleveland, Mayfield Heights, Columbus, Grand Rapids MI) and plans to roughly double staff. December 2024: BlueBridge Networks marks its 20th anniversary, still operating Cleveland, Mayfield Heights, and Columbus facilities.\", \"investors\": \"BlueBridge Networks LLC is a privately held company headquartered in Cleveland, OH; Kevin Goodman is associated with the company as a founder/Managing Director. Crunchbase records one funding round of $6 million closing July 11, 2013, but does not name the specific investor(s). No individual or institutional owners specific to the Mayfield Heights facility are publicly disclosed.\", \"politicalContext\": \"No facility-specific political statements or records from named officials (state, county, or Mayfield Heights city officials) about this facility were found in public searches, including city council materials and news archives. This should not be reported as a topic of political commentary absent such evidence.\", \"sources\": [\"https://www.datacentermap.com/usa/ohio/cleveland/bluebridge-mayfield-hts/\", \"https://cloudandcolocation.com/datacenters/bluebridge-networks-mayfield-heights-data-center/\", \"https://bluebridgenetworks.com/cleveland-data-center-services/\", \"https://bluebridgenetworks.com/\", \"https://www.datacenterjournal.com/data-centers/ohio/cleveland/bluebridge-networks-mayfield-heights-data-center/\", \"https://inflect.com/building/5915-landerbrook-drive-mayfield-heights/bluebridge-networks/datacenter/mayfield-heights\", \"https://www.freshwatercleveland.com/features/Bridging-Clevelands-Digital-Divide-BlueBridge-Networks-Celebrates-Two-Decades-Of-Innovation_121224.aspx\", \"https://www.freshwatercleveland.com/street-level/bluebridge062713.aspx\", \"https://www.prnewswire.com/news-releases/bluebridge-networks-announces-acquisition-of-former-nationwide-insurance-data-center-93272224.html\", \"https://www.crainscleveland.com/article/20100510/FREE/100519983/bluebridge-networks-buys-nationwide-insurance-data-center-in\", \"https://www.cnbc.com/2010/05/10/bluebridge-networks-announces-acquisition-of-former-nationwide-insurance-data-center-further-enhances-ability-to-minimize-risks-reduce-costs-andincrease-customer-service-for-its-customers.html\", \"https://www.crunchbase.com/organization/bluebridge-networks\", \"https://www.mayfieldheightsohio.gov/997/Economic-Development-Incentive-Programs\", \"https://kevinjgoodman.com/index.php/2015/04/20/the-evolution-of-the-bluebridge-networks-cleveland-cloud-computing-and-data-center-bluebridgenetworks/\", \"https://www.commercialcafe.com/commercial-property/us/oh/mayfield-heights/landerbrook-place/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogabluebridge-networks-cleveland": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"BlueBridge Networks was founded in 2004 as a partnership to operate data center space inside the Sterling Building at 1255 Euclid Avenue, Playhouse Square, downtown Cleveland. The building's data-center space itself dates to a circa-2000 renovation of the 1909 Sterling (former Sterling-Lindner department store) building. Kevin Goodman, current managing director, joined in February 2005, a year after his brother founded the company. The company marked its 20th anniversary in December 2024.\", \"powerMW\": \"Reported at 2.1 MW by BlueBridge managing director Kevin Goodman (per Signal Cleveland and Data Center Journal coverage), which differs from the 1 MW nameplate figure in the tracker file. BlueBridge also advertises wholesale colocation capacity 'up to' additional MW within the shared 250,000-sq-ft Sterling Building, which houses multiple operators (BlueBridge and, separately, DataBank's CLE1 facility), so total building power and BlueBridge's own contracted/nameplate capacity may differ.\", \"sizeSqFt\": \"BlueBridge's leased footprint is reported as roughly 14,294 sq ft on the 5th floor (Suite 500) of the 250,000-sq-ft Sterling Building; the company also markets availability of up to 100,000 sq ft of wholesale edge data-center space within the building. These figures come from data-center marketplace listings (DataCenterJournal, Inflect, cloudandcolocation.com) rather than a single authoritative filing.\", \"totalInvestment\": \"No comprehensive, verified total-investment figure specific to the current facility was found. Two partial data points exist: (1) a 2013 Freshwater Cleveland report that BlueBridge announced a $6 million technology investment; (2) secondary-source characterizations of the original circa-2000 Sterling Building data center build-out as a '$20 million' facility (this predates and is separate from BlueBridge's 2004 entry as operator, and could not be independently confirmed from a primary source in this search). Not publicly disclosed as a single reconciled figure.\", \"employment\": {\"construction\": \"Not publicly disclosed (facility occupies pre-existing renovated commercial space; no discrete new-construction jobs figure was found)\", \"permanent\": \"Not disclosed at the facility level. Company-wide, BlueBridge Networks (which also operates Mayfield Heights and Columbus facilities) is reported to have roughly 19-21 employees as of 2025 per third-party data aggregators (LeadIQ, ZoomInfo); a 2013 press item cited 14 employees plus 30 contractors company-wide with plans to add 15 more.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No facility-specific grid-impact studies, transmission upgrades, or utility filings were found; likely immaterial to the grid given the facility's small (roughly 1-2 MW) scale.\", \"detail\": \"Downtown Cleveland is served by either FirstEnergy's Illuminating Company or the city-owned Cleveland Public Power, but no source confirms which utility feeds 1255 Euclid Avenue specifically, and no utility notices, interconnection studies, or capacity-planning documents mentioning BlueBridge were found. At roughly 1-2 MW, the load is consistent with a standard commercial office-building draw rather than a grid-significant load, unlike the large-scale (100+ MW) data center proposals (e.g., the ~150 MW Slavic Village proposal) that triggered Cleveland's 2026 data-center moratorium debate.\"}, \"taxImplications\": {\"summary\": \"No public record of a property tax abatement, Community Reinvestment Area (CRA) designation, PILOT agreement, or Ohio state data-center sales-tax exemption specific to this facility was found.\", \"detail\": \"Searches of Cuyahoga County's Fiscal GIS Hub abatement/TIF resources and general web search did not surface a BlueBridge- or Sterling Building-specific abatement record. Ohio's statutory data center sales-tax exemption (ORC 5709.50) generally requires very large investment ($100M+) and job-creation thresholds that a facility of this scale would be unlikely to meet, unlike larger Ohio projects (e.g., H5 Data Centers' unrelated Cleveland facility at 1625 Rockwell Ave, which received a 15-year, ~$20 million state sales-tax break for its much larger expansion). No confirmation either way was found for BlueBridge, so this should be treated as unconfirmed rather than definitively absent.\"}, \"environmentalImpact\": {\"summary\": \"Minimal/no distinct environmental impact identified; the facility occupies pre-existing, previously renovated commercial building space rather than new or greenfield construction.\", \"detail\": \"BlueBridge's space is inside the 1909 Sterling Building (former Sterling-Lindner-Davis department store), modernized in 1973 and renovated into data-center use around 2000, well before BlueBridge began operating there in 2004. No new land use, rezoning, environmental permitting disputes, or community environmental-impact filings tied to BlueBridge specifically were found in this search.\"}, \"waterLoop\": {\"answer\": \"No\", \"detail\": \"The facility is reported to use approximately 300 tons of HVAC cooling via a pressurized downdraft (raised-floor) air distribution system, with cooling units using glycol rather than water to reject heat — i.e., a closed glycol-based mechanical cooling system with no evident evaporative water consumption, distinct from open-loop or evaporative water-cooled hyperscale designs.\"}, \"timeline\": \"1909: Sterling Building constructed (originally Sterling-Lindner-Davis department store) at East 13th & Euclid Ave, Playhouse Square, downtown Cleveland. 1973: Building modernized. c.2000: Building renovated to include data-center space (dot-com era carrier hotel build-out), reportedly valued around $20 million (unverified from a primary source). 2004: BlueBridge Networks founded as a partnership to operate/utilize the underused data-center asset in the Sterling Building. Feb 2005: Kevin Goodman (brother of founder) joins as managing director/partner. 2013: BlueBridge announces $6 million technology investment and plans to roughly double staff (from 14 employees/30 contractors). 2017 (Jan): DataBank acquires a separate data-center operation (CLE1) within the same Sterling Building from 365 Datacenters — a distinct tenant/operator from BlueBridge, not to be conflated. 2024 (Dec): BlueBridge celebrates its 20th anniversary, profiled by Freshwater Cleveland. 2026: Cleveland City Council debates and passes a citywide 3-month moratorium on new standalone data-center permits (prompted by an unrelated ~150 MW proposal in Slavic Village); the moratorium explicitly does not apply to existing multi-tenant colocation facilities like BlueBridge's Sterling Building space.\", \"investors\": \"BlueBridge Networks LLC appears to be a privately held, founder/family-operated company (founded 2004 by an unnamed sibling of Kevin Goodman, who serves as managing director/partner). No institutional investors, private equity ownership, or public funding-round data beyond the 2013 reference to a $6 million 'funding round' close (per aggregator Craft.co/Crunchbase-style data) were found. No named outside investors were identified.\", \"politicalContext\": \"No facility-specific political statements or records from named officials about BlueBridge Networks' Cleveland (Euclid Avenue) location were found in this search. Note for context (not specific to this facility): in 2026, Cleveland City Council — led by Councilman Charles Slife's original one-year moratorium proposal, later shortened to three months by Mayor Justin Bibb's administration, with Utilities Committee chair Brian Kazy and Ward 12 Council Member Tanmay Shah both quoted in coverage — debated and passed (14-1) a citywide moratorium on new standalone data-center permits. That moratorium was triggered by an unrelated large (~150 MW) proposed data center in Slavic Village and by its own terms exempts existing multi-tenant colocation buildings such as the Sterling Building, so it does not appear to bear directly on BlueBridge's existing downtown facility. Party affiliations of the named officials (Bibb, Slife, Kazy, Shah) were not independently verified against Ballotpedia/Secretary of State records in this pass, and Cleveland municipal elections are nonpartisan, so no [R]/[D]/[I] tags are applied.\", \"sources\": [\"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\", \"https://www.datacenterjournal.com/data-centers/ohio/cleveland/bluebridge-networks-downtown-cleveland/\", \"https://www.datacentermap.com/usa/ohio/cleveland/bluebridge-networks/\", \"https://www.datacentermap.com/usa/ohio/cleveland/bluebridge-networks/specs/\", \"https://www.datacentermap.com/usa/ohio/cleveland/sterling-building/\", \"https://cloudandcolocation.com/datacenters/bluebridge-networks-cleveland-data-center/\", \"https://www.datacenters.com/bluebridge-networks-bluebridge-cleveland\", \"https://inflect.com/building/1255-euclid-avenue-cleveland/bluebridge-networks/datacenter/downtown-cleveland\", \"https://bluebridgenetworks.com/cleveland-data-center-services/\", \"https://bluebridgenetworks.com/\", \"https://www.freshwatercleveland.com/street-level/bluebridge062713.aspx\", \"https://www.freshwatercleveland.com/features/Bridging-Clevelands-Digital-Divide-BlueBridge-Networks-Celebrates-Two-Decades-Of-Innovation_121224.aspx\", \"https://kevinjgoodman.com/index.php/2015/04/20/the-evolution-of-the-bluebridge-networks-cleveland-cloud-computing-and-data-center-bluebridgenetworks/\", \"https://www.crainscleveland.com/article/20170211/CUSTOM1817/170209831/kevin-j-goodman-bluebridge-networks-llc\", \"https://www.databank.com/data-centers/cleveland/1255-euclid-ave/\", \"https://baxtel.com/data-center/databank-cleveland-cle1\", \"https://fiscalhub.gis.cuyahogacounty.gov/pages/abatements\", \"https://cuyahogacountyauditors.org/property-search/\", \"https://neo-trans.blog/2026/05/15/clevelands-proposed-data-center-moratorium-in-a-race-against-time-technology/\", \"https://signalcleveland.org/cleveland-data-center-moratorium-city-council/\", \"https://www.axios.com/local/cleveland/2026/06/29/cleveland-data-center-moratorium\", \"https://www.news5cleveland.com/news/local-news/cleveland-city-council-advances-three-month-pause-on-new-standalone-data-center-projects\", \"https://www.crainscleveland.com/politics-policy/ccl-shortened-data-center-moratorium-20260715/\", \"https://clevelandmagazine.com/articles/h5-data-centers-files-plans-for-30-million-cleveland-expansion/\", \"https://leadiq.com/c/bluebridge-networks-llc/5a1d9dd123000053008db816\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogacleveland-clinic-brecksville": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Site (14 acres) acquired in Brecksville in 2010; facility construction ran approximately 12 months and was completed/opened in 2012.\", \"powerMW\": \"3.0 MW initial critical IT load (matches tracker figure), delivered via a Cleveland Clinic-owned medium-voltage substation built by the local electric utility. Expansion capacity beyond the initial load is not publicly quantified.\", \"sizeSqFt\": \"Sources vary: engineering/design-firm project pages (Syska Hennessy, Gensler-linked coverage) describe a 120,000 sq ft greenfield facility, consisting of an initial 25,000 sq ft raised-floor module (expandable by another 25,000 sq ft) plus 10,000 sq ft of office space, with remaining building shell reserved for future build-out. One 2026 news search summary cited a larger 273,000 sq ft figure for the 'complex,' which could not be independently verified against a primary source in this research pass.\", \"totalInvestment\": \"Not publicly disclosed. No dollar figure for construction cost or total investment was found in Cleveland Clinic press materials, design/engineering-firm project pages (Gensler, Syska Hennessy, Gilbane, Harrington Electric, Smith & Oby), or trade press. Sources note only that the 12-month construction schedule was completed on time and within budget, without stating the budget amount.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed. General references confirm the facility is staffed with on-call/24-7 data center engineering operations (per employee reviews), but no specific headcount for the Brecksville data center is published.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Served by a Clinic-owned, on-site medium-voltage substation built by the local electric utility (Cuyahoga County/Brecksville is in Cleveland Electric Illuminating Co./FirstEnergy territory, though no source explicitly named FirstEnergy for this project).\", \"detail\": \"Initial critical IT load was 3.0 MW at a design density of 150 W/sq ft, sized to Uptime Institute Tier III (concurrently maintainable, no single point of failure) standards. Backup power infrastructure includes two 30,000-gallon underground fuel oil storage tanks for generators. No public reporting discusses transmission upgrades, utility interconnection studies, or broader grid-capacity impacts tied to this facility — unlike the scale of scrutiny given to newer hyperscale proposals in the region.\"}, \"taxImplications\": {\"summary\": \"No facility-specific PILOT or CRA agreement was identified. As a Cleveland Clinic (501(c)(3) nonprofit hospital system) property presumably used for exempt charitable/health-system purposes, it likely qualifies for Ohio's nonprofit real-property tax exemption (ORC 5709.12) rather than a negotiated abatement, but this could not be confirmed at the parcel level via Cuyahoga County Auditor records in this research pass.\", \"detail\": \"Countywide context: as of 2018 assessments, Cleveland Clinic held at least $2.4 billion in tax-exempt real property across Cuyahoga County, an amount estimated to represent roughly $84 million/year in foregone property tax revenue if it were taxable (Ideastream/Policy Matters Ohio reporting). This is an aggregate, system-wide figure, not a Brecksville-facility-specific number. The Clinic has publicly stated its property-tax exemption 'helps fund the equivalent of approximately 1,500 Cleveland Clinic jobs in Cuyahoga County.' No county auditor record specific to the Brecksville data center parcel (8002 Katherine Blvd, 44141) was located confirming its individual exempt/taxable status.\"}, \"environmentalImpact\": {\"summary\": \"LEED-NC Silver certified; described as the first mission-critical (data center) facility to achieve LEED certification.\", \"detail\": \"Built on a 14-acre greenfield site acquired in 2010. Design was noted for energy-efficient use of conventional equipment. The facility consolidates legacy Cleveland Clinic IT equipment from other locations and was designed to be expandable to support research supercomputing. No environmental permit disputes, wetlands/land-use controversies, or air-quality (generator emissions) filings specific to this site were found in available sources.\"}, \"waterLoop\": {\"answer\": \"Partial\", \"detail\": \"Cooling plant includes three 700-ton chillers and three 750-ton evaporative cooling towers, 47 CRAC units, 10 HVAC pumps, and two 27,000-gallon chilled water storage tanks. This is a closed chilled-water loop internally (chillers to CRACs) but heat rejection occurs through evaporative cooling towers, which consume make-up water — a hybrid design rather than a fully closed (dry/zero-water) loop. No source discloses specific water withdrawal/consumption volumes.\"}, \"timeline\": \"2010: Cleveland Clinic acquires 14-acre site in Brecksville, OH. 2011–2012: ~12-month design-build construction (architect Gensler, MEP engineer Syska Hennessy Group, general contractor Gilbane, with subcontractors including Harrington Electric and Smith & Oby), completed on schedule and within budget. 2012: Facility opens with 3.0 MW initial critical IT load, Tier III design, and LEED-NC Silver certification, consolidating Cleveland Clinic's legacy data infrastructure. 2013: Project featured in a New York Building Congress healthcare-committee case study on challenges/solutions. 2026 (May–July): Facility referenced publicly by name as an example of an established 'in-house'/enterprise data center during Cleveland (city, not Brecksville) political debate over hyperscale data center zoning and a subsequent Cleveland City Council moratorium on new standalone data centers, which explicitly does not apply to facilities of this type.\", \"investors\": \"Not investor-backed. Cleveland Clinic is a nonprofit, multi-specialty academic medical center headquartered in Cleveland, Ohio, governed by its own Board of Directors/Board of Governors. The Brecksville data center is wholly owned and operated by Cleveland Clinic itself for internal enterprise IT/electronic health record and clinical operations use — it is not a colocation asset with external investors, REIT ownership, or third-party tenants.\", \"politicalContext\": \"No officials from Brecksville (the facility's actual host municipality) have made identified public statements specifically about this data center's development, taxes, or operations. However, in 2026 the facility was cited by name in Cleveland (city of Cleveland, a separate jurisdiction) political discourse about hyperscale data centers: Cleveland Mayor Justin Bibb [D] (Cleveland's mayoral race is officially nonpartisan, but Bibb is widely reported in national press as a Democrat and has led the Democratic Mayors Association) said hyperscale data centers 'have no future' in dense city neighborhoods, following Cleveland's rejection of a large hyperscale project in Slavic Village, and suggested the city could instead zone specific areas for 'data cloud facilities similar to those already used by corporations like Sherwin Williams and health groups like the Cleveland Clinic' — using the Cleveland Clinic's enterprise data center model (of which Brecksville is the primary example) as a contrast to unwanted hyperscale development. Separately, Cleveland City Council passed a three-month moratorium (14-1 vote, mid-July 2026) on new standalone data center permits that explicitly exempts in-house facilities/'server rooms' like Cleveland Clinic's from the freeze. These statements concern Cleveland Clinic's enterprise data center model broadly and reference it as a positive/acceptable example, but are not statements from Brecksville's own elected officials about this specific site.\", \"sources\": [\"https://baxtel.com/data-center/cleveland-clinic-brecksville\", \"https://baxtel.com/data-centers/cleveland-clinic\", \"https://syska.com/project/cleveland-clinic-new-greenfield-data-center/\", \"https://www.gensler.com/projects/cleveland-clinic-data-center\", \"https://harringtonelectric.com/portfolio-item/cleveland-clinic-data-center/\", \"https://smithandoby.com/cleveland-clinic-data-center/\", \"https://www.gilbaneco.com/project/cleveland-clinic-data-center/\", \"https://www.thebluebook.com/iProview/277000/building-integrated-services/subcontractors/construction-projects/cleveland-clinic-data-center-164837.html\", \"https://www.ohiobiz.com/listings/cleveland-clinic-data-center\", \"https://www.buildingcongress.com/uploads/pdf/NYBC-Healthcare-Committee-10-15-2013.pdf\", \"https://www.wyso.org/2026-05-27/cleveland-officials-take-harder-stance-on-hyperscale-data-centers\", \"https://www.ideastream.org/government-politics/2026-05-27/cleveland-officials-take-harder-stance-on-hyperscale-data-centers\", \"https://www.axios.com/local/cleveland/2026/06/29/cleveland-data-center-moratorium\", \"https://www.news5cleveland.com/news/local-news/cleveland-city-council-advances-three-month-pause-on-new-standalone-data-center-projects\", \"https://signalcleveland.org/cleveland-data-center-moratorium-city-council/\", \"https://www.crainscleveland.com/politics-policy/ccl-shortened-data-center-moratorium-20260715/\", \"https://ballotpedia.org/Justin_Bibb\", \"https://www.ideastream.org/news/health-science/2022-06-21/cleveland-nonprofit-hospitals-get-millions-in-property-tax-breaks-many-are-asking-is-it-worth-it\", \"https://policymattersohio.org/news/2013/12/09/clevelands-hospitals-are-ducking-millions-in-taxes-and-should-pay-their-fair-share-three-groups-say/\", \"https://codes.ohio.gov/ohio-revised-code/section-5709.12\", \"https://cuyahogacounty.gov/fiscal-officer/departments/appraisal/nonprofit-exemptions\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogacogent-cleveland-1-keith-bldg-": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed (exact commissioning date for the Cogent colocation deployment inside the Keith Building at 1621 Euclid Ave is not stated in available sources; the Keith Building itself was completed in 1921, and Cogent's downtown carrier-hotel colocation model in cities like Cleveland generally traces to its early-2000s Allied Riser Communications acquisition, but no source confirms a specific Cleveland opening date)\", \"powerMW\": \"Approximately 0.2 MW of colocation power capacity per DataCenterMap, backed by a 230 kW diesel generator with a 550-gallon fuel reserve\", \"sizeSqFt\": \"Keith Building total ~220,000 sq ft; Cogent's raised-floor colocation space within it is reported as approximately 5,000 sq ft (datacenters.com) or 3,042 sq ft (Baxtel/DataCenterMap) — sources vary, treat as approximate\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed (small colocation/meet-me-room sites like this are typically remote-managed with minimal or no dedicated on-site staff)\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Minimal — small telecom colocation site, not a hyperscale load\", \"detail\": \"No utility-specific interconnection, transmission, or load studies were found. At ~0.2 MW, this facility is far below the scale that would trigger grid-impact or transmission-planning disclosures. Local electric utility (likely Cleveland Public Power or The Illuminating Company/FirstEnergy) is not confirmed in available sources. Backup power is a 230 kW diesel generator with 550-gallon fuel reserve.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No county auditor abatement records, Community Reinvestment Area (CRA) designation, PILOT agreement, or state sales-tax exemption specific to this Cogent colocation space within the Keith Building was found. As a small tenant fit-out inside an existing historic office building (not a new-build data center), it would not typically qualify for Ohio's data center sales-tax exemption program (which generally targets large new construction with substantial capital investment and job commitments).\"}, \"environmentalImpact\": {\"summary\": \"Negligible new environmental impact — reuse of existing historic office building\", \"detail\": \"This is a colocation build-out within the pre-existing Keith Building (a 21-story historic office tower completed in 1921 in the Playhouse Square district), not new construction or new land development. No greenfield land use, wetlands, air permits, or comparable environmental filings were found, consistent with a small interior tenant improvement rather than a standalone data center campus.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Sources describe standard HVAC/CRAC-style environmental control (temperature/humidity monitoring, airflow sensors) typical of small colocation suites, with no mention of water-based or evaporative cooling systems. Given the small footprint (~0.2 MW, a few thousand sq ft), the facility most likely uses conventional air-cooled/DX cooling rather than a water loop, but this is not explicitly confirmed in any source.\"}, \"timeline\": \"1921: Keith Building constructed in downtown Cleveland (Playhouse Square), once the tallest building in the city. Early 2000s (approximate, unconfirmed for this specific site): Cogent Communications' carrier-neutral colocation/meet-me-room model in downtown high-rise buildings across the US generally traces to its 2002 acquisition of Allied Riser Communications' building-centric network assets. Facility currently operates as 'Cogent Cleveland 1' / listed internally by Cogent as 'CLE-Office' / 'CLE-DC,' offering carrier-neutral colocation with connectivity to AT&T, Level 3/Lumen, and Charter, among others. As of the FY2025 10-K, Cogent's portfolio nationally includes 52 larger former-Sprint data centers and 87 smaller Edge Data Centers; the Cleveland site appears consistent with the smaller Edge Data Center category. Cogent's 2025 sale of 10 data center facilities for $225M does not identify Cleveland as one of the divested sites, and the Cleveland listing remains live on Cogent's own site, suggesting it was not part of that sale, though this could not be independently confirmed line-by-line against the sold-facility list.\", \"investors\": \"Cogent Communications Holdings, Inc. (NASDAQ: CCOI), a publicly traded telecommunications/network and data center operator, operates this facility as a leased tenant. The Keith Building itself (the host property) is managed/owned by K&D Real Estate Services per DataCenterMap's building listing; no other named investors or ownership entities specific to Cogent's colocation space were found.\", \"politicalContext\": \"No facility-specific political statements or records from named officials regarding this particular Cogent/Keith Building colocation site were found. A campaign-issues page for an Ohio county commissioner candidate (Ryan Grissinger) discusses 'Data Centers in Central Ohio' as a policy issue, but that content addresses large hyperscale data centers in the Columbus/Central Ohio region, not this small Cleveland/Cuyahoga County telecom colo site, so it is not included here as facility-specific commentary.\", \"sources\": [\"https://www.datacenters.com/cogent-communications-cleveland-1\", \"https://www.datacentermap.com/usa/ohio/cleveland/\", \"https://www.datacentermap.com/usa/ohio/cleveland/cogent-cleveland/\", \"https://www.datacentermap.com/usa/ohio/cleveland/keith-building/\", \"https://www.datacentermap.com/usa/ohio/cleveland/keith-building/specs/\", \"https://baxtel.com/data-center/cogent-cleveland\", \"https://baxtel.com/data-center/cleveland\", \"https://www.cogentco.com/en/cogent-cleveland/413-cle-office\", \"https://www.cogentco.com/en/cogent-cleveland/413-cle-office/2533-cle-dc\", \"https://www.cogentco.com/en/network/cogent-data-centers\", \"https://cloudandcolocation.com/colocation-provider/cogent-communications/\", \"https://cloudandcolocation.com/datacenters/cogent-communications-cleveland-data-center/\", \"https://inflect.com/1621-euclid-avenue-cleveland/cogent/datacenter/cle04\", \"https://www.sec.gov/Archives/edgar/data/1158324/000110465926017968/ccoi-20251231x10k.htm\", \"https://www.prnewswire.com/news-releases/cogent-communications-announces-closing-of-sale-of-10-data-center-facilities-302813574.html\", \"https://www.stocktitan.net/sec-filings/CCOI/8-k-cogent-communications-holdings-inc-reports-material-event-37cdb632fcea.html\", \"https://ryangrissinger.com/issues/data-centers\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogacogent-cleveland-2-rockefeller-": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed\", \"powerMW\": \"1 MW (per tracker; not independently corroborated by a public capacity disclosure — Cogent's own Cleveland 1 facility at 1621 Euclid Ave is separately listed at 0.2 MW, but no MW figure for the Rockefeller Ave / Cleveland 2 site was found in public listings)\", \"sizeSqFt\": \"5,804 sq ft usable colocation space, of which approximately 3,619 sq ft is configured as non-raised-floor data hall, per DataCenterMap and Datacenters.com listings\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No facility-specific grid impact data publicly disclosed\", \"detail\": \"This is a small (1 MW class) multi-tenant colocation suite inside an existing building rather than a new-build hyperscale campus. No utility interconnection filings, transmission studies, or load-impact notices referencing this address were found in public records or trade press. Facility uses on-site UPS and backup generators per vendor listings, but the utility provider and any grid-planning documentation are not publicly available.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement, CRA, or PILOT records found\", \"detail\": \"Searches of Cuyahoga County Auditor resources and general Cleveland economic-development/tax-incentive coverage did not surface any abatement, Community Reinvestment Area designation, PILOT agreement, or Ohio data-center sales-tax exemption specifically tied to 2650 Rockefeller Ave. Colocation buildouts in existing leased/owned commercial buildings of this scale often do not generate discrete public incentive filings the way large new-build campuses do.\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental review or permit records found\", \"detail\": \"The facility occupies space in an existing building in an industrial section of Cleveland; no evidence of new construction, land clearing, or a distinct environmental permitting process was found. No EPA, Ohio EPA, or city planning environmental filings referencing this address were located.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Public vendor listings describe HVAC, UPS, and backup generator systems but do not specify the cooling methodology (e.g., chilled water, DX/air-cooled, evaporative). No closed-loop or water-usage disclosure was found for this facility.\"}, \"timeline\": \"Limited public timeline exists. Cogent Communications (founded 1999, NASDAQ: CCOI) operates two Cleveland facilities: 'Cleveland 1' at 1621 Euclid Ave (Keith Building, ~3,042 sq ft, 0.2 MW) and 'Cleveland 2' at 2650 Rockefeller Ave (~5,804 sq ft). No specific commissioning/opening date for the Rockefeller Ave site was found. As of Cogent's 2026 SEC 8-K disclosures regarding a $225M sale of 10 data center facilities (Phoenix, Anaheim, Burbank, Stockton, Atlanta, Chicago, Elkridge, Kansas City, Nashville, and Houston), the Cleveland facilities were not among those sold, indicating this site remains part of Cogent's active ~70-facility North American data center portfolio.\", \"investors\": \"Owned/operated by Cogent Communications Holdings, Inc. (NASDAQ: CCOI), a publicly traded company; no separate joint-venture, special-purpose entity, or third-party investor structure specific to this facility was identified in available filings or press coverage.\", \"politicalContext\": \"No facility-specific political statements or records from named officials referencing this particular Cogent Cleveland/Rockefeller facility were found. A search did surface an unrelated candidate campaign page ('Ryan Grissinger for Commissioner') discussing data centers generally in Central Ohio, but it does not reference this Cleveland/Cuyahoga County facility and was excluded as not facility-specific.\", \"sources\": [\"https://www.datacentermap.com/usa/ohio/cleveland/cogent-data-center-cleveland-2/\", \"https://www.datacenters.com/cogent-communications-cleveland-2\", \"https://www.datacentermap.com/usa/ohio/cleveland/\", \"https://www.datacentermap.com/usa/ohio/cleveland/cogent-cleveland/\", \"https://cloudandcolocation.com/colocation-provider/cogent-communications/\", \"https://cloudandcolocation.com/datacenters/cogent-communications-cleveland-data-center/\", \"https://baxtel.com/data-center/cleveland\", \"https://baxtel.com/data-centers/cogent-communications\", \"https://www.cogentco.com/en/network/cogent-data-centers\", \"https://www.cogentco.com/en/cogent-cleveland\", \"https://www.sec.gov/Archives/edgar/data/1158324/000110465926017968/ccoi-20251231x10k.htm\", \"https://www.stocktitan.net/sec-filings/CCOI/8-k-cogent-communications-holdings-inc-reports-material-event-37cdb632fcea.html\", \"https://www.tradingview.com/news/tradingview:caf56f678f3eb:0-cogent-communications-closes-225m-sale-of-10-data-center-facilities/\", \"https://cuyahogacountyauditor.net/property-search/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogadatabank-cle1": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Facility opened at 1255 Euclid Ave as a carrier-hotel/colocation site prior to DataBank's involvement (operated by 365 Data Centers). DataBank acquired the site in January 2017 via its acquisition of 365 Data Centers' Cleveland facility. Exact original commissioning date of the raised-floor space is Not publicly disclosed.\", \"powerMW\": \"0.4 MW critical IT load (N+1 power and cooling design). Note: tracker file lists nameplate capacity as 0 MW, reflecting its status as a small colocation toehold rather than a large campus.\", \"sizeSqFt\": \"7,440 raised sq ft dedicated to IT infrastructure (one DataBank/trade-press source cites up to 10,000 sq ft of raised-floor space in the building); exact leased footprint varies slightly by source.\", \"totalInvestment\": \"Not publicly disclosed. No county, city, or SEC filing discloses a specific capital investment figure for the CLE1 suite itself. (Note: a separate, unrelated $1.6B data center project in Cleveland proposed by Lakeland Equity was reported in 2026 press but is a different facility/operator, not DataBank CLE1 — should not be conflated.)\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed (small colocation facility; likely served by regional DataBank operations staff, headcount not broken out per site)\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Minimal — small colocation load within an existing commercial building\", \"detail\": \"CLE1 draws a 0.4 MW critical IT load with on-site diesel generator backup and on-site fuel storage for redundancy. No utility, substation, or transmission-level interconnection filings specific to this facility were found; at 0.4 MW the site is far below the scale that typically triggers dedicated transmission or large-load utility review in Ohio.\"}, \"taxImplications\": {\"summary\": \"No facility-specific abatement, CRA, or PILOT record found\", \"detail\": \"DataBank leases suite space within an existing renovated commercial building (Sterling Building/Euclid corridor) rather than owning a purpose-built campus, and no Community Reinvestment Area (CRA) agreement, PILOT, or state sales-tax exemption specific to this DataBank suite was located in Cuyahoga County Fiscal Officer abatement/TIF data or city of Cleveland economic development records. Ohio's statewide data center sales-tax exemption (typically tied to much larger qualifying investment/job thresholds) does not appear to apply to a facility this small based on available public records.\"}, \"environmentalImpact\": {\"summary\": \"Negligible — adaptive reuse of existing downtown office/commercial space\", \"detail\": \"The facility occupies leased space within an existing building in downtown Cleveland's Euclid Avenue corridor rather than new-build/greenfield construction, so no new land use, wetlands, or site-development permitting was identified. No environmental impact statements, air permits, or land-use filings specific to this suite were found.\"}, \"waterLoop\": {\"answer\": \"Yes\", \"detail\": \"DataBank's air conditioning/cooling system at CLE1 uses a closed loop of chilled water to cool the raised-floor space, per DataBank facility materials.\"}, \"timeline\": \"2002 (approx.) -
