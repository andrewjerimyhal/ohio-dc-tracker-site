Not publicly disclosed\", \"detail\": \"No facility-specific grid impact study, interconnection filing, or transmission notation was found. The Illuminating Company (a FirstEnergy operating company) is the electric utility serving Mayfield Heights and Cuyahoga County generally, but no utility filing or news item ties a specific load addition or grid upgrade to this TierPoint site. Given the small (1 MW) nameplate capacity, any grid impact would be expected to be minor and handled as routine commercial service.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No county auditor CRA (Community Reinvestment Area) abatement, PILOT agreement, or local tax record specific to this facility was found in Cuyahoga County or City of Mayfield Heights sources. Ohio's state data-center sales-tax exemption (Ohio Revised Code 122.175, administered via JobsOhio) requires a minimum of $100 million in capital investment over three years and at least $1.5 million in annual employee compensation to qualify; a facility of this small (1 MW) scale would not typically meet that threshold, and no record of TierPoint receiving this exemption for this site was found.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No environmental permit filings, land-use case records, or press coverage specific to this facility's construction or operation were located. As an existing/'Settled' colocation facility rather than a new-build hyperscale project, it would not have been subject to the kind of siting/environmental review coverage seen for newer proposed Ohio data centers.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No facility-specific cooling system documentation (open-loop, closed-loop, evaporative, or air-cooled) was found. Small colocation facilities of roughly this size (~1 MW) typically use packaged DX/CRAC or air-cooled chiller systems rather than large evaporative cooling towers, but this could not be confirmed for this specific site.\"}, \"timeline\": \"Not publicly disclosed for this specific site. Broader corporate context: TierPoint was founded in 2010 (originally as Cequel Data Centers, based in Dallas) and rebranded as TierPoint in 2013. The company grew nationally through acquisitions, including Xand (2014), Hosted Solutions (2015), Cosentry (2016), and the purchase of Windstream's data center business (announced Oct. 2015, ~$575M, ~14 facilities). It is unclear from public sources which acquisition, if any, brought the Mayfield Heights facility into TierPoint's portfolio, or whether it was a ground-up TierPoint build.\", \"investors\": \"Facility-specific ownership/investment is not separately disclosed; the site operates under TierPoint, LLC's corporate umbrella. At the corporate level, TierPoint's ownership includes Argo Infrastructure Partners (which became majority owner around 2022 and increased its stake further in 2024-2025, having invested roughly $700 million in TierPoint since an initial 2020 raise alongside Wafra and Macquarie Capital Principal Finance), along with TA Associates and Ontario Teachers' Pension Plan as other significant investors. Argo itself was acquired by Apollo Global Management in 2024, making Apollo an indirect upstream owner.\", \"politicalContext\": \"No facility-specific political statements, endorsements, or records from named officials about the TierPoint Mayfield Heights facility were found in any search. No Mayfield Heights City Council agenda/minutes item, Cuyahoga County official statement, or news coverage specifically addressing this site was located. This differs from Cleveland's more recent, higher-profile data center siting debates (e.g., downtown carrier hotels and new hyperscale proposals), which have drawn public officials' comments but not in connection with this small, established Mayfield Heights facility.\", \"sources\": [\"https://www.datacentermap.com/c/tierpoint/\", \"https://www.datacentermap.com/usa/ohio/cleveland/\", \"https://www.tierpoint.com/data-centers/\", \"https://baxtel.com/data-centers/tierpoint\", \"https://www.datacenters.com/providers/tierpoint/data-center-locations\", \"https://datacenterhawk.com/marketplace/providers/tierpoint\", \"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\", \"https://signalcleveland.org/where-are-ohio-data-centers-located-check-out-this-map/\", \"https://dcmap.us/states/ohio/\", \"https://www.tierpoint.com/news/windstream-completes-sale-data-center-assets-tierpoint/\", \"https://www.datacenterdynamics.com/en/news/tierpoint-to-buy-windstream-data-centers/\", \"https://www.tscp.com/news/thompson-street-portfolio-company-tierpoint-acquires-windstream-communications-data-centers/\", \"https://www.tierpoint.com/news/tierpoint-closes-500-million-investment-from-argo-infrastructure-partners/\", \"https://www.businesswire.com/news/home/20251209662043/en/Argo-Infrastructure-Partners-Increases-Ownership-and-Capital-Commitment-to-TierPoint\", \"https://www.ta.com/portfolio/investments/tierpoint/\", \"https://www.datacenterdynamics.com/en/news/tierpoint-owner-argo-acquired-by-apollo-management/\", \"https://www.jobsohio.com/incentives-programs/data-center-tax-exemption\", \"https://codes.ohio.gov/ohio-revised-code/section-122.175\", \"https://www.firstenergycorp.com/illuminating_company.html\", \"https://www.mayfieldheightsohio.gov/259/City-Council\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogaverizon-cleveland": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Not publicly disclosed (facility appears to be a longstanding legacy Verizon/GTE-Bell Atlantic telecom colocation site in downtown Cleveland's carrier-hotel corridor; no specific commissioning date found in public sources)\", \"powerMW\": \"2 MW (per tracker file); independent sources describe it only as a Verizon 'Advanced Data Center' colocation site without confirming a specific MW figure\", \"sizeSqFt\": \"Not publicly disclosed (total facility square footage not found; only cabinet-level specs are published — 24 sq ft for non-caged and 32 sq ft for caged custom cabinet footprints)\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No utility interconnection, load, or transmission information specific to this facility was found. As a small (2 MW-class) legacy telecom colocation site rather than a hyperscale campus, it would not typically trigger utility-level grid impact disclosures or filings.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No facility-specific tax abatement, Community Reinvestment Area (CRA), PILOT, or state sales-tax exemption records were found for this address. Ohio does offer a state sales/use tax exemption program and CRA property-tax abatements (up to 100% for 15-30 years) for qualifying data centers meeting investment/payroll thresholds, and Cuyahoga County/Cleveland have granted such abatements to other larger facilities (e.g., the H5/Cleveland Technology Center on Rockwell Ave), but no record ties such an incentive specifically to this Verizon site.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No environmental permit filings, land-use case records, or siting/zoning documents specific to this Verizon facility were located. The facility occupies existing built space within a downtown Cleveland telecom building rather than representing new land development, which is consistent with the absence of environmental impact filings.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No cooling system information (closed-loop, open-loop, evaporative, or air-cooled) specific to this facility was found in any public source.\"}, \"timeline\": \"Specific dated milestones could not be confirmed. General context: the facility operates as a Verizon-branded 'Advanced Data Center' colocation site at 1150 W. 3rd St., Cleveland, within the city's downtown carrier-hotel/telecom infrastructure cluster (alongside H5's Cleveland Technology Center at 1425-1625 Rockwell Ave and other colocation operators). In December 2016/May 2017, Verizon sold 29 data centers across 15 U.S./Latin American metro areas to Equinix for $3.6 billion, but Cleveland was not among the metros included, indicating Verizon has continuously retained and operated this Cleveland site through and after that divestiture.\", \"investors\": \"Verizon Communications Inc. (NYSE: VZ) — wholly owned and operated; no third-party investor, joint-venture, or REIT partner identified for this specific facility. (Note: unrelated to H5 Data Centers, DataBank, or other operators present elsewhere in Cleveland's carrier-hotel buildings.)\", \"politicalContext\": \"No facility-specific political statements, endorsements, or records from named officials referencing this Verizon Cleveland facility were found in any searched source (news, city/county records, or trade press). Broader Ohio political debate exists over data center tax incentives generally (e.g., Policy Matters Ohio's criticism of state data-center tax breaks, and 2026 coverage of a legislative pause on new Ohio data-center sales-tax exemptions after a $42M exemption was approved for two other Ohio data centers), but none of this coverage names or references the Verizon Cleveland facility specifically, so no official statement can be attributed to this site.\", \"sources\": [\"https://cloudandcolocation.com/datacenters/verizon-business-advanced-data-center-cleveland/\", \"https://cloudandcolocation.com/colocation-provider/verizon/\", \"https://cloudandcolocation.com/city/cleveland/\", \"https://baxtel.com/data-center/verizon-1525-rockwell\", \"https://baxtel.com/data-centers/verizon-enterprise\", \"https://baxtel.com/data-center/cleveland\", \"https://www.datacentermap.com/usa/ohio/cleveland/\", \"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\", \"https://www.verizon.com/business/locations/oh/cleveland/11427-euclid-ave-12046824/\", \"https://www.verizon.com/business/service_guide/reg/cp_colo_plus_colocation_services.pdf\", \"https://www22.verizon.com/wholesale/attachments/CustomerFacing-Colocation_60_Off_Promotion_070115.pdf\", \"https://www.prnewswire.com/news-releases/equinix-completes-acquisition-of-29-data-centers-from-verizon-300448614.html\", \"https://www.equinix.com/newsroom/press-releases/2016/12/equinix-to-acquire-portfolio-of-24-data-center-sites-from-verizon-in-3-6-billion-deal\", \"https://www.datacenterfrontier.com/colocation/article/11430980/equinix-buys-24-data-centers-from-verizon-in-36-billion-deal\", \"https://www.datacenterknowledge.com/hyperscalers/why-equinix-is-buying-verizon-data-centers-for-3-6b\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://policymattersohio.org/research/indefensible-tax-breaks-for-data-centers-will-cost-ohio/\", \"https://neo-trans.blog/2026/05/06/1-6b-data-center-planned-in-cleveland/\", \"https://www.loopnet.com/property/1150-w-3rd-st-cleveland-oh-44113/39035-10108012/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogavxchnge-cleveland-oh01": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed. The site was already operating as a carrier hotel/colocation facility by April 2014 (Fibertech Networks press release announcing a connection to \\\"vXchnge's Cleveland data center\\\"), and vXchnge itself was formed in 2013 when Stephens Group (private equity) merged its Fiber Media investment with a newly acquired Santa Clara colocation business. The Cleveland facility likely predates the vXchnge brand as a Fiber Media asset, but no exact commissioning date for the Cleveland site has been published.\", \"powerMW\": \"1 MW (N+1 redundant power and cooling; 2,000-gallon diesel generator fuel tank for backup)\", \"sizeSqFt\": \"13,000 sq ft total leased space, with 8,600 sq ft of raised-floor/usable data center space\", \"totalInvestment\": \"Not publicly disclosed. No state, county, or trade-press reporting of a specific capital investment figure was found for this facility. It appears to be a colocation buildout inside existing leased space in the historic Higbee Building rather than a discrete ground-up construction project with a disclosed budget.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed (small colocation facilities of this size typically run with a handful of on-site technicians, but no specific headcount for this site has been published)\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Minimal — a small 1 MW colocation load inside an existing downtown office/commercial building\", \"detail\": \"No utility-specific interconnection filings, transmission upgrades, or grid-impact studies for this facility were found. It is a modest 1 MW load compared to hyperscale projects now being proposed in the Cleveland area (e.g., a separate $1.6 billion, 150 MW data center campus proposed for Cleveland's Slavic Village in 2026, which is a wholly different project by Lakeland Equity Group and has driven Cleveland City Council to consider a data center moratorium). No specific electric utility (e.g., Cleveland Public Power vs. FirstEnergy/Illuminating Company) is confirmed in available sources for this address.\"}, \"taxImplications\": {\"summary\": \"No evidence of a CRA, PILOT, or Ohio data-center sales-tax exemption tied to this facility\", \"detail\": \"Ohio's Data Center Tax Exemption program (administered via JobsOhio/Ohio Tax Credit Authority) and related county property-tax abatements are generally reserved for large new-build projects meeting high minimum investment and payroll thresholds; no such filing, award, or news coverage naming vXchnge/AceHost's Cleveland OH01 facility was found in state incentive announcements or Cuyahoga County records searches conducted.\"}, \"environmentalImpact\": {\"summary\": \"Negligible incremental environmental footprint — adaptive reuse of existing building space, not new construction\", \"detail\": \"The facility occupies leased suite space (Suite 710) within the historic Higbee Building at 200 W. Prospect Ave, a pre-existing downtown Cleveland structure (former Higbee's department store, later renovated for office/commercial use). No new land development, rezoning, or environmental permitting specific to the data center buildout was found.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Sources confirm N+1 redundant cooling systems but do not specify whether cooling is via water-based chillers/CRAH units, refrigerant-based CRAC units, or a closed-loop system. Given the facility's small footprint (8,600 sq ft) inside a multi-tenant office building rather than a purpose-built cooling-tower site, evaporative open-loop cooling is less likely than packaged CRAC/chiller systems, but this could not be confirmed from public sources.\"}, \"timeline\": \"2013: vXchnge formed when Stephens Group merged its Fiber Media portfolio company with a newly acquired Santa Clara colocation business, bringing existing Fiber Media facilities (likely including Cleveland) under the vXchnge brand. April 2014: Fibertech Networks announces a network connection to \\\"vXchnge's Cleveland data center,\\\" confirming the facility was operational by this date. 2015: vXchnge acquires eight additional Sungard Availability Services facilities, expanding its national edge data center footprint (Cleveland not confirmed as part of this batch). Late January 2022: vXchnge as a corporate entity ceases operations after selling its data center portfolio piecemeal — the Santa Clara and a Minneapolis facility to Cologix, the Austin facility to Element Critical, and seven facilities (Nashville, Philadelphia, Pittsburgh, Portland, St. Paul, Secaucus, St. Louis) to H5 Data Centers. 2022: AceHost (a hosting/colocation provider) confirms to Data Center Dynamics that it has taken over the Cleveland location \\\"with the customer base intact and with a 15-year lease,\\\" rather than the site being sold outright. Present day: trade directories (DataCenterJournal, Cloud and Colocation, Baxtel, DataCenterMap) still largely list the facility under the legacy \\\"vXchnge Cleveland (OH01)\\\" name, though operational control appears to have passed to AceHost since 2022 — the tracker's listed operator/status (\\\"vXchnge\\\" / \\\"Active\\\") may be outdated and worth flagging for verification.\", \"investors\": \"vXchnge was privately backed by Stephens Group, a Little Rock, Arkansas-based family-owned private equity firm, which formed the company in 2013 by combining its Fiber Media investment with an acquired Santa Clara colocation business (Bay Area Internet Services). CEO throughout the company's existence was Keith Olsen, former CEO of Switch & Data. vXchnge ceased operating as a company in January 2022; its facilities were divested individually to Cologix, Element Critical, and H5 Data Centers, while the Cleveland facility specifically was taken over via a 15-year lease by AceHost (also known as Ace-Host/Acenet), a hosting, colocation, and cloud-services provider — not a sale of the underlying real estate or company.\", \"politicalContext\": \"No facility-specific political statements or records from named officials about this vXchnge/AceHost Cleveland OH01 facility were found. Separately, Cleveland City Council has in 2026 been actively debating a possible moratorium on new data center construction, prompted by a much larger, unrelated proposed project (a $1.6 billion, 150 MW data center campus near Slavic Village from Westlake-based Lakeland Equity Group). That broader policy debate involves city officials and trade groups (e.g., the Cleveland Building and Construction Trades Council urging regulation rather than an outright ban), but no statements found specifically reference the small, pre-existing downtown vXchnge/AceHost colocation site at 200 W. Prospect Ave. Party affiliations of officials involved in the moratorium debate were not verified against this specific facility and are therefore omitted rather than guessed.\", \"sources\": [\"https://www.datacenterjournal.com/data-centers/ohio/cleveland/vxchnge-cleveland-oh01/\", \"https://cloudandcolocation.com/datacenters/vxchnge-cleveland-datacenter/\", \"https://cloudandcolocation.com/colocation-provider/vxchnge/\", \"https://cloudandcolocation.com/city/cleveland/\", \"https://newswire.telecomramblings.com/2014/04/fibertech-networks-connects-vxchnges-cleveland-data-center/\", \"https://datacentercatalog.com/usa/vxchnge-cleveland-data-center\", \"https://www.datacenterdynamics.com/en/news/data-center-firm-vxchnge-ceases-operations/\", \"https://www.communicationstoday.co.in/data-center-firm-vxchnge-ceases-operations/\", \"https://dgtlinfra.com/h5-data-centers-colocation-vxchnge/\", \"https://h5datacenters.com/h5-data-centers-announces-acquisition-of-seven-data-centers-from-vXchnge.html\", \"https://dgtlinfra.com/element-critical-7-mw-austin-data-center-vxchnge/\", \"https://www.datacenterknowledge.com/cologix/cologix-acquires-vxchnge-data-center-midwest-interconnection-hub\", \"https://www.datacenterknowledge.com/archives/2015/05/04/vxchnge-buys-eight-sungard-facilities-in-edge-data-center-markets\", \"https://www.datacenterknowledge.com/archives/2014/07/21/vxchnge-new-philadelphia-data-center-in-works/\", \"https://thetechtribune.com/keith-olsen-ali-marashi-george-pollock-jr-and-ernest-sampera-of-vxchnge/\", \"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\", \"https://inflect.com/200-west-prospect-avenue-cleveland\", \"https://www.datacenters.com/providers/acehost-data-centers\", \"https://www.acehost.com/raleigh-durham-data-center.php\", \"https://neo-trans.blog/2026/05/06/1-6b-data-center-planned-in-cleveland/\", \"https://neo-trans.blog/2026/05/07/more-details-emerge-on-cleveland-data-center/\", \"https://neo-trans.blog/2026/05/14/data-center-rejection-prompts-reaction/\", \"https://neo-trans.blog/2026/05/15/clevelands-proposed-data-center-moratorium-in-a-race-against-time-technology/\", \"https://neo-trans.blog/2026/05/19/cleveland-trades-council-urges-data-center-regulations-not-ban/\", \"https://www.datacentermap.com/usa/ohio/cleveland/\", \"https://www.news5cleveland.com/news/local-news/ohios-spending-billions-on-tax-breaks-for-data-centers-now-an-incentive-battle-is-brewing\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogawindstream-cleveland": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Not publicly disclosed. The facility operates out of 200 W. Prospect Ave, Cleveland (a shared carrier-neutral colocation building — vXchnge Cleveland OH01 is listed at the same address), a longstanding regional telecom hub. No source gives a specific commissioning or opening date for Windstream's colocation operation there; Windstream Holdings itself was formed in 2006 (Alltel wireline spinoff/Valor Communications merger) and has grown its data-center/colo portfolio since largely through acquisitions (e.g., Hosted Solutions in 2010, EarthLink in 2017), but none of the located sources tie the Cleveland site to a specific acquisition or build date.\", \"powerMW\": \"1 MW (per tracker file; not independently corroborated by a public spec sheet — datacenters.com and datacentermap.com list the facility without disclosing gross power capacity)\", \"sizeSqFt\": \"Not publicly disclosed. datacenters.com explicitly notes gross building size and colocation space figures are not provided in public data for this location.\", \"totalInvestment\": \"Not publicly disclosed. (Note: Windstream's $310–312.8M acquisition of Hosted Solutions in 2010 covered only Raleigh NC, Charlotte NC, and Boston MA data centers — not Cleveland — so it is not applicable to this facility.)\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No utility interconnection filings, transmission studies, or grid-impact statements specific to this facility were found. Given its small (1 MW per tracker) scale and location in an existing downtown Cleveland carrier-hotel building rather than a new build, it is unlikely to have triggered the kind of large-load transmission review associated with hyperscale proposals. Likely electric utility for downtown Cleveland is Cleveland Public Power or The Illuminating Company (FirstEnergy), but this is inferred from service territory, not confirmed for this address.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No record found of a Community Reinvestment Area (CRA) exemption, PILOT, or Ohio data-center sales-tax exemption specifically tied to this Windstream facility. Ohio's data-center sales-tax abatement program requires a minimum $100M investment and $1.5M annual payroll commitment, thresholds this small legacy colo facility is not confirmed to meet or to have applied for. Separately, Cleveland City Council in 2026 advanced a citywide moratorium/policy review on new, standalone hyperscale data-center projects (led by Councilman Charles Slife, narrowed from 12 to 3 months by Mayor Justin Bibb [D]) — this activity targets new hyperscale proposals (e.g., a 150 MW project in Slavic Village) and does not reference the existing Windstream Prospect Ave facility.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No Ohio EPA permit, land-use, or environmental filing specific to this address was located. The facility occupies space within an existing downtown Cleveland building at 200 W. Prospect Ave rather than representing new greenfield construction, which if accurate would imply minimal incremental land-use impact, but this is inferred from its listing type, not confirmed via a permit record.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No cooling-system disclosure (closed-loop, open-loop, evaporative, or air-cooled) was found for this facility. Small-scale (1 MW-class) telecom colocation sites of this type typically rely on CRAC/CRAH air-cooling rather than large evaporative cooling towers, but this is a general industry inference, not a confirmed fact about this specific site.\"}, \"timeline\": \"No dated timeline of site-specific events (groundbreaking, expansions, ownership changes at the facility level) was found. Corporate-level events affecting the operator: 2006 — Windstream Corporation formed via Alltel wireline spinoff/Valor Communications merger; 2010 — Windstream acquires Hosted Solutions (data centers in NC/MA, not Cleveland); 2019 — Windstream Holdings files Chapter 11 bankruptcy; 2020 — Windstream emerges from bankruptcy under new ownership (former creditors, including Elliott Management); Aug 4, 2025 — Uniti Group Inc. (Nasdaq: UNIT) completes merger with Windstream, making Windstream a wholly owned subsidiary of Uniti.\", \"investors\": \"Windstream is now a wholly owned subsidiary of Uniti Group Inc. (Nasdaq: UNIT) following the August 4, 2025 merger completion; Windstream equityholders received approximately 38% of combined New Uniti stock, legacy Uniti stockholders approximately 62%. Reported major institutional shareholders of Uniti as of early 2025 include The Vanguard Group (~12.8%), BlackRock Inc. (~10.5%), and State Street Corporation (~5.2%), with Elliott Management (a major creditor from Windstream's 2020 bankruptcy exit) continuing to hold strategic influence. No investor or ownership information specific to the Cleveland facility (e.g., a separate landlord/REIT for 200 W. Prospect Ave) was found.\", \"politicalContext\": \"No political statements or records from named officials specifically about the Windstream Cleveland (200 W. Prospect Ave) facility were found. For broader context only: in 2026 Cleveland Mayor Justin Bibb [D] and City Council (moratorium sponsored by Councilman Charles Slife) debated and enacted a temporary pause on new, standalone hyperscale data-center projects citywide, with Bibb stating hyperscale data centers 'have no future' in dense city neighborhoods and citing environmental and utility-cost concerns; this policy discussion centers on new large-scale proposals (e.g., a 150 MW Slavic Village project) and does not reference or apply retroactively to this small, existing Windstream colocation site.\", \"sources\": [\"https://www.datacenters.com/windstream-cleveland-oh\", \"https://www.datacentermap.com/usa/ohio/cleveland/windstream-cleveland/\", \"https://www.datacentermap.com/usa/ohio/cleveland/windstream-cleveland/specs/\", \"https://baxtel.com/data-center/cleveland\", \"https://baxtel.com/data-centers/windstream\", \"https://www.datacenterknowledge.com/deals/windstream-buys-hosted-solutions-for-310m\", \"https://news.windstream.com/news/news-details/2024/Uniti-to-Merge-with-Windstream-Creating-Premier-Insurgent-Fiber-Provider/default.aspx\", \"https://www.globenewswire.com/news-release/2025/08/01/3126133/35697/en/Uniti-Completes-Merger-with-Windstream.html\", \"https://signalcleveland.org/cleveland-data-center-moratorium-city-council/\", \"https://www.ideastream.org/government-politics/2026-05-27/cleveland-officials-take-harder-stance-on-hyperscale-data-centers\", \"https://www.cleveland19.com/2026/04/28/cleveland-city-council-proposes-moratorium-data-center-development/\", \"https://neo-trans.blog/2026/05/07/more-details-emerge-on-cleveland-data-center/\", \"https://ballotpedia.org/Justin_Bibb\", \"https://www.datacenterjournal.com/data-centers/ohio/cleveland/vxchnge-cleveland-oh01/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogazayo-zcolo-cleveland": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Not publicly disclosed (zColo/Zayo colocation operations at 1525 Rockwell Ave, Cleveland were active by at least the early 2010s per zColo network-expansion press materials, but no confirmed commissioning date for this specific site was found)\", \"powerMW\": \"1 MW (per tracker file; facility literature describes redundant AC/DC power distribution and dual power grids but does not publish a nameplate MW figure)\", \"sizeSqFt\": \"7,500 sq ft (colocation space via private suites, caged space, and cabinets)\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"Facility marketing describes redundant power grids and AC/DC power distribution to the site, but no utility name, substation, transmission-line, or load-impact information specific to this facility was found in public records or trade press.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement, CRA, PILOT, or sales-tax exemption identified\", \"detail\": \"Ohio has run a large data-center sales-tax exemption/incentive program (Ohio Revised Code 122.175) that has directed billions in tax breaks to large hyperscale projects (e.g., the H5 Cleveland facility, the first in the state to receive the exemption in 2014). No record was found tying zColo/Zayo's small (7,500 sq ft) Cleveland colocation site to this program, a Cuyahoga County Community Reinvestment Area (CRA) abatement, or a PILOT agreement. As a legacy carrier-hotel/telecom colo rather than a new hyperscale build, it may simply not have sought or qualified for these incentives, but this could not be independently confirmed via county auditor records within the available research tools.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No environmental permit filings, land-use approvals, or impact assessments specific to this facility were found. The site occupies existing downtown Cleveland commercial/telecom building space at 1525 Rockwell Ave rather than a greenfield build, which typically involves fewer new-construction environmental filings.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No public source specifies the cooling method (air-cooled CRAC/CRAH vs. water-based) for this facility. Given its small size (7,500 sq ft, ~1 MW) and its nature as an in-building telecom/colo suite rather than a purpose-built hyperscale campus, standard air-cooling is plausible but unconfirmed.\"}, \"timeline\": \"Specific dated timeline not publicly available. Known context: Zayo Group acquired multiple regional colocation/data center assets during the 2010s and branded them 'zColo,' including a Cleveland, OH site at 1525 Rockwell Ave offering 7,500 sq ft of colocation space with connections to 9 regional/national carrier networks and Zayo's broader Cleveland metro fiber network. Zayo itself was taken private in 2020. No Cleveland-specific opening, expansion, or upgrade dates were found in available trade press.\", \"investors\": \"Zayo Group LLC is the operator/lessee of the zColo Cleveland facility. Zayo has been privately held since May 2020, when it was acquired in a take-private transaction (~$14.3 billion including debt) by a consortium of EQT Infrastructure and Digital Colony (renamed DigitalBridge in 2021). No separate or distinct ownership entity specific to the Cleveland facility was identified; it is operated under Zayo's national zColo colocation portfolio.\", \"politicalContext\": \"No facility-specific political statements, endorsements, or records from named officials regarding this particular Zayo zColo Cleveland site were found. Search results did surface general Ohio political and policy discussion around data-center tax incentives statewide (e.g., Ohio legislature/Policy Matters Ohio commentary on the state's data-center sales-tax exemption program, and a candidate campaign page discussing data centers in Central Ohio), but none of these referenced this Cleveland/Cuyahoga County facility by name, so no official-with-party-affiliation quote can be attributed to it without fabrication.\", \"sources\": [\"https://cloudandcolocation.com/datacenters/zcolo-zayo-group-llc-cleveland-data-center/\", \"https://cloudandcolocation.com/colocation-provider/zayo/\", \"https://www.datacenterjournal.com/data-centers/ohio/cleveland/zcolo-cleveland-1525-rockwell-ave/\", \"https://www.news5cleveland.com/news/local-news/ohios-spending-billions-on-tax-breaks-for-data-centers-now-an-incentive-battle-is-brewing\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://policymattersohio.org/research/indefensible-tax-breaks-for-data-centers-will-cost-ohio/\", \"https://codes.ohio.gov/ohio-revised-code/section-122.175\", \"https://h5datacenters.com/ohio-data-center-tax-abatement.html\", \"https://data-cuyahoga.opendata.arcgis.com/maps/c81420a146d94cb88d303ecf5a769619\"]}, \"ts\": 1784434061000}", "v67_dc_delawarecentersquare-cmh1": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed. The facility at 8180 Green Meadows Drive North, Lewis Center (Orange Township), Delaware County, OH predates its current ownership: it operated as a CenturyLink data center before CenturyLink sold its entire data-center/colocation business (57 facilities) to a BC Partners/Medina Capital consortium in a deal that closed May 1, 2017, forming Cyxtera Technologies. The site then became 'Cyxtera CMH1.' No original commissioning/opening date for the building itself was found in public sources.\", \"powerMW\": \"Sources conflict. The tracker file lists 2 MW nameplate. Third-party colocation marketplace listings (datacenters.com, datacentermap.com, Inflect, gotcolo.com) describe the broader CMH1/CMH1-A campus as offering 7.0-7.5 MW of colocation power (with one page citing 3.75 MW for the 'CMH1-A' suite and utility feed to the site listed as up to 35.8 MW). These figures likely reflect maximum available/contracted capacity for the multi-tenant campus rather than a single disclosed nameplate figure, which is consistent with the tracker's more conservative 2 MW figure for this specific facility record.\", \"sizeSqFt\": \"Most sources (datacenters.com, csquare.com, gotcolo.com) consistently list 27,000 sq ft of raised-floor colocation space for the CMH1 Lewis Center campus. One secondary listing (for the 'CMH1-A' suite specifically) cites 18,704 sq ft of raised floor - likely a subset of the full campus rather than a conflicting total.\", \"totalInvestment\": \"Not publicly disclosed. No capital investment figure specific to this facility (construction cost, upgrade spend, or acquisition allocation) was found. Note: this facility should not be confused with the unrelated, much larger Cologix COL5 data center under construction nearby at 6787 Green Meadows Drive in Orange Township (a ~$1-1.17 billion project), which is a separate operator and separate site on the same road.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed for this specific facility\", \"detail\": \"The site is in AEP Ohio's service territory (Delaware County). Ohio regulators have approved new AEP data-center interconnection tariff rules amid a broader statewide surge in large-load/data-center interconnection requests, but no transmission upgrade, substation, or load-specific filing tied to this particular CMH1 facility was found in PUCO records or trade press searches.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed for this specific facility\", \"detail\": \"No county Community Reinvestment Area (CRA), PILOT, property-tax abatement, or state sales-tax exemption filing specific to this Centersquare/Cyxtera CMH1 site was found. (For contrast: a separate, unrelated new-build data center on the same road - Cologix's COL5 project - received a 10-year 50% Delaware County property tax abatement and a state-approved 50%/10-year sales tax exemption valued at ~$42.3 million in 2026, but that deal applies to Cologix, not Centersquare, and should not be attributed to this facility.)\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No facility-specific environmental review, land-use permit, or impact filing was found. As an existing, previously-developed colocation site (originally built out under CenturyLink, later Cyxtera) rather than a new greenfield project, it would not be expected to have generated the kind of fresh environmental/zoning record that new hyperscale proposals in the county have produced.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No source disclosed the specific cooling architecture (closed-loop, open-loop, evaporative, or air-cooled) for this facility. Centersquare's general marketing materials discuss sustainability commitments across its portfolio, but no CMH1/Delaware County-specific water usage or cooling-system detail was found.\"}, \"timeline\": \"Facility originally built out and operated as a CenturyLink data center (exact construction/opening date not publicly disclosed) -> May 1, 2017: CenturyLink sells its 57-facility data center/colocation business (including this site) to a BC Partners/Medina Capital consortium for ~$2.15B cash plus assumed obligations (deal reported at $1.8-2.8B depending on source), forming Cyxtera Technologies; site rebrands 'Cyxtera CMH1' -> November 2023: Cyxtera files for bankruptcy; Brookfield Infrastructure acquires Cyxtera's assets and combines them with its existing Evoque Data Center Solutions platform -> April 2024: Brookfield launches the combined business under the new brand 'Centersquare' (also styled 'Csquare'); site becomes 'Centersquare CMH1' -> Present: facility continues operating as active multi-tenant colocation space marketed by Centersquare/Csquare in the Columbus market.\", \"investors\": \"Owned and operated by Centersquare (also styled Csquare), a colocation platform controlled by Brookfield Infrastructure Partners, formed in April 2024 from the merger of Cyxtera Technologies (acquired out of bankruptcy by Brookfield in November 2023) and Brookfield's existing Evoque Data Center Solutions business. Centersquare's CEO is Spencer Mullee. No minority investors or separate SEC filings specific to this facility were found; Centersquare itself does not appear to be a standalone SEC filer (parent Brookfield Infrastructure entities are publicly traded, but no CMH1-specific disclosures were located in their filings).\", \"politicalContext\": \"No political statements or records from named officials specifically about the Centersquare CMH1 facility were found. Delaware County Commissioner Jeff Benton [R] and Orange Township Trustee Erica Fouss [R] have both made general public comments about data centers in the Lewis Center/Orange Township area (Benton noting 'pluses and minuses' - job creation and property tax revenue versus electricity and water demand; Fouss describing herself as 'data center neutral' while noting township-level economic benefits) - but these statements were made in coverage of the newer, unrelated Cologix COL5 project on the same road (Green Meadows Drive), not this Centersquare/Cyxtera facility. As is common for smaller, established colocation sites, no facility-specific political commentary on Centersquare CMH1 was identified.\", \"sources\": [\"https://www.interconnection.fyi/data-center/project/centersquare-b9d2b1d4\", \"https://www.datacenters.com/centersquare-cmh1-columbus-lewis-center-campus\", \"https://www.csquare.com/data-centers/columbus\", \"https://www.datacentermap.com/usa/ohio/columbus/cyxtera-cmh1/\", \"https://baxtel.com/data-center/centersquare-columbus-cmh1\", \"https://inflect.com/8180-green-meadows-drive-north-lewis-center/cyxtera-technologies-inc/datacenter/cl1\", \"https://gotcolo.com/data-center/cmh1-columbus-lewis-center-data-center-campus/\", \"https://datacenterhawk.com/marketplace/providers/csquare/8180-green-meadows-drive-north/cmh1-a\", \"https://www.datacenterdynamics.com/en/news/brookfield-combines-cyxtera-and-evoque-under-new-centersquare-brand/\", \"https://www.datacenterfrontier.com/colocation/article/55016615/brookfield-infrastructures-evoque-cyxtera-data-center-collaboration-emerges-as-centersquare\", \"https://www.datacenterdynamics.com/en/news/centurylink-completes-sale-of-its-data-center-business-now-called-cyxtera/\", \"https://www.datacenterknowledge.com/build-design/cyxtera-puts-a-fresh-spin-on-centurylink-s-former-data-center-empire\", \"https://www.datacenters.com/news/the-rundown-largest-data-center-acquisitions-of-2017-2018\", \"https://www.delawaresource.com/2026/06/03/orange-township-data-center-among-last-projects-approved-before-ohio-tax-break-pause/\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://columbusregion.com/press-release/cologix-expands-in-central-ohio/\", \"https://ryangrissinger.com/issues/data-centers\", \"https://ballotpedia.org/Ryan_Grissinger_(Delaware_County_Commission,_Ohio,_candidate_2026)\", \"https://co.delaware.oh.us/commissioners/commissioner-1-bio/\", \"https://ballotpedia.org/Jeff_Benton_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"https://www.orangetwp.org/staff/erica-fouss/\", \"https://www.delgazette.com/2026/02/03/orange-twp-overcomes-obstacles-in-2025/\", \"https://www.utilitydive.com/news/Ohio-regulators-approve-aep-data-center-interconnection-rules/752690/\"]}, \"ts\": 1784434061000}", "v67_dc_delawarecologix-col4": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Cologix first announced the COL4 project in March 2021 (planned 40 MW/117,000 sq ft). It was re-scoped and re-announced August 29, 2022 (256,000 sq ft, 36 MW, $150M investment). Cologix announced COL4 as fully complete and operational on May 23, 2024, calling it 'the first AI-ready colocation data center in Columbus.'\", \"powerMW\": \"Sources disagree depending on announcement phase: original 2021 plan = 40 MW (6 halls); Aug 2022 re-announcement = 36 MW (8 halls); May 2024 completion coverage (Data Center Frontier) = 33 MW (3 data halls online at completion); Cologix's current COL4 property page and DatacenterMap/Baxtel list 27 MW, matching the tracker's 27 MW figure. Likely reflects phased build-out (27-33 MW currently live, up to 36 MW at full build).\", \"sizeSqFt\": \"256,000 sq ft, on an approximately 7-9 acre parcel along Alta View Blvd/Worthington Woods Blvd, adjacent to Cologix's existing COL1-3 campus (535/555/585 Scherers Court).\", \"totalInvestment\": \"$150 million (stated as 'more than $150 million,' sometimes rounded to $152 million by JobsOhio) for the COL4 build, per Cologix/JobsOhio's August 2022 announcement. Note: this is separate from Cologix's later ~$1.1 billion, multi-campus Delaware/Licking County investment (COL5 in Orange Township and a Johnstown site), which is a different, newer project and should not be conflated with COL4.\", \"employment\": {\"construction\": \"Not publicly disclosed specifically for COL4 (no construction-jobs figure found in the 2021/2022/2024 COL4 announcements).\", \"permanent\": \"15 new full-time jobs pledged as part of the 2022 expansion announcement, bringing Cologix's regional headcount to 39 employees.\", \"totalPayroll\": \"$1.5 million in new annual payroll, per the Ohio Tax Credit Authority's 2022 approval tied to the COL4 project's 15 new jobs.\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No source specifically named the interconnecting utility, substation, or transmission-level impact for COL4. Central Ohio data centers in this corridor are generally served by AEP Ohio, but no COL4-specific grid-impact filing, utility docket, or transmission study was found in public search results.\"}, \"taxImplications\": {\"summary\": \"State sales-tax exemption; no COL4-specific local property abatement found\", \"detail\": \"The Ohio Tax Credit Authority approved a 75%, 10-year sales-tax exemption for the COL4 project in August 2022, tied to the $150M investment and 15 new jobs/$1.5M new payroll. This is a state-level exemption administered via JobsOhio/Ohio Development Services Agency, typically covering data-center equipment purchases. No county-level Community Reinvestment Area (CRA) or property-tax abatement specific to COL4 was found (that pattern instead applies to Cologix's newer COL5/COL6 Orange Township-Johnstown project, which received a separate 50%, 10-year sales-tax exemption worth ~$42.3M plus a Delaware County CRA property abatement in 2026 — not part of COL4).\"}, \"environmentalImpact\": {\"summary\": \"Built to LEED principles; no controversy or contested permitting found\", \"detail\": \"Cologix states COL4 was built using LEED (Leadership in Energy and Environmental Design) principles, with energy-efficient LED lighting (auto-off), renewable-energy power purchase options, green-roof capability, and EV charging stations. Unlike some newer central-Ohio hyperscale proposals (e.g., the Amazon project in Sunbury), no environmental-impact controversy, contested zoning fight, or EIS was found specifically for COL4; it was built as an expansion of an already-developed, already-zoned data-center campus.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Cologix describes company-wide use of closed-loop cooling systems that 'eliminate the need for evaporative cooling towers and significantly reduce water usage,' and reports a fleet-wide average Water Usage Effectiveness (WUE) of 0.203 in 2024 (versus an industry average around 1.8). However, no source explicitly confirmed COL4's cooling design (closed-loop vs. evaporative/open-loop) at the individual-facility level, so this cannot be confirmed as COL4-specific.\"}, \"timeline\": \"March 2021: Cologix first announces COL4 plans (40 MW, 6 data halls, ~117,000 sq ft) on its Worthington Woods Blvd campus. August 29, 2022: Cologix re-announces an expanded/re-scoped COL4 — $150M investment, 256,000 sq ft, up to 36 MW across 8 data halls, 15 new jobs pledged; Ohio Tax Credit Authority approves a 75%, 10-year sales-tax exemption. May 23, 2024: Cologix announces COL4 complete and operational, marketed as Columbus's first AI-ready colocation data center (33 MW live across 3 data halls at completion, per Data Center Frontier); JobsOhio CEO J.P. Nauseef comments on the completion. 2025-2026: Cologix begins a separate, much larger ($1.1B) buildout of new campuses (COL5 in Orange Township, Delaware Co., and a Johnstown, Licking Co. site) — distinct projects from COL4, receiving their own state tax exemption (~$42.3M) and a Delaware County CRA abatement in 2026, just before Ohio paused new data-center tax breaks.\", \"investors\": \"Cologix is a privately held company; it is not itself SEC-registered/public. Majority ownership has been held by Stonepeak (an infrastructure-focused private equity firm) since March 2017. Mubadala Investment Company partnered in as a co-investor in January 2020. In December 2021 (completed April 2022), Stonepeak executed a ~$3.0 billion equity recapitalization of Cologix, moving ownership into new Stonepeak-managed vehicles with a mix of reinvesting existing investors and new third-party investors, including Madison International Realty. Company leadership quoted in COL4 coverage: Bill Fathers (CEO, in 2021) and Laura Ortman (President & Chief Revenue Officer, quoted in the 2022 expansion announcement).\", \"politicalContext\": \"No facility-specific political statements from named elected officials were found regarding COL4 itself. The only official-adjacent quote found in COL4 coverage is from J.P. Nauseef, President & CEO of JobsOhio (a private nonprofit economic-development corporation, not an elected official, so no party affiliation applies), who commented favorably on COL4's May 2024 completion as part of Ohio's broader data-center growth. Separately, Delaware County Economic Development Director Dana McDaniel (a county staff official, not an elected official — no party affiliation applicable) was quoted welcoming Cologix's newer COL5 project in Orange Township and contrasting it with the more controversial Amazon Sunbury proposal, but that quote pertains to COL5/Orange Township, not COL4. Ohio Governor Mike DeWine [R] and Lt. Governor Jim Tressel [R] were named in a June 2026 state announcement of tax-credit approvals covering Cologix's Orange Township/Johnstown projects (COL5/COL6), not COL4 specifically. No DeWine, state legislator, or Franklin/Delaware County commissioner statement was found that addresses COL4 by name.\", \"sources\": [\"https://cologix.com/data-centers/columbus/col4/\", \"https://www.datacenterdynamics.com/en/news/cologix-re-announces-col4-data-center-in-columbus-ohio/\", \"https://cologix.com/news/cologix-expanding-data-center-campus-in-the-columbus-region-investing-more-than-150-million/\", \"https://www.jobsohio.com/newsroom/news-press/cologix-expanding-data-center-campus-in-the-columbus-region\", \"https://www.globenewswire.com/en/news-release/2022/08/29/2506136/0/en/Cologix-Expanding-Data-Center-Campus-in-the-Columbus-Region-Investing-More-Than-150-Million.html\", \"https://www.areadevelopment.com/newsItems/9-8-2022/cologix-columbus-ohio.shtml\", \"https://www.globenewswire.com/news-release/2024/05/23/2887404/0/en/Cologix-is-the-First-Colocation-Provider-to-Complete-an-AI-Ready-Data-Center-in-Columbus.html\", \"https://cologix.com/news/cologix-first-colocation-provider-to-complete-ai-ready-data-center-columbus/\", \"https://www.datacenterfrontier.com/site-selection/article/55042304/cologix-expands-central-ohio-footprint-with-completion-of-ai-ready-data-center-in-columbus\", \"https://hostingjournalist.com/news/cologix-completes-fourth-data-center-in-columbus-ohio\", \"https://www.intelligentdatacentres.com/2024/06/04/cologix-completes-first-ai-ready-data-centre-in-columbus/\", \"https://baxtel.com/data-center/cologix-columbus-col4\", \"https://www.datacentermap.com/usa/ohio/columbus/cologix-col4-s/\", \"https://datacenterhawk.com/marketplace/providers/cologix/7500-alta-view-boulevard/col4\", \"https://columbusregion.com/press-release/cologix-expands-in-central-ohio/\", \"https://www.delawaresource.com/2026/06/03/orange-township-data-center-among-last-projects-approved-before-ohio-tax-break-pause/\", \"https://signalohio.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://governor.ohio.gov/media/news-and-media/governor-dewine-announces-eight-projects-set-to-create-1618-jobs-more-than-1-8-billion-in-investments\", \"https://hs.getobedio.com/blog/worthington-council-reviews-274m-cologix-data-center-expansion\", \"https://regionalplanning.co.delaware.oh.us/wp-content/uploads/sites/17/2025/06/ORA-Cologix-starts-work-06.18.25.pdf\", \"https://stonepeak.com/portfolio-highlights/cologix\", \"https://stonepeak.com/news/stonepeak-recapitalize-cologix\", \"https://dgtlinfra.com/stonepeak-cologix-equity-recapitalization/\", \"https://cologix.com/resources/blogs/how-cologix-champions-sustainability/\"]}, \"ts\": 1784434061000}", "v67_dc_delawareexpedient-cmh3": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"In service since approximately February 2024 (Expedient publicly announced launch of operations on February 13, 2024). Note: the building itself was originally constructed in 1985 and upgraded in 2004 by Nationwide Mutual Insurance before being converted to Expedient's CMH3 colocation facility.\", \"powerMW\": \"3 MW of initial power capacity, with plans disclosed at launch to expand to 7.5 MW in the future. Matches the 3 MW figure in the tracker file.\", \"sizeSqFt\": \"102,000 sq ft total facility, including 39,600 sq ft of raised-floor/data hall space, described as able to accommodate more than 33,000 physical servers.\", \"totalInvestment\": \"Not publicly disclosed. The facility was acquired via a sale-leaseback arrangement in which Nationwide Mutual Insurance retained ownership of the building as landlord while Expedient took over operational control and is responsible for future upgrade/expansion investment; neither company disclosed the transaction value or capital investment figures.\", \"employment\": {\"construction\": \"Not publicly disclosed (this was a retrofit/conversion of an existing 1985-built Nationwide building rather than new ground-up construction, so no construction-jobs figure has been publicized).\", \"permanent\": \"Not publicly disclosed as a specific headcount tied to this facility. Expedient has advertised ongoing hiring for roles based at the Lewis Center/CMH3 site, including an entry-level 'IT Support Associate' position on its Operations Support Center team, but no total on-site employment figure is published.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No facility-specific grid or transmission impact study or utility statement found\", \"detail\": \"No county- or utility-specific interconnection, substation, or transmission notes tied specifically to CMH3 were found. Delaware County Commissioner Jeff Benton [R] has made general public comments about data centers in the county citing electricity demand as a concern, but these remarks are about data center development in Delaware County broadly (in the context of a separate, much larger Orange Township project) and are not confirmed to reference the Expedient CMH3 facility specifically.\"}, \"taxImplications\": {\"summary\": \"No confirmed facility-specific tax abatement, CRA, or PILOT agreement found\", \"detail\": \"Ohio's Community Reinvestment Area (CRA) program is the standard vehicle for data center property-tax abatements in the state (up to 100% abatement for 15-30 years) and has been used for other Delaware County-area data center projects, but no public record was found confirming that the Expedient CMH3 facility itself (a retrofit/lease of an existing 1985 Nationwide-owned building) received a CRA abatement, PILOT agreement, or state sales-tax exemption. Because the underlying real estate remains owned by Nationwide under the sale-leaseback structure, its tax treatment may differ from ground-up new-build data center projects that typically seek such incentives.\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental review, permit, or land-use filing found\", \"detail\": \"No county auditor, township, or state environmental permit records specific to CMH3's conversion from office/data-center use were located in public search. Because the project reused an existing 1985-built structure rather than involving new land development, it likely did not trigger the same land-use/greenfield environmental review process associated with new-build hyperscale campuses in the area.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No source specifies whether CMH3's cooling system is closed-loop, open-loop, or evaporative. The facility is built to (and designed to exceed) Tier III standards in a converted 1985/2004-era insurance company data center building; specific cooling architecture and water-consumption data have not been publicly disclosed by Expedient or Nationwide.\"}, \"timeline\": \"1985: Building originally constructed for Nationwide Mutual Insurance at 281 E. Powell Road, Lewis Center Township, Delaware County, Ohio. 2004: Facility upgraded. Prior to 2024: Nationwide modernizes its own IT infrastructure and reduces its footprint in the building to less than half of capacity. February 13, 2024: Expedient publicly announces it has added the former Nationwide facility to its portfolio as 'CMH3' via a sale-leaseback deal (Nationwide remains landlord/owner; Expedient takes operational control), marking Expedient's 15th U.S. data center and 5th in Ohio. February 2024 (approx.): Facility becomes operational/in-service under Expedient as a Tier III-class colocation facility with 3 MW initial capacity (7.5 MW planned future capacity).\", \"investors\": \"Operator Expedient is a private company founded in 2001, headquartered in Pittsburgh, PA. Since December 2019, Expedient has been owned by InfraBridge (an infrastructure investment manager), which is now a division of DigitalBridge Group, Inc. (NYSE: DBRG), a publicly traded global digital infrastructure investment firm. Expedient was previously owned by Landmark Media Enterprises, LLC. For the CMH3 building specifically, real estate ownership is retained by Nationwide Mutual Insurance Company under a sale-leaseback arrangement, with Expedient as operator/tenant responsible for IT operations and future capital upgrades.\", \"politicalContext\": \"No political statements or records from named officials specifically about the Expedient CMH3 facility were found. Delaware County Commissioner Jeff Benton [R] (elected/appointed, Delaware County Commission) has made general public remarks about data centers in Delaware County -- noting both benefits (job creation, property tax revenue) and concerns (electricity demand, water usage) -- but these comments were made in the context of data center development in the county broadly (notably a much larger, separately-sited Cologix/Orange Township project that received a state tax incentive), not in specific reference to the Expedient CMH3 site. No Sunbury village or Delaware County township-level statements specific to this facility were located.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/expedient-launches-data-center-in-columbus-ohio/\", \"https://expedient.com/about/media/2024-02-13-expedient-expands-again-adds-fifth-ohio-data-center/\", \"https://www.infrabridge.com/news/2024-02-13-expedient-expands-again-adds-fifth-ohio-data-center\", \"https://www.prnewswire.com/news-releases/expedient-expands-again-adds-fifth-ohio-data-center-302059734.html\", \"https://baxtel.com/data-center/expedient-lewis-center-cmh3\", \"https://datacenterhawk.com/marketplace/providers/expedient/281-east-powell-road/cmh3\", \"https://telecomtalk.info/expedient-expands-with-new-datacenter-columbus-ohio/919438/\", \"https://www.datacenterfrontier.com/colocation/article/11427841/expedient-in-growth-mode-to-support-8216cloud-journey8217-in-regional-markets\", \"https://expedient.com/about/board-and-investors/\", \"https://pitchbook.com/profiles/company/87491-80\", \"https://ballotpedia.org/Jeff_Benton_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"https://co.delaware.oh.us/commissioners/commissioner-1-bio/\", \"https://www.delawaresource.com/2026/06/03/orange-township-data-center-among-last-projects-approved-before-ohio-tax-break-pause/\", \"https://ryangrissinger.com/issues/data-centers\", \"https://www.datacentermap.com/usa/ohio/columbus/\"]}, \"ts\": 1784434061000}"};

// ── STORAGE SHIM ──────────────────────────────────────────────────────────────
// Storage layer: prefer localStorage (persistent across reloads) in deployed HTML.
// Fall back to window.storage only when localStorage is unavailable (e.g. private browsing with storage blocked).
// NOTE: window.storage exists in Claude artifact sandbox but is session-scoped — do NOT use it as primary.
const _useWinStorage = (()=>{
  try { localStorage.setItem('__test__','1'); localStorage.removeItem('__test__'); return false; }
  catch(e) { return typeof window.storage !== 'undefined'; }
})();
const storage={
  async set(k,v){
    try{
      if(_useWinStorage) return await window.storage.set(k,v);
      localStorage.setItem(k,v); return true;
    }catch(e){return false;}
  },
  async get(k){
    try{
      if(_useWinStorage) return await window.storage.get(k);
      const v=localStorage.getItem(k); return v?{value:v}:null;
    }catch(e){return null;}
  },
  async list(pfx){
    try{
      if(_useWinStorage) return await window.storage.list(pfx);
      const keys=Object.keys(localStorage).filter(k=>k.startsWith(pfx)); return{keys};
    }catch(e){return{keys:[]};}
  },
};

// ── CACHE ─────────────────────────────────────────────────────────────────────
const BS_PFX='v67_bs_',DC_PFX='v67_dc_';
async function cacheSet(pfx,id,data){try{await storage.set(pfx+id,JSON.stringify({data,ts:Date.now()}));return true;}catch(e){return false;}}
async function cacheGet(pfx,id){try{const r=await storage.get(pfx+id);return r?JSON.parse(r.value):null;}catch(e){return null;}}
async function cacheLoadAll(pfx){try{const keys=(await storage.list(pfx))?.keys||[];const out={};for(const k of keys){try{const r=await storage.get(k);if(r){const p=JSON.parse(r.value);out[k.replace(pfx,'')]={...p.data,_ts:p.ts};}}catch(e){}}return out;}catch(e){return{};}}
async function cacheIdSet(pfx){try{const keys=(await storage.list(pfx))?.keys||[];return new Set(keys.map(k=>k.replace(pfx,'')));}catch(e){return new Set();}}

// ── AUTH ──────────────────────────────────────────────────────────────────────
const ACCESS_CODE='freedom250';
const AUTH_KEY='ohdc_auth_v1';
function getAuth(){try{return localStorage.getItem(AUTH_KEY)==='1';}catch(e){return false;}}
function setAuth(){try{localStorage.setItem(AUTH_KEY,'1');}catch(e){}}

function LoginScreen({onAuth}){
  const[code,setCode]=useState('');
  const[err,setErr]=useState(false);
  const[shake,setShake]=useState(false);
  function attempt(){
    if(code.toLowerCase()===ACCESS_CODE.toLowerCase()){setAuth();onAuth();}
    else{setErr(true);setShake(true);setCode('');setTimeout(()=>setShake(false),600);}
  }
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#0f172a',padding:24}}>
      <div style={{animation:'fadeIn .4s ease',textAlign:'center',maxWidth:380,width:'100%'}}>
        <div style={{fontSize:13,letterSpacing:'.18em',color:'#475569',textTransform:'uppercase',marginBottom:6}}>Restricted Access</div>
        <div style={{fontSize:28,fontWeight:700,color:'white',marginBottom:4,letterSpacing:'-.5px'}}>Ohio Data Center Intelligence</div>
        <div style={{fontSize:13,color:'#475569',marginBottom:36}}>v.74-publish · Private Research Platform</div>
        <div style={{background:'#1e293b',borderRadius:12,padding:28,border:'0.5px solid #334155',animation:shake?'shake .5s ease':'none'}}>
          <div style={{fontSize:11,color:'#64748b',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10,textAlign:'left'}}>Access Code</div>
          <input autoFocus type="password" value={code} onChange={e=>{setCode(e.target.value);setErr(false);}} onKeyDown={e=>e.key==='Enter'&&attempt()} placeholder="Enter access code"
            style={{width:'100%',background:'#0f172a',border:`1px solid ${err?'#ef4444':'#334155'}`,borderRadius:8,padding:'10px 14px',color:'white',fontSize:14,outline:'none',marginBottom:12,letterSpacing:'.1em'}}/>
          {err&&<div style={{fontSize:11,color:'#ef4444',marginBottom:10,textAlign:'left'}}>Incorrect access code. Please try again.</div>}
          <button onClick={attempt} style={{width:'100%',background:'#3b82f6',color:'white',border:'none',borderRadius:8,padding:'10px 0',fontSize:13,fontWeight:600,cursor:'pointer',letterSpacing:'.03em'}}>Enter →</button>
        </div>
        <div style={{fontSize:10,color:'#334155',marginTop:20}}>This platform contains confidential investment research.<br/>Unauthorized access is prohibited.</div>
      </div>
    </div>
  );
}

const stripMD=t=>(t||'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^#{1,6}\s+/gm,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/^\s*[-*>]+\s*/gm,'').replace(/^\s*\d+\.\s+/gm,'').trim();
function cleanVal(v){if(v==null)return'TBD';let s=stripMD(String(v)).replace(/^[-:•*\s]+/,'').trim();const l=s.toLowerCase();if(!s||['tbd','n/a','na','unknown','—','-'].includes(l)||l.includes('not disclosed')||l.includes('research pending'))return'TBD';return s;}
function getSections(txt){const sec={};const parts=txt.split(/\n##\s+/);for(let i=1;i<parts.length;i++){const nl=parts[i].indexOf('\n');const h=(nl>-1?parts[i].slice(0,nl):parts[i]).trim().toLowerCase();const b=(nl>-1?parts[i].slice(nl+1):'').trim();if(h.includes('metric'))sec.metrics=b;else if(h.includes('grid')||h.includes('power'))sec.grid=b;else if(h.includes('tax'))sec.tax=b;else if(h.includes('environ'))sec.env=b;else if(h.includes('water'))sec.water=b;else if(h.includes('timeline'))sec.timeline=b;else if(h.includes('investor'))sec.investors=b;else if(h.includes('politic'))sec.political=b;else if(h.includes('source'))sec.sources=b;}return sec;}
function toResult(fac,txt){const s=getSections(txt);const fl=t=>t?t.split('\n')[0].replace(/^[-•*\d.]+\s*/,'').trim():'';const srcs=s.sources?s.sources.split('\n').map(x=>x.replace(/^[-•*\d.]+\s*/,'').trim()).filter(Boolean):[];
  // Alias-based extraction: tries each alias in order, returns first match found in the metrics block
  const gmA=aliases=>{
    if(!s.metrics)return'';
    for(const k of aliases){
      const m=s.metrics.match(new RegExp(k+'\\s*:\\s*([^\\n]+)','i'));
      if(m){const v=m[1].replace(/^-+\s*/,'').trim();if(v&&!/^\bTBD\b$/i.test(v))return v.replace(/\bTBD\b.*/i,'').trim();}
    }
    return'';
  };
  const gm=k=>gmA([k]);
  const startDate=gmA(['Operational Date','Operational','Online Date','Go-?Live Date','Expected Operational','In-?Service Date'])||gmA(['Construction Start','Construction Start Date','Groundbreaking','Groundbreaking Date'])||'';
  const sizeSqFt=gmA(['Square Feet','Square Footage','Facility Size','Total Square Feet','Building Size','Sq\\.?\\s*Ft\\.?'])||'';
  const totalInvestment=gmA(['Total Investment','Investment','Total Capital Investment','Project Cost','Capital Expenditure','Capex'])||fac.cost||'';
  return{status:fac.status,startDate,powerMW:fac.mw>0?fac.mw+' MW':'',sizeSqFt,totalInvestment,employment:{construction:gmA(['Construction Jobs','Construction Employment']),permanent:gmA(['Permanent Jobs','Permanent Employment','Full-?Time Jobs']),totalPayroll:gmA(['Annual Payroll','Payroll'])},gridImpact:{summary:fl(s.grid),detail:s.grid||''},taxImplications:{summary:fl(s.tax),detail:s.tax||''},environmentalImpact:{summary:fl(s.env),detail:s.env||''},waterLoop:{answer:fl(s.water)||'TBD',detail:s.water||''},timeline:s.timeline||'',investors:s.investors||'',politicalContext:s.political||'',sources:srcs,dataConfidence:srcs.length>2?'High':srcs.length>0?'Medium':'Low',_raw:Object.keys(s).length===0?txt:''};}

function calcStats(vals){if(!vals.length)return null;const s=[...vals].sort((a,b)=>a-b);const mean=vals.reduce((a,b)=>a+b,0)/vals.length;const mid=Math.floor(s.length/2);const median=s.length%2===0?(s[mid-1]+s[mid])/2:s[mid];const stddev=Math.sqrt(vals.reduce((a,b)=>a+Math.pow(b-mean,2),0)/vals.length);return{mean,median,stddev,min:s[0],max:s[s.length-1],n:vals.length};}

// ── BASE SCAN VIEW ────────────────────────────────────────────────────────────
function BaseScanView({bsCache,setBsCache,resCache,onBack,onResearch}){
  const[scanning,setScanning]=useState(false);
  const[paused,setPaused]=useState(false);
  const[prog,setProg]=useState({done:0,total:0,current:'',log:[]});
  const[sortBy,setSortBy]=useState('priority');
  const pauseRef=useRef(false),stopRef=useRef(false);
  const PO={Critical:4,High:3,Medium:2,Low:1};
  const cached=Object.keys(bsCache);
  const pct=prog.total>0?Math.round((prog.done/prog.total)*100):0;
  const sorted=useMemo(()=>FACS.filter(f=>bsCache[f.id]).sort((a,b)=>{const sa=bsCache[a.id],sb=bsCache[b.id];if(sortBy==='priority')return(PO[sb.priority]||0)-(PO[sa.priority]||0);if(sortBy==='recent')return(sb._ts||0)-(sa._ts||0);return a.name.localeCompare(b.name);}),[bsCache,sortBy]);
  async function runScan(rescanAll){
    stopRef.current=false;pauseRef.current=false;setPaused(false);
    const queue=rescanAll?[...FACS]:FACS.filter(f=>!bsCache[f.id]);
    if(!queue.length)return;
    setScanning(true);setProg({done:0,total:queue.length,current:'Starting...',log:[]});
    let done=0;
    for(const fac of queue){
      if(stopRef.current)break;
      while(pauseRef.current)await new Promise(r=>setTimeout(r,200));
      setProg(p=>({...p,current:`Scanning ${fac.name}...`,done}));
      try{const result=await apiBaseScan(fac);const entry={...result,_ts:Date.now()};await cacheSet(BS_PFX,fac.id,result);setBsCache(prev=>({...prev,[fac.id]:entry}));setProg(p=>({...p,log:[{name:fac.name,ok:true,pri:result.priority},...p.log].slice(0,60)}));}
      catch(e){setProg(p=>({...p,log:[{name:fac.name,ok:false},...p.log].slice(0,60)}));}
      done++;await new Promise(r=>setTimeout(r,450));
    }
    setScanning(false);setProg(p=>({...p,done,current:`Done — ${done} processed`}));
  }
  async function rescanOne(fac){try{const result=await apiBaseScan(fac);const entry={...result,_ts:Date.now()};await cacheSet(BS_PFX,fac.id,result);setBsCache(prev=>({...prev,[fac.id]:entry}));}catch(e){console.error(e);}}
  const togglePause=()=>{pauseRef.current=!pauseRef.current;setPaused(p=>!p);};
  const stopScan=()=>{stopRef.current=true;setScanning(false);setPaused(false);};
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style={T.nav}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:12,padding:0}}>← Back</button>
        <span style={{fontSize:14,fontWeight:600,color:'white'}}>⚡ Base Scan</span>
        <span style={{fontSize:11,color:'#475569',background:'rgba(255,255,255,0.06)',padding:'2px 8px',borderRadius:99}}>{cached.length} / {FACS.length} cached</span>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <span style={{fontSize:10,color:'#475569'}}>Sort:</span>
          {['priority','recent','name'].map(s=><button key={s} onClick={()=>setSortBy(s)} style={{fontSize:10,padding:'2px 7px',borderRadius:99,border:'none',cursor:'pointer',background:sortBy===s?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.05)',color:sortBy===s?'white':'#64748b',textTransform:'capitalize'}}>{s}</button>)}
        </div>
      </div>
    </div>
    {(scanning||prog.done>0)&&<div style={{padding:'8px 20px',background:'white',borderBottom:'0.5px solid #e2e8f0',flexShrink:0}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
        <span style={{color:'#64748b',fontStyle:scanning&&!paused?'italic':'normal'}}>{prog.current}</span>
        <span style={{fontWeight:600,color:'#1e293b'}}>{pct}% ({prog.done}/{prog.total})</span>
      </div>
      <div style={{height:4,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#22c55e,#16a34a)',borderRadius:99,transition:'width .35s'}}/></div>
    </div>}
    {scanning&&prog.log.length>0&&<div style={{background:'#0f172a',padding:'5px 20px',flexShrink:0,maxHeight:64,overflowY:'auto'}}>
      {prog.log.slice(0,4).map((l,i)=><div key={i} style={{fontSize:10,fontFamily:'monospace',color:l.ok?'#4ade80':'#f87171',lineHeight:1.6}}>{l.ok?'✓':'✗'} {l.name}{l.ok&&l.pri?' · '+l.pri:''}</div>)}
    </div>}
    {cached.length===0&&!scanning
      ?<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',color:'#94a3b8'}}>
          <div style={{fontSize:32,marginBottom:10}}>⚡</div>
          <div style={{fontSize:14,fontWeight:500,color:'#475569',marginBottom:6}}>No base scans cached yet</div>
          <div style={{fontSize:12,lineHeight:1.7,maxWidth:360}}>Base scans populate via the scheduled research pipeline — none are cached for the current filter yet.</div>
        </div>
      :<div style={{flex:1,overflowY:'auto',padding:'12px 20px'}}>
          <div style={{fontSize:11,color:'#94a3b8',marginBottom:10}}>{sorted.length} cached · sorted by {sortBy}</div>
          {sorted.map(fac=>{
            const sc=bsCache[fac.id],ss=SS(fac.status),hasResearch=resCache.has(fac.id);
            return <div key={fac.id} style={{...T.card,borderLeft:`3px solid ${PRC[sc.priority]||'#94a3b8'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:3}}>{fac.name}</div>
                  <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:'#94a3b8'}}>{fac.company} · {fac.county} Co. · {fac.mw>0?fac.mw+' MW':'?'}</span>
                    <CacheTag type={hasResearch?'full':'base'} ts={sc._ts}/>
                  </div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <span style={T.pill(ss.bg,ss.cl)}>{fac.status}</span>
                  <span style={{...T.pill('#f8fafc',PRC[sc.priority]||'#94a3b8'),border:`0.5px solid ${PRC[sc.priority]||'#e2e8f0'}20`}}>{sc.priority}</span>
                </div>
              </div>
              <BaseScanCard sc={sc} compact={false}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                <span style={{fontSize:9,color:'#cbd5e1'}}>{sc._ts?new Date(sc._ts).toLocaleString():'—'}</span>
                <div style={{display:'flex',gap:5}}>
                  <button onClick={()=>onResearch(fac)} style={{...T.btn('#0f172a','white','none')}}>View Research →</button>
                </div>
              </div>
            </div>;
          })}
        </div>
    }
  </div>;
}

// ── HOME VIEW ─────────────────────────────────────────────────────────────────

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[authed,setAuthed]=useState(getAuth());
  const[view,setView]=useState('boot');
  const[query,setQuery]=useState('');
  const[filter,setFilter]=useState('All');
  const[tierFilter,setTierFilter]=useState('All');
  const[sel,setSel]=useState(null);
  const[res,setRes]=useState(null);
  const[err,setErr]=useState('');
  const[msg,setMsg]=useState('');
  const[prog,setProg]=useState(0);
  const[isCached,setIsCached]=useState(false);
  const[resCache,setResCache]=useState(new Set());
  const[bsCache,setBsCache]=useState({});
  const[model,setModel]=useState('sonnet');
  useEffect(()=>{if(!authed)return;(async()=>{const[bs,rc]=await Promise.all([cacheLoadAll(BS_PFX),cacheIdSet(DC_PFX)]);setBsCache(bs);setResCache(rc);setView('home');})();},[authed]);
  const filtered=useMemo(()=>{let list=FACS;if(filter!=='All')list=list.filter(f=>f.region===filter);if(tierFilter!=='All')list=list.filter(f=>f.tier===tierFilter);if(query.length>=2){const q=query.toLowerCase();list=list.filter(f=>f.name.toLowerCase().includes(q)||f.company.toLowerCase().includes(q)||f.county.toLowerCase().includes(q)||f.city.toLowerCase().includes(q));}else list=list.filter(f=>f.mw>=25||f.cost!=='');return list;},[query,filter,tierFilter]);
  const doResearch=useCallback(async(fac)=>{
    const fm={...fac,_model:model};
    const hit=await cacheGet(DC_PFX,fac.id);
    if(hit){setSel(fm);setRes({...hit.data,_cachedAt:new Date(hit.ts).toLocaleDateString()});setIsCached(true);setView('results');return;}
    // No cached deep research available in this static build — show pending state, no API call.
    setSel(fm);setRes(null);setView('pending');
  },[model]);
  function handleLogout(){try{localStorage.removeItem(AUTH_KEY);}catch(e){}setAuthed(false);setView('boot');}
  if(!authed)return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  if(view==='boot')return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',gap:12,color:'#94a3b8',fontSize:12,background:'#0f172a',flexDirection:'column'}}><div style={{width:22,height:22,border:'2px solid #1e293b',borderTopColor:'#3b82f6',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Loading...<style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>;
  if(view==='pending')return <PendingView fac={sel} onBack={()=>setView('home')}/>;
  if(view==='results')return <ResultsView fac={sel} res={res} isCached={isCached} bsScan={bsCache[sel?.id]} onBack={()=>setView('home')}/>;
  if(view==='map')return <MapView bsCache={bsCache} onResearch={f=>{setView('home');setTimeout(()=>doResearch(f),50);}} onBack={()=>setView('home')}/>;
  if(view==='basescan')return <BaseScanView bsCache={bsCache} setBsCache={setBsCache} resCache={resCache} onBack={()=>setView('home')} onResearch={f=>{setView('home');setTimeout(()=>doResearch(f),50);}}/>;
  if(view==='analytics')return <AnalyticsView bsCache={bsCache} onBack={()=>setView('home')}/>;
  return <HomeView query={query} setQuery={setQuery} filter={filter} setFilter={setFilter} tierFilter={tierFilter} setTierFilter={setTierFilter} model={model} setModel={setModel} filtered={filtered} onSelect={f=>doResearch(f)} resCache={resCache} bsCache={bsCache} error={err} onMap={()=>setView('map')} onBaseScan={()=>setView('basescan')} onAnalytics={()=>setView('analytics')} onLogout={handleLogout}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
