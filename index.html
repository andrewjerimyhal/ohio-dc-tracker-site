const _useWinStorage = (()=>{
  try { localStorage.setItem('__test__','1'); localStorage.removeItem('__test__'); return false; }
  catch(e) { return typeof window.storage !== 'undefined'; }
})();
const storage={
  async set(k,v){
    try{
      if(_useWinStorage) return await window.storage.set(k,v);
      localStorage.setItem(k,v); return true;
    }catch(e){return false;}
  },
  async get(k){
    try{
      if(_useWinStorage) return await window.storage.get(k);
      const v=localStorage.getItem(k); return v?{value:v}:null;
    }catch(e){return null;}
  },
  async list(pfx){
    try{
      if(_useWinStorage) return await window.storage.list(pfx);
      const keys=Object.keys(localStorage).filter(k=>k.startsWith(pfx)); return{keys};
    }catch(e){return{keys:[]};}
  },
};

async function cacheLoadAll(pfx){try{const keys=(await storage.list(pfx))?.keys||[];const out={};for(const k of keys){try{const r=await storage.get(k);if(r){const p=JSON.parse(r.value);out[k.replace(pfx,'')]={...p.data,_ts:p.ts};}}catch(e){}}return out;}catch(e){return{};}}

}

// ── TEXT UTILS ────────────────────────────────────────────────────────────────
const stripMD=t=>(t||'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^#{1,6}\s+/gm,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/^\s*[-*>]+\s*/gm,'').replace(/^\s*\d+\.\s+/gm,'').trim();
function cleanVal(v){if(v==null)return'TBD';let s=stripMD(String(v)).replace(/^[-:•*\s]+/,'').trim();const l=s.toLowerCase();if(!s||['tbd','n/a','na','unknown','—','-'].includes(l)||l.includes('not disclosed')||l.includes('research pending'))return'TBD';return s;}
function getSections(txt){const sec={};const parts=txt.split(/\n##\s+/);for(let i=1;i<parts.length;i++){const nl=parts[i].indexOf('\n');const h=(nl>-1?parts[i].slice(0,nl):parts[i]).trim().toLowerCase();const b=(nl>-1?parts[i].slice(nl+1):'').trim();if(h.includes('metric'))sec.metrics=b;else if(h.includes('grid')||h.includes('power'))sec.grid=b;else if(h.includes('tax'))sec.tax=b;else if(h.includes('environ'))sec.env=b;else if(h.includes('water'))sec.water=b;else if(h.includes('timeline'))sec.timeline=b;else if(h.includes('investor'))sec.investors=b;else if(h.includes('politic'))sec.political=b;else if(h.includes('source'))sec.sources=b;}return sec;}
function toResult(fac,txt){const s=getSections(txt);const fl=t=>t?t.split('\n')[0].replace(/^[-•*\d.]+\s*/,'').trim():'';const srcs=s.sources?s.sources.split('\n').map(x=>x.replace(/^[-•*\d.]+\s*/,'').trim()).filter(Boolean):[];
  // Alias-based extraction: tries each alias in order, returns first match found in the metrics block
  const gmA=aliases=>{
    if(!s.metrics)return'';
    for(const k of aliases){
      const m=s.metrics.match(new RegExp(k+'\\s*:\\s*([^\\n]+)','i'));
      if(m){const v=m[1].replace(/^-+\s*/,'').trim();if(v&&!/^\bTBD\b$/i.test(v))return v.replace(/\bTBD\b.*/i,'').trim();}
    }
    return'';
  };
  const gm=k=>gmA([k]);
  const startDate=gmA(['Operational Date','Operational','Online Date','Go-?Live Date','Expected Operational','In-?Service Date'])||gmA(['Construction Start','Construction Start Date','Groundbreaking','Groundbreaking Date'])||'';
  const sizeSqFt=gmA(['Square Feet','Square Footage','Facility Size','Total Square Feet','Building Size','Sq\\.?\\s*Ft\\.?'])||'';
  const totalInvestment=gmA(['Total Investment','Investment','Total Capital Investment','Project Cost','Capital Expenditure','Capex'])||fac.cost||'';
  return{status:fac.status,startDate,powerMW:fac.mw>0?fac.mw+' MW':'',sizeSqFt,totalInvestment,employment:{construction:gmA(['Construction Jobs','Construction Employment']),permanent:gmA(['Permanent Jobs','Permanent Employment','Full-?Time Jobs']),totalPayroll:gmA(['Annual Payroll','Payroll'])},gridImpact:{summary:fl(s.grid),detail:s.grid||''},taxImplications:{summary:fl(s.tax),detail:s.tax||''},environmentalImpact:{summary:fl(s.env),detail:s.env||''},waterLoop:{answer:fl(s.water)||'TBD',detail:s.water||''},timeline:s.timeline||'',investors:s.investors||'',politicalContext:s.political||'',sources:srcs,dataConfidence:srcs.length>2?'High':srcs.length>0?'Medium':'Low',_raw:Object.keys(s).length===0?txt:''};}

const PRIORITY_SCORE={Critical:4,High:3,Medium:2,Low:1};
const GRID_SCORE={'Very High':4,High:3,Medium:2,Low:1};
const ENV_SCORE={Significant:4,Moderate:3,Minor:2,None:1};
function parseCostM(cost){if(!cost)return null;const s=cost.replace(/[~<>+,\s]/g,'');const n=parseFloat(s);if(isNaN(n))return null;if(/b/i.test(s))return n*1000;if(/m/i.test(s))return n;return null;}
const FIELD_DEFS=[
  {id:'mw',label:'MW Capacity',unit:'MW',get:(f)=>f.mw>0?f.mw:null},
  {id:'cost_m',label:'Investment ($M est.)',unit:'$M',get:(f)=>parseCostM(f.cost)},
  {id:'cost_per_mw',label:'Cost per MW ($M/MW)',unit:'$M/MW',get:(f)=>{const m=f.mw>0?f.mw:null,c=parseCostM(f.cost);return(m&&c)?+(c/m).toFixed(2):null;}},
  {id:'mw_per_cost',label:'MW per $M invested',unit:'MW/$M',get:(f)=>{const m=f.mw>0?f.mw:null,c=parseCostM(f.cost);return(m&&c)?+(m/c).toFixed(3):null;}},
  {id:'priority',label:'Priority Score',unit:'1-4',needsScan:true,get:(f,bs)=>bs?(PRIORITY_SCORE[bs.priority]||null):null},
  {id:'gridRisk',label:'Grid Risk Score',unit:'1-4',needsScan:true,get:(f,bs)=>bs?(GRID_SCORE[bs.gridRisk]||null):null},
  {id:'envFlag',label:'Env Impact Score',unit:'1-4',needsScan:true,get:(f,bs)=>bs?(ENV_SCORE[bs.envFlag]||null):null},
];
const STATUS_GROUPS=['All','Active','Under Constr.','Permitted','Site Selected','Pre-Constr.','Scouting','DENIED','Withdrawn'];
const REGION_GROUPS=['All','Central','North-East','North-West','South-East','South-West'];
const TYPE_GROUPS=['All','AI/Hyperscale','Cloud/AI','Colocation','Crypto/HPC','Crypto/Mining','Hyperscale','Telecom/Colo','Enterprise/Medical','Government'];
function calcStats(vals){if(!vals.length)return null;const s=[...vals].sort((a,b)=>a-b);const mean=vals.reduce((a,b)=>a+b,0)/vals.length;const mid=Math.floor(s.length/2);const median=s.length%2===0?(s[mid-1]+s[mid])/2:s[mid];const stddev=Math.sqrt(vals.reduce((a,b)=>a+Math.pow(b-mean,2),0)/vals.length);return{mean,median,stddev,min:s[0],max:s[s.length-1],n:vals.length};}
function fmtVal(v,fieldId){if(v===null||v===undefined)return'—';const scoreLabels={priority:{4:'Critical',3:'High',2:'Medium',1:'Low'},gridRisk:{4:'Very High',3:'High',2:'Medium',1:'Low'},envFlag:{4:'Significant',3:'Moderate',2:'Minor',1:'None'}};if(scoreLabels[fieldId]){const lbl=scoreLabels[fieldId][Math.round(v)];return lbl?`${lbl} (${v.toFixed(1)})`:v.toFixed(2);}if(v>=1000)return v.toLocaleString(undefined,{maximumFractionDigits:1});return v<1?v.toFixed(3):v.toFixed(2);}

// ── BASE SCAN VIEW ────────────────────────────────────────────────────────────
function BaseScanView({bsCache,setBsCache,resCache,onBack,onResearch}){
  const[scanning,setScanning]=useState(false);
  const[paused,setPaused]=useState(false);
  const[prog,setProg]=useState({done:0,total:0,current:'',log:[]});
  const[sortBy,setSortBy]=useState('priority');
  const pauseRef=useRef(false),stopRef=useRef(false);
  const PO={Critical:4,High:3,Medium:2,Low:1};
  const cached=Object.keys(bsCache);
  const pct=prog.total>0?Math.round((prog.done/prog.total)*100):0;
  const sorted=useMemo(()=>FACS.filter(f=>bsCache[f.id]).sort((a,b)=>{const sa=bsCache[a.id],sb=bsCache[b.id];if(sortBy==='priority')return(PO[sb.priority]||0)-(PO[sa.priority]||0);if(sortBy==='recent')return(sb._ts||0)-(sa._ts||0);return a.name.localeCompare(b.name);}),[bsCache,sortBy]);
  async function runScan(rescanAll){
    stopRef.current=false;pauseRef.current=false;setPaused(false);
    const queue=rescanAll?[...FACS]:FACS.filter(f=>!bsCache[f.id]);
    if(!queue.length)return;
    setScanning(true);setProg({done:0,total:queue.length,current:'Starting...',log:[]});
    let done=0;
    for(const fac of queue){
      if(stopRef.current)break;
      while(pauseRef.current)await new Promise(r=>setTimeout(r,200));
      setProg(p=>({...p,current:`Scanning ${fac.name}...`,done}));
      try{const result=await apiBaseScan(fac);const entry={...result,_ts:Date.now()};await cacheSet(BS_PFX,fac.id,result);setBsCache(prev=>({...prev,[fac.id]:entry}));setProg(p=>({...p,log:[{name:fac.name,ok:true,pri:result.priority},...p.log].slice(0,60)}));}
      catch(e){setProg(p=>({...p,log:[{name:fac.name,ok:false},...p.log].slice(0,60)}));}
      done++;await new Promise(r=>setTimeout(r,450));
    }
    setScanning(false);setProg(p=>({...p,done,current:`Done — ${done} processed`}));
  }
  async function rescanOne(fac){try{const result=await apiBaseScan(fac);const entry={...result,_ts:Date.now()};await cacheSet(BS_PFX,fac.id,result);setBsCache(prev=>({...prev,[fac.id]:entry}));}catch(e){console.error(e);}}
  const togglePause=()=>{pauseRef.current=!pauseRef.current;setPaused(p=>!p);};

      {prog.log.slice(0,4).map((l,i)=><div key={i} style={{fontSize:10,fontFamily:'monospace',color:l.ok?'#4ade80':'#f87171',lineHeight:1.6}}>{l.ok?'✓':'✗'} {l.name}{l.ok&&l.pri?' · '+l.pri:''}</div>)}

          {/* Expanded scan panel */}
          {sc&&isExp&&<BaseScanCard sc={sc} compact={false}/>}
          {sc&&isExp&&<div style={{padding:'6px 20px 8px',background:'#f8fafc',display:'flex',justifyContent:'flex-end'}}>
            <button onClick={()=>onSelect(f)} style={{...T.btn('#0f172a','white','none'),fontSize:11}}>Full Research →</button>
          </div>}
        </div>;
      })}
    </div>
    <div style={{padding:'6px 20px',background:'#f8fafc',borderTop:'0.5px solid #e2e8f0',fontSize:10,color:'#94a3b8',flexShrink:0,display:'flex',justifyContent:'space-between'}}>
      <span>{query.length<2?`${filtered.length} major facilities — type to search all ${FACS.length}`:`${filtered.length} results`}</span>
      <span>{bsCount} base scanned · {resCache.size} fully researched{bsCount>0?' · click any scanned row to preview before researching':''}</span>
    </div>
  </div>;
}

// ── LOADING & RESULTS ─────────────────────────────────────────────────────────
const LOAD_MSGS=['Searching latest news and press releases...','Checking Ohio EPA and permit records...','Analyzing AEP Ohio grid filings...','Reviewing county tax abatement records...','Scanning political statements and voting records...','Verifying employment and investment figures...','Cross-referencing all sources...','Compiling research brief...'];
function LoadingView({fac,msg,prog}){
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',background:'#0f172a'}}>
    <div style={{fontSize:10,color:'#475569',marginBottom:6,textTransform:'uppercase',letterSpacing:'.1em'}}>Researching · {MODELS[fac._model||'sonnet'].label}</div>
    <div style={{fontSize:20,fontWeight:600,color:'white',marginBottom:4}}>{fac.name}</div>
    <div style={{fontSize:12,color:'#475569',marginBottom:28}}>{fac.company} · {fac.county} County</div>
    <div style={{width:220,height:3,background:'#1e293b',borderRadius:99,overflow:'hidden',marginBottom:18}}><div style={{height:'100%',background:'linear-gradient(90deg,#3b82f6,#7c3aed)',borderRadius:99,width:prog+'%',transition:'width 2s ease'}}/></div>
    <div style={{fontSize:12,color:'#475569',minHeight:20,fontStyle:'italic'}}>{msg}</div>
  </div>;
}
function ResultsView({fac,res,isCached,bsScan,onBack}){
  const[exp,setExp]=useState(null);
  const r=res,conf=r.dataConfidence||'Medium',cc={High:RT.emerald,Medium:RT.amber,Low:'#ef4444'}[conf];
  const pillars=[
    {k:'grid',icon:'⚡',title:'Power Grid Impact',color:RT.amber,sum:r.gridImpact?.summary,det:r.gridImpact?.detail},
    {k:'tax',icon:'▤',title:'Tax Implications',color:RT.teal,sum:r.taxImplications?.summary,det:r.taxImplications?.detail},
    {k:'env',icon:'◈',title:'Environmental Impact',color:RT.emerald,sum:r.environmentalImpact?.summary,det:r.environmentalImpact?.detail},
    {k:'water',icon:'≈',title:'Closed Water Loop',color:RT.sky,sum:r.waterLoop?.answer,det:r.waterLoop?.detail},
  ];
  return <div style={{minHeight:'100vh',background:RT.bg}}>
    <div style={{padding:'22px 20px 18px',borderBottom:`1px solid ${RT.borderStrong}`,background:RT.surfaceAlt}}>
      {isCached&&<div style={{fontSize:9,color:RT.textLow,marginBottom:10,fontFamily:RT.mono,textTransform:'uppercase',letterSpacing:'.08em'}}>Research recorded {r._cachedAt}</div>}
      <div style={{position:'relative',border:`1px solid ${RT.borderStrong}`,borderRadius:6,padding:'16px 20px',background:RT.surface,maxWidth:860,margin:'0 auto'}}>
        {[['-6px','-6px'],['-6px','auto'],['auto','-6px'],['auto','auto']].map(([t,l],i)=><div key={i} style={{position:'absolute',top:t,left:l,right:l==='auto'?'-6px':'auto',bottom:t==='auto'?'-6px':'auto',width:5,height:5,borderRadius:'50%',background:RT.borderStrong}}/>)}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontSize:9,color:RT.textLow,textTransform:'uppercase',letterSpacing:'.12em',marginBottom:5,fontFamily:RT.mono}}>Facility Record</div>
            <div style={{fontSize:19,fontWeight:700,color:RT.textHi,letterSpacing:'-.2px'}}>{fac.name}</div>
            <div style={{fontSize:11,color:RT.textMid,marginTop:4,fontFamily:RT.mono}}>{fac.company} · {fac.city}, {fac.county} CO · {fac.region}</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end'}}>
            <span style={{fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:3,background:'rgba(242,165,65,0.12)',color:RT.amber,fontFamily:RT.mono,letterSpacing:'.04em'}}>{(r.status||fac.status).toUpperCase()}</span>
            <span style={{fontSize:9,color:RT.textLow,fontFamily:RT.mono}}>CONF: <strong style={{color:cc}}>{conf.toUpperCase()}</strong></span>
          </div>
        </div>
      </div>
    </div>
    {bsScan&&<div style={{maxWidth:860,margin:'0 auto'}}><BaseScanCard sc={bsScan} compact={false}/></div>}
    <div style={{background:RT.surfaceAlt,borderBottom:`1px solid ${RT.border}`,padding:'10px 20px',display:'flex',gap:6,justifyContent:'center'}}>
      <div style={{maxWidth:860,width:'100%',display:'flex',gap:6}}>
        <button onClick={onBack} style={{fontSize:11,padding:'5px 13px',borderRadius:4,border:`1px solid ${RT.border}`,background:'transparent',color:RT.textMid,cursor:'pointer',fontFamily:RT.mono}}>← BACK</button>
      </div>
    </div>
    <div style={{maxWidth:860,margin:'0 auto',padding:'16px 16px 40px'}}>
      <div style={{background:RT.surface,borderRadius:6,border:`1px solid ${RT.border}`,marginBottom:14,overflow:'hidden'}}>
        <div style={{padding:'9px 16px',fontSize:10,fontWeight:600,color:RT.teal,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,borderBottom:`1px solid ${RT.border}`}}>— Core Data</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)'}}>
          {[['Start Date',r.startDate],['Power',r.powerMW||(fac.mw>0?fac.mw+' MW':'')],['Size (sq ft)',r.sizeSqFt],['Investment',r.totalInvestment||fac.cost],['Constr. Jobs',r.employment?.construction],['Perm. Jobs',r.employment?.permanent],['Payroll',r.employment?.totalPayroll],['Type',fac.type],['Region',fac.region]].map(([l,v])=>{const cv=cleanVal(v),tbd=cv==='TBD';return <div key={l} style={{padding:'10px 14px',borderBottom:`1px solid ${RT.border}`,borderRight:`1px solid ${RT.border}`}}><div style={{fontSize:8,color:RT.textLow,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3,fontFamily:RT.mono}}>{l}</div><div style={{fontSize:13,fontWeight:tbd?400:700,color:tbd?RT.textLow:RT.textHi,fontFamily:RT.mono,fontStyle:tbd?'italic':'normal'}}>{tbd?'not disclosed':cv}</div></div>;})}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:600,color:RT.amber,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,marginBottom:8}}>— Four-Pillar Analysis <span style={{color:RT.textLow,fontWeight:400,letterSpacing:'normal',textTransform:'none'}}>· tap to expand</span></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {pillars.map(p=><div key={p.k} onClick={()=>setExp(exp===p.k?null:p.k)} style={{background:RT.surface,borderRadius:6,border:`1px solid ${RT.border}`,borderTop:`2px solid ${p.color}`,padding:13,cursor:'pointer'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:20,height:20,borderRadius:3,border:`1px solid ${p.color}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:p.color}}>{p.icon}</div>
                <span style={{fontSize:10,fontWeight:600,color:RT.textHi,fontFamily:RT.mono,textTransform:'uppercase',letterSpacing:'.05em'}}>{p.title}</span>
              </div>
              <span style={{fontSize:9,color:RT.textLow}}>{exp===p.k?'▲':'▼'}</span>
            </div>
            <div style={{fontSize:11.5,fontWeight:400,color:RT.textMid,lineHeight:1.5}}>{p.sum?stripMD(p.sum):'Tap to expand'}</div>
            {exp===p.k&&p.det&&<div style={{fontSize:11.5,color:RT.textMid,lineHeight:1.7,borderTop:`1px solid ${RT.border}`,paddingTop:9,marginTop:9,whiteSpace:'pre-wrap'}}>{stripMD(p.det)}</div>}
          </div>)}
        </div>
      </div>
      <Section title="Proposed Timeline" content={r.timeline}/>
      <Section title="Notable Investors & Organizers" content={r.investors}/>
      <Section title="Political Statements & Records" content={r.politicalContext} note="[R]=Republican  [D]=Democrat  [I]=Independent"/>
      {r._raw&&<Section title="Full Research Output" content={r._raw}/>}
      {r.sources?.length>0&&<div style={{background:RT.surface,borderRadius:6,border:`1px solid ${RT.border}`,padding:'12px 16px',marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:RT.textLow,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,marginBottom:8}}>— Sources ({r.sources.length})</div>
        {r.sources.map((s,i)=><div key={i} style={{fontSize:11,color:RT.textMid,marginBottom:4,paddingLeft:12,borderLeft:`2px solid ${RT.border}`}}>{s}</div>)}
      </div>}
    </div>
  </div>;
}

function PendingView({fac,onBack}){
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',background:'#f8fafc'}}>
    <div style={{fontSize:32,marginBottom:14}}>🕐</div>
    <div style={{fontSize:17,fontWeight:600,color:'#1e293b',marginBottom:4}}>{fac.name}</div>
    <div style={{fontSize:12,color:'#64748b',marginBottom:20}}>{fac.company} · {fac.county} County</div>
    <div style={{fontSize:13,color:'#475569',maxWidth:380,lineHeight:1.7,marginBottom:20}}>
      Full research for this facility hasn't been generated yet. This tracker updates on a scheduled cadence — <strong>Active-tier</strong> facilities (under construction, permitting, site selection) refresh weekly; <strong>Settled-tier</strong> facilities refresh periodically since their status changes rarely.
    </div>
    <button onClick={onBack} style={{...T.btn('#0f172a','white','none'),fontSize:12,padding:'7px 16px'}}>← Back to search</button>
  </div>;
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[authed,setAuthed]=useState(getAuth());
  const[view,setView]=useState('boot');
  const[query,setQuery]=useState('');
  const[filter,setFilter]=useState('All');
  const[tierFilter,setTierFilter]=useState('All');
  const[sel,setSel]=useState(null);
  const[res,setRes]=useState(null);
  const[err,setErr]=useState('');
  const[msg,setMsg]=useState('');
  const[prog,setProg]=useState(0);
  const[isCached,setIsCached]=useState(false);
  const[resCache,setResCache]=useState(new Set());
  const[bsCache,setBsCache]=useState({});
  const[model,setModel]=useState('sonnet');
  useEffect(()=>{if(!authed)return;(async()=>{const[bs,rc]=await Promise.all([cacheLoadAll(BS_PFX),cacheIdSet(DC_PFX)]);setBsCache(bs);setResCache(rc);setView('home');})();},[authed]);
  const filtered=useMemo(()=>{let list=FACS;if(filter!=='All')list=list.filter(f=>f.region===filter);if(tierFilter!=='All')list=list.filter(f=>f.tier===tierFilter);if(query.length>=2){const q=query.toLowerCase();list=list.filter(f=>f.name.toLowerCase().includes(q)||f.company.toLowerCase().includes(q)||f.county.toLowerCase().includes(q)||f.city.toLowerCase().includes(q));}else list=list.filter(f=>f.mw>=25||f.cost!=='');return list;},[query,filter,tierFilter]);
  const doResearch=useCallback(async(fac)=>{
    const fm={...fac,_model:model};
    const hit=await cacheGet(DC_PFX,fac.id);
    if(hit){setSel(fm);setRes({...hit.data,_cachedAt:new Date(hit.ts).toLocaleDateString()});setIsCached(true);setView('results');return;}
    // No cached deep research available in this static build — show pending state, no API call.
    setSel(fm);setRes(null);setView('pending');
  },[model]);
  function handleLogout(){try{localStorage.removeItem(AUTH_KEY);}catch(e){}setAuthed(false);setView('boot');}
  if(!authed)return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  if(view==='boot')return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',gap:12,color:'#94a3b8',fontSize:12,background:'#0f172a',flexDirection:'column'}}><div style={{width:22,height:22,border:'2px solid #1e293b',borderTopColor:'#3b82f6',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Loading...<style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>;
  if(view==='pending')return <PendingView fac={sel} onBack={()=>setView('home')}/>;
  if(view==='results')return <ResultsView fac={sel} res={res} isCached={isCached} bsScan={bsCache[sel?.id]} onBack={()=>setView('home')}/>;
  if(view==='map')return <MapView bsCache={bsCache} onResearch={f=>{setView('home');setTimeout(()=>doResearch(f),50);}} onBack={()=>setView('home')}/>;
  if(view==='basescan')return <BaseScanView bsCache={bsCache} setBsCache={setBsCache} resCache={resCache} onBack={()=>setView('home')} onResearch={f=>{setView('home');setTimeout(()=>doResearch(f),50);}}/>;
  if(view==='analytics')return <AnalyticsView bsCache={bsCache} onBack={()=>setView('home')}/>;
  return <HomeView query={query} setQuery={setQuery} filter={filter} setFilter={setFilter} tierFilter={tierFilter} setTierFilter={setTierFilter} model={model} setModel={setModel} filtered={filtered} onSelect={f=>doResearch(f)} resCache={resCache} bsCache={bsCache} error={err} onMap={()=>setView('map')} onBaseScan={()=>setView('basescan')} onAnalytics={()=>setView('analytics')} onLogout={handleLogout}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
