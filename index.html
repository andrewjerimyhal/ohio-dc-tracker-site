(function(){
  const _SEED={"v67_bs_monroebitdeer-clarington": "{\"data\": {\"headline\": \"Bitdeer's 570 MW Clarington crypto/HPC campus represents one of Ohio's largest single-site data center developments, leveraging proximity to Ohio Valley transmission infrastructure.\", \"gridRisk\": \"High\", \"gridNote\": \"570 MW load in rural Monroe County places substantial stress on AEP Ohio's transmission network; major interconnection upgrades likely required.\", \"taxStatus\": \"Ohio data centers qualify for sales tax exemption on equipment; Monroe County may offer additional incentives given rural economic development priority.\", \"envFlag\": \"Moderate\", \"envNote\": \"Large thermal and noise footprint in rural Ohio Valley; potential concerns around stormwater, land disturbance, and proximity to Ohio River corridor.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Transmission capacity and interconnection timeline in a rural, low-load-density county could significantly delay or constrain full 570 MW buildout.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334789855}, \"ts\": 1782334789855}", "v67_bs_browndb-stu-mt-orab-mega-site": "{\"data\": {\"headline\": \"Unconfirmed Meta-linked 1500 MW hyperscale AI campus in rural Brown County represents one of Ohio's largest single-site data center investments and will stress AEP Ohio's transmission infrastructure significantly.\", \"gridRisk\": \"Very High\", \"gridNote\": \"1500 MW in Brown County will require major AEP Ohio transmission upgrades; rural grid lacks existing capacity for hyperscale AI load.\", \"taxStatus\": \"Ohio data center sales tax exemption likely applicable; Brown County may offer additional local abatements to attract investment.\", \"envFlag\": \"Significant\", \"envNote\": \"1500 MW load raises substantial water consumption, land use, and air quality concerns in a rural agricultural county with limited existing industrial infrastructure.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interco rect environmental violations at this facility.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Capacity unknown limits investment sizing; FirstEnergy grid reliability and potential rate increases pose operational cost risk for colocation margin stability.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334037925}, \"ts\": 1782334037925}", "v67_bs_montgomerylumen-dayton-3": "{\"data\": {\"headline\": \"Legacy Lumen telecom colocation node in Dayton serving as regional network interconnect point with limited disclosed capacity data.\", \"gridRisk\": \"Low\", \"gridNote\": \"Dayton Power and Light (AES Ohio) serves the area; telecom colo facilities typically draw modest and stable power loads compared to hyperscale data centers.\", \"taxStatus\": \"Ohio data center equipment may qualify for sales tax exemption if thresholds are met; Montgomery County offers standard enterprise zone incentives.\", \"envFlag\": \"None\", \"envNote\": \"No known environmental flags; legacy telecom facilities generally have low environmental footprint relative to large compute campuses.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Lumen Technologies ongoing financial distress and network asset divestitures create uncertainty about long-term operational continuity and facility investment commitment.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334843161}, \"ts\": 1782334843161}", "v67_bs_pikeports-technology-campus-softbank-sb-energy-": "{\"data\": {\"headline\": \"SoftBank's 10,000 MW AI campus at the former Portsmouth Gaseous Diffusion Plant represents the largest proposed data center investment in US history, combining massive on-site gas generation with a $4.2B transmission buildout on a legacy contaminated federal site.\", \"gridRisk\": \"High\", \"gridNote\": \"9.2 GW of on-site natural gas generation partially offloads grid demand but $4.2B AEP Ohio transmission upgrade signals significant regional grid stress; scale is unprecedented for a single campus.\", \"taxStatus\": \"Located on DOE Portsmouth site with complex federal land status; tax treatment likely involves Ohio Jobs Creation Tax Credit and potential federal energy zone benefits, but terms not publicly confirmed.\", \"envFlag\": \"Significant\", \"envNote\": \"Active radioactive and toxic remediation ongoing at former uranium enrichment site; Ohio EPA review in progress; on-site gas generation adds air quality concerns; cumulative environmental liability is substantial.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Radioactive and hazardous legacy contamination at the DOE Portsmouth site poses regulatory, liability, and timeline risk that could delay or derail construction regardless of capital committed.\", \"investmentEstimate\": \"$33B+\", \"priority\": \"Critical\", \"_ts\": 1782334858621}, \"ts\": 1782334858621}", "v67_bs_montgomerylumen-dayton-2": "{\"data\": {\"headline\": \"Legacy Lumen telecom facility in Dayton offering modest colocation capacity within a mid-sized Midwest market served by AES Ohio's constrained grid.\", \"gridRisk\": \"Medium\", \"gridNote\": \"AES Ohio faces ongoing transmission upgrade challenges and aging infrastructure in the Dayton region, though 2 MW demand is manageable at this scale.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemptions on equipment and electricity for qualifying facilities, though Lumen's colo model complicates direct applicability.\", \"envFlag\": \"Minor\", \"envNote\": \"Urban Dayton location with standard telecom operational footprint; no major environmental concerns flagged but brownfield site history in Montgomery County warrants due diligence.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Lumen Technologies' ongoing financial restructuring and debt load creates counterparty and operational continuity risk for colocation tenants.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334808775}, \"ts\": 1782334808775}", "v67_bs_montgomeryencore-technologies-msb1": "{\"data\": {\"headline\": \"Small 3 MW colocation facility in Dayton suburb served by Dayton Power and Light within a mature industrial corridor with limited expansion headroom.\", \"gridRisk\": \"Low\", \"gridNote\": \"DP&L service territory with stable suburban grid infrastructure; 3 MW load is modest and unlikely to strain local capacity.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment under certain thresholds; Montgomery County has no known special incentive districts for this site.\", \"envFlag\": \"None\", \"envNote\": \"No known environmental concerns associated with this suburban industrial location.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scale at 3 MW constrains enterprise colocation competitiveness against larger regional facilities in Columbus or Cincinnati.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334829003}, \"ts\": 1782334829003}", "v67_bs_franklindatacanopy-columbus": "{\"data\": {\"headline\": \"Small 1 MW colocation facility in Columbus serves as a regional connectivity node within Ohio's growing data center market anchored by the Columbus metro area.\", \"gridRisk\": \"Low\", \"gridNote\": \"Columbus is served by AEP Ohio with stable grid infrastructure and access to PJM Interconnection; 1 MW load is negligible for the regional grid.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment purchases; Franklin County may offer additional local incentives depending on investment thresholds.\", \"envFlag\": \"Minor\", \"envNote\": \"Small facility footprint limits environmental impact; standard UPS and diesel generator backup systems present minor emissions and fuel storage considerations.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 1 MW capacity constrains long-term revenue growth and competitive positioning against hyperscale campuses entering the Columbus market.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334344406}, \"ts\": 1782334344406}", "v67_bs_delawarecologix-col4": "{\"data\": {\"headline\": \"Cologix COL4 is a 27 MW active colocation facility in Delaware County, Ohio, positioned within the AEP Ohio service territory and benefiting from Ohio's data center tax exemption on equipment purchases.\", \"gridRisk\": \"Medium\", \"gridNote\": \"AEP Ohio serves the area with generally stable transmission infrastructure, but regional PJM interconnection queue congestion and load growth from Ohio's data center boom may pressure future capacity expansion timelines.\", \"taxStatus\": \"Ohio HB 218 (2022) provides a sales and use tax exemption for data center equipment and electricity for qualifying facilities; Delaware County may offer additional local incentives depending on job creation commitments.\", \"envFlag\": \"Minor\", \"envNote\": \"Ohio data centers face minimal direct environmental permitting hurdles, though increasing scrutiny on water consumption and carbon footprint from colocation customers may require enhanced ESG reporting.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Power capacity constraints driven by surging Ohio data center demand competing for PJM interconnection slots could limit future expansion beyond current 27 MW footprint.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Medium\", \"_ts\": 1782333837372}, \"ts\": 1782333837372}", "v67_bs_franklinkaris-critical-prairie-township": "{\"data\": {\"headline\": \"Karis Critical's 90 MW hyperscale campus in Prairie Township marks a significant addition to Franklin County's growing data center corridor, leveraging Columbus metro infrastructure and AEP Ohio grid access.\", \"gridRisk\": \"High\", \"gridNote\": \"90 MW hyperscale load in Franklin County adds substantial demand on AEP Ohio's already-stressed Columbus-area transmission system; large load interconnection queue timelines likely 3-5+ years.\", \"taxStatus\": \"Ohio data centers may qualify for state sales tax exemption on equipment; Franklin County Enterprise Zone or CRA abatements likely pursued but terms unconfirmed at site-selected stage.\", \"envFlag\": \"Moderate\", \"envNote\": \"Prairie Township in western Franklin County includes wetland and floodplain areas near Big Darby Creek watershed, a state-designated scenic river; site-specific environmental review required before construction.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interconnection timeline and capacity constraints on AEP Ohio transmission infrastructure pose the most significant development risk given the 90 MW hyperscale demand profile.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334188863}, \"ts\": 1782334188863}", "v67_bs_franklinexpedient-upper-arlington": "{\"data\": {\"headline\": \"Small urban colocation facility serving Columbus metro enterprises with modest 2MW footprint in established residential-commercial suburb.\", \"gridRisk\": \"Low\", \"gridNote\": \"Upper Arlington is served by AEP Ohio with stable suburban grid infrastructure and low congestion risk at 2MW scale.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment and electricity; Franklin County abatements possible via CRA or enterprise zone programs.\", \"envFlag\": \"Minor\", \"envNote\": \"2MW facility has limited environmental impact; standard cooling and backup diesel generator emissions typical for urban colo.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability beyond 2MW in dense suburban Upper Arlington location constrains long-term growth potential.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334329569}, \"ts\": 1782334329569}", "v67_bs_franklinark-data-centers-westerville": "{\"data\": {\"headline\": \"Small 1 MW colocation facility in Westerville serving regional SMB and enterprise clients within the Columbus metro area.\", \"gridRisk\": \"Low\", \"gridNote\": \"AEP Ohio serves Westerville with stable grid infrastructure and ample capacity for a 1 MW load in the Columbus suburban corridor.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment under certain thresholds; Franklin County incentives may apply but deal size limits leverage.\", \"envFlag\": \"None\", \"envNote\": \"1 MW facility poses minimal environmental footprint; no significant water, emissions, or land use concerns expected at this scale.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scale at 1 MW constrains revenue potential and competitive positioning against larger Columbus-area hyperscale and colo operators.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334422009}, \"ts\": 1782334422009}", "v67_bs_franklinenet-cmh-1": "{\"data\": {\"headline\": \"Small-scale Columbus colocation facility serving regional enterprise clients in Ohio's growing data center market.\", \"gridRisk\": \"Low\", \"gridNote\": \"AEP Ohio provides stable grid service to Franklin County with adequate capacity for 1 MW load.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment and electricity for qualifying facilities.\", \"envFlag\": \"None\", \"envNote\": \"1 MW facility presents minimal environmental footprint with no significant emissions or land use concerns.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scale reduces competitive positioning against hyperscale and larger colo operators entering the Columbus market.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334288174}, \"ts\": 1782334288174}", "v67_bs_lickingaligned-pataskala": "{\"data\": {\"headline\": \"Aligned Data Centers is developing a 150 MW AI/hyperscale campus in Pataskala, Licking County, positioning the facility within Ohio's rapidly expanding data center corridor east of Columbus.\", \"gridRisk\": \"High\", \"gridNote\": \"150 MW hyperscale load in Licking County falls under AEP Ohio territory, which is already managing significant new data center demand growth; large single-site interconnection queue position and transmission upgrade timelines pose material risk.\", \"taxStatus\": \"Ohio's Commercial Activity Tax applies, but Licking County and Pataskala may offer local tax increment financing or CRA property tax abatements consistent with incentives granted to nearby data center developments; formal agreements not yet confirmed at site-selected stage.\", \"envFlag\": \"Moderate\", \"envNote\": \"Pataskala area involves potential wetland and floodplain considerations near Licking County; 150 MW facility will require OEPA air permits for backup generation and stormwater NPDES permitting; no major Superfund concerns identified.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"AEP Ohio grid interconnection capacity and timeline uncertainty at 150 MW scale is the primary risk, compounded by competing large loads in the same transmission zone and potential multi-year delays for necessary substation and transmission upgrades.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334666252}, \"ts\": 1782334666252}", "v67_bs_undisclosedcipher-mining-ulysses-site": "{\"data\": {\"headline\": \"Cipher Mining's 200 MW Ulysses site expands Ohio's crypto/HPC footprint but county and grid interconnect details remain undisclosed, limiting near-term assessment.\", \"gridRisk\": \"High\", \"gridNote\": \"200 MW load in a rural Ohio location likely served by AEP Ohio or a rural co-op; large unannounced industrial loads strain local transmission without confirmed interconnect agreements.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemptions on equipment; county-level abatements unconfirmed given undisclosed county.\", \"envFlag\": \"Moderate\", \"envNote\": \"Crypto/HPC operations generate significant heat and noise; rural siting raises concerns about local air quality, noise ordinances, and community impact without disclosed environmental review.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Undisclosed county and lack of confirmed grid interconnect or utility agreement makes capacity delivery and timeline highly uncertain at this stage.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Medium\", \"_ts\": 1782333852794}, \"ts\": 1782333852794}", "v67_bs_franklinwow-business-columbus": "{\"data\": {\"headline\": \"WOW! Business operates a modest 3 MW telecom/colo facility in Columbus serving regional business connectivity needs with limited scalability.\", \"gridRisk\": \"Low\", \"gridNote\": \"AEP Ohio serves Columbus with stable grid infrastructure; 3 MW demand is easily accommodated.\", \"taxStatus\": \"Ohio data center tax exemption may apply to qualifying equipment; Franklin County incentives possible but likely modest at this scale.\", \"envFlag\": \"Minor\", \"envNote\": \"3 MW facility carries low environmental footprint; standard telecom cooling and diesel backup generator emissions typical.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited capacity ceiling and competitive pressure from larger Columbus colo providers constrains growth and tenant acquisition.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334252783}, \"ts\": 1782334252783}", "v67_bs_mahoningdrs-youngstown-south": "{\"data\": {\"headline\": \"Small 2 MW colocation facility in post-industrial Youngstown serving regional enterprises on aging FirstEnergy grid infrastructure.\", \"gridRisk\": \"Medium\", \"gridNote\": \"FirstEnergy Ohio service area faces aging transmission infrastructure and capacity constraints in the Mahoning Valley region; 2 MW load is manageable but grid reliability history warrants monitoring.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment purchases above qualifying thresholds; Mahoning County may offer additional incentives given Youngstown's economically distressed designation.\", \"envFlag\": \"Minor\", \"envNote\": \"Youngstown area carries legacy industrial contamination concerns in broader region, though colocation facility itself presents low direct environmental footprint at 2 MW scale.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Regional economic fragility and limited local enterprise demand in Youngstown metro may constrain colocation occupancy and revenue growth, compounded by aging regional grid reliability.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334751867}, \"ts\": 1782334751867}", "v67_bs_adamsadams-co-dc-former-dp-l-landfill-": "{\"data\": {\"headline\": \"Former DP&L landfill-to-data-center conversion represents a brownfield redevelopment opportunity with significant environmental legacy and rural grid constraints in Adams County.\", \"gridRisk\": \"High\", \"gridNote\": \"Adams County sits on the periphery of AEP Ohio territory with limited 100 MW transmission capacity; substantial substation upgrades likely required for industrial-scale AI load.\", \"taxStatus\": \"Ohio data center sales tax exemption likely applicable; rural enterprise zone abatements possible but Adams Co. has limited track record with large industrial incentive packages.\", \"envFlag\": \"Significant\", \"envNote\": \"Former DP&L landfill designation raises serious concerns about coal ash, leachate, soil contamination, and EPA closure compliance; Phase II ESA and potential Superfund adjacency review strongly advised.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Environmental remediation liability from landfill legacy contamination could substantially delay permitting, increase capital costs, or trigger regulatory action under RCRA or Ohio EPA closure rules.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782333860985}, \"ts\": 1782333860985}", "v67_bs_franklincrown-castle-columbus-oh1": "{\"data\": {\"headline\": \"Crown Castle's Columbus OH1 is a small-scale telecom colocation facility supporting regional fiber connectivity in central Ohio's growing data center market.\", \"gridRisk\": \"Low\", \"gridNote\": \"2 MW load is minimal for AEP Ohio service territory; no significant grid interconnection concerns expected at this capacity.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemption on equipment; Franklin County abatements possible via CRA or TIF programs.\", \"envFlag\": \"None\", \"envNote\": \"2 MW telecom colo presents negligible environmental footprint; standard cooling and backup generator emissions only.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 2 MW constrains future expansion; Crown Castle's core business is fiber/towers, not large-scale colo, reducing investment priority.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334246469}, \"ts\": 1782334246469}", "v67_bs_warrencbts-mason": "{\"data\": {\"headline\": \"CBTS Mason is a modest 1 MW colocation facility in suburban Warren County serving regional enterprise IT needs with limited grid and environmental exposure.\", \"gridRisk\": \"Low\", \"gridNote\": \"1 MW load is negligible for AEP Ohio's suburban Mason grid infrastructure with ample capacity in Warren County.\", \"taxStatus\": \"Ohio data center tax exemption may apply to qualifying colocation equipment; Warren County offers standard commercial property tax rates.\", \"envFlag\": \"None\", \"envNote\": \"1 MW facility presents minimal environmental footprint; no significant water, emissions, or land use concerns expected at this scale.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Small capacity limits revenue scale and competitive positioning against larger hyperscale and regional colo operators in the Columbus-Cincinnati corridor.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782335043943}, \"ts\": 1782335043943}", "v67_bs_lickingmeta-prometheus": "{\"data\": {\"headline\": \"Meta's 1GW+ Prometheus campus in New Albany is the world's first gigawatt-scale AI data center, representing a landmark $10B hyperscale investment requiring unprecedented AEP Ohio grid infrastructure upgrades.\", \"gridRisk\": \"Very High\", \"gridNote\": \"1GW+ load requires major AEP Ohio transmission upgrades; among the largest single-site grid demands in US history.\", \"taxStatus\": \"Sales tax exemptions on equipment and New Albany property tax abatement negotiated; partial incentive package.\", \"envFlag\": \"Significant\", \"envNote\": \"Gigawatt-scale power draw and water consumption carry significant environmental footprint; watershed restoration commitments noted but scale of impact is substantial.\", \"waterLoop\": \"Partial\", \"keyRisk\": \"AEP Ohio grid upgrade timeline and capacity delivery could delay or constrain full 1GW operational readiness.\", \"investmentEstimate\": \"~$10B\", \"priority\": \"Critical\", \"_ts\": 1782334612792}, \"ts\": 1782334612792}", "v67_bs_hamiltonencore-technologies-nor1": "{\"data\": {\"headline\": \"Small colocation facility in the Cincinnati suburb of Norwood serving regional enterprise clients with modest 3 MW capacity.\", \"gridRisk\": \"Low\", \"gridNote\": \"3 MW draw is well within AES Ohio/Duke Energy distribution capacity for the Norwood area; no significant grid stress expected.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemption on equipment and electricity if thresholds are met; Hamilton County offers limited additional incentives.\", \"envFlag\": \"Minor\", \"envNote\": \"3 MW facility has limited environmental footprint; standard cooling and modest water use typical for facilities this size in urban infill locations.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 3 MW capacity constrains long-term growth; Norwood is a landlocked inner-ring suburb with little room for campus expansion.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334512225}, \"ts\": 1782334512225}", "v67_bs_cuyahogalakeland-equity-e55th-denied-": "{\"data\": {\"headline\": \"A $1.6B hyperscale data center proposal was denied by Cleveland Mayor Justin Bibb in May 2026, blocking 150 MW of planned capacity in Cuyahoga County.\", \"gridRisk\": \"Low\", \"gridNote\": \"Permit denial eliminates any near-term grid impact; FirstEnergy transmission planning for this load is moot unless project is appealed or relocated.\", \"taxStatus\": \"No tax revenue realized; potential abatement negotiations and anticipated economic development benefits are voided by denial.\", \"envFlag\": \"None\", \"envNote\": \"Project denial means no environmental review obligations are active; site impacts are contingent on any future reapplication.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Regulatory and political opposition at the municipal level; Mayor Bibb's denial signals potential systemic resistance to large-scale data center development in Cleveland without community benefit or grid assurance frameworks.\", \"investmentEstimate\": \"$1.6B\", \"priority\": \"Low\", \"_ts\": 1782334116912}, \"ts\": 1782334116912}", "v67_bs_franklinamazon-scioto-darby-campus": "{\"data\": {\"headline\": \"Amazon's Scioto Darby Campus is a large-scale hyperscale AI/cloud facility in Hilliard representing one of AWS's most significant Ohio infrastructure investments at 395 MW of capacity.\", \"gridRisk\": \"High\", \"gridNote\": \"395 MW load places substantial demand on AEP Ohio transmission infrastructure in Franklin County; coordination with PJM required for grid interconnection at this scale.\", \"taxStatus\": \"Likely benefits from Ohio's Data Center Sales Tax Exemption for qualifying equipment; local CRA or TIF incentives probable given Hilliard/Franklin County development history.\", \"envFlag\": \"Moderate\", \"envNote\": \"High energy consumption raises carbon footprint concerns; cooling water withdrawal from Scioto-Darby watershed warrants OEPA scrutiny; noise and stormwater impacts from large campus footprint likely.\", \"waterLoop\": \"Partial\", \"keyRisk\": \"Grid capacity constraints and PJM interconnection queue delays could limit phased expansion; sustained community opposition to water and environmental impacts is a secondary risk.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Critical\", \"_ts\": 1782334177729}, \"ts\": 1782334177729}", "v67_bs_butlercbts-hamilton": "{\"data\": {\"headline\": \"CBTS Hamilton is a small 1 MW colocation facility in Butler County serving regional enterprise clients with limited scalability potential.\", \"gridRisk\": \"Low\", \"gridNote\": \"Butler County is served by Duke Energy Ohio with stable suburban grid infrastructure and no known capacity constraints at this scale.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on qualifying equipment; Butler County has no known special incentive districts but standard CRA abatements may apply.\", \"envFlag\": \"None\", \"envNote\": \"At 1 MW capacity, facility has minimal environmental footprint with no significant water, air, or land impact concerns expected.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited growth capacity at 1 MW makes facility vulnerable to client churn if expansion needs cannot be met on-site.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782333910892}, \"ts\": 1782333910892}", "v67_bs_warrencbts-lebanon": "{\"data\": {\"headline\": \"CBTS Lebanon is a modest 8 MW colocation facility in Warren County serving regional enterprise clients with established Ohio infrastructure presence.\", \"gridRisk\": \"Low\", \"gridNote\": \"Warren County is served by Duke Energy Ohio with stable suburban grid infrastructure and low congestion risk at 8 MW scale.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemption on equipment and electricity enterprise data center provisions if thresholds are met.\", \"envFlag\": \"Minor\", \"envNote\": \"8 MW facility carries standard cooling and energy consumption footprint; no significant environmental concerns expected at this scale in Warren County.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited public capacity and expansion data makes growth trajectory and competitive positioning against larger regional colo operators difficult to assess.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782335050618}, \"ts\": 1782335050618}", "v67_bs_hamiltoncbts-gold-coast": "{\"data\": {\"headline\": \"CBTS Gold Coast is a modest 2 MW colocation facility in Cincinnati serving regional enterprise clients with managed IT and network services.\", \"gridRisk\": \"Low\", \"gridNote\": \"Cincinnati is served by Duke Energy Ohio with stable urban grid infrastructure; 2 MW load poses minimal strain.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on qualifying equipment; Hamilton County has no additional special incentives noted.\", \"envFlag\": \"None\", \"envNote\": \"2 MW facility presents negligible environmental footprint; urban colocation with no significant cooling or emissions concerns flagged.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 2 MW capacity constrains growth potential and competitive positioning against larger regional colo providers.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334499450}, \"ts\": 1782334499450}", "v67_bs_franklinlumen-columbus-226-n-5th-": "{\"data\": {\"headline\": \"Legacy Lumen telecom colo in downtown Columbus serving as critical network hub for central Ohio connectivity infrastructure.\", \"gridRisk\": \"Low\", \"gridNote\": \"3 MW load is modest and well within AEP Ohio urban grid capacity; downtown Columbus has redundant utility feeds typical for telecom facilities.\", \"taxStatus\": \"Likely qualifies for existing telecom property tax treatment under Ohio law; data center-specific abatements may not apply given telecom classification.\", \"envFlag\": \"Minor\", \"envNote\": \"Downtown urban site with impervious surfaces and limited green space; standard telecom cooling emissions but small footprint limits broader environmental impact.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Lumen Technologies financial instability and ongoing asset divestitures rai ignificant grid impact expected.\", \"taxStatus\": \"Standard commercial property tax applies in Franklin County; Ohio data center tax exemptions may apply for qualifying equipment.\", \"envFlag\": \"Minor\", \"envNote\": \"Minimal environmental footprint at 1 MW; standard cooling and diesel backup generator emissions typical for telecom colo.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 1 MW constrains investment upside; Windstream financial history includes past bankruptcy proceedings raising counterparty risk.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334383210}, \"ts\": 1782334383210}", "v67_bs_lickingvantage-oh1-building-3": "{\"data\": {\"headline\": \"Vantage OH1 Building 3 is a 64 MW hyperscale facility under construction in New Albany, part of a growing data center corridor that is significantly straining AEP Ohio's transmission infrastructure.\", \"gridRisk\": \"High\", \"gridNote\": \"AEP Ohio faces substantial load growth from hyperscale development in Licking County; interconnection queues are congested and large load additions face multi-year timelines and potential upgrade costs.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemption on equipment; New Albany and Licking County have actively used TIF and enterprise zone incentives to attract data center investment.\", \"envFlag\": \"Moderate\", \"envNote\": \"Large impervious surface footprint, stormwater management requirements, and proximity to Raccoon Creek watershed warrant review; diesel generator emissions and noise are standard concerns for facilities of this scale.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interconnection delay or AEP Ohio capacity constraints could push commercial operation dates significantly, impacting lease commitments and capital deployment timelines.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334581739}, \"ts\": 1782334581739}", "v67_bs_allengoogle-lima-area-project-bosc-": "{\"data\": {\"headline\": \"Google's 316 MW Lima Area data center represents a major AI/cloud infrastructure commitment in western Ohio with complex regulatory and infrastructure obligations still pending resolution.\", \"gridRisk\": \"High\", \"gridNote\": \"316 MW load requires full-cost AEP infrastructure coverage; scale strains regional grid and terms of cost allocation warrant monitoring.\", \"taxStatus\": \"15-year abatement offset in place with $250K/yr direct payment to Elida Schools; favorable for Google but reduces near-term local tax base.\", \"envFlag\": \"Moderate\", \"envNote\": \"115 diesel generators with EPA permit pending is a material air quality concern; 5M gallon/day water ordinance adds environmental scrutiny.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"EPA permit denial or conditions on 115 diesel generators could delay or constrain facility operations.\", \"investmentEstimate\": \"$500M\", \"priority\": \"High\", \"_ts\": 1782333867237}, \"ts\": 1782333867237}", "v67_bs_cuyahogastratcap-cleveland-w-150th-": "{\"data\": {\"headline\": \"Small-scale urban colocation facility in Cleveland's west side serving regional enterprise clients with modest 3 MW capacity footprint.\", \"gridRisk\": \"Low\", \"gridNote\": \"FirstEnergy/CEI service territory with stable urban grid infrastructure; 3 MW load is well within local distribution capacity.\", \"taxStatus\": \"Ohio data center tax exemption may apply to qualifying equipment; Cuyahoga County CRA abatements potentially available depending on investment thresholds.\", \"envFlag\": \"Minor\", \"envNote\": \"Urban colocation facility with standard cooling and diesel backup generator emissions; no significant environmental concerns expected at this scale.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited growth capacity at 3 MW constrains scalability and long-term competitiveness against larger regional hyperscale alternatives.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334044591}, \"ts\": 1782334044591}", "v67_bs_miamimeta-piqua-dc-project-klondike-": "{\"data\": {\"headline\": \"Meta's 180 MW AI hyperscale campus in Piqua represents a major hyperscale anchor investment for Miami County and AES Ohio's grid territory, with significant infrastructure buildout implications.\", \"gridRisk\": \"High\", \"gridNote\": \"180 MW hyperscale AI load in AES Ohio territory, a smaller utility already managing capacity constraints; will likely require new transmission infrastructure or substation upgrades coordinated with PJM.\", \"taxStatus\": \"Ohio likely offers data center sales tax exemptions on equipment; Miami County may negotiate additional abatements via Enterprise Zone or CRA agreements tied to J5 LLC entity.\", \"envFlag\": \"Moderate\", \"envNote\": \"Large impervious footprint and cooling water demands in Miami County; proximity to Great Miami River watershed warrants stormwater and consumptive use scrutiny; AI workloads drive higher PUE and water usage intensity.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"AES Ohio grid capacity to deliver 180 MW of reliable AI-grade power without multi-year transmission upgrade delays through PJM queue.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334775362}, \"ts\": 1782334775362}", "v67_bs_delawareaws-sunbury-campus": "{\"data\": {\"headline\": \"AWS is investing $2B to build a 750 MW hyperscale AI/cloud campus in Sunbury, Ohio, representing one of the largest single data center investments in the state and significantly expanding the already-strained AEP Ohio transmission grid.\", \"gridRisk\": \"Very High\", \"gridNote\": \"750 MW demand requires new AEP Ohio infrastructure; Delaware County corridor already under heavy data center load, creating cumulative grid stress and potential interconnection delays.\", \"taxStatus\": \"Ohio data centers qualify for large-scale IT exemptions; AWS likely negotiating county/state abatements typical for projects of this scale.\", \"envFlag\": \"Significant\", \"envNote\": \"750 MW facility requires major water and energy resources; land disturbance, stormwater, and Ohio EPA permitting expected; proximity to rural Delaware County raises habitat and traffic concerns.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"AEP Ohio transmission capacity and interconnection timeline pose the greatest risk to project delivery and operational launch dates.\", \"investmentEstimate\": \"$2B\", \"priority\": \"Critical\", \"_ts\": 1782333822287}, \"ts\": 1782333822287}", "v67_bs_summitlumen-akron-1": "{\"data\": {\"headline\": \"Lumen Akron 1 is a legacy telecom carrier hotel and colocation facility serving as a critical network hub for northeast Ohio's communications infrastructure.\", \"gridRisk\": \"Low\", \"gridNote\": \"Akron is served by FirstEnergy/Ohio Edison with stable urban grid infrastructure; telecom facilities typically have robust backup power.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions for qualifying equipment; Summit County has standard commercial property tax rates with potential abatement via CRA or TIF.\", \"envFlag\": \"Minor\", \"envNote\": \"Legacy telecom building may have older infrastructure with minimal sustainability features; limited renewable energy commitment known for this facility.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Capacity constraints and aging building infrastructure limit scalability; Lumen's ongoing network rationalization strategy raises long-term facility commitment uncertainty.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334959244}, \"ts\": 1782334959244}", "v67_bs_hamiltonencore-technologies-blu1": "{\"data\": {\"headline\": \"Small suburban colocation facility in Blue Ash serving Cincinnati metro enterprises with 3 MW capacity on AES Ohio grid.\", \"gridRisk\": \"Low\", \"gridNote\": \"AES Ohio serves the Blue Ash area with stable suburban grid infrastructure; 3 MW load is modest and unlikely to strain local capacity.\", \"taxStatus\": \"Hamilton County offers standard Ohio commercial property taxation; Ohio has no data center-specific tax incentive at this scale without significant capital investment thresholds.\", \"envFlag\": \"None\", \"envNote\": \"3 MW colocation at this scale poses minimal environmental impact; no major cooling or emissions concerns flagged for Blue Ash suburban industrial area.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability beyond 3 MW in a suburban Blue Ash location constrains future expansion for growing colocation demand.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334505449}, \"ts\": 1782334505449}", "v67_bs_franklinverizon-hilliard": "{\"data\": {\"headline\": \"Verizon Hilliard is a small 1 MW telecom/colocation facility serving as regional network infrastructure in the Columbus metro area.\", \"gridRisk\": \"Low\", \"gridNote\": \"1 MW load is minimal for AEP Ohio's Franklin County grid; no significant strain expected.\", \"taxStatus\": \"Ohio data center sales tax exemption may apply; Hilliard/Franklin County incentives possible but likely limited for small legacy telecom facility.\", \"envFlag\": \"None\", \"envNote\": \"1 MW capacity presents negligible environmental footprint; no significant cooling or emissions concerns anticipated.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Small capacity limits revenue potential and may face obsolescence risk as enterprise colo demand shifts to hyperscale alternatives.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334363106}, \"ts\": 1782334363106}", "v67_bs_franklinstack-nal01a": "{\"data\": {\"headline\": \"STACK NAL01A is an active 11 MW colocation facility in New Albany, Ohio, part of a growing hyperscale corridor benefiting from state tax incentives and AEP Ohio grid infrastructure.\", \"gridRisk\": \"Medium\", \"gridNote\": \"AEP Ohio serves the New Albany area with generally reliable transmission, but rapid regional data center growth is increasing aggregate load pressure on local substations.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment; New Albany and Franklin County have historically provided additional incentive packages to attract tech investment.\", \"envFlag\": \"Minor\", \"envNote\": \"11 MW operational load generates moderate heat and minor water consumption concerns; New Albany corridor growth raises cumulative environmental scrutiny.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid capacity strain from compounding hyperscale demand in the New Albany corridor could challenge future expansion or power delivery timelines.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Medium\", \"_ts\": 1782334153181}, \"ts\": 1782334153181}", "v67_bs_cuyahogafusion-connect-cleveland": "{\"data\": {\"headline\": \"Small urban telecom colocation facility in Cleveland serving regional connectivity needs with limited expansion capacity.\", \"gridRisk\": \"Low\", \"gridNote\": \"1 MW load is negligible for Cleveland's urban grid infrastructure managed by FirstEnergy/Ohio Edison.\", \"taxStatus\": \"Eligible for Ohio data center sales tax exemption on equipment if qualified investment thresholds are met.\", \"envFlag\": \"None\", \"envNote\": \"Small urban facility with minimal environmental footprint; standard urban stormwater and emissions compliance expected.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited 1 MW capacity constrains scalability and long-term competitive positioning against larger hyperscale and regional colo facilities.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334109781}, \"ts\": 1782334109781}", "v67_bs_mahoningark-data-centers-youngstown": "{\"data\": {\"headline\": \"Small 3 MW colocation facility in post-industrial Youngstown serving regional SMB and enterprise clients with limited regional competition.\", \"gridRisk\": \"Low\", \"gridNote\": \"FirstEnergy/Ohio Edison territory; Mahoning Valley industrial legacy means adequate substation infrastructure exists, though local grid investment has lagged post-deindustrialization.\", \"taxStatus\": \"Ohio Commercial Activity Tax applies; Mahoning County and City of Youngstown may offer enterprise zone abatements given economic distress designation, but data center-specific incentives are limited compared to Columbus metro.\", \"envFlag\": \"Minor\", \"envNote\": \"Youngstown's brownfield-heavy industrial history raises minor site contamination awareness; no specific environmental flags on data center operations themselves.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited market depth in Youngstown MSA constrains occupancy growth; small 3 MW capacity limits hyperscaler appeal and major enterprise deployments.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334744508}, \"ts\": 1782334744508}", "v67_bs_trumbullbristolville-ai-data-center": "{\"data\": {\"headline\": \"A 300 MW AI/hyperscale data center in rural Trumbull County signals major industrial investment in northeast Ohio's economically distressed region but poses significant grid and infrastructure challenges.\", \"gridRisk\": \"Very High\", \"gridNote\": \"300 MW load in rural Trumbull County will require substantial transmission upgrades from FirstEnergy/Ohio Edison; area grid not currently configured for hyperscale AI demand.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment; Trumbull County Enterprise Zone abatements likely pursued given distressed community status.\", \"envFlag\": \"Moderate\", \"envNote\": \"Rural greenfield site in Trumbull County raises wetland and agricultural land conversion concerns; cooling water sourcing and discharge permitting will require OEPA review.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interconnection timeline and transmission infrastructure cost allocation could delay project significantly given FirstEnergy's constrained queue in northeast Ohio.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334983661}, \"ts\": 1782334983661}", "v67_bs_cuyahogaeverstream-parma": "{\"data\": {\"headline\": \"Everstream's Parma facility serves as a regional fiber and colocation hub in the Cleveland metro, supporting enterprise and carrier connectivity across northeast Ohio.\", \"gridRisk\": \"Low\", \"gridNote\": \"1 MW load is minimal for FirstEnergy/Ohio Edison territory; no significant grid constraint expected at this scale.\", \"taxStatus\": \"Cuyahoga County property taxes apply; Ohio data center tax exemptions may partially apply depending on colocation classification.\", \"envFlag\": \"None\", \"envNote\": \"Small urban telecom facility; no significant environmental footprint or remediation concerns anticipated.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited scalability at 1 MW constrains growth potential; competitive pressure from larger Cleveland-area colo providers.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334065190}, \"ts\": 1782334065190}", "v67_bs_sciotogoogle-franklin-furnace-dazzler-": "{\"data\": {\"headline\": \"Google's 450 MW Franklin Furnace facility represents a major AI/cloud investment in rural Scioto County with full grid infrastructure costs borne by Google and a long-term favorable tax abatement structure.\", \"gridRisk\": \"High\", \"gridNote\": \"450 MW load requires new AEP Ohio substation; rural Scioto County grid likely requires significant upgrades beyond substation; Google cost coverage mitigates ratepayer risk but construction timeline adds uncertainty.\", \"taxStatus\": \"75% 15-year abatement with PILOT at $500K/yr; favorable for Google but modest direct tax yield for county given investment scale.\", \"envFlag\": \"Moderate\", \"envNote\": \"Ohio EPA wetland permit under review as of June 2026; unresolved permit is a material site development risk given Franklin Furnace's proximity to Ohio River corridor wetlands.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Ohio EPA wetland permit denial or significant mitigation requirements could delay or reduce buildout scope.\", \"investmentEstimate\": \"$1B\", \"priority\": \"High\", \"_ts\": 1782334866095}, \"ts\": 1782334866095}", "v67_bs_lickingvantage-oh1-building-2": "{\"data\": {\"headline\": \"Vantage OH1 Building 2 is a 64 MW hyperscale facility under construction in New Albany, expanding Vantage's growing Ohio campus amid surging hyperscale demand in the Columbus metro.\", \"gridRisk\": \"High\", \"gridNote\": \"64 MW hyperscale load in Licking County places significant demand on AEP Ohio infrastructure; large campus buildouts in New Albany corridor are stressing regional transmission capacity.\", \"taxStatus\": \"Ohio data centers may qualify for state sales tax exemption on equipment; Licking County and New Albany likely negotiated local abatements given competitive incentive environment.\", \"envFlag\": \"Moderate\", \"envNote\": \"Large impervious surface footprint and significant water consumption for cooling raise concerns under Ohio EPA stormwater and consumptive use frameworks; New Albany growth corridor faces cumulative environmental scrutiny.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interconnection delays and AEP Ohio capacity constraints could push energization timelines, compounded by hyperscale construction cost inflation and supply chain pressure on critical electrical equipment.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334573516}, \"ts\": 1782334573516}", "v67_bs_unionmeta-marysville-south-anadonna-llc-": "{\"data\": {\"headline\": \"Meta's 200 MW AI/hyperscale campus in Marysville signals major hyperscaler expansion into central Ohio's growing data center corridor under an LLC land-holding structure.\", \"gridRisk\": \"High\", \"gridNote\": \"200 MW load in Union County will require significant AEP Ohio transmission upgrades; central Ohio grid already under strain from Dublin/New Albany hyperscale buildout.\", \"taxStatus\": \"Anadonna LLC land-holding typical of hyperscaler tax abatement strategy; likely pursuing Union County Enterprise Zone or CRA abatement, obscuring true tax base impact.\", \"envFlag\": \"Moderate\", \"envNote\": \"Large impervious surface, stormwater runoff into Mad River watershed, and consumptive water use for cooling warrant county-level environmental review.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"AEP Ohio interconnection queue delays and transmission capacity constraints could significantly push out energization timeline for a 200 MW single-site load.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782335008484}, \"ts\": 1782335008484}", "v67_bs_franklindatabank-columbus": "{\"data\": {\"headline\": \"DataBank Columbus is a modest 2 MW colocation facility in Franklin County serving regional enterprise and cloud interconnection demand in Ohio's growing data center market.\", \"gridRisk\": \"Low\", \"gridNote\": \"AEP Ohio serves Columbus with a relatively stable grid; 2 MW load is minimal and unlikely to face interconnection constraints.\", \"taxStatus\": \"Ohio offers data center sales tax exemptions on equipment; Franklin County may offer additional incentive negotiations for qualifying facilities.\", \"envFlag\": \"Minor\", \"envNote\": \"Small footprint limits environmental impact, but Ohio's coal-heavy grid mix raises indirect emissions concerns relative to cleaner-grid states.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited 2 MW capacity constrains growth potential and may render the facility strategically marginal as hyperscaler and enterprise demand scales toward larger campuses.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334316570}, \"ts\": 1782334316570}", "v67_bs_franklinbresco-broadband-columbus": "{\"data\": {\"headline\": \"Small telecom/colo facility in Columbus serving regional connectivity needs with limited public data on capacity or expansion plans.\", \"gridRisk\": \"Low\", \"gridNote\": \"Columbus metro grid is well-served by AEP Ohio with stable infrastructure; small telecom colo presents minimal load concerns.\", \"taxStatus\": \"Franklin County standard commercial rates apply; Ohio data center tax exemptions may be available if qualifying investment thresholds are met.\", \"envFlag\": \"None\", \"envNote\": \"No known environmental flags; typical urban telecom facility footprint with standard cooling and power systems.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Limited public data on capacity, ownership structure, and financials makes investment and risk assessment highly uncertain.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334395679}, \"ts\": 1782334395679}", "v67_bs_woodmeta-bowling-green-dc": "{\"data\": {\"headline\": \"Meta's 180 MW AI/hyperscale data center in Bowling Green represents a transformative load addition to Wood County's distribution grid, likely requiring major transmission upgrades from AEP Ohio.\", \"gridRisk\": \"Very High\", \"gridNote\": \"180 MW hyperscale AI load is substantial for Wood County's grid; AEP Ohio will require significant substation and transmission infrastructure investment; interconnection timeline risk is high.\", \"taxStatus\": \"Ohio data centers may qualify for significant sales tax exemptions on equipment; Wood County likely negotiated a PILOT or CRA abatement; terms TBD pending public disclosure.\", \"envFlag\": \"Moderate\", \"envNote\": \"Large impervious surface footprint, stormwater runoff into Maumee River watershed, and diesel generator emissions are primary concerns; Wood County is in a sensitive Great Lakes tributary zone.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interconnection delay \\u2014 AEP Ohio transmission queue congestion and substation capacity constraints could push commercial operation well beyond initial schedule.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Critical\", \"_ts\": 1782335058985}, \"ts\": 1782335058985}", "v67_bs_franklinstate-of-ohio-computer-center": "{\"data\": {\"headline\": \"State-operated government data center serving Ohio administrative agencies with modest 5 MW capacity in the Columbus metro grid zone.\", \"gridRisk\": \"Low\", \"gridNote\": \"Columbus is served by AEP Ohio with stable urban grid infrastructure; 5 MW load is manageable with minimal strain.\", \"taxStatus\": \"Exempt from property and sales tax as a state government facility; no PILOT agreements or incentive structures applicable.\", \"envFlag\": \"Minor\", \"envNote\": \"Standard PUE concerns for aging government facilities; no known environmental violations but older infrastructure may lack modern efficiency standards.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Aging government infrastructure with limited modernization budget and potential deferred maintenance creating operational continuity risk.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334416053}, \"ts\": 1782334416053}", "v67_bs_summitquantum-hpc-project-triton": "{\"data\": {\"headline\": \"Quantum HPC's 180 MW AI/HPC facility in Norton was withdrawn before development, eliminating a major load addition to FirstEnergy's Akron-area grid but signaling continued hyperscale interest in Summit County.\", \"gridRisk\": \"Medium\", \"gridNote\": \"180 MW would have stressed FirstEnergy Ohio Edison transmission infrastructure in the Norton/Barberton area; withdrawal relieves near-term grid pressure but area capacity constraints remain relevant for future proposals.\", \"taxStatus\": \"No active tax incentive agreements expected given withdrawal; Summit County Enterprise Zone or Ohio Data Center Sales Tax Exemption would have been applicable but no abatements were finalized.\", \"envFlag\": \"None\", \"envNote\": \"Project withdrawn prior to permitting or environmental review; no known site disturbance, wetland, or air quality filings on record.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Project is withdrawn with no public explanation, suggesting site control loss, utility interconnection obstacles, permitting challenges, or developer financing issues that could affect any successor proposal at this location.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Low\", \"_ts\": 1782334937301}, \"ts\": 1782334937301}", "v67_bs_lickinggoogle-new-albany-data-center": "{\"data\": {\"headline\": \"Google's 250 MW New Albany campus anchors Ohio's AI infrastructure buildout but draws scrutiny over water consumption and AEP grid upgrade dependencies.\", \"gridRisk\": \"High\", \"gridNote\": \"250 MW load requires significant AEP transmission upgrades in a corridor already stressed by rapid data center proliferation in Licking County.\", \"taxStatus\": \"No state tax credits for original build per Lt. Gov. Husted; facility proceeds without traditional Ohio incentive package.\", \"envFlag\": \"Moderate\", \"envNote\": \"405M+ gallons of water consumed annually with only 64% replenishment achieved in 2024, falling short of Google's stated water restoration goals.\", \"waterLoop\": \"Partial\", \"keyRisk\": \"Grid capacity constraints from concentrated hyperscaler load growth in the New Albany corridor could delay expansion or trigger reliability concerns.\", \"investmentEstimate\": \"$600M+\", \"priority\": \"High\", \"_ts\": 1782334646741}, \"ts\": 1782334646741}", "v67_bs_starkpanattoni-perry-township": "{\"data\": {\"headline\": \"Amazon-linked 240 MW hyperscale campus in Stark County signals major Ohio data center expansion into secondary markets beyond established Columbus corridor.\", \"gridRisk\": \"High\", \"gridNote\": \"240 MW hyperscale load in Perry Township will stress AEP Ohio transmission infrastructure; new substation and significant grid upgrades likely required with multi-year lead times.\", \"taxStatus\": \"Ohio data centers qualify for sales tax exemption on equipment; Stark County likely pursuing CRA or JEDD abatement to compete with established markets.\", \"envFlag\": \"Moderate\", \"envNote\": \"Large impervious surface footprint, stormwater management requirements, and cooling system water discharge will require OEPA permitting; greenfield site likely involves wetland delineation.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interconnection timeline and capacity \\u2014 AEP Ohio queue congestion and transformer lead times could delay energization 3-5 years for a load of this scale.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334901120}, \"ts\": 1782334901120}", "v67_bs_lickingkaris-critical-new-albany": "{\"data\": {\"headline\": \"Karis Critical's 36 MW hyperscale campus in New Albany positions it within Ohio's premier data center corridor alongside Meta and Google, but pre-construction status introduces significant execution and grid timing risk.\", \"gridRisk\": \"High\", \"gridNote\": \"AEP Ohio transmission zone faces well-documented interconnection queue congestion; 36 MW hyperscale load at pre-construction stage means queue position and substation capacity are unconfirmed.\", \"taxStatus\": \"Licking County and New Albany are active with data center tax abatements and potential local TIF or CRA agreements typical for this corridor.\", \"envFlag\": \"Minor\", \"envNote\": \"New Albany development area is largely graded commercial/industrial land with managed stormwater; wetland and floodplain exposure is low but standard OEPA NPDES permit required for construction.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid interconnection timing and capacity allocation from AEP Ohio given heavy hyperscale demand pressure across the New Albany corridor.\", \"investmentEstimate\": \"TBD\", \"priority\": \"High\", \"_ts\": 1782334715874}, \"ts\": 1782334715874}", "v67_bs_warrencyrusone-cin5-lebanon-": "{\"data\": {\"headline\": \"CyrusOne CIN5 is a 14 MW active colocation facility in Lebanon, Ohio serving the Cincinnati metro market with proximity to regional network infrastructure.\", \"gridRisk\": \"Medium\", \"gridNote\": \"Warren County served by Duke Energy Ohio; regional grid generally stable but growing data center load in southwest Ohio may pressure capacity long-term.\", \"taxStatus\": \"Ohio data centers may qualify for sales tax exemption on equipment; Lebanon/Warren County local incentives vary and should be verified.\", \"envFlag\": \"Minor\", \"envNote\": \"14 MW facility carries standard cooling and energy consumption footprint; Ohio's coal-heavy grid mix raises indirect emissions concerns.\", \"waterLoop\": \"TBD\", \"keyRisk\": \"Grid capacity constraints as regional data center density increases combined with Ohio's carbon-intensive power mix affecting sustainability commitments.\", \"investmentEstimate\": \"TBD\", \"priority\": \"Medium\", \"_ts\": 1782335037049}, \"ts\": 1782335037049}", "v67_dc_adamsadams-co-dc-former-dp-l-landfill-": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Construction start date of February 1, 2026 was listed in a memo submitted to the Ohio EPA supporting the Buck Canyon Properties wetland-mitigation application. Operationally, AES Ohio's Feb. 3, 2026 interconnection filing shows the facility requesting an initial 100 MW load in 2028, ramping to 400 MW (2029), 700 MW (2030), 1.1 GW (2031), and 1.3 GW by March 2032 — meaning full build-out/energization is not expected until 2028-2032.\", \"powerMW\": \"100 MW initial (2028), ramping to 1,300 MW (1.3 GW) by 2032 per AES Ohio's PJM/Transmission Expansion Advisory Committee filing.\", \"sizeSqFt\": \"Not publicly disclosed. Ohio EPA wetland-mitigation records describe the planned development as twelve light-industrial buildings plus internal access drives, five stormwater basins, and utility infrastructure on a 1,016-acre parcel, but no specific building square footage has been released.\", \"totalInvestment\": \"Not publicly disclosed as a discrete, confirmed figure for this specific facility. Context: Buck Canyon Properties LLC paid $2.65 million for the 1,016-acre site in 2024; separately, Amazon (widely believed to be the end operator) has announced roughly $10 billion in new AWS Ohio-wide infrastructure investment (on top of a prior $7.8 billion commitment and $6+ billion invested through 2022, totaling over $23 billion statewide through 2030) — none of these public figures are broken out specifically for the Adams County/Buck Canyon site.\", \"employment\": {\"construction\": \"Described only as 'hundreds' of construction and supply-chain jobs (via Amazon's Adams County community-relations site); no precise construction headcount has been published.\", \"permanent\": \"At least 500 long-term positions claimed (data center engineers, network specialists, operations managers, security specialists), per amazon.adamscountyoh.gov.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"AES Ohio (formerly DP&L) filed with PJM Interconnection for a new customer load near its Stuart Substation in Adams County, ramping from 100 MW in 2028 to 1.3 GW by 2032 — which would make it one of Ohio's largest data center loads.\", \"detail\": \"The Feb. 3, 2026 AES Ohio filing to PJM's Transmission Expansion Advisory Committee describes a customer request for service in the vicinity of the Stuart Substation, escalating in stages to 1,300 MW by March 2032 — over 20-31 times Adams County's own current electricity consumption, per WCPO and Journal-News/Dayton Daily News reporting. Interconnection is complicated because power infrastructure from three separate utilities may be needed: the Stuart plant substation and adjacent switchyard are owned by AES Ohio, while the remainder of the former Stuart/Killen plant site sits in AEP Ohio's service territory, and Duke Energy lines may also be involved. The project is explicitly designed to reuse legacy DP&L/AES transmission and substation infrastructure from the retired Stuart and Killen coal plants rather than build an entirely new interconnection from scratch.\"}, \"taxImplications\": {\"summary\": \"Adams County is weighing a Community Reinvestment Area (CRA)/Tax Increment Financing (TIF) package for the project — including a proposed 30-year, 100% county property-tax abatement — while Ohio's statewide data-center sales-tax exemption program has been paused by Gov. DeWine pending legislative study.\", \"detail\": \"Public-records reporting (People's Defender, Food & Water Watch) describes at least two incentive options under discussion: a 30-year CRA in which the project (and other development in the zone) would pay zero property tax to the county, or a 15-year, 50% CRA combined with a TIF. Under the TIF structure, a '100% school compensation' clause is used to avoid the requirement for Manchester Local School District board approval (normally triggered when a TIF exceeds 75%/10 years) — but because the underlying CRA already halves the taxable value, critics (Food & Water Watch) say the 'full' school compensation is effectively only 50% of what schools, EMS, and other county services would otherwise receive. The land in question currently generates about $18,000/year in property tax; Amazon's community-relations materials claim the project will eventually generate 'tens of millions' in new public revenue. Separately, on the state level, Gov. Mike DeWine [R] announced in late May 2026 that he directed the Ohio Tax Credit Authority to pause new data-center sales-and-use-tax exemption approvals while the legislature's new Joint Committee on Data Centers studies the issue — a moratorium that affects the applicability of Ohio's data-center sales tax exemption to projects like this one going forward.\"}, \"environmentalImpact\": {\"summary\": \"The project would redevelop roughly 1,016 acres of former DP&L/AES Stuart and Killen coal-plant and landfill land, clearing about 320 acres of forest, disturbing 0.74 acres of wetlands (offset via mitigation credits), and operating under a federal permit with special protections for endangered species and nearby cemeteries.\", \"detail\": \"Buck Canyon Properties LLC's Ohio EPA wetland-mitigation filing states the development would cause 'unavoidable permanent impacts to approximately 0.74 acres of three low-quality isolated wetlands,' offset by 68 Yards LLC's purchase of mitigation credits from the Red Stone Farm Mitigation Bank in Pike County. The U.S. Army Corps of Engineers issued a Nationwide Permit No. 39 on Feb. 18, 2026, with 11 special conditions, including measures to protect endangered bats, mussels, and butterflies, a requirement to halt work if human remains or archaeological sites are discovered, and a 100-foot buffer with temporary construction fencing around the Boone and Davidson cemeteries and permanent fencing around the Rogers Parr cemetery. The 'Buck Canyon' project footprint is expected to clear approximately 320 acres of forested habitat. Local opposition groups and outlets (WCPO, Food & Water Watch, Hoodline) have raised broader concerns about noise, light pollution, heat, and strain on the rural ecosystem, in addition to the underlying brownfield/former-power-plant redevelopment angle the county has promoted as a selling point ('Adams County touts demolished power plants as the best place for data centers').\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"No official filing or company statement explicitly confirms closed-loop versus open/evaporative cooling for this facility. Public estimates conflict: West Union Village Mayor Jason Buda told village council he had heard the facility could use 'one million gallons a day' — about four times the village's own usage — while Amazon's Adams County community-relations materials cite a much smaller figure of approximately 19.7 million gallons per year (roughly 54,000 gallons/day) drawn from the Ohio River, alongside a corporate pledge to be 'water positive' by 2030 and funding of an 11-acre wetland restoration with The Nature Conservancy. The order-of-magnitude discrepancy between these two figures, combined with the lack of a specific published cooling-system design or water-use permit for the site, means the closed-loop question cannot be confirmed either way from public sources.\"}, \"timeline\": \"2023-2024: Two affiliated companies (ultimately controlled by three owners, including Derek Harmon and Darren Royse) begin acquiring roughly 790 acres at the former Killen and Stuart power-plant sites; Buck Canyon Properties LLC pays $2.65 million for the adjoining 1,016-acre former DP&L landfill/Stuart Station parcel in 2024.\\nDecember 2025: Buck Canyon Properties requests Ohio EPA approval of a wetland mitigation plan for a 'light industrial use' consisting of twelve buildings, access drives, five stormwater basins, and utility infrastructure; the filing lists a construction start date of Feb. 1, 2026.\\nFebruary 3, 2026: AES Ohio (formerly DP&L) files with PJM's Transmission Expansion Advisory Committee confirming a new large customer load request near its Stuart Substation, ramping to 1.3 GW by 2032 — the filing that first publicly confirmed the project's scale, though AES declined to name the operator or confirm the exact site.\\nFebruary 12, 2026: Public debate over the project emerges in Adams County amid transparency concerns (People's Defender).\\nFebruary 18, 2026: U.S. Army Corps of Engineers issues Nationwide Permit No. 39 with special conditions for endangered species and cemetery protection.\\nFebruary-March 2026: Amazon Web Services holds a community open house in Manchester, Ohio about the 'potential data center'; county commissioners state no formal site plan, incentive request, or NDA has been received from any company.\\nMarch 2026: People's Defender reports 'growing developer interest' in Adams County ahead of public debate.\\nApril 2026: Local opposition intensifies; residents petition for a statewide constitutional amendment to ban large data centers and for local rural zoning restrictions.\\nMay-June 2026: Statewide ballot-amendment signature drive proceeds (413,487 signatures needed by July 1); Ohio legislature forms a bipartisan Joint Committee on Data Centers; Gov. DeWine pauses new state data-center sales-tax exemptions.\\n2028-2032: Phased power ramp-up (100 MW in 2028 to 1.3 GW by 2032) per the AES Ohio/PJM filing, implying phased construction/energization through the early 2030s.\", \"investors\": \"The land under the project is held by Buck Canyon Properties LLC (and affiliated entities, reportedly including 68 Yards LLC for wetland-credit purchases), which paid $2.65 million in 2024 for the 1,016-acre former DP&L Stuart Station/landfill parcel. Buck Canyon's owners are identified in reporting as Derek Harmon and Darren Royse (a third owner is referenced but not named in available sources); they have declined to comment publicly, citing a nondisclosure agreement. Two related companies controlled by the same ownership group have separately purchased about 790 acres at the former Killen and Stuart plant sites since 2023 and signed option agreements to sell roughly 97 combined acres to Hecate Energy, a Chicago-based developer of solar, battery storage, and gas-fired generation that supplies power infrastructure to data centers — suggesting Hecate could play a role in on-site or adjacent power generation. The strongest public evidence points to Amazon Web Services (Amazon Data Services) as the actual end-user/developer: Amazon operates a dedicated community-relations website (amazon.adamscountyoh.gov), held an open house in Manchester, Ohio branded as 'Amazon Web Services,' and has publicized job-training partnerships (with Columbus State Community College and Tolles Career and Technical Center) tied to the county. However, as of the most recent public statements, AES Ohio's regulatory filing declined to formally name the operator, and Adams County commissioners (Holt, Jones, Hayslip) say they have received nothing in writing and have signed no NDA — so while investigative and trade press treat Amazon as the de facto identified developer, it remains formally unconfirmed in official county/state records, consistent with the 'Undisclosed' listing.\", \"politicalContext\": \"Adams County Commissioner Barbara Moore Holt [R] said repeatedly that the county has received no formal plans: 'To this day, I have nothing in writing,' and 'I have signed no NDA'; she said the county is 'simply doing nothing but waiting.' Commissioner Jason Hayslip [R] said resident feedback has been mixed and that, to his knowledge, no formal incentive request has been made to the county; he also declined to sign any NDA. Board President Kelly Jones [R] likewise vowed not to sign an NDA regarding the project. All three commissioners have stated they do not support a countywide moratorium on data centers, citing limits on the board's authority and private property rights. At the state level, Sen. Brian Chavez [R, Marietta] and Rep. Adam Holmes [R, Nashport] co-chair the new Joint Committee on Data Centers; Chavez has been the most vocal defender of the industry among lawmakers, at one point asking data-center opponents 'Are you being paid for this in any way?' and characterizing some opposition as coming from 'coastal liberal organizations,' while Holmes acknowledged that testimony at the hearings was overwhelmingly critical of data centers. Gov. Mike DeWine [R] announced in May 2026 that he paused the state's data-center sales-tax exemption program pending the Joint Committee's study, while also telling communities that data centers are 'the future' but should 'pay their own way' so ordinary ratepayers aren't burdened. At the local level, West Union Village Mayor Jason Buda (nonpartisan village office; affiliation not established in available records) publicly raised concerns about the facility's water use ('about four times the amount we use ourself'). Adams County resident Nikki Gerber testified at the Statehouse against data centers generally, telling lawmakers 'You took an oath to protect this great state of Ohio, its natural resources and the people in it' — she is a private resident/advocate, not an elected official, so no party tag applies.\", \"sources\": [\"https://www.datacenterdynamics.com/en/news/new-data-center-construction-confirmed-in-adams-county-ohio/\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-data-center-could-be-one-of-ohios-biggest-power-guzzlers\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-touts-demolished-power-plants-as-the-best-place-for-data-centers\", \"https://www.wcpo.com/news/local-news/i-team/adams-county-data-center-gets-federal-permit-as-voters-sign-petitions-to-block-it\", \"https://www.peoplesdefender.com/2026/02/12/data-center-debate-emerges-in-adams-county-amid-calls-for-transparency/\", \"https://www.peoplesdefender.com/2026/02/18/discussion-continues-residents-and-experts-add-new-perspectives-on-data-center-plans-in-adams-county/\", \"https://www.peoplesdefender.com/2026/03/27/records-show-growing-developer-interest-in-adams-county-ahead-of-public-debate/\", \"https://www.peoplesdefender.com/2026/04/16/commissioners-meet-data-center-discussion-continues/\", \"https://www.journal-news.com/news/proposed-data-center-could-be-one-of-ohios-biggest-power-guzzlers/PIHRA4ZAGJC75OTEGK5EPR3VIY/\", \"https://hoodline.com/2026/04/adams-county-locals-take-big-swing-at-monster-data-center-power-grab/\", \"https://www.foodandwaterwatch.org/2026/05/28/inside-the-fight-to-stop-a-data-center-in-ohio/\", \"https://www.foodandwaterwatch.org/2026/06/08/data-center-tax-breaks-ohio/\", \"https://www.foodandwaterwatch.org/wp-content/uploads/2026/05/2605_FSW_DataCenterTax_OH.pdf\", \"https://amazon.adamscountyoh.gov/\", \"https://baxtel.com/news/data-centers/dp-facilities-inc\", \"https://baxtel.com/data-center/amazon-project-galaxy\", \"https://stopohiodatacenters.org/\", \"https://ohiocapitaljournal.com/2026/06/03/data-center-opponents-give-ohio-lawmakers-an-earful/\", \"https://ohiocapitaljournal.com/2026/05/18/ohio-lawmakers-are-creating-bipartisan-data-center-committee-that-will-start-meeting-this-month/\", \"https://ohiocapitaljournal.com/2026/04/03/data-center-ban-on-the-ohio-ballot-petitioners-get-approval-to-start-gathering-signatures/\", \"https://ohiocapitaljournal.com/2026/04/30/ohio-data-center-ban-proposal-advocates-are-trying-to-get-413000-signatures-by-july-1/\", \"https://www.governing.com/infrastructure/ohio-throws-hundreds-of-millions-to-tech-giants-data-centers\", \"https://www.wosu.org/2026-06-11/gov-dewine-says-data-centers-are-the-future-but-they-should-pay-their-own-way\", \"https://www.wcpo.com/news/state/state-ohio/dewine-announces-pause-of-ohios-data-center-tax-exemption\", \"https://governor.ohio.gov/wps/portal/gov/governor/media/news-and-media/governor-dewine-announces-pause-of-data-center-tax-exemption\", \"https://www.wcpo.com/news/local-news/adams-county/ohio-voters-could-decide-on-a-proposed-ballot-measure-to-ban-large-scale-data-centers-across-the-state\", \"https://www.wcpo.com/news/local-news/adams-county/adams-county-residents-voice-skepticism-concerns-over-proposed-data-center-projects-at-community-meeting\", \"https://www.peoplesdefender.com/2026/05/13/jones-wins-republican-primary-for-adams-county-commissioner/\", \"https://www.peoplesdefender.com/2026/04/15/jones-cites-experience-fiscal-record-in-bid-for-second-term/\", \"https://www.thecentersquare.com/ohio/article_6b0142e7-f0c5-4ece-9dbd-17f4525bff0c.html\", \"https://www.aboutamazon.com/news/aws/aws-continues-to-invest-in-ohio\"]}, \"ts\": 1784272480000}", "v67_dc_allengoogle-lima-area-project-bosc-": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"No confirmed groundbreaking date has been publicly disclosed. Multiple outlets (LimaOhio.com, AEDG, DCD) consistently report construction is expected to begin in 2026, pending final Ohio EPA air-permit approval for the backup generators. Completion targets are inconsistent across sources: some report completion by 2030, while a hometownstations.com report cites facility completion 'targeted for 2028.' As of the July 14, 2026 LimaOhio.com report, construction had not yet broken ground and permits were still pending.\", \"powerMW\": \"316 MW (figure reflected in third-party data center tracking listings, e.g., datacentermap.com's 'Google Project BOSC' entry). Google and AEP Ohio have not officially published a facility-specific MW figure in press coverage reviewed; AEDG/Google materials describe the campus only as designed to be 'water-cooled' and coordinated with AEP Ohio 'to meet power demands.'\", \"sizeSqFt\": \"Not publicly disclosed. Multiple independent searches (local press, AEDG, trade press, Allen County Auditor materials) confirm building square footage has not been released. The site itself is variously reported as 200+ acres (initial AEDG figure) to 373 acres spanning American Township and neighboring Sugar Creek Township (per Signal Ohio and later reporting) of former farmland.\", \"totalInvestment\": \"$500 million capital investment, confirmed consistently across Data Center Dynamics, LimaOhio.com, AEDG, WTOL, hometownstations.com, and Signal Ohio -- described as the largest private-sector investment in Allen County history. Of that total, $50 million is earmarked for local infrastructure (per AEDG/DCD), including roundabouts at Bluelick Road/North Cole Street and SR-115/North Cole Street; a separately cited $13.6 million is allocated to local water infrastructure upgrades (unclear from reporting whether this is a subset of, or additional to, the $50M figure).\", \"employment\": {\"construction\": \"Reported at 'at least 1,000 construction jobs' (single secondary-source citation, irecruit.co summary of local coverage; not independently corroborated by a primary Google/AEDG release in the sources reviewed).\", \"permanent\": \"Approximately 50 full-time/permanent jobs, consistently cited across DCD, hometownstations.com, WTOL, LimaOhio.c
