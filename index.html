projected to roughly quadruple, from about 500 MW to about 2,000 MW, by 2027. Because AEP expects it will take 7-10 years for permanent transmission infrastructure to catch up with demand, AEP Ohio separately proposed onsite fuel-cell power generation as an interim bridge for large customers, including a 15-year contract with Cologix (and a separate 6-year contract with Amazon Web Services) to help serve central Ohio data-center load while transmission upgrades are built out. Delaware County Commissioner Jeff Benton publicly cited electricity demand as one of the 'minuses' associated with data centers generally, alongside job creation and tax revenue as 'pluses.'\"}, \"taxImplications\": {\"summary\": \"COL5, bundled with Cologix's Licking County project, received a 50%, 10-year Ohio state sales-tax exemption valued at about $42.3 million plus a separate local 10-year, 50% Delaware County property tax abatement, arriving just before Governor DeWine's statewide pause on new data-center tax breaks.\", \"detail\": \"In roughly June 2026, the Ohio Tax Credit Authority approved a 50%, 10-year sales-tax exemption for Cologix Inc./Cologix US, Inc. covering both the Orange Township (Delaware County, i.e., COL5) and Johnstown (Licking County) projects jointly, valued at approximately $42.3 million; combined with a prior 2022 award, Cologix's cumulative Ohio state tax abatements were reported to exceed $50 million. In exchange, Cologix committed to $1.17 billion in combined capital investment, 90 FTE jobs, and $10 million in new annual payroll, and to operate the facilities for at least 13 years. Separately, Delaware Source reported the smaller (COL5) project also receiving a 10-year, 50% property tax abatement from Delaware County government plus an additional income tax break and another property-tax subsidy mechanism; specific school-district PILOT/hold-harmless payment terms for the Olentangy Local School District were not broken out in publicly available reporting reviewed. This was one of the last data-center incentives approved before Gov. Mike DeWine announced a statewide pause on new data-center sales-tax exemption requests (the Cologix deal was explicitly carved out/exempted from that pause as 'already in the works'), amid criticism from some state legislators, including Rep. Sean P. Brennan [D-Parma], that cumulative 2025-era data-center exemptions statewide were approaching $2.2 billion while school districts faced funding pressure.\"}, \"environmentalImpact\": {\"summary\": \"Cologix describes COL5 as using a closed-loop cooling system designed to minimize water withdrawal, sited within an existing Orange Township industrial park; specific Ohio EPA air-permit records for backup diesel generators were not located in public filings reviewed.\", \"detail\": \"Cologix's own materials, echoed in the Delaware County Regional Planning & Community Development newsletter, describe COL5 as utilizing 'a closed-loop mechanical system for minimal water usage.' Delaware County Commissioner Jeff Benton publicly flagged water usage (alongside electricity demand) as a community concern associated with data centers generally, while also stating the project was 'situating the facility appropriately in an industrial park that is designed for this kind of use,' implying the site was pre-zoned/planned for heavy commercial-industrial use, which should limit incremental land-disturbance concerns relative to greenfield development. Stormwater/erosion control on Delaware County projects of this type is typically administered through the County Engineer's Drainage, Erosion and Sediment Control (DESC) program, but no COL5-specific stormwater permit record was located. Data centers of this scale typically require backup diesel generators subject to Ohio EPA permit-by-rule (PBR) requirements for emergency generators; no COL5-specific Ohio EPA air-permit record was found in this research, so generator-specific air-permit details are Not publicly disclosed based on available search results.\"}, \"waterLoop\": {\"answer\": \"Yes\", \"detail\": \"COL5 is described by Cologix and by the Delaware County Regional Planning & Community Development office as using a 'closed-loop mechanical system for minimal water usage.' This is consistent with Cologix's broader corporate sustainability claims, which state the company achieved a fleet-wide average Water Usage Effectiveness (WUE) of 0.203 in 2024 (versus an industry average of about 1.8) and that its closed-loop, liquid-to-chip cooling designs 'eliminate the need for evaporative cooling towers and significantly reduce water usage' compared to legacy air-cooled/evaporative designs. No source reviewed described COL5 as using an open-loop or evaporative cooling-tower system.\"}, \"timeline\": \"2014: Cologix enters the Columbus, Ohio market (COL1-COL4 built out in subsequent years).\\nPre-2025: Cologix assembles a 28-acre site at the southeast corner of Green Meadows Drive and Home Road in Orange Township, Delaware County (an existing industrial park area near Lewis Center).\\nJune 18, 2025: Delaware County's regional planning office reports Cologix has 'started work' on the COL5 site — construction/site preparation groundbreaking.\\nThroughout 2025-2026: Construction of Phase 1 (135,000 sq ft building, ~60,000 sq ft raised floor, 25 MW) proceeds; Phase 1 building permit valuation reported at roughly $274 million.\\nNovember 2024 (context, separate project): Cologix separately announces an $7 billion, up to 800 MW, 2 million sq ft, 8-building 'Johnstown Campus' on 154 acres in Licking County — a much larger, distinct facility from COL5, but bundled with it for state-incentive purposes.\\n~Late May 2026: Gov. Mike DeWine announces a statewide pause on new data-center sales-tax exemption requests pending legislative review by a special Data Center Study Commission, but exempts the already-underway Cologix project from the pause.\\n~June 1-3, 2026: The Ohio Tax Credit Authority approves a combined 50%/10-year sales-tax exemption (~$42.3 million) for Cologix's Delaware County (COL5) and Licking County (Johnstown) projects — one of the last such approvals before the moratorium takes effect.\\nQ3 2026 / Fall 2026: COL5 Phase 1 targeted to be 'ready for service.'\\nBeyond 2026: Additional phases anticipated to bring the Orange Township campus to a total of roughly 120 MW of capacity.\", \"investors\": \"Sole named developer/operator is Cologix Inc. / Cologix US, Inc., a privately held, Denver, Colorado-headquartered data center and interconnection company (COL5 is its fifth Columbus-area facility, following COL1-COL4). No separate joint-venture partner, outside equity investor, or named private landowner/seller for the 28-acre Orange Township parcel was disclosed in public reporting reviewed. The project was supported through Ohio's economic-development apparatus — JobsOhio and the Ohio Tax Credit Authority reviewed and approved the state incentive package, and Delaware County's economic development office (rather than Orange Township trustees) is reported to have coordinated site selection/negotiation. Cologix is separately pursuing a much larger, financially distinct $7 billion / 800 MW 'Johnstown Campus' in neighboring Licking County, underscoring the company's broader central-Ohio expansion strategy (over $1.1 billion combined investment figure cited by Columbus Region economic-development press materials covers both the Orange Township and Johnstown projects together).\", \"politicalContext\": \"Delaware County Commissioner Jeff Benton [R] (Delaware County Republican Party Central Committee member) publicly weighed in on the project, stating 'There are pluses and minuses to a data center,' citing job creation and increased property tax revenue as benefits while flagging electricity demand and water usage as concerns; he also stated, 'This investment represents long-term value for our community and the people who live and work here, while situating the facility appropriately in an industrial park that is designed for this kind of use.' Delaware County Commissioner Gary Merrell [R] (elected 2012, multiple terms as Board President/Vice President) sits on the three-member commission that approved the local property-tax and income-tax incentives, though no direct on-record quote from him about this specific project was found. Orange Township Trustee Erica Fouss stated she remains 'data center neutral' pending further training from the Ohio Township Association, and said township trustees were not involved in selecting the COL5 site — that process was coordinated through Delaware County's economic development efforts — while acknowledging the project is good for economic development 'from a township perspective.' Her party affiliation could not be reliably confirmed from primary sources in this research (Ohio township trustee races are officially nonpartisan on the ballot), so it is not tagged. At the state level, Gov. Mike DeWine [R] announced a pause on new data-center sales-tax exemptions in late May 2026 while explicitly carving out the already-underway Cologix project so it could still receive final Ohio Tax Credit Authority approval. State Rep. Sean P. Brennan [D] (D-Parma) publicly criticized the resulting $42.3 million exemption, noting that data-center exemptions approved since 2025 were approaching $2.2 billion statewide 'while school districts are facing funding reductions, families are worried about rising utility, property tax, and rent costs,' and noted he was the sole Democrat to initially co-sponsor legislation creating a Data Center Study Commission, though he said he supported the pause on further exemptions.\", \"sources\": [\"https://regionalplanning.co.delaware.oh.us/wp-content/uploads/sites/17/2025/06/ORA-Cologix-starts-work-06.18.25.pdf\", \"https://www.delawaresource.com/2026/06/03/orange-township-data-center-among-last-projects-approved-before-ohio-tax-break-pause/\", \"https://bluewaterhealthyliving.com/news/national-news/ohio/data-center-operator-starts-work-on-1-billion-delaware-complex-part-of-larger-expansion/\", \"https://columbusregion.com/press-release/cologix-expands-in-central-ohio/\", \"https://cologix.com/data-centers/columbus/col5/\", \"https://cologix.com/resources/spec-sheets/col5-data-center-spec-sheet/\", \"https://www.datacenters.com/cologix-col5\", \"https://www.datacentermap.com/usa/ohio/columbus/cologix-col5/\", \"https://hs.getobedio.com/blog/worthington-council-reviews-274m-cologix-data-center-expansion\", \"https://www.aepohio.com/company/news/view?releaseID=9242\", \"https://dailyenergyinsider.com/news/42710-aep-ohio-identifies-routes-for-two-electric-transmission-lines-for-delaware-licking-counties/\", \"https://www.wvxu.org/2025-02-20/aep-ohio-proposes-onsite-fuel-cell-power-generation-for-aws-cologix-data-centers\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://signalohio.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://ohiohouse.gov/members/sean-p-brennan/news/rep-brennan-voices-disappointment-over-additional-423m-data-center-tax-break-while-schools-face-funding-challenges-145318\", \"https://www.edgeir.com/cologix-to-invest-7b-in-central-ohio-for-800mw-ai-ready-data-center-expansion-20241122\", \"https://www.datacenterdynamics.com/en/news/cologix-invests-7bn-in-licking-county-ohio-data-center-campus/\", \"https://cologix.com/resources/blogs/how-cologix-champions-sustainability/\", \"https://ballotpedia.org/Jeff_Benton_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"https://ballotpedia.org/Gary_Merrell_(Delaware_County_Commission,_Ohio,_candidate_2024)\", \"http://delawaregop.org/commissioner-jeff-benton-sworn-in/\"]}, \"ts\": 1784272480000}", "v67_dc_undisclosedcipher-mining-ulysses-site": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed as a groundbreaking date. Site acquisition was announced December 23, 2025 (GlobeNewswire/Cipher Mining press release); Cipher states the site is 'on track to energize in the fourth quarter of 2027.' Local Washington County reporting indicates the developer (HashWorks Powered Land Waterford LLC, tied to Sabre 56 and Cipher Digital) began quietly acquiring/optioning land in Waterford Township before the public announcement, with residents saying they first learned of the project 'at the start of' 2026 and county commissioners signing an NDA with developers in January 2026. No specific construction/groundbreaking date has been publicly reported as of this research.\", \"powerMW\": \"200 MW (195-acre site; secured capacity from AEP Ohio with interconnection approvals to participate in the PJM market). This site is part of Cipher's broader 3.4 GW, 8-site national development pipeline as of the December 2025 announcement.\", \"sizeSqFt\": \"Not publicly disclosed\", \"totalInvestment\": \"Not directly disclosed by Cipher for this specific site. Analysts/press have estimated $1.8-2.2 billion for the facility based on Cipher's industry-cited cost basis of $9-11 million per MW of critical computing load applied to 200 MW (see Yahoo Finance/Brave New Coin coverage of the Dec 23, 2025 announcement). Separately, local reporting confirms HashWorks Powered Land Waterford LLC paid $20 million for a ~275-acre parcel purchased from Waterford Township Trustee Doug McCutcheon alone, as part of assembling the 500+ acre site. Cipher's broader corporate financing for its data-center buildout pipeline (not site-specific) includes $1.1 billion in convertible notes issued previously and $333 million of additional senior secured notes priced November 20, 2025.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"The 200 MW Ulysses site has secured capacity and completed interconnection agreements with AEP Ohio, giving Cipher direct access to PJM, the largest wholesale electricity market in the US.\", \"detail\": \"Per Cipher's December 23, 2025 announcement, 'all utility agreements required to support the development of the site are in place' with AEP Ohio, and the site has secured interconnection approvals to participate in the PJM Interconnection market. The company cited the site's acreage, energization timeline (targeted Q4 2027), diverse fiber paths, and proximity to a major metropolitan area as reasons it is well-suited for HPC/AI hosting in addition to bitcoin mining. AEP Ohio's transmission planning documents in the vicinity reference the Sporn-Muskingum transmission corridor passing through Washington County, consistent with the site's location. No specific substation, transmission-line upgrade, or MW-load ratepayer-impact study specific to this project was found in public records located during this research.\"}, \"taxImplications\": {\"summary\": \"Washington County commissioners are negotiating a possible Community Reinvestment Area (CRA) property-tax abatement or Payment-in-Lieu-of-Taxes (PILOT) arrangement with the developer, but say no abatement has been approved as of spring 2026.\", \"detail\": \"Washington County signed a non-disclosure agreement with the data-center developers in January 2026 to facilitate negotiations. Commissioner Charlie L. Schilling (Vice President of the Board of County Commissioners) has publicly discussed both a Community Reinvestment Area agreement and a PILOT structure, under which the developer would make an annual lump-sum payment to the county in place of standard property taxes. In April 2026, commissioners publicly stated they had not approved any tax abatement for the project. Under Ohio law, any CRA, enterprise zone, or tax-increment-financing agreement requires formation of a tax incentive review council that must include affected township trustees, giving Waterford Township trustees a formal role in any eventual abatement terms. In June 2026, Schilling testified before an Ohio legislative body referred to in local press as the 'Ohio Joint Data Center Committee,' stating 'I support policies that keep Ohio competitive for these kinds of developments,' and noting that the developers could proceed with construction regardless of whether commissioners approve incentives, since the commissioners' role is limited to negotiating the best available terms, not blocking the project outright. No information was found confirming Ohio's specific sales/use-tax exemption treatment (or lack thereof) for crypto-mining equipment as applied to this project.\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental permit data (water withdrawal, air permit for backup generators) was found for the Waterford site; the project has drawn broad community concern over water use, diesel generator noise/emissions, and land-use disruption typical of large Ohio data-center proposals.\", \"detail\": \"Washington County residents have packed multiple commissioner meetings since February 2026 raising concerns about the Waterford project's proximity to farms and homes, its impact on land use, and fears about noise and water demand, mirroring statewide concerns documented by Sierra Club Ohio and other advocacy groups about data-center noise pollution (diesel backup generators can emit 200-600x the NOx of natural gas plants and produce ~90dB sound levels) and water consumption (large data centers can use up to 5 million gallons/day). No Ohio EPA water-withdrawal permit, air permit application, or land-disturbance permit specific to the Waterford/Ulysses site was located in public records during this research; these details were 'Not publicly disclosed' as of this research.\"}, \"waterLoop\": {\"answer\": \"Not publicly disclosed\", \"detail\": \"Neither Cipher Mining's press release/investor materials nor local Washington County press coverage reviewed specify whether the Ulysses/Waterford facility will use closed-loop liquid cooling, air cooling, or immersion cooling. Cipher's other (Texas) sites reportedly use a mix of cooling approaches, but no site-specific technical disclosure for Ulysses was found.\"}, \"timeline\": \"December 23, 2025: Cipher Mining publicly announces acquisition of the 200 MW, 195-acre 'Ulysses' site in Ohio -- its first outside Texas -- with AEP Ohio capacity and PJM interconnection approvals already secured.\\nEarly 2026: Washington County residents in Waterford Township report first learning of the project; land assembly by HashWorks Powered Land Waterford LLC (500+ acres, including 275 acres bought from Township Trustee Doug McCutcheon for $20 million) becomes locally known.\\nJanuary 2026: Washington County Commissioners sign a non-disclosure agreement with developers to begin negotiations; commissioners publicly discuss the project at a January meeting marked by disputes over the NDA.\\nFebruary 2026: Residents pack commissioner meetings (reported by WTAP, Marietta Times, News and Sentinel) raising environmental and fiscal concerns.\\nMarch-May 2026: Commissioners repeatedly state they are pushing developers to hold a public meeting; residents petition Waterford Township trustees for a development moratorium, which trustees Randy Harper and Tim Rossiter decline to pass, citing legal advice.\\nMay 2026: A Waterford resident publicly calls for Trustee Doug McCutcheon to resign over his land sale to the developer.\\nApril 2026: Commissioners confirm no tax abatement has yet been approved.\\nMay 5, 2026: Cipher Mining formally rebrands to 'Cipher Digital Inc.' on its Q1 2026 earnings call, reflecting a strategic pivot toward hyperscale HPC/AI hosting.\\nJune 2026: Commissioner Charlie Schilling testifies before Ohio's legislative data-center committee about local tax and infrastructure implications.\\nJuly 2026 (present): Residents continue asking commissioners for help/answers; no public meeting with developers has yet been confirmed as held; site remains in pre-construction/negotiation phase.\\nQ4 2027: Target energization date per Cipher's original announcement.\", \"investors\": \"Cipher Mining Inc. (NASDAQ: CIFR), a publicly traded bitcoin-mining-turned-HPC/AI data center developer, is the site's ultimate corporate sponsor; the company rebranded to Cipher Digital Inc. in May 2026. Land for the site was assembled/leased through HashWorks Powered Land Waterford LLC, a real-estate holding entity based in Marietta, OH that describes itself as focused on 'the convergence of energy transition and the need for digital computing infrastructure' and which holds 500+ acres in Waterford Township. Local and trade press (Data Center Dynamics/Blockspace) report the project LLCs are tied to both Sabre 56 (a data-center development/engineering consulting firm) and Cipher Digital. Known landowner-sellers include Waterford Township Trustee Doug McCutcheon, who sold approximately 275 acres of his own land to the developer for $20 million -- a transaction that has become a local controversy given his elected position. Cipher's project-level financing draws on broader corporate capital raises, including $1.1 billion in convertible notes and $333 million in additional senior secured notes priced November 20, 2025, earmarked for data-center/HPC development across its pipeline.\", \"politicalContext\": \"Waterford Township Trustee Doug McCutcheon has faced public calls to resign (reported by WOUB, May 2026) after residents learned he sold ~275 acres of his own land to the project's developer for $20 million while serving as a township official with zoning/land-use authority over the same development -- a conflict-of-interest allegation; his party affiliation was not confirmed in records found (Ohio township trustee races are low-profile local contests and no partisan tag could be verified). Fellow Waterford Township Trustees Randy Harper and Tim Rossiter declined to enact a moratorium on data-center development despite resident requests, stating they were advised against it; their party affiliations were not confirmed. Washington County Board of Commissioners -- James W. Booth (President), Charlie L. Schilling (Vice President), and Kevin J. Ritter -- have taken the lead in negotiating with developers; Commissioner Schilling has been the most publicly vocal, stating 'I support policies that keep Ohio competitive for these kinds of developments' and testifying to an Ohio legislative 'Joint Data Center Committee' in June 2026 about PILOT/tax-relief structures; none of the three sitting commissioners' party affiliations could be confirmed via public records located in this research. Separately, Washington County's November 2026 election results (for terms beginning January 2027, and therefore not necessarily reflecting the board that handled this controversy) show commissioner seats won by Brian G. Whalin [D], Stephanie Lang [R], and Eddie Place [R] -- Place having previously been sworn in as a sitting Washington County Commissioner in January 2025, though it is unclear from available sources whether he was concurrently serving alongside Booth/Schilling/Ritter or in a staggered seat. No statements from Ohio Governor Mike DeWine [R], Ohio's Washington County state house/senate delegation, or federal officials specifically addressing the Ulysses/Waterford project were found in this research; if such statements exist they were not surfaced before the session's search budget was exhausted.\", \"sources\": [\"https://investors.ciphermining.com/news-releases/news-release-details/cipher-mining-announces-acquisition-200-mw-site-ohio\", \"https://www.globenewswire.com/news-release/2025/12/23/3209864/0/en/Cipher-Mining-Announces-Acquisition-of-200-MW-Site-in-Ohio.html\", \"https://www.theminermag.com/news/2025-12-23/cipher-ohio-hpc-pjm\", \"https://www.datacenterdynamics.com/en/news/cipher-mining-acquires-land-for-200mw-data-center-site-in-ohio/\", \"https://blockspace.media/in // Storage layer: prefer localStorage (persistent across reloads) in deployed HTML.
// Fall back to window.storage only when localStorage is unavailable (e.g. private browsing with storage blocked).
// NOTE: window.storage exists in Claude artifact sandbox but is session-scoped — do NOT use it as primary.
const _useWinStorage = (()=>{
  try { localStorage.setItem('__test__','1'); localStorage.removeItem('__test__'); return false; }
  catch(e) { return typeof window.storage !== 'undefined'; }
})();
const storage={
  async set(k,v){
    try{
      if(_useWinStorage) return await window.storage.set(k,v);
      localStorage.setItem(k,v); return true;
    }catch(e){return false;}
  },
  async get(k){
    try{
      if(_useWinStorage) return await window.storage.get(k);
      const v=localStorage.getItem(k); return v?{value:v}:null;
    }catch(e){return null;}
  },
  async list(pfx){
    try{
      if(_useWinStorage) return await window.storage.list(pfx);
      const keys=Object.keys(localStorage).filter(k=>k.startsWith(pfx)); return{keys};
    }catch(e){return{keys:[]};}
  },
};

async function cacheGet(pfx,id){try{const r=await storage.get(pfx+id);return r?JSON.parse(r.value):null;}catch(e){return null;}}
async function cacheLoadAll(pfx){try{const keys=(await storage.list(pfx))?.keys||[];const out={};for(const k of keys){try{const r=await storage.get(k);if(r){const p=JSON.parse(r.value);out[k.replace(pfx,'')]={...p.data,_ts:p.ts};}}catch(e){}}return out;}catch(e){return{};}}
async function cacheIdSet(pfx){try{const keys=(await storage.list(pfx))?.keys||[];return new Set(keys.map(k=>k.replace(pfx,'')));}catch(e){return new Set();}}

const stripMD=t=>(t||'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/^#{1,6}\s+/gm,'').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/^\s*[-*>]+\s*/gm,'').replace(/^\s*\d+\.\s+/gm,'').trim();
function cleanVal(v){if(v==null)return'TBD';let s=stripMD(String(v)).replace(/^[-:•*\s]+/,'').trim();const l=s.toLowerCase();if(!s||['tbd','n/a','na','unknown','—','-'].includes(l)||l.includes('not disclosed')||l.includes('research pending'))return'TBD';return s;}
function getSections(txt){const sec={};const parts=txt.split(/\n##\s+/);for(let i=1;i<parts.length;i++){const nl=parts[i].indexOf('\n');const h=(nl>-1?parts[i].slice(0,nl):parts[i]).trim().toLowerCase();const b=(nl>-1?parts[i].slice(nl+1):'').trim();if(h.includes('metric'))sec.metrics=b;else if(h.includes('grid')||h.includes('power'))sec.grid=b;else if(h.includes('tax'))sec.tax=b;else if(h.includes('environ'))sec.env=b;else if(h.includes('water'))sec.water=b;else if(h.includes('timeline'))sec.timeline=b;else if(h.includes('investor'))sec.investors=b;else if(h.includes('politic'))sec.political=b;else if(h.includes('source'))sec.sources=b;}return sec;}
function toResult(fac,txt){const s=getSections(txt);const fl=t=>t?t.split('\n')[0].replace(/^[-•*\d.]+\s*/,'').trim():'';const srcs=s.sources?s.sources.split('\n').map(x=>x.replace(/^[-•*\d.]+\s*/,'').trim()).filter(Boolean):[];
  // Alias-based extraction: tries each alias in order, returns first match found in the metrics block
  const gmA=aliases=>{
    if(!s.metrics)return'';
    for(const k of aliases){
      const m=s.metrics.match(new RegExp(k+'\\s*:\\s*([^\\n]+)','i'));
      if(m){const v=m[1].replace(/^-+\s*/,'').trim();if(v&&!/^\bTBD\b$/i.test(v))return v.replace(/\bTBD\b.*/i,'').trim();}
    }
    return'';
  };
  const gm=k=>gmA([k]);
  const startDate=gmA(['Operational Date','Operational','Online Date','Go-?Live Date','Expected Operational','In-?Service Date'])||gmA(['Construction Start','Construction Start Date','Groundbreaking','Groundbreaking Date'])||'';
  const sizeSqFt=gmA(['Square Feet','Square Footage','Facility Size','Total Square Feet','Building Size','Sq\\.?\\s*Ft\\.?'])||'';
  const totalInvestment=gmA(['Total Investment','Investment','Total Capital Investment','Project Cost','Capital Expenditure','Capex'])||fac.cost||'';
  return{status:fac.status,startDate,powerMW:fac.mw>0?fac.mw+' MW':'',sizeSqFt,totalInvestment,employment:{construction:gmA(['Construction Jobs','Construction Employment']),permanent:gmA(['Permanent Jobs','Permanent Employment','Full-?Time Jobs']),totalPayroll:gmA(['Annual Payroll','Payroll'])},gridImpact:{summary:fl(s.grid),detail:s.grid||''},taxImplications:{summary:fl(s.tax),detail:s.tax||''},environmentalImpact:{summary:fl(s.env),detail:s.env||''},waterLoop:{answer:fl(s.water)||'TBD',detail:s.water||''},timeline:s.timeline||'',investors:s.investors||'',politicalContext:s.political||'',sources:srcs,dataConfidence:srcs.length>2?'High':srcs.length>0?'Medium':'Low',_raw:Object.keys(s).length===0?txt:''};}

  {id:'envFlag',label:'Env Impact Score',unit:'1-4',needsScan:true,get:(f,bs)=>bs?(ENV_SCORE[bs.envFlag]||null):null},
];
const STATUS_GROUPS=['All','Active','Under Constr.','Permitted','Site Selected','Pre-Constr.','Scouting','DENIED','Withdrawn'];
const REGION_GROUPS=['All','Central','North-East','North-West','South-East','South-West'];
const TYPE_GROUPS=['All','AI/Hyperscale','Cloud/AI','Colocation','Crypto/HPC','Crypto/Mining','Hyperscale','Telecom/Colo','Enterprise/Medical','Government'];
function calcStats(vals){if(!vals.length)return null;const s=[...vals].sort((a,b)=>a-b);const mean=vals.reduce((a,b)=>a+b,0)/vals.length;const mid=Math.floor(s.length/2);const median=s.length%2===0?(s[mid-1]+s[mid])/2:s[mid];const stddev=Math.sqrt(vals.reduce((a,b)=>a+Math.pow(b-mean,2),0)/vals.length);return{mean,median,stddev,min:s[0],max:s[s.length-1],n:vals.length};}
function fmtVal(v,fieldId){if(v===null||v===undefined)return'—';const scoreLabels={priority:{4:'Critical',3:'High',2:'Medium',1:'Low'},gridRisk:{4:'Very High',3:'High',2:'Medium',1:'Low'},envFlag:{4:'Significant',3:'Moderate',2:'Minor',1:'None'}};if(scoreLabels[fieldId]){const lbl=scoreLabels[fieldId][Math.round(v)];return lbl?`${lbl} (${v.toFixed(1)})`:v.toFixed(2);}if(v>=1000)return v.toLocaleString(undefined,{maximumFractionDigits:1});return v<1?v.toFixed(3):v.toFixed(2);}

    </div>

      {[['Status',STATUS_GROUPS,statusF,setStatusF],['Region',REGION_GROUPS,regionF,setRegionF],['Type',TYPE_GROUPS,typeF,setTypeF]].map(([lbl,opts,val,set])=>(

          <select value={val} onChange={e=>set(e.target.value)} style={{fontSize:11,border:'0.5px solid #e2e8f0',borderRadius:5,padding:'2px 6px',color:'#475569',background:'white',cursor:'pointer'}}>
            {opts.map(o=><option key={o}>{o}</option>)}

        <button onClick={()=>setDir(d=>d==='desc'?'asc':'desc')} style={{fontSize:10,padding:'2px 9px',borderRadius:99,border:'0.5px solid #e2e8f0',cursor:'pointer',background:'white',color:'#64748b',marginLeft:4}}>{dir==='desc'?'↓ High→Low':'↑ Low→High'}</button>

            <div style={{position:'relative',marginBottom:4}}>
              <div style={{height:8,background:'#f1f5f9',borderRadius:99,overflow:'hidden',position:'relative'}}>
                <div style={{position:'absolute',height:'100%',borderRadius:99,background:'linear-gradient(90deg,#3b82f6,#7c3aed)',left:'0%',width:'100%',opacity:0.12}}/>
                <div style={{position:'absolute',top:-2,width:3,height:12,background:'#1e293b',borderRadius:2,left:`${Math.max(0,Math.min(97,((st.mean-st.min)/(st.max-st.min||1))*100))}%`}}/>

            <div style={{display:'flex',gap:14,fontSize:9,color:'#94a3b8',marginTop:4}}>
              <span>{fmtVal(st.min,fieldId)} (min)</span>
              <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:8,height:2,background:'#1e293b',display:'inline-block',borderRadius:1}}/> Mean</span>
              <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:8,height:2,background:'#f59e0b',display:'inline-block',borderRadius:1}}/> Median</span>
              <span style={{marginLeft:'auto'}}>{fmtVal(st.max,fieldId)} (max)</span>
            </div>
          </div>}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            {[{label:`🏆 Top ${topN}`,data:top,accent:'#22c55e',textAccent:'#065f46'},{label:`⚠️ Bottom ${topN}`,data:bottom,accent:'#ef4444',textAccent:'#991b1b'}].map(({label,data,accent,textAccent})=>(
              <div key={label} style={{background:'white',borderRadius:10,border:'0.5px solid #e2e8f0',overflow:'hidden'}}>
                <div style={{background:'#1e293b',color:'white',padding:'7px 12px',fontSize:11,fontWeight:500}}>{label} · {field.label}</div>
                {data.map((r,i)=>{const ss=SS(r.fac.status);const pct=Math.max(3,Math.round((r.val/barMax)*100));return <div key={r.fac.id} style={{padding:'8px 12px',borderBottom:'0.5px solid #f8fafc'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6,marginBottom:5}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:9,color:'#94a3b8',marginBottom:1,fontWeight:600}}>#{i+1}</div>
                      <div style={{fontSize:11,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'#1e293b'}}>{r.fac.name}</div>

                      <span style={T.pill(ss.bg,ss.cl,8)}>{r.fac.status}</span>

                  <div style={{height:4,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:accent,borderRadius:99}}/></div>

            ))}

          {byRegion.length>1&&<div style={{background:'white',borderRadius:10,border:'0.5px solid #e2e8f0',padding:'12px 14px',marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:600,color:'#1e293b',marginBottom:10,textTransform:'uppercase',letterSpacing:'.05em'}}>Avg {field.label} by Region</div>

// ── BASE SCAN VIEW ────────────────────────────────────────────────────────────
function BaseScanView({bsCache,setBsCache,resCache,onBack,onResearch}){
  const[scanning,setScanning]=useState(false);
  const[paused,setPaused]=useState(false);
  const[prog,setProg]=useState({done:0,total:0,current:'',log:[]});
  const[sortBy,setSortBy]=useState('priority');
  const pauseRef=useRef(false),stopRef=useRef(false);
  const PO={Critical:4,High:3,Medium:2,Low:1};
  const cached=Object.keys(bsCache);
  const pct=prog.total>0?Math.round((prog.done/prog.total)*100):0;
  const sorted=useMemo(()=>FACS.filter(f=>bsCache[f.id]).sort((a,b)=>{const sa=bsCache[a.id],sb=bsCache[b.id];if(sortBy==='priority')return(PO[sb.priority]||0)-(PO[sa.priority]||0);if(sortBy==='recent')return(sb._ts||0)-(sa._ts||0);return a.name.localeCompare(b.name);}),[bsCache,sortBy]);
  async function runScan(rescanAll){
    stopRef.current=false;pauseRef.current=false;setPaused(false);
    const queue=rescanAll?[...FACS]:FACS.filter(f=>!bsCache[f.id]);
    if(!queue.length)return;
    setScanning(true);setProg({done:0,total:queue.length,current:'Starting...',log:[]});
    let done=0;
    for(const fac of queue){
      if(stopRef.current)break;
      while(pauseRef.current)await new Promise(r=>setTimeout(r,200));
      setProg(p=>({...p,current:`Scanning ${fac.name}...`,done}));
      try{const result=await apiBaseScan(fac);const entry={...result,_ts:Date.now()};await cacheSet(BS_PFX,fac.id,result);setBsCache(prev=>({...prev,[fac.id]:entry}));setProg(p=>({...p,log:[{name:fac.name,ok:true,pri:result.priority},...p.log].slice(0,60)}));}
      catch(e){setProg(p=>({...p,log:[{name:fac.name,ok:false},...p.log].slice(0,60)}));}
      done++;await new Promise(r=>setTimeout(r,450));
    }
    setScanning(false);setProg(p=>({...p,done,current:`Done — ${done} processed`}));
  }
  async function rescanOne(fac){try{const result=await apiBaseScan(fac);const entry={...result,_ts:Date.now()};await cacheSet(BS_PFX,fac.id,result);setBsCache(prev=>({...prev,[fac.id]:entry}));}catch(e){console.error(e);}}
  const togglePause=()=>{pauseRef.current=!pauseRef.current;setPaused(p=>!p);};
  const stopScan=()=>{stopRef.current=true;setScanning(false);setPaused(false);};
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <div style={T.nav}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#64748b',cursor:'pointer',fontSize:12,padding:0}}>← Back</button>
        <span style={{fontSize:14,fontWeight:600,color:'white'}}>⚡ Base Scan</span>
        <span style={{fontSize:11,color:'#475569',background:'rgba(255,255,255,0.06)',padding:'2px 8px',borderRadius:99}}>{cached.length} / {FACS.length} cached</span>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{display:'flex',gap:4,alignItems:'center'}}>
          <span style={{fontSize:10,color:'#475569'}}>Sort:</span>
          {['priority','recent','name'].map(s=><button key={s} onClick={()=>setSortBy(s)} style={{fontSize:10,padding:'2px 7px',borderRadius:99,border:'none',cursor:'pointer',background:sortBy===s?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.05)',color:sortBy===s?'white':'#64748b',textTransform:'capitalize'}}>{s}</button>)}
        </div>
      </div>
    </div>
    {(scanning||prog.done>0)&&<div style={{padding:'8px 20px',background:'white',borderBottom:'0.5px solid #e2e8f0',flexShrink:0}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
        <span style={{color:'#64748b',fontStyle:scanning&&!paused?'italic':'normal'}}>{prog.current}</span>
        <span style={{fontWeight:600,color:'#1e293b'}}>{pct}% ({prog.done}/{prog.total})</span>
      </div>
      <div style={{height:4,background:'#f1f5f9',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#22c55e,#16a34a)',borderRadius:99,transition:'width .35s'}}/></div>
    </div>}
    {scanning&&prog.log.length>0&&<div style={{background:'#0f172a',padding:'5px 20px',flexShrink:0,maxHeight:64,overflowY:'auto'}}>
      {prog.log.slice(0,4).map((l,i)=><div key={i} style={{fontSize:10,fontFamily:'monospace',color:l.ok?'#4ade80':'#f87171',lineHeight:1.6}}>{l.ok?'✓':'✗'} {l.name}{l.ok&&l.pri?' · '+l.pri:''}</div>)}
    </div>}
    {cached.length===0&&!scanning
      ?<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',color:'#94a3b8'}}>
          <div style={{fontSize:32,marginBottom:10}}>⚡</div>
          <div style={{fontSize:14,fontWeight:500,color:'#475569',marginBottom:6}}>No base scans cached yet</div>
          <div style={{fontSize:12,lineHeight:1.7,maxWidth:360}}>Base scans populate via the scheduled research pipeline — none are cached for the current filter yet.</div>
        </div>
      :<div style={{flex:1,overflowY:'auto',padding:'12px 20px'}}>
          <div style={{fontSize:11,color:'#94a3b8',marginBottom:10}}>{sorted.length} cached · sorted by {sortBy}</div>
          {sorted.map(fac=>{
            const sc=bsCache[fac.id],ss=SS(fac.status),hasResearch=resCache.has(fac.id);
            return <div key={fac.id} style={{...T.card,borderLeft:`3px solid ${PRC[sc.priority]||'#94a3b8'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:12,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:3}}>{fac.name}</div>
                  <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
                    <span style={{fontSize:10,color:'#94a3b8'}}>{fac.company} · {fac.county} Co. · {fac.mw>0?fac.mw+' MW':'?'}</span>
                    <CacheTag type={hasResearch?'full':'base'} ts={sc._ts}/>
                  </div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <span style={T.pill(ss.bg,ss.cl)}>{fac.status}</span>
                  <span style={{...T.pill('#f8fafc',PRC[sc.priority]||'#94a3b8'),border:`0.5px solid ${PRC[sc.priority]||'#e2e8f0'}20`}}>{sc.priority}</span>
                </div>
              </div>
              <BaseScanCard sc={sc} compact={false}/>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
                <span style={{fontSize:9,color:'#cbd5e1'}}>{sc._ts?new Date(sc._ts).toLocaleString():'—'}</span>
                <div style={{display:'flex',gap:5}}>
                  <button onClick={()=>onResearch(fac)} style={{...T.btn('#0f172a','white','none')}}>View Research →</button>
                </div>
              </div>
            </div>;
          })}
        </div>
    }
  </div>;
}

// ── MAP VIEW ──────────────────────────────────────────────────────────────────
function MapView({bsCache,onResearch,onBack}){
  const[sf,setSf]=useState('All');
  const[sel,setSel]=useState(null);

        <div style={{padding:'9px 16px',fontSize:10,fontWeight:600,color:RT.teal,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,borderBottom:`1px solid ${RT.border}`}}>— Core Data</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)'}}>
          {[['Start Date',r.startDate],['Power',r.powerMW||(fac.mw>0?fac.mw+' MW':'')],['Size (sq ft)',r.sizeSqFt],['Investment',r.totalInvestment||fac.cost],['Constr. Jobs',r.employment?.construction],['Perm. Jobs',r.employment?.permanent],['Payroll',r.employment?.totalPayroll],['Type',fac.type],['Region',fac.region]].map(([l,v])=>{const cv=cleanVal(v),tbd=cv==='TBD';return <div key={l} style={{padding:'10px 14px',borderBottom:`1px solid ${RT.border}`,borderRight:`1px solid ${RT.border}`}}><div style={{fontSize:8,color:RT.textLow,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3,fontFamily:RT.mono}}>{l}</div><div style={{fontSize:13,fontWeight:tbd?400:700,color:tbd?RT.textLow:RT.textHi,fontFamily:RT.mono,fontStyle:tbd?'italic':'normal'}}>{tbd?'not disclosed':cv}</div></div>;})}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,fontWeight:600,color:RT.amber,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,marginBottom:8}}>— Four-Pillar Analysis <span style={{color:RT.textLow,fontWeight:400,letterSpacing:'normal',textTransform:'none'}}>· tap to expand</span></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {pillars.map(p=><div key={p.k} onClick={()=>setExp(exp===p.k?null:p.k)} style={{background:RT.surface,borderRadius:6,border:`1px solid ${RT.border}`,borderTop:`2px solid ${p.color}`,padding:13,cursor:'pointer'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <div style={{width:20,height:20,borderRadius:3,border:`1px solid ${p.color}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:p.color}}>{p.icon}</div>
                <span style={{fontSize:10,fontWeight:600,color:RT.textHi,fontFamily:RT.mono,textTransform:'uppercase',letterSpacing:'.05em'}}>{p.title}</span>
              </div>
              <span style={{fontSize:9,color:RT.textLow}}>{exp===p.k?'▲':'▼'}</span>
            </div>
            <div style={{fontSize:11.5,fontWeight:400,color:RT.textMid,lineHeight:1.5}}>{p.sum?stripMD(p.sum):'Tap to expand'}</div>
            {exp===p.k&&p.det&&<div style={{fontSize:11.5,color:RT.textMid,lineHeight:1.7,borderTop:`1px solid ${RT.border}`,paddingTop:9,marginTop:9,whiteSpace:'pre-wrap'}}>{stripMD(p.det)}</div>}
          </div>)}
        </div>
      </div>
      <Section title="Proposed Timeline" content={r.timeline}/>
      <Section title="Notable Investors & Organizers" content={r.investors}/>
      <Section title="Political Statements & Records" content={r.politicalContext} note="[R]=Republican  [D]=Democrat  [I]=Independent"/>
      {r._raw&&<Section title="Full Research Output" content={r._raw}/>}
      {r.sources?.length>0&&<div style={{background:RT.surface,borderRadius:6,border:`1px solid ${RT.border}`,padding:'12px 16px',marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:RT.textLow,textTransform:'uppercase',letterSpacing:'.1em',fontFamily:RT.mono,marginBottom:8}}>— Sources ({r.sources.length})</div>
        {r.sources.map((s,i)=><div key={i} style={{fontSize:11,color:RT.textMid,marginBottom:4,paddingLeft:12,borderLeft:`2px solid ${RT.border}`}}>{s}</div>)}
      </div>}
    </div>
  </div>;
}

function PendingView({fac,onBack}){
  return <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',background:'#f8fafc'}}>
    <div style={{fontSize:32,marginBottom:14}}>🕐</div>
    <div style={{fontSize:17,fontWeight:600,color:'#1e293b',marginBottom:4}}>{fac.name}</div>
    <div style={{fontSize:12,color:'#64748b',marginBottom:20}}>{fac.company} · {fac.county} County</div>
    <div style={{fontSize:13,color:'#475569',maxWidth:380,lineHeight:1.7,marginBottom:20}}>
      Full research for this facility hasn't been generated yet. This tracker updates on a scheduled cadence — <strong>Active-tier</strong> facilities (under construction, permitting, site selection) refresh weekly; <strong>Settled-tier</strong> facilities refresh periodically since their status changes rarely.
    </div>
    <button onClick={onBack} style={{...T.btn('#0f172a','white','none'),fontSize:12,padding:'7px 16px'}}>← Back to search</button>
  </div>;
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const[authed,setAuthed]=useState(getAuth());
  const[view,setView]=useState('boot');
  const[query,setQuery]=useState('');
  const[filter,setFilter]=useState('All');
  const[tierFilter,setTierFilter]=useState('All');
  const[sel,setSel]=useState(null);
  const[res,setRes]=useState(null);
  const[err,setErr]=useState('');
  const[msg,setMsg]=useState('');
  const[prog,setProg]=useState(0);
  const[isCached,setIsCached]=useState(false);
  const[resCache,setResCache]=useState(new Set());
  const[bsCache,setBsCache]=useState({});
  const[model,setModel]=useState('sonnet');
  useEffect(()=>{if(!authed)return;(async()=>{const[bs,rc]=await Promise.all([cacheLoadAll(BS_PFX),cacheIdSet(DC_PFX)]);setBsCache(bs);setResCache(rc);setView('home');})();},[authed]);
  const filtered=useMemo(()=>{let list=FACS;if(filter!=='All')list=list.filter(f=>f.region===filter);if(tierFilter!=='All')list=list.filter(f=>f.tier===tierFilter);if(query.length>=2){const q=query.toLowerCase();list=list.filter(f=>f.name.toLowerCase().includes(q)||f.company.toLowerCase().includes(q)||f.county.toLowerCase().includes(q)||f.city.toLowerCase().includes(q));}else list=list.filter(f=>f.mw>=25||f.cost!=='');return list;},[query,filter,tierFilter]);
  const doResearch=useCallback(async(fac)=>{
    const fm={...fac,_model:model};
    const hit=await cacheGet(DC_PFX,fac.id);
    if(hit){setSel(fm);setRes({...hit.data,_cachedAt:new Date(hit.ts).toLocaleDateString()});setIsCached(true);setView('results');return;}
    // No cached deep research available in this static build — show pending state, no API call.
    setSel(fm);setRes(null);setView('pending');
  },[model]);
  function handleLogout(){try{localStorage.removeItem(AUTH_KEY);}catch(e){}setAuthed(false);setView('boot');}
  if(!authed)return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  if(view==='boot')return <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',gap:12,color:'#94a3b8',fontSize:12,background:'#0f172a',flexDirection:'column'}}><div style={{width:22,height:22,border:'2px solid #1e293b',borderTopColor:'#3b82f6',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Loading...<style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style></div>;
  if(view==='pending')return <PendingView fac={sel} onBack={()=>setView('home')}/>;
  if(view==='results')return <ResultsView fac={sel} res={res} isCached={isCached} bsScan={bsCache[sel?.id]} onBack={()=>setView('home')}/>;
  if(view==='map')return <MapView bsCache={bsCache} onResearch={f=>{setView('home');setTimeout(()=>doResearch(f),50);}} onBack={()=>setView('home')}/>;
  if(view==='basescan')return <BaseScanView bsCache={bsCache} setBsCache={setBsCache} resCache={resCache} onBack={()=>setView('home')} onResearch={f=>{setView('home');setTimeout(()=>doResearch(f),50);}}/>;
  if(view==='analytics')return <AnalyticsView bsCache={bsCache} onBack={()=>setView('home')}/>;
  return <HomeView query={query} setQuery={setQuery} filter={filter} setFilter={setFilter} tierFilter={tierFilter} setTierFilter={setTierFilter} model={model} setModel={setModel} filtered={filtered} onSelect={f=>doResearch(f)} resCache={resCache} bsCache={bsCache} error={err} onMap={()=>setView('map')} onBaseScan={()=>setView('basescan')} onAnalytics={()=>setView('analytics')} onLogout={handleLogout}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
</body>
</html>
