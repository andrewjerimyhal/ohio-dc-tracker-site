365 Data Centers establishes/operates a carrier-hotel colocation facility at 1255 Euclid Ave, Cleveland (365 Data Centers founded 2002, headquartered San Francisco). January 2017 - DataBank acquires the Cleveland facility as part of its acquisition of 365 Data Centers' assets, rebranding it CLE1. 2016 (context) - DataBank itself acquired by Digital Bridge Holdings (with TIAA, Allstate Investments, The Edgewater Funds) from Avista Capital Partners, DigitalBridge's inaugural data center investment. June 2022 - DigitalBridge completes a recapitalization of DataBank, bringing in new institutional investors. Present - CLE1 continues to operate as a small (0.4 MW) colocation/carrier-hotel site; per 2026 local reporting (Signal Cleveland), the facility does not support AI-scale workloads.\", \"investors\": \"DataBank (operator) is owned/controlled by DigitalBridge Group, Inc. (NYSE: DBRG), which acquired DataBank in 2016 alongside TIAA, Allstate Investments, and The Edgewater Funds; a June 2022 recapitalization brought additional institutional capital into the DataBank platform. No investor or ownership disclosure is broken out specifically for the CLE1 Cleveland asset — ownership is at the DataBank platform level.\", \"politicalContext\": \"No facility-specific political statements or records from named officials about DataBank CLE1 were found in searches of local (Cleveland/Cuyahoga County) government sources, trade press, or news coverage. Local coverage (Signal Cleveland, 2026) discusses Cleveland's downtown data centers generally, including DataBank's small carrier-hotel presence, but does not quote or cite any named elected official commenting specifically on this facility. This should not be confused with a separate, much larger $1.6B data center project proposed in Cleveland by Lakeland Equity, which has drawn distinct local economic-development attention but is an unrelated facility and operator.\", \"sources\": [\"https://www.datacenterjournal.com/data-centers/ohio/cleveland/databank-cleveland-cle1/\", \"https://www.ocolo.io/colocation/databank/cle1-downtown-cleveland/\", \"https://www.datacenters.com/databank-cle1-downtown-cleveland\", \"https://cloudandcolocation.com/datacenters/databank-cleveland-data-center-cle1/\", \"https://www.datacenterhawk.com/colo/databank/1255-euclid-avenue-suite-200/cle1\", \"https://www.databank.com/data-centers/cleveland/1255-euclid-ave/\", \"https://www.datacentermap.com/usa/ohio/cleveland/databank-cleveland/\", \"https://www.databank.com/wp-content/uploads/2025/11/CLE1-datasheet.pdf\", \"https://baxtel.com/data-center/databank-cleveland-cle1\", \"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\", \"https://365datacenters.com/company/\", \"https://mergr.com/transaction/the-edgewater-funds-acquires-databank\", \"https://www.datacenterdynamics.com/en/news/digitalbridge-completes-databank-recapitalization/\", \"https://www.databank.com/resources/press-releases/digital-bridge-acquires-databank-launches-data-center-platform/\", \"https://ir.digitalbridge.com/news-releases/news-release-details/digitalbridge-announces-recapitalization-databank\", \"https://neo-trans.blog/2026/05/07/more-details-emerge-on-cleveland-data-center/\", \"https://fiscalhub.gis.cuyahogacounty.gov/pages/1f53705b2f314f1d96a52b9000ae4752\", \"https://data-cuyahoga.opendata.arcgis.com/maps/c81420a146d94cb88d303ecf5a769619\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogaeverstream-parma": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed. The facility at 12875 Corporate Drive, Suite A, Parma, OH 44130 originated as a regional interconnection/data center site built out by OneCommunity (the Cleveland-area nonprofit fiber network) prior to 2014. OneCommunity's board created the for-profit entity Everstream around 2013-2014, and Everstream took over operation of the Parma facility as part of that spinout; no exact commissioning date for the data center itself was found in county, city, or trade-press records.\", \"powerMW\": \"1 MW per tracker record. Third-party colocation directories (Newby Ventures/PeeringDB-sourced listings, Inflect, DataCenterJournal aggregation) describe the facility with a 1.2 MW power capacity, N+1 UPS, and backup generators — figures are directory-reported and not independently verified against utility or county filings.\", \"sizeSqFt\": \"Approximately 10,000 sq ft, per third-party data center directory aggregation (DataCenterJournal/Inflect-sourced listings). Not corroborated by Cuyahoga County Auditor property records, which could not be matched to this address via public search.\", \"totalInvestment\": \"Not publicly disclosed at the facility level. At the corporate level, Everstream (the operator) received a $50 million investment from Boston-based M/C Partners and J.P. Morgan Asset Management in September 2015 (closed October 15, 2015) as part of its spinout from OneCommunity — this was a company-wide capitalization, not a Parma-facility-specific investment figure.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed for this specific facility. At the company level, Everstream announced on June 13, 2019 plans to create 90 new full-time positions in Ohio (50 in Northeast Ohio/Cleveland region, 40 in Central Ohio/Columbus) tied to an Ohio Job Creation Tax Credit — this was a statewide hiring announcement across engineering, network operations, field services and sales roles, not specific to the Parma data center.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No documented grid impact\", \"detail\": \"No utility interconnection filings, transmission studies, or grid-capacity news coverage were found for this facility. As a 1 MW-class telecom colocation site, it would be expected to draw standard commercial/industrial utility service; the specific electric utility serving the site was not confirmed in public sources.\"}, \"taxImplications\": {\"summary\": \"No facility-specific abatement, CRA, or PILOT record found\", \"detail\": \"No Community Reinvestment Area (CRA) agreement, PILOT, or property tax abatement specific to 12875 Corporate Drive was located. The only tax-incentive record found is Everstream's 2019 statewide Ohio Job Creation Tax Credit announcement tied to a 90-job hiring plan across Cleveland and Columbus, which is a company/payroll-based credit rather than a property-based abatement, and was not confirmed as applying to the Parma facility itself.\"}, \"environmentalImpact\": {\"summary\": \"No environmental impact filings or permits found\", \"detail\": \"No EPA, Ohio EPA, or local environmental permit records specific to this facility were located via public search. As an existing/retrofitted commercial building in an established industrial/office corridor of Parma rather than a greenfield hyperscale build, it does not appear in state siting or environmental review databases found.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Generic data center directory listings (e.g., DataCenterJournal-style aggregator pages) describe the facility's cooling as 'a combination of air-cooled and water-cooled methods,' but this appears to be templated directory language rather than facility-verified reporting, and no primary source (Everstream materials, utility water-use permits, or trade press) confirms whether the site uses a closed-loop, open-loop, or evaporative cooling system.\"}, \"timeline\": \"Pre-2014: Facility operated as part of OneCommunity's Northeast Ohio fiber/interconnection network at 12875 Corporate Drive, Parma. 2013-2014: OneCommunity's board approves creation of for-profit subsidiary Everstream. September-October 2015: Everstream receives $50M investment from M/C Partners and J.P. Morgan Asset Management, becomes standalone company holding majority of OneCommunity's fiber/data center assets (OneCommunity retains minority stake). June 13, 2019: Everstream announces plans for 90 new Ohio jobs (Cleveland and Columbus) supported by an Ohio Job Creation Tax Credit. February 2023: Bill Major becomes President and CEO, succeeding founder Brett Lindsey. May 28, 2025: Everstream reaches agreement to sell substantially all operations to Bluebird Fiber and files Chapter 11 bankruptcy (U.S. Bankruptcy Court, Southern District of Texas). August 1, 2025: Bankruptcy court approves sale to Bluebird Fiber, with a prevailing bid of $384.6 million. March 6, 2026: Bluebird Fiber completes purchase of substantially all Everstream assets and operations, forming a combined ~36,000-route-mile fiber network across 12 states — implying the Parma facility's ownership has transferred (or is transferring) from Everstream to Bluebird Fiber as of this research date (July 2026), though a Bluebird-branded confirmation specific to the Parma site was not found.\", \"investors\": \"Historical/company-level ownership chain: OneCommunity (nonprofit, original network owner) -> Everstream spun out as for-profit entity (2013-2015) -> $50M investment from M/C Partners and J.P. Morgan Asset Management (2015) -> later investor group reported to include AMP Capital Investors, Dexus, InfraBridge, J.P. Morgan Asset Management, and M/C Partners, with Everstream operating as a subsidiary of Midwest Fiber Acquisition LLC -> May-August 2025 Chapter 11 bankruptcy -> assets acquired by Bluebird Fiber (deal completed March 6, 2026, ~$384.6M). No investor or ownership disclosure specific to the Parma facility alone (as distinct from the parent company) was found.\", \"politicalContext\": \"No facility-specific political statements or records were found from named officials (e.g., Parma Mayor Timothy DeGeeter [D, per Ohio Democratic Party affiliation as reported in local election coverage — not independently re-verified against Ballotpedia in this pass], Cuyahoga County Council members, or state legislators) specifically addressing the Everstream Parma data center. Searches of the Parma mayor's office, city council records, and Ohio Tax Credit Authority materials returned only generic company or program information, not statements tied to this facility. Stating explicitly per instructions: no facility-specific political statements exist in the sources checked, rather than fabricating any.\", \"sources\": [\"https://www.datacenterjournal.com/data-centers/ohio/parma/everstream-parma-data-center/\", \"https://www.datacentermap.com/usa/ohio/cleveland/everstream-parma-data-center/\", \"https://www.newby-ventures.com/research/db/facility/3394\", \"https://www.peeringdb.com/fac/3394\", \"https://inflect.com/12875-corporate-drive-parma/onecommunity/datacenter/onecommunity-everstream-parma-data-center\", \"https://www.datacenters.com/providers/everstream\", \"https://everstream.net/press-releases/everstream-announces-plans-to-create-90-new-jobs-in-ohio/\", \"https://www.prnewswire.com/news-releases/everstream-receives-50m-investment-from-mc-partners-and-jp-morgan-asset-management-300140704.html\", \"http://everstream.net/onecommunity-launches-everstream/\", \"https://www.crainscleveland.com/article/20150913/NEWS/309139996/onecommunity-sells-internet-business-to-raise-cash\", \"https://quadcitiesbusiness.com/bluebird-fiber-completes-purchase-of-everstream-assets-operations/\", \"https://www.telecompetitor.com/bluebird-fibers-everstream-acquisition-gains-a-key-approval/\", \"https://www.businesswire.com/news/home/20250801140830/en/Everstream-Receives-Court-Approval-for-Sale-of-Business-to-Bluebird-Fiber\", \"https://www.businesswire.com/news/home/20250527278639/en/Everstream-Reaches-Agreement-for-Sale-of-Business-to-Bluebird-Fiber\", \"https://bluebirdfiber.com/bluebird-fiber-completes-purchase-of-everstream-assets/\", \"https://bluebirdfiber.com/bluebird-fiber-to-significantly-expand-market-reach-via-purchase-of-everstream-assets/\", \"https://elevenflo.com/blog/everstream-solutions-bankruptcy\", \"https://www.crainscleveland.com/technology/everstream-acquired-bluebird-fiber/\", \"https://www.clevelandohio.gov/news/ohio-tax-credit-authority-approves-11-million-job-creation-tax-credits-two-cleveland-projects\", \"https://cityofparma-oh.gov/222/Mayors-Office\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogaexpedient-neo-151": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not publicly disclosed. The Garfield Heights 1 / NEO 151 building is described in trade press as Expedient's original Cleveland-area data center. A 10-Oct-2011 Expedient press release references completion of a power-plant upgrade at this 'original Garfield Heights data center,' implying it was already an established, operating facility well before 2011 (likely built in the mid-to-late 2000s), but no primary source gives an exact commissioning date.\", \"powerMW\": \"Nameplate 3 MW per tracker file. Vendor data sheets describe 2.7 MW critical IT load with 6.0 MW total diesel generator capacity (2N UPS); an older data sheet cites 1,600+ kVA of A/B redundant power plant capacity and 2.5 MW generators with ~4,000 gallons of on-site fuel storage. Figures vary slightly by source/vintage.\", \"sizeSqFt\": \"Approximately 42,000 sq ft total building space with about 24,000 sq ft of raised-floor colocation space, per datacenters.com; one directory (DataCenterJournal) cites a 44,067 sq ft building footprint. Combined with its sister facility Garfield Heights 2 (NEO 152), Expedient's two Garfield Heights buildings total roughly 66,800 sq ft and 4.7 MW of combined critical IT load.\", \"totalInvestment\": \"Not publicly disclosed for original construction. Data Center Dynamics reported Expedient invested 'more than $1 million' in electrical infrastructure upgrades (two 300kVA Liebert UPS units and a second 1.25 MW Caterpillar generator) to expand its Cleveland-area data center capacity (circa 2012); it is not clear from available sources whether this specific investment applied to NEO 151 (Garfield Heights 1) or its sister building NEO 152 (Garfield Heights 2).\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No county, city, or utility filings referencing grid load or transmission impacts specific to this facility were located. The Garfield Heights area is served by The Illuminating Company (a FirstEnergy Corp. utility); the facility carries redundant utility feeds plus on-site diesel backup generation (figures cited range from 2.5 MW to 6.0 MW total generator capacity across different vendor data sheets), but no utility interconnection study, load forecast, or grid-impact statement specific to NEO 151 was found.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No Cuyahoga County Fiscal Officer, County Auditor, or City of Garfield Heights record specifically identifying a Community Reinvestment Area (CRA) abatement, PILOT agreement, or Ohio state sales/use-tax data-center exemption (ORC 122.175) tied to this facility was found. Cuyahoga County does publish a general Abatements & TIFs GIS layer that may contain parcel-level detail not captured in this search.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No environmental permit filings, zoning/land-use case records, or environmental impact statements specific to this facility were found in available public or trade-press sources.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Vendor literature describes air-based mechanical cooling via CRAC units (up to ~600 tons across roughly 28 units in one data sheet) rather than a chilled-water plant, but no source explicitly characterizes the cooling system as closed-loop, open-loop, or evaporative, so water-usage/loop status cannot be confirmed.\"}, \"timeline\": \"Sept 2001: Expedient (originally 'US VoiceData') founded in Cleveland, Ohio, later expanding via acquisitions (RMRC, Dec 2001; Expedient, Apr 2002; Yipes Markets, May 2002). Undated (pre-2011, likely mid-to-late 2000s): Garfield Heights 1 / NEO 151 becomes Expedient's original Cleveland-area colocation data center. Oct 10, 2011: Expedient completes a power-plant upgrade at the 'original Garfield Heights' facility and begins an expansion (doubling capacity) of its second Cleveland-area facility. Mar 27, 2012: Expedient again expands its second Cleveland data center, adding UPS and generator capacity. Jan 26, 2015: Expedient announces completion of Phase 1 of a third Cleveland-area data center (6,500 sq ft raised floor). Dec 2, 2019: AMP Capital completes its acquisition of Expedient from Landmark Media Enterprises, LLC, in a deal reported at over $500 million; AMP Capital's infrastructure-equity arm (later rebranded InfraBridge, now under DigitalBridge Group) becomes Expedient's investment sponsor. No facility-specific event after 2019 was found in this search.\", \"investors\": \"Expedient Data Centers was founded in Cleveland, Ohio in 2001 and is now headquartered in Pittsburgh, PA. In December 2019, Expedient was acquired by AMP Capital (an Australian asset manager) from prior owner Landmark Media Enterprises, LLC, in a deal reported at more than $500 million company-wide (not facility-specific). AMP Capital's international infrastructure-equity business was subsequently absorbed by DigitalBridge Group, which now operates as InfraBridge and serves as Expedient's investment manager/sponsor. No separate real-estate owner or investor specific to the NEO 151 building was identified; it operates as part of Expedient's national colocation portfolio.\", \"politicalContext\": \"No facility-specific political statements, endorsements, council votes, or records from named local, county, or state officials referencing the Expedient NEO 151 / Garfield Heights facility were found in this search. Unlike newer large-load hyperscale data-center proposals in Ohio, this is a long-established colocation facility (predating 2011) and does not appear to have generated public hearings or elected-official commentary captured in available news or government-record sources.\", \"sources\": [\"https://www.datacenters.com/expedient-cleveland-151-neo\", \"https://inflect.com/building/15166-neo-parkway-garfield-heights/expedient/datacenter/expedient-cleveland-151-neo\", \"https://cloudandcolocation.com/city/garfield-heights/\", \"https://www.datacenterhawk.com/marketplace/providers/expedient/15166-neo-parkway/cleveland-151\", \"https://static.datacentermap.com/company/expedient-communications/datacenter1315/Expedient%20Garfield%20Heights%201%20Data%20Sheet.pdf\", \"https://www.expedient.com/uploads/EXP__Sell_Sheet--DC_Cleveland151.pdf\", \"https://marketplace.upstack.com/data-centers/expedient-data-center-cleveland-cleveland-151\", \"https://cloudandcolocation.com/datacenters/expedient-communications-cleveland-data-center-neo-151/\", \"https://baxtel.com/data-center/expedient-garfield-heights-1\", \"https://baxtel.com/data-center/expedient-garfield-heights-2\", \"https://www.datacenterjournal.com/data-centers/ohio/cleveland/expedient-cleveland-151-neo/\", \"https://www.datacentermap.com/usa/ohio/cleveland/expedient-cleveland/\", \"https://www.datacentermap.com/usa/ohio/cleveland/expedient-cleveland-152/\", \"https://www.datacenterknowledge.com/business/expedient-completes-third-data-center-in-hometown-cleveland\", \"https://www.datacenterdynamics.com/en/news/expedient-invests-more-than-1-million-to-expand-cleveland-datacenter-2/\", \"https://www.expedient.com/about/media/2011-10-10-expedient-data-centers-expansion-complete/\", \"https://www.expedient.com/about/media/2012-03-27-expedient-expanding-second-cleveland-data-center-again/\", \"https://expedient.com/about/media/2015-01-26-expedient-announces-latest-data-center-expansion-in-cleveland/\", \"https://expedient.com/about/board-and-investors/\", \"https://www.datacenterdynamics.com/en/news/digitalbridge-acquires-infrastructure-equity-business-from-amp-subsidiary-becomes-investment-manager-for-expedient/\", \"https://expedient.com/about/media/expedient-secures-new-investment-sponsor-amp-capital-to-fund-continued-growth-and-expansion-of-its-data-center-and-enterprise-cloud-platforms/\", \"https://expedient.com/about/media/expedient-announces-the-completion-of-previously-announced-acquisition-by-amp-capital/\", \"https://expedient.com/about/overview/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogaexpedient-neo-152": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Not precisely confirmed for the 15248 Neo Parkway (NEO 152) building specifically. Circumstantial evidence points to circa 2007: an Expedient press release dated Feb 19, 2007, announced acquisition of a '24,000 sq. ft. state-of-the-art data center' in the Cleveland area, closely matching NEO 152's 24,850 sq ft total footprint. An August 2008 press mention cites a $4.8 million build of a 'second data center in Cleveland,' and further expansion/open-house events were announced in October 2011 and May 2012. No single primary source gives an explicit 'commissioned' date for this exact building.\", \"powerMW\": \"2.0 MW total facility power (matches tracker figure). Note: aggregate third-party listings sometimes combine this building with the adjacent Expedient Garfield Heights 1 (NEO 151) facility for a combined ~4.7 MW / ~66,800 sq ft across both buildings.\", \"sizeSqFt\": \"24,850 sq ft total building space, with approximately 12,500 sq ft of raised-floor colocation space (consistent across datacenters.com, cloudandcolocation.com, and inflect.com listings). One older source describes a similar nearby facility as ~21,000-24,000 total sq ft with ~13,000 sq ft raised floor, indicating minor variance across listing sources over time.\", \"totalInvestment\": \"Not publicly disclosed as a single total for this specific building. Related public figures found: an August 2008 reference to a $4.8 million build of a 'second data center in Cleveland' (plausibly this facility or an expansion of it), and a separate Data Center Dynamics headline stating Expedient invested 'more than $1 million' in a later Cleveland data center expansion. No authoritative all-in capital cost for NEO 152 specifically was located.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed at the facility level. Expedient (the parent operating company) reports approximately 400 total employees company-wide across all of its Pittsburgh, Cleveland, and Boston-area locations combined, not broken out per site.\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No utility- or transmission-specific grid impact disclosures found for this facility.\", \"detail\": \"No filings, press releases, or trade-press coverage were found discussing substation upgrades, transmission capacity requests, or grid load impacts tied specifically to the 15248 Neo Parkway site (electric utility serving Garfield Heights is generally The Illuminating Company/FirstEnergy, but no facility-specific interconnection details were found). Given the facility's modest 2 MW nameplate load — small relative to hyperscale campuses — it is unlikely to have triggered large-scale transmission review or public utility proceedings.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement, CRA, PILOT, or Ohio sales-tax exemption records were found.\", \"detail\": \"Searches of Cuyahoga County Fiscal Officer/Auditor property-search resources and Garfield Heights economic development pages did not surface an abatement agreement tied to this parcel. Ohio's state sales/use tax exemption for qualifying data centers (Ohio Revised Code 122.175) targets large-scale projects with significant minimum investment and payroll thresholds; no evidence was found that this smaller, already-established colocation building applied for or received that program, a local Community Reinvestment Area (CRA) abatement, or a PILOT agreement.\"}, \"environmentalImpact\": {\"summary\": \"No facility-specific environmental permitting or land-use filings were found.\", \"detail\": \"No Ohio EPA, U.S. EPA, or Garfield Heights planning/permit records specific to this address were located in public searches. The facility sits within the existing 'NEO' business/industrial park alongside the adjacent Expedient Garfield Heights 1 (NEO 151) building, suggesting a build-out/retrofit within an established light-industrial corridor rather than a greenfield development requiring novel environmental review.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No source specifies whether the facility uses closed-loop chilled water, an evaporative cooling tower, or an air-cooled (DX/CRAC) system. Available specifications describe an N+1 cooling configuration providing 500+ tons of total cooling capacity supported by Liebert UPS units and Caterpillar diesel generators for backup power — details consistent with a legacy circa-2007 colocation build — but actual water consumption or loop architecture was not disclosed in any source reviewed.\"}, \"timeline\": \"Feb 19, 2007: Expedient press release announces acquisition of a 24,000 sq. ft. Cleveland-area data center (footprint closely matching NEO 152's 24,850 sq ft; likely origin of this facility, though the exact building match is not 100% confirmed). Aug 2008: Expedient reported investing $4.8 million to build a 'second data center in Cleveland.' Oct 2009: Expedient blog post ('Special Announcement') references a Cleveland-area data center expansion. Oct 10, 2011: Expedient press release, 'Data Centers Expansion Complete,' covering Cleveland facility work. May 10, 2012: Public open house unveiling Cleveland's expanded data center. Oct 2019 - Dec 2, 2019: Expedient (the parent company operating this and all its facilities) is acquired by AMP Capital from prior sponsor Landmark Media Enterprises (a 14-year investor); deal closes Dec 2, 2019. Ongoing: facility continues to operate as an active colocation site (Expedient 'Cleveland 152 / NEO 152'), rated for 2.0 MW total power per current third-party data center directories, consistent with the tracker's 'Active' status.\", \"investors\": \"Expedient (the operating company) was founded in 2001 and is headquartered in Pittsburgh, PA; it operates colocation facilities in Cleveland (including this Garfield Heights site), Pittsburgh, and Boston. Ownership history at the company level: Landmark Media Enterprises, LLC served as Expedient's investment sponsor for approximately 14 years before selling its stake; AMP Capital (via its infrastructure equity platform) announced its acquisition of Expedient in October 2019, with the deal completing December 2, 2019. AMP Capital's infrastructure business was subsequently rebranded/absorbed into InfraBridge, which is now a division of publicly traded DigitalBridge Group, Inc. (NYSE: DBRG). No ownership stake, financing, or investor commitment specific to the individual Garfield Heights (NEO 152) property — as distinct from the Expedient company as a whole — was identified.\", \"politicalContext\": \"No facility-specific political statements, endorsements, or records from named officials referencing Expedient NEO 152 or its Garfield Heights campus were found in local news, city council/planning records, or trade press searches. This absence is consistent with the facility's profile as a small (2 MW), long-established colocation site rather than a new large-scale project of the kind that typically draws public officials' comment; no claim of political commentary is made for this facility.\", \"sources\": [\"https://www.datacenters.com/expedient-cleveland-152-neo\", \"https://cloudandcolocation.com/datacenters/expedient-communications-cleveland-data-center-neo-152/\", \"https://cloudandcolocation.com/city/garfield-heights/\", \"https://inflect.com/building/15248-neo-parkway-garfield-heights/expedient/datacenter/expedient-cleveland-152-neo\", \"https://inflect.com/building/15166-neo-parkway-garfield-heights/expedient/datacenter/expedient-cleveland-151-neo\", \"https://www.datacenterhawk.com/colo/expedient/15248-neo-parkway/cleveland-152\", \"https://www.expedient.com/blog/special-announcement-expedients-latest-data-center-expansion/\", \"https://www.expedient.com/about/media/2011-10-10-expedient-data-centers-expansion-complete/\", \"https://www.datacentermap.com/usa/ohio/cleveland/expedient-cleveland-152/\", \"https://baxtel.com/data-center/expedient-garfield-heights-2\", \"https://expedient.com/about/press/2007-02-19-expedient-data-centers-acquires-24000-sq-ft-state-of-the-art-data-center/\", \"https://expedient.com/about/media/2012-05-11-clevelands-expanded-data-center-unveiled-at-may-10th-open-house/\", \"https://www.datacenterdynamics.com/en/news/expedient-invests-more-than-1-million-to-expand-cleveland-datacenter-2/\", \"https://marketplace.upstack.com/data-centers/expedient-data-center-cleveland-cleveland-151\", \"https://www.datacentermap.com/usa/ohio/cleveland/expedient-cleveland/\", \"https://www.datacenterknowledge.com/business/expedient-completes-third-data-center-in-hometown-cleveland\", \"https://expedient.com/about/board-and-investors/\", \"https://www.prnewswire.com/news-releases/expedient-secures-new-investment-sponsor-amp-capital-to-fund-continued-growth-and-expansion-of-its-data-center-and-enterprise-cloud-platforms-300941607.html\", \"https://expedient.com/about/media/expedient-announces-the-completion-of-previously-announced-acquisition-by-amp-capital/\", \"https://www.datacentermap.com/c/expedient-communications/\", \"https://www.garfieldhts.org/172/Economic-Development\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogafusion-connect-cleveland": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Colocation operations at 1621 Euclid Ave began in 2008 under Fidelity Voice and Data (predecessor brand); the site continued as Fusion Connect's Cleveland colocation facility following Fidelity's rebrand to Fusion Connect (some directories list the Fusion Connect-branded listing as established/opened in 2015). Exact commissioning date of current 1 MW build-out is not publicly disclosed.\", \"powerMW\": \"1 MW fully built-out power capacity (matches tracker file)\", \"sizeSqFt\": \"6,000 sq. ft. of fully built-out whitespace\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No facility-specific grid impact data published\", \"detail\": \"No county, utility, or trade-press filings were found quantifying this facility's grid load or naming its utility interconnection. As a 1 MW leased colocation suite inside an existing multi-tenant downtown office building (the historic 'Carrier Hotel' district at 1621 Euclid Ave), it is a minor load compared to hyperscale campuses and has not been the subject of grid-capacity reporting. Cleveland's utility for the area is generally served by the Illuminating Company (FirstEnergy) for downtown Cleveland, but no source explicitly ties this to Fusion Connect's suite.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement, CRA, PILOT, or Ohio data-center sales-tax exemption found\", \"detail\": \"Searches of Cleveland CRA program materials, Ohio data center sales-tax exemption program references, and Fusion Connect press materials turned up no record of this facility receiving a Community Reinvestment Area abatement, PILOT, or Ohio Tax Credit Authority data-center sales-tax exemption (which typically require large capital investment/payroll thresholds this small colocation suite is unlikely to meet). Not publicly disclosed.\"}, \"environmentalImpact\": {\"summary\": \"No environmental permits or land-use filings specific to this facility were found\", \"detail\": \"The facility occupies leased floors within an existing historic downtown office building (reported as the Keith Building/downtown 'Carrier Hotel' at 1621 Euclid Ave) rather than new-build construction, so it would not have triggered the kind of new-construction environmental review, land clearing, or siting permits associated with greenfield hyperscale projects. No environmental impact statements, air/water permits, or land-use case filings referencing Fusion Connect's Cleveland suite were located. Note: Cleveland City Council's 2026 data center moratorium and environmental/utility-cost concerns raised by Mayor Justin Bibb's administration relate to new, standalone hyperscale/AI data center proposals, not to this existing small colocation tenant space.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No source specifies the cooling system design (chiller type, open/closed loop, evaporative use) for this facility. As a modest 1 MW leased colocation suite within an existing office building, it likely relies on conventional building/CRAC-type air-cooling rather than large-scale evaporative or open-loop water cooling typical of hyperscale campuses, but this is inference, not a documented fact. Not publicly disclosed.\"}, \"timeline\": \"2008: Colocation services begin at 1621 Euclid Ave, Cleveland under Fidelity Voice and Data. Later: Fidelity Voice and Data rebrands to Fusion Connect (following corporate mergers under the Fusion Telecommunications/Fusion Connect umbrella); some directories date this Fusion Connect-branded listing to 2015. June 2019: Fusion Connect, Inc. files Chapter 11 bankruptcy (approx. $691.5M debt from 2018 reverse mergers). December 2019: Bankruptcy court approves reorganization plan, wiping out ~$272M of debt via debt-for-equity swap to senior secured lenders; Fusion emerges from Chapter 11. January 2022: Fusion completes a second, out-of-court restructuring — a debt-for-equity exchange eliminating over $240M of funded debt, with a Morgan Stanley Private Credit-affiliated fund becoming majority shareholder (alongside Ellington Management Group and Investcorp Credit Management BDC as supporting investors); recapitalization included $55M in new preferred equity and refinancing of a $60M credit facility. Facility continues operating today as a 1 MW / 6,000 sq ft multi-tenant colocation site within Cleveland's downtown carrier-hotel district. April-May 2026: Cleveland City Council debates and advances a three-month moratorium on new, standalone data center development citywide (unrelated to this existing facility specifically).\", \"investors\": \"Fusion Connect, Inc. is the operating company; it does not own the underlying building at 1621 Euclid Ave (it leases colocation space within the multi-tenant 'Carrier Hotel' building, historically associated with H5 Data Centers branding in some directories). Corporate ownership: following Fusion Connect's June 2019 Chapter 11 filing and December 2019 emergence, senior secured (first-lien) lenders received equity in the reorganized company. In January 2022, Fusion Connect completed a further out-of-court recapitalization in which a fund affiliated with/managed by Morgan Stanley Private Credit became the majority shareholder, with Ellington Management Group and Investcorp Credit Management BDC, Inc. as additional investors; the deal cut over $240 million of funded debt and included $55M in new preferred equity. No subsequent (2023-2026) change-of-control has been identified in available sources, so Morgan Stanley Private Credit-affiliated ownership appears to remain current as of this research.\", \"politicalContext\": \"No political statements or official records specifically addressing the Fusion Connect Cleveland facility (1621 Euclid Ave) were found. Cleveland Mayor Justin Bibb (whose office has not had party affiliation independently confirmed via Ballotpedia/Secretary of State record in this research pass, so no [R]/[D]/[I] tag is applied here) and Cleveland City Council have made public statements in 2026 about a citywide three-month moratorium on new, standalone data center projects, citing environmental protection and rising utility costs — e.g., Bibb stated the city is 'doing the work right now to make sure we have strong policies and real safe guards in place to protect our environment and address rising utility costs.' However, these statements concern new/proposed large-scale (hyperscale/AI) data center development generally and do not name or reference Fusion Connect's existing small colocation facility. No official has been found commenting on this specific facility.\", \"sources\": [\"https://baxtel.com/data-center/fusion-connect-cleveland\", \"https://baxtel.com/data-centers/fusion-connect\", \"https://www.datacentermap.com/usa/ohio/cleveland/fidelity-voice-and-data/\", \"https://www.datacentermap.com/c/fusion-connect/\", \"https://cloudscene.com/data-center/united-states-of-america/cleveland/fusion-cleveland\", \"https://www.peeringdb.com/fac/1419\", \"https://colocationm.com/united-states/cleveland-dc-2\", \"https://elevenflo.com/blog/fusion-connect-chapter-11-reorganization\", \"https://www.fusionconnect.com/about/press-releases/fusion-successfully-completes-financial-restructuring\", \"https://www.channelfutures.com/telephony-uc-collaboration/fusion-connect-exits-bankruptcy-begins-new-era-under-new-ownership\", \"https://www.channelfutures.com/regulation-compliance/fusion-connect-files-chapter-11-bankruptcy\", \"https://news.bloomberglaw.com/bankruptcy-law/fusion-connect-bankruptcy-plan-to-swap-debt-for-equity-approved\", \"https://www.davispolk.com/experience/fusion-connect-emerges-chapter-11-bankruptcy\", \"https://www.msspalert.com/news/morgan-stanley-acquiring-mssp-fusion-connect-cybersecurity-business-recapitalized-for-growth\", \"https://www.scworld.com/news/fusion-connect-acquired-by-morgan-stanley\", \"https://www.proskauer.com/release/proskauer-advises-ad-hoc-group-of-lenders-on-the-recapitalization-of-fusion-connect\", \"https://www.prnewswire.com/news-releases/fusion-connect-raises-55m-in-new-investment-round-to-accelerate-growth\", \"https://www.morganstanley.com/im/en-us/capital-seeker/companies/fusion.html\", \"https://signalcleveland.org/cleveland-to-keep-flock-cameras-pause-data-center-projects/\", \"https://www.news5cleveland.com/news/local-news/cleveland-city-council-advances-three-month-pause-on-new-standalone-data-center-projects\", \"https://signalcleveland.org/cleveland-data-center-moratorium-city-council/\", \"https://signalcleveland.org/cleveland-cuyahoga-county-data-center-moratorium-guidelines/\", \"https://www.cleveland19.com/2026/04/28/cleveland-city-council-proposes-moratorium-data-center-development/\", \"https://neo-trans.blog/2026/05/07/more-details-emerge-on-cleveland-data-center/\", \"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\", \"https://morethanjustparks.com/data-center-tracker/fusion-connect-cleveland-oh--68308904-4d7a-43fa-a55b-d91def8bdfe9\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogah5-cleveland-technology-center": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Building has operated as a telecom/data hub since the Terremark era (pre-2013). Under ByteGrid ownership (acquired 2013), the data center itself became operational in May 2015. H5 Data Centers acquired the facility from ByteGrid in January 2017, becoming H5's first Ohio site.\", \"powerMW\": \"10 MW per current H5/tracker listings (matches tracker file). An older ByteGrid-era facility description cited access to up to 20 MW fed via FirstEnergy through two separate substations, so historical capacity may be larger than currently marketed load.\", \"sizeSqFt\": \"Approximately 333,000-351,000 sq ft total across three connected buildings (sources vary: DataCenterDynamics and some H5 materials cite 333,000 sq ft; datacenters.com/ocolo.io and other directories cite 351,000 sq ft), including roughly 150,000 sq ft of raised-floor colocation space. A 2026 expansion permit covers an additional ~59,720 sq ft of interior build-out.\", \"totalInvestment\": \"H5 and its customers state they have invested more than $100 million cumulatively at this site to qualify for Ohio's data-center sales-tax exemption. ByteGrid secured a $100 million credit facility in 2013 tied to acquiring/building out the property. Separately, H5's architect filed a permit around June 12, 2026 for a new $30 million interior expansion/renovation project.\", \"employment\": {\"construction\": \"Not publicly disclosed for the specific 2026 $30M H5 expansion.\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed as a dollar figure. Ohio's data-center sales-tax exemption program requires qualifying facilities to pay at least $1.5 million in annual employee compensation; H5 states it has 'exceeded' the employment and payroll requirements for this facility, but exact figures are not public.\"}, \"gridImpact\": {\"summary\": \"Served by The Illuminating Company (a FirstEnergy company) via two substations; facility currently marketed with access to roughly 10 MW of redundant power at under $0.06/kWh.\", \"detail\": \"H5 marketing materials state The Illuminating Company provides 'more than 10 MW of redundant, reliable and affordable power' to the Rockwell Ave. facility. An older ByteGrid-era facility profile described access to up to 20 MW fed through two separate FirstEnergy substations. The 2026 expansion filing includes a new backup generator building (to be screened by a wall along St. Clair Ave.), indicating added on-site backup generation capacity is being built regardless of any change in grid draw.\"}, \"taxImplications\": {\"summary\": \"First Ohio data center approved for the state's 100% sales-and-use tax exemption on qualifying data-center equipment (2014); H5 markets it as one of only two Ohio facilities with that full exemption.\", \"detail\": \"Ohio's JobsOhio-administered Data Center Tax Exemption requires a company to invest at least $100 million in capital over three years and pay at least $1.5 million in annual qualifying employee compensation. H5 states it and its customers have exceeded both thresholds at this facility. One secondary source (unverified against primary abatement records) describes a '15-year sales tax break from the state valued at about $20 million' tied to this site. The 2026 $30M expansion is a separate capital project moving through the City of Cleveland's standard permitting process, which is currently the subject of a proposed council moratorium (see politicalContext) that could affect timing/approval. County-auditor property-tax abatement (CRA/PILOT) records specific to this parcel were not located in this research; the confirmed abatement is the state sales-and-use tax exemption, not a real-property tax abatement.\"}, \"environmentalImpact\": {\"summary\": \"The active 2026 expansion involves demolition of adjacent retail buildings and displacement of small businesses to build out a generator yard; the operator markets closed-loop cooling to reduce water draw.\", \"detail\": \"As part of its 2026 expansion, an H5 affiliate (CLE-Infrastructure LLC) filed in April 2026 to demolish buildings at 1522-1540 and 1616 St. Clair Ave. to expand its generator yard, displacing tenants including Cleveland Safe/Cleveland Key & Security, Ambitious Ink Printing Company, Kk Lustrouz Kollection clothier, and the Spaces & Co. co-working space. New backup generators are being sited along St. Clair Ave. and screened by a new wall/facade. Because this is redevelopment of an existing downtown telecom building rather than greenfield construction, no wetlands or new-land-use permitting issues were identified in available sources.\"}, \"waterLoop\": {\"answer\": \"Yes\", \"detail\": \"H5's own marketing materials state the Cleveland facility uses a closed-loop chilled-water cooling system that recirculates water without a constant feed, which the company says cuts water consumption 80-90% versus older/open-loop systems. This is a vendor-supplied claim; it was not independently verified against county or state environmental permit records in this research.\"}, \"timeline\": \"Pre-2013: Building operates as a telecom hub ('Cleveland Technology Center'), previously owned by Terremark, hosting long-haul fiber nodes for CenturyLink, XO/Verizon, Windstream, and Zayo. 2013: ByteGrid acquires the property and secures a $100M credit facility for data-center build-out. 2014: Facility becomes the first in Ohio approved for the state's data-center sales-and-use tax exemption. May 2015: ByteGrid's data center becomes operational. January 2017: H5 Data Centers acquires the facility from ByteGrid, its first Ohio site, rebranding it the H5 Cleveland Technology Center. 2018: H5 announces a data-center expansion at the Cleveland site. April 2026: H5 affiliate CLE-Infrastructure LLC files to demolish buildings at 1522-1540 and 1616 St. Clair Ave. to expand the generator yard. June 12, 2026: H5's architect files a City of Cleveland permit for a $30 million, ~59,720 sq ft interior data-center fit-out plus a new generator building. April-July 2026: Cleveland City Council debates and advances a citywide data-center permitting moratorium that could affect review of H5's pending expansion permit (three-month version advanced by the Utilities Committee in late June 2026).\", \"investors\": \"H5 Data Centers is a privately held data-center operator founded in 2013 by CEO Josh Simms. It acquired the Cleveland asset from prior owner ByteGrid in January 2017. H5 has partnered with private-equity firm Novacap on other portfolio acquisitions industry-wide, but it could not be confirmed from public sources whether Novacap holds an equity stake specifically in the Cleveland facility. H5 is privately held and does not appear to be an SEC-reporting issuer, so no facility-specific SEC filings were located (a Wells Fargo CMBS prospectus referencing the Cleveland property as loan collateral circa 2017 was noted but not verified in detail).\", \"politicalContext\": \"No political statements from named officials specifically about the H5 Cleveland Technology Center / 1625 Rockwell Ave. facility by name were found. The facility's pending 2026 expansion sits within a broader, highly active Cleveland data-center policy debate: Council Member Charles Slife [D] (identified via search results as affiliated with the Ward 17 Democratic Club and the Cuyahoga County Democratic Party executive committee -- note Cleveland council seats are formally nonpartisan) introduced legislation in April 2026 proposing a one-year moratorium on new and expansion data-center permits/certificates of occupancy citywide. The council's Utilities Committee, chaired by Council Member Brian Kazy (party affiliation not confirmed in this research), advanced a scaled-back three-month moratorium on standalone data-center projects in late June 2026, with Kazy stating 'We're not saying \\\"absolutely no\\\" to data centers.' Mayor Justin Bibb (party affiliation not independently verified in this research) made general public remarks -- not naming H5 -- that hyperscale data centers 'have no future' in dense city neighborhoods, and said via Instagram the city is 'doing the work right now to make sure we have strong policies and real safeguards in place to protect our environment and address rising utility costs,' following the city's May 2026 rejection of an unrelated $1.6 billion, 150 MW data-center proposal by Lakeland Equity Group in the Slavic Village neighborhood. All of the above statements addressed Cleveland data-center policy generally, not the H5/Rockwell Avenue facility specifically, though as an active permit applicant H5 is directly affected by the moratorium debate.\", \"sources\": [\"https://www.interconnection.fyi/data-center/project/h5-data-centers-0037a5a7\", \"https://www.datacenters.com/h5-cleveland\", \"https://www.datacentermap.com/usa/ohio/cleveland/h5dc-cleveland/\", \"https://cloudandcolocation.com/datacenters/h5-data-centers-cleveland-data-center/\", \"https://neo-trans.blog/2026/04/06/downtown-data-center-to-demo-stores/\", \"https://clevelandmagazine.com/articles/downtown-cleveland-s-largest-data-center-plans-major-expansion/\", \"https://h5datacenters.com/cleveland-data-center.html\", \"https://h5datacenters.com/cleveland-colocation.html\", \"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\", \"https://clevelandmagazine.com/articles/h5-data-centers-files-plans-for-30-million-cleveland-expansion/\", \"https://neo-trans.blog/2026/06/12/cleveland-data-center-plans-to-expand/\", \"https://www.datacenterdynamics.com/en/news/h5-files-to-renovate-cleveland-data-center/\", \"https://h5datacenters.com/h5-cleveland-data-center-expansion-2018.html\", \"https://h5datacenters.com/h5-aquires-cleveland-data-center.html\", \"https://neo-trans.blog/2026/05/07/more-details-emerge-on-cleveland-data-center/\", \"https://www.sec.gov/Archives/edgar/data/0000850779/000153949717000433/n858_424b2-x22.htm\", \"https://baxtel.com/data-center/h5-cleveland-technology-center-ctc\", \"https://baxtel.com/news/h5-to-expand-its-cleveland-data-center\", \"https://www.crainscleveland.com/article/20170127/NEWS/170129846/h5-buys-massive-downtown-cleveland-data-center\", \"https://www.datacenterdynamics.com/en/news/h5-buys-333000-sq-ft-data-center-in-cleveland/\", \"https://www.clevelandohio.gov/node/5868\", \"https://northeastohioregion.com/news/bytegrid-celebrates-grand-opening-in-downtown-cleveland/\", \"https://datacenterhawk.com/resources/market-insights/h5-data-centers-expands-to-cleveland-what-it-means\", \"https://en.wikipedia.org/wiki/H5_(US_company)\", \"https://www.news5cleveland.com/news/local-news/cleveland-city-council-advances-three-month-pause-on-new-standalone-data-center-projects\", \"https://www.axios.com/local/cleveland/2026/06/29/cleveland-data-center-moratorium\", \"https://cityofcleveland.legistar.com/LegislationDetail.aspx?ID=7993388\", \"https://www.cleveland19.com/2026/04/28/cleveland-city-council-proposes-moratorium-data-center-development/\", \"https://signalcleveland.org/cleveland-data-center-moratorium-city-council/\", \"https://signalcleveland.org/cleveland-to-keep-flock-cameras-pause-data-center-projects/\", \"https://ballotpedia.org/Charles_Slife\", \"https://www.wvxu.org/2026-05-27/cleveland-officials-take-harder-stance-on-hyperscale-data-centers\", \"https://neo-trans.blog/2026/05/14/data-center-rejection-prompts-reaction/\", \"https://www.wkyc.com/article/news/local/cleveland/cleveland-data-center-slavic-village-permit-rejected-lakeland-equity-group-mayor-justin-bibb-hyperscale-east-55th/95-283bcf74-9d60-4563-b63c-6edd1a193198\", \"https://www.ideastream.org/government-politics/2026-05-14/cleveland-rejects-permit-for-hyperscale-data-center-in-slavic-village\", \"https://signalcleveland.org/cleveland-rejects-data-center-permit-for-slavic-village/\", \"https://h5datacenters.com/cleveland-datacenter-first-for-ohio-tax-abatement.html\", \"https://www.jobsohio.com/incentives-programs/data-center-tax-exemption\", \"https://policymattersohio.org/research/indefensible-tax-breaks-for-data-centers-will-cost-ohio/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogalumen-cleveland-1": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Not publicly disclosed\", \"powerMW\": \"1 MW (per tracker file; the facility is described in colocation data sheets as having a 1 MW backup diesel generator with a standby connection for a second unit, which is consistent with this nameplate figure)\", \"sizeSqFt\": \"40,000 sq ft total space (consistently reported by both datacenters.com and datacentermap.com for 'Lumen Cleveland 1' at 4000 Chester Ave)\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"No public grid-impact disclosures found\", \"detail\": \"As a small (1 MW), decades-old legacy telecom colocation site absorbed into Level 3 Communications, then CenturyLink, then Lumen's network, this facility has not been the subject of any utility interconnection study, transmission-upgrade filing, or grid-strain coverage found in searches of Ohio utility, PUCO, or trade-press sources. This is consistent with its scale — well below the load levels (tens to hundreds of MW) that trigger grid-impact discussion for Ohio hyperscale campuses.\"}, \"taxImplications\": {\"summary\": \"No abatement, CRA, or PILOT record found tied to this specific facility\", \"detail\": \"Ohio offers a state sales-tax exemption for data centers investing at least $100 million with $1.5 million+ annual payroll, and Cleveland-area facilities (e.g., H5 Cleveland, the first Ohio project to receive this exemption, in 2014) have used municipal Community Reinvestment Area (CRA) abatements. No Cuyahoga County Auditor, City of Cleveland, or Ohio Development Services Agency record was found linking any such exemption to the Lumen/Level 3 facility at 4000 Chester Ave, and at 1 MW it falls far below the scale that typically qualifies for Ohio's major data-center tax-incentive programs.\"}, \"environmentalImpact\": {\"summary\": \"No environmental review or siting controversy found\", \"detail\": \"The facility occupies existing built telecom infrastructure at 4000 Chester Ave (a legacy Level 3 fiber point-of-presence building) rather than a new-build campus on undeveloped land. No Ohio EPA, U.S. EPA, or City of Cleveland planning-department environmental review records were located, consistent with reuse of an existing structure rather than new land development.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No public information on cooling-water usage (closed-loop, open-loop, evaporative, or air-cooled) was found for this specific facility. Small legacy telecom colocation sites of this vintage and scale typically use air-cooled/DX HVAC rather than evaporative cooling towers, but this could not be confirmed for 4000 Chester Ave specifically.\"}, \"timeline\": \"Facility originates as a Level 3 Communications network colocation/fiber POP site at 4000 Chester Ave, Cleveland (exact commissioning date not publicly disclosed). November 2017: Level 3 Communications merges into CenturyLink; the facility becomes a CenturyLink colocation site (note: this is distinct from CenturyLink's separate divestiture of ~57 of its own data centers to a BC Partners/Medina Capital consortium, completed May 2017, which formed Cyxtera — no evidence found that this Level 3-heritage Cleveland site was part of that sale). 2020: CenturyLink rebrands as Lumen Technologies; the site becomes 'Lumen Cleveland 1.' Present day: continues operating as an active Lumen colocation facility offering roughly 40,000 sq ft of space with diverse fiber connectivity.\", \"investors\": \"Not publicly disclosed as a standalone entity. The facility is owned/operated directly by Lumen Technologies, Inc. (NYSE: LUMN), a publicly traded telecommunications company; no separate joint-venture partner, REIT landlord, or third-party investor was identified for this specific site in the property and corporate records reviewed.\", \"politicalContext\": \"No facility-specific political statements, endorsements, or records from named officials referencing the Lumen Cleveland 1 / 4000 Chester Ave facility were found. Ohio's public debate over data-center tax incentives and grid impact (covered by outlets such as News 5 Cleveland and Signal Cleveland) concerns large hyperscale campuses elsewhere in the state; no coverage ties any Cuyahoga County, City of Cleveland, or Ohio state official's remarks specifically to this Lumen facility.\", \"sources\": [\"https://www.datacenters.com/lumen-cleveland-1\", \"https://www.datacentermap.com/usa/ohio/cleveland/level3-cleveland1/\", \"https://www.datacentermap.com/usa/ohio/cleveland/\", \"https://baxtel.com/data-center/lumen-cleveland-4000-chester\", \"https://baxtel.com/data-center/cleveland\", \"https://www.lumen.com/en-us/services/colocation.html\", \"https://news.lumen.com/CenturyLink-completes-sale-of-data-centers-and-colocation-business-to-consortium-led-by-BC-Partners-and-Medina-Capital\", \"https://www.datacenterdynamics.com/en/news/centurylink-completes-sale-of-its-data-center-business-now-called-cyxtera/\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://www.news5cleveland.com/news/local-news/ohios-spending-billions-on-tax-breaks-for-data-centers-now-an-incentive-battle-is-brewing\", \"https://en.wikipedia.org/wiki/Level_3_Communications\", \"https://cuyahogacountyauditor.net/property-search/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogalumen-cleveland-2-keith-bldg-": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Not publicly disclosed. The Keith Building at 1621 Euclid Avenue (Cleveland, Playhouse Square) was completed in 1921 as a historic office tower; Lumen's telecom colocation presence there traces to legacy Level 3 Communications infrastructure (Level 3 merged into CenturyLink in Nov. 2017, which rebranded as Lumen Technologies in 2020), but no specific commissioning date for the Lumen suite itself is publicly available.\", \"powerMW\": \"0 MW nameplate per tracker; industry aggregators describe only cabinet-level density (approx. 3.5 kW per cabinet, N+1 UPS/cooling) rather than a facility-wide MW figure, consistent with a small telecom colocation suite rather than a utility-scale data center.\", \"sizeSqFt\": \"Not publicly disclosed with confidence. Aggregator listings for Lumen's presence in the Keith Building give inconsistent figures (some list ~3,500 sq ft of raised-floor colocation space under the name 'Lumen Cleveland 4'; other aggregators use the labels 'Lumen Cleveland 2' or 'Lumen Cleveland 3' for what appears to be the same 1621 Euclid Ave address, with differing/overlapping specs). The Keith Building overall is a 213,000 sq ft multi-tenant office tower per K&D Real Estate Services; Lumen occupies only a small colocation footprint within it (Suite 518-WT referenced in one listing).\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No utility, transmission, or grid-load filings specific to this small in-building telecom colocation suite were found. Given the 0 MW nameplate classification and cabinet-level (kW) power draw described by colocation aggregators, this facility appears to draw standard commercial building power from the Keith Building's existing electrical service rather than requiring dedicated utility/transmission infrastructure.\"}, \"taxImplications\": {\"summary\": \"No facility-specific tax abatement, CRA, PILOT, or sales-tax exemption found\", \"detail\": \"Ohio has awarded large sales-tax exemptions and property tax abatements to major new hyperscale data center projects (e.g., Cologix in Delaware/Licking counties, H5 Cleveland in 2014), but no such facility-specific incentive was found for this small Lumen colocation suite in the Keith Building. As an existing telecom colo space within an already-standing 1921 office building rather than new-build hyperscale development, it does not appear in Ohio JobsOhio/tax-incentive announcement records located during this search.\"}, \"environmentalImpact\": {\"summary\": \"Minimal/not applicable — existing in-building colocation suite, no land development\", \"detail\": \"The facility occupies leased space within the existing historic Keith Building (built 1921) in downtown Cleveland; no new land use, site development, or environmental permitting specific to a Lumen buildout was found. No EPA, Ohio EPA, or local planning/permit filings specific to this suite were located.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No source disclosed cooling system water usage for this facility. Aggregator specs reference only N+1 UPS and N+1 cooling redundancy (mechanical/electrical specs), not water usage type. Given the small size (a few thousand square feet of colocation space within an office building) it is more likely served by conventional CRAC/DX cooling rather than an industrial closed- or open-loop water system, but this is inferential, not confirmed.\"}, \"timeline\": \"1921: Keith Building constructed as a 21-story office tower in Playhouse Square, Cleveland. Pre-2011: Level 3 Communications establishes telecom colocation presence in the building (exact date undisclosed). 2011: CenturyLink acquires Level 3's parent-adjacent assets in unrelated transactions (Savvis) as part of broader data center expansion. November 2017: CenturyLink completes acquisition of Level 3 Communications, bringing the Cleveland Keith Building colo site under the combined company. 2020: CenturyLink rebrands as Lumen Technologies; Cleveland Keith Building facility becomes 'Lumen Cleveland' (numbered inconsistently as 'Cleveland 2,' 'Cleveland 3,' or 'Cleveland 4' across different third-party listing sites). Present (2026): Facility remains listed as an active, small-footprint carrier colocation site in the Keith Building; Cogent Communications separately operates its own, larger colocation space (~3,042 sq ft) in the same building.\", \"investors\": \"Lumen Technologies, Inc. (NYSE: LUMN), a publicly traded telecommunications company headquartered in Denver/Monroe, Louisiana. The Cleveland colocation asset traces to Level 3 Communications, which merged into CenturyLink in 2017; CenturyLink rebranded as Lumen Technologies in 2020. No separate real-estate investor, REIT, or joint-venture ownership specific to this suite was identified; the Keith Building itself is managed by K&D Real Estate Services, with Lumen as a tenant/colocation operator within it.\", \"politicalContext\": \"No facility-specific political statements or records from named officials about this particular Lumen Keith Building colocation suite were found. Broader Ohio political debate over data center tax incentives (e.g., the 2026 moratorium on new data center sales-tax exemptions covered by Signal Cleveland/Signal Ohio and News 5 Cleveland) concerns large new hyperscale projects (such as Cologix in Delaware/Licking counties) and does not reference this small, pre-existing Cleveland telecom colocation site by name.\", \"sources\": [\"https://baxtel.com/data-center/lumen-cleveland-4\", \"https://baxtel.com/data-centers/lumen-technologies\", \"https://www.datacentermap.com/usa/ohio/cleveland/level3-cleveland3/\", \"https://www.datacentermap.com/usa/ohio/cleveland/keith-building/\", \"https://www.datacentermap.com/usa/ohio/cleveland/keith-building/specs/\", \"https://www.datacentermap.com/usa/ohio/cleveland/cogent-cleveland/\", \"https://inflect.com/building/1621-euclid-avenue-cleveland/lumen/datacenter/level-3-cleveland-3\", \"https://www.datacenters.com/lumen-cleveland-3\", \"https://www.datacenters.com/lumen-cleveland-4\", \"https://www.colocapacity.com/facilities/102/Cleveland%20Data%20Center%202\", \"https://www.centurylink.com/business/colocation/data-centers/cleveland.html?rid=lvltmigration\", \"https://news.centurylink.com/company-history\", \"https://signalcleveland.org/ohio-approves-last-data-center-exemption-before-moratorium/\", \"https://www.news5cleveland.com/news/local-news/ohios-spending-billions-on-tax-breaks-for-data-centers-now-an-incentive-battle-is-brewing\", \"https://cuyahogacountyauditor.net/property-search/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogastratcap-cleveland-w-150th-": "{\"data\": {\"dataConfidence\": \"Medium\", \"startDate\": \"Building constructed in 1988 as National City Bank's data center/operations facility; expanded 2008. Operated as third-party colocation (T5@Cleveland) prior to 2022; current owner StratCap (via Strategic Datasphere LLC) acquired the asset June 6, 2022. No single 'colocation opening' date is publicly disclosed — the site has functioned as a data center continuously since the late 1980s, with third-party colocation marketing dating to at least the T5 era (pre-2022).\", \"powerMW\": \"3 MW critical IT power (8,000 sq ft turnkey data hall at N+1), matching the tracker's listed 3 MW\", \"sizeSqFt\": \"187,000 sq ft total building; approximately 138,500 sq ft available for lease at time of 2022 acquisition, including an 8,000 sq ft turnkey data hall; 55,000 sq ft of raised floor referenced under prior T5 operation\", \"totalInvestment\": \"Individual purchase price for the Cleveland asset is not publicly disclosed. StratCap's Strategic Datasphere LLC acquired it June 6, 2022 as part of a 4-property portfolio (Cleveland, Jacksonville, Denver, Atlanta) with an aggregate purchase price of approximately $120.9 million (announced in a July 11, 2022 release citing >$150M in 1H2022 digital-infrastructure acquisitions). Separately, PNC reportedly sold the building itself to BFR Cleveland Office LLC in 2019 for $51.7 million (whole-building real estate transaction, not the StratCap data-center-platform deal). Deal was described as all-cash.\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed for this specific facility\", \"detail\": \"No utility- or facility-specific grid/transmission notes were found for the StratCap W 150th site. Cleveland's electric service in this area is split between Cleveland Public Power and the Cleveland Electric Illuminating Company (FirstEnergy), but no source confirms which serves this parcel or documents any load/interconnection study tied to it. Broader 2026 Cleveland City Council debate over a data-center moratorium raised general concerns about grid capacity for NEW data center loads citywide, but no source connects that discussion to this specific, already-operating 3 MW facility.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No county auditor abatement record, CRA agreement, PILOT, or facility-specific state sales-tax exemption filing was found for this address in available search results. Ohio does offer a statewide data center sales-tax exemption program in general, but no source confirms this facility's participation.\"}, \"environmentalImpact\": {\"summary\": \"Adaptive reuse of an existing 1988-built commercial/banking operations building rather than new greenfield construction\", \"detail\": \"The facility occupies a pre-existing office/bank-operations campus (built 1988, expanded 2008) that was converted to third-party colocation use, meaning no new land development was associated with the current data center use. No environmental permit filings, land-use variance records, or impact statements specific to this site were found.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"Trade press describes liquid-cooled racks capable of supporting 300+ watts per sq ft on a 48-inch raised floor, but no source specifies whether the cooling plant uses a closed-loop chilled-water system, open/evaporative cooling towers, or another configuration. Not publicly disclosed.\"}, \"timeline\": \"1988: Building constructed as National City Bank's data center and operations facility. 2008: Facility expanded following PNC Bank's acquisition of National City; PNC continued as a major tenant (~26% of building, ~14 years remaining lease term as of 2022). 2019: Building reportedly sold (PNC-related ownership) to BFR Cleveland Office LLC for $51.7 million. Pre-2022: Operated as T5@Cleveland, a colocation facility marketed by T5 Data Centers under lease from asset owner referenced as 'Legacy Investing.' June 6, 2022: StratCap's Strategic Datasphere LLC platform acquires the facility (part of a 4-asset, ~$120.9M portfolio also including Jacksonville, Denver, and Atlanta properties). 2026: Facility continues operating as an active colocation site; unrelated citywide, Cleveland City Council advances a 3-month moratorium (June-July 2026) on NEW standalone data center projects amid an AI-driven data center boom — this existing, already-operating facility is not a subject of that moratorium.\", \"investors\": \"StratCap (an alternative investment manager operating under the HMC Capital family, stratcap.com) acquired and holds the asset through its institutional data center real estate platform, Strategic Datasphere, LLC. The holding structure ties to StratCap Digital Infrastructure REIT, Inc., a non-traded REIT registered with the SEC (CIK 1868516). Prior ownership/landlord entities referenced in sourcing include 'Legacy Investing' (per Baxtel, pre-StratCap landlord under the T5 lease) and BFR Cleveland Office LLC (2019 building purchaser). PNC Bank remains a major long-term tenant leasing roughly 26% of the building.\", \"politicalContext\": \"No political statements or official records specifically about the StratCap W 150th facility were found. For broader context: in mid-2026, Cleveland City Council advanced a three-month moratorium on NEW standalone data center projects (proposed by Ward 15 Councilman Charles Slife, with Council President Blaine Griffin raising concerns about water use and grid capacity), driven by citywide AI-data-center growth pressure. Cleveland City Council seats are elected on a nonpartisan basis, and no source reviewed (news coverage, Ballotpedia, or Ohio Secretary of State record) confirmed partisan [R]/[D]/[I] affiliations for these officials, so none are tagged here. Critically, none of this moratorium coverage names or references the StratCap/W 150th facility, which is an existing, already-operating site acquired in 2022 rather than a new proposal.\", \"sources\": [\"https://baxtel.com/data-center/stratcap-4100-w-150\", \"https://www.datacenterdynamics.com/en/news/stratcap-acquires-3mw-data-center-in-cleveland/\", \"https://www.businesswire.com/news/home/20220606005928/en/StratCap-Acquires-Cleveland-Data-Center\", \"https://www.businesswire.com/news/home/20220711005947/en/StratCap-Acquires-Over-%24150-Million-in-Digital-Infrastructure-Assets\", \"https://www.connectcre.com/stories/cleveland-high-density-data-center-acquired-by-strategic-datasphere/\", \"https://www.streetinsider.com/Business+Wire/StratCap+Acquires+Cleveland+Data+Center/20180093.html\", \"https://bluevaultpartners.com/stratcap-acquires-cleveland-data-center/\", \"https://bluevaultpartners.com/stratcap-acquires-over-150-million-in-digital-infrastructure-assets/\", \"https://www.citybiz.co/article/274436/stratcap-acquires-cleveland-data-center/\", \"https://www.datacenterhawk.com/marketplace/providers/t5-data-centers/4150-w-150th-street/t5-cleveland\", \"https://www.sec.gov/Archives/edgar/data/1868516/000110465925047909/tm2514115d5_ars.pdf\", \"https://www.sec.gov/Archives/edgar/data/1868516/000110465925046353/tm2513520d1_10k.htm\", \"https://stratcap.com/\", \"https://signalcleveland.org/cleveland-data-center-moratorium-city-council/\", \"https://www.axios.com/local/cleveland/2026/06/29/cleveland-data-center-moratorium\", \"https://www.news5cleveland.com/news/local-news/cleveland-city-council-advances-three-month-pause-on-new-standalone-data-center-projects\", \"https://www.ideastream.org/government-politics/2026-04-28/no-more-data-centers-in-cleveland-council-member-proposes-one-year-moratorium\", \"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogatierpoint-cleveland": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Not publicly disclosed\", \"powerMW\": \"1 MW (per tracker record). Note: could not independently confirm this figure via TierPoint's own site or major data-center aggregators (Baxtel, DataCenterMap, DataCenters.com) for a Cleveland-specific facility — those sources consistently list downtown Cleveland colocation under other operators (DataBank's Downtown Cleveland Data Center at 0.4 MW, H5 Data Centers Cleveland Technology Center, Expedient, SecureData 365/Sungard). TierPoint's own published market list (Arkansas, Connecticut, Florida, Illinois, Kansas, Maryland, Massachusetts, Missouri, Nebraska, New York, North Carolina, Oklahoma, Pennsylvania, South Dakota, Tennessee, Texas, Washington, Wisconsin) does not name Ohio, and Baxtel's Cleveland facility list does not include a TierPoint entry.\", \"sizeSqFt\": \"Not publicly disclosed\", \"totalInvestment\": \"Not publicly disclosed for this facility specifically. (At the corporate level, TierPoint's owner Argo Infrastructure Partners has deployed roughly $3 billion in capital company-wide since 2020, but no portion of that has been publicly tied to a Cleveland site.)\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No utility interconnection filings, transmission studies, or grid-impact statements specific to a TierPoint Cleveland facility were found. At a 1 MW nameplate scale (roughly the load of a large commercial building), any grid impact would typically be minor and handled as a standard commercial service upgrade rather than a reported transmission-level event; however this is inference, not a sourced fact for this site.\"}, \"taxImplications\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No county auditor abatement record, Community Reinvestment Area (CRA) agreement, PILOT, or Ohio data-center sales-tax exemption filing specific to this facility was found. Ohio's state sales-tax exemption program for data centers generally targets large-scale projects (historically requiring very large capital investment and payroll thresholds), which a 1 MW colocation facility would likely not qualify for, but no record confirms participation either way.\"}, \"environmentalImpact\": {\"summary\": \"Not publicly disclosed\", \"detail\": \"No environmental permits, land-use filings, or siting studies specific to this facility were found. As an existing small-footprint colocation operation (rather than a new-build campus), it is unlikely to have generated the kind of environmental review now being applied to new large data center proposals in Cleveland and Akron, but this is not independently confirmed.\"}, \"waterLoop\": {\"answer\": \"Unknown\", \"detail\": \"No cooling-system details (chilled water, DX/air-cooled, evaporative, or closed-loop) specific to this facility were publicly found.\"}, \"timeline\": \"No facility-specific timeline (siting, construction, commissioning, expansions) could be confirmed. Broader company context: TierPoint's national colocation platform traces to Cequel Data Centers (founded 2010, later renamed TierPoint), which grew via acquisitions including Xand (2014, itself a roll-up of DBSI and Access Northeast under ABRY Partners since 2011), Cosentry (2016), and Windstream Hosted Solutions' data center business (2017, $575M, which added Raleigh/Charlotte, Chicago, Little Rock, and Nashville — not Ohio). No acquisition or build announcement naming a Cleveland facility was found in TierPoint's press archive, Data Center Dynamics, or Data Center Frontier coverage reviewed.\", \"investors\": \"Facility ownership/investor structure not separately disclosed. At the parent-company level, TierPoint is majority-owned by Argo Infrastructure Partners (an infrastructure investor being acquired by Apollo Global Management as of late 2025), which first invested in 2020 alongside Wafra and Macquarie Capital Principal Finance and increased its stake to majority in July 2024 and further in December 2025. Other historical TierPoint investors include Cequel III, Ontario Teachers' Pension Plan, RedBird Capital Partners, The Stephens Group, and Thompson Street Capital Partners.\", \"politicalContext\": \"No political statements or records from named officials specifically about a TierPoint Cleveland facility were found. Broader (non-facility-specific) local context: in mid-2026 Cuyahoga County's Department of Sustainability released a county-wide Data Center Development Guide for local officials evaluating power, water, and land-use impacts of NEW data center proposals, and Cleveland City Council's Utilities Committee advanced a three-month moratorium on new, standalone data center construction (with Akron separately proposing a conditional-use zoning review process for future data centers). These actions target new/proposed large-scale projects and do not reference TierPoint or this address by name, so no officials' statements can be attributed to this specific 'Settled tier' facility.\", \"sources\": [\"https://www.tierpoint.com/data-centers/\", \"https://www.tierpoint.com/about-us/\", \"https://baxtel.com/data-centers/tierpoint\", \"https://baxtel.com/data-center/cleveland\", \"https://www.datacentermap.com/usa/ohio/cleveland/\", \"https://www.datacentermap.com/usa/ohio/cleveland/databank-cleveland/\", \"https://www.datacentermap.com/usa/ohio/cleveland/h5dc-cleveland/\", \"https://www.datacenters.com/providers/tierpoint/data-center-locations\", \"https://signalcleveland.org/inside-cleveland-data-center-carrier-hotel-colocation-downtown/\", \"https://ryangrissinger.com/issues/data-centers\", \"https://www.crainscleveland.com/politics-policy/ccl-cuyahoga-county-data-center-guide-20260610/\", \"https://www.axios.com/local/cleveland/2026/06/17/cuyahoga-county-data-center-playbook\", \"https://cuyahogacms.blob.core.windows.net/home/docs/default-source/sustainability/datacenterrecommendations.pdf?sfvrsn=7d6e5664_3\", \"https://www.crainscleveland.com/politics-policy/ccl-shortened-data-center-moratorium-20260715/\", \"https://www.news5cleveland.com/news/local-news/cleveland-city-council-advances-three-month-pause-on-new-standalone-data-center-projects\", \"https://signalcleveland.org/cleveland-data-center-moratorium-city-council/\", \"https://www.wkyc.com/article/news/local/northeast-ohio/data-centers-cleveland-akron-construction-city-council-utilities-committee-planning-commission-northeast-ohio-cuyahoga-summit-county/95-a37726f6-0db1-438c-ad98-1966d8b9274d\", \"https://www.akronohio.gov/news_detail_T17_R468.php\", \"https://www.businesswire.com/news/home/20251209662043/en/Argo-Infrastructure-Partners-Increases-Ownership-and-Capital-Commitment-to-TierPoint\", \"https://www.businesswire.com/news/home/20240711878730/en/Argo-Infrastructure-Partners-Announces-Majority-Investment-in-TierPoint-to-Further-Support-Growth-of-Data-Center-Portfolio\", \"https://www.tierpoint.com/news/tierpoint-closes-500-million-investment-from-argo-infrastructure-partners/\", \"https://www.telecomramblings.com/2014/10/tierpoint-acquires-xand-doubles-footprint/\", \"https://www.datacenters.com/news/windstream-sells-data-center-business-for-575-million\", \"https://redbirdcap.com/tierpoint-agrees-to-acquire-windstreams-data-center-business-for-575-million/\"]}, \"ts\": 1784434061000}", "v67_dc_cuyahogatierpoint-mayfield-heights": "{\"data\": {\"dataConfidence\": \"Low\", \"startDate\": \"Not publicly disclosed\", \"powerMW\": \"1 MW (per tracker/nameplate figure; TierPoint does not publicly break out this facility's capacity on its own site, and independent corroboration was not found)\", \"sizeSqFt\": \"Not publicly disclosed\", \"totalInvestment\": \"Not publicly disclosed\", \"employment\": {\"construction\": \"Not publicly disclosed\", \"permanent\": \"Not publicly disclosed\", \"totalPayroll\": \"Not publicly disclosed\"}, \"gridImpact\": {\"summary\": \"
